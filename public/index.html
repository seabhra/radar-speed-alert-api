<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Cache Control -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Radar X9 BH - Alerta Inteligente (OSM + IA)</title>

  <!-- CDNs -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" crossorigin="anonymous" />
  
  <script src="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js" crossorigin="anonymous"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
    /* ==========================================
       VARIÁVEIS GLOBAIS
       ========================================== */
    :root {
        --bg-color: #0f1115;
        --panel-color: #1a1d24;
        --accent-color: #00ff88;
        --alert-color: #ff3333;
        --text-main: #ffffff;
        --text-muted: #a0a0a0;
        --sidebar-width: 68px;
        --btn-size: 50px;
    }

    /* ==========================================
       RESET E BASE
       ========================================== */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* ==========================================
       CABEÇALHO
       ========================================== */
    header {
        background-color: var(--panel-color);
        padding: 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 2px solid var(--accent-color);
        box-shadow: 0 4px 15px rgba(0, 255, 136, 0.1);
        z-index: 1000;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .app-icon {
        width: 50px;
        height: 40px;
        border-radius: 8px;
        object-fit: contain;
    }

    h1 {
        font-size: 1.2rem;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    h1 span {
        color: var(--accent-color);
    }

    /* ==========================================
       BOTÃO MENU (☰ MENU)
       ========================================== */
    .btn-menu-toggle {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        background: none;
        border: 1.5px solid rgba(0, 255, 136, 0.3);
        border-radius: 10px;
        padding: 8px 14px 6px;
        cursor: pointer;
        transition: all 0.25s ease;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-menu-toggle:hover {
        border-color: var(--accent-color);
        background: rgba(0, 255, 136, 0.06);
    }

    .btn-menu-toggle:active {
        transform: scale(0.93);
    }

    .menu-hamburger {
        display: flex;
        flex-direction: column;
        gap: 4px;
        width: 22px;
    }

    .menu-hamburger span {
        display: block;
        height: 2.5px;
        width: 100%;
        background-color: var(--accent-color);
        border-radius: 2px;
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        transform-origin: center;
    }

    .btn-menu-toggle.active .menu-hamburger span:nth-child(1) {
        transform: translateY(6.5px) rotate(45deg);
    }

    .btn-menu-toggle.active .menu-hamburger span:nth-child(2) {
        opacity: 0;
        transform: scaleX(0);
    }

    .btn-menu-toggle.active .menu-hamburger span:nth-child(3) {
        transform: translateY(-6.5px) rotate(-45deg);
    }

    .menu-label {
        font-size: 0.55rem;
        font-weight: 700;
        letter-spacing: 1.5px;
        color: var(--accent-color);
        text-transform: uppercase;
        line-height: 1;
        margin-top: 2px;
    }

    /* ==========================================
       BARRA RETRÁTIL LATERAL
       ========================================== */
    .sidebar-controls {
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        width: var(--sidebar-width);
        z-index: 500;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 20px 0;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        transform: translateX(0);
    }

    .sidebar-controls.retracted {
        transform: translateX(calc(var(--sidebar-width) + 10px));
    }

    .sidebar-controls .map-btn {
        width: var(--btn-size);
        height: var(--btn-size);
        opacity: 1;
        transition: opacity 0.25s ease 0s, transform 0.2s ease, border-color 0.2s ease;
    }

    .sidebar-controls.retracted .map-btn {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s ease 0s, transform 0.2s ease, border-color 0.2s ease;
    }

    /* ==========================================
       BARRA DE PESQUISA
       ========================================== */
    .search-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        background-color: rgba(26, 29, 36, 0.98);
        backdrop-filter: blur(8px);
        display: flex;
        gap: 12px;
        z-index: 1000;
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        padding: 0 15px;
        border-bottom: 1px solid transparent;
        transition: all 0.3s ease;
        align-items: center;
    }

    .search-container.active {
        max-height: 90px;
        opacity: 1;
        padding: 15px;
        border-bottom: 1px solid #333;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    .search-container input {
        flex: 1;
        padding: 14px 20px;
        border-radius: 30px;
        border: 1px solid #444;
        background-color: #000;
        color: #fff;
        font-size: 1rem;
        outline: none;
        font-family: 'Inter', sans-serif;
    }

    .search-container input:focus {
        border-color: var(--accent-color);
    }

    .btn-search {
        position: relative;
        flex-shrink: 0;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        background: rgba(46, 102, 158, 0.95);
        box-shadow: 0 3px 8px rgba(203, 240, 15, 0.5);
        transition: all 0.2s ease;
        overflow: hidden;
    }

    .btn-search:active {
        transform: scale(0.9);
    }

    .btn-search img {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 40px;
        height: 40px;
        object-fit: contain;
        display: block;
        transform: translate(-50%, -50%);
    }

    /* ==========================================
       CONTAINER DO MAPA
       ========================================== */
    .map-wrapper {
        position: relative;
        flex: 1;
        display: flex;
        overflow: hidden;
        width: 100%;
    }

    #map {
        width: 100%;
        height: 100%;
        background-color: #2a2a2a;
        z-index: 1;
    }

    /* ==========================================
       WIDGET DE BÚSSOLA
       ========================================== */
    .compass-widget {
        position: absolute;
        top: 20px;
        left: 5px;
        width: 65px;
        height: 65px;
        z-index: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
    }

    .compass-base {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: contain;
        z-index: 1;
        opacity: 0.9;
    }

    .compass-needle {
        position: absolute;
        width: 55%;
        height: 55%;
        object-fit: contain;
        z-index: 2;
        transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ==========================================
       BOTÕES DE CONTROLE DO MAPA
       ========================================== */
    .map-btn {
        width: var(--btn-size);
        height: var(--btn-size);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        cursor: pointer;
        background: rgba(20, 20, 20, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
        transition: all 0.2s ease;
        flex-shrink: 0;
    }

    .map-btn:hover {
        transform: scale(1.08);
        border-color: var(--accent-color);
    }

    .map-btn:active {
        transform: scale(0.92);
    }

    .map-btn img {
        width: 30px;
        height: 30px;
        object-fit: contain;
        pointer-events: none;
    }

    .alert-toggle-btn {
        background: rgba(29, 28, 28, 0.9);
        border: 2px solid rgba(255, 255, 255, 0.08);
        transition: all 0.3s ease;
    }

    .alert-toggle-btn.alert-off {
        background: rgba(222, 127, 127, 0.9);
        border-color: #888;
    }

    .alert-toggle-btn.alert-off img {
        filter: rgba(225, 82, 82, 0.9);
    }

    .alert-toggle-btn img {
        transition: all 0.3s ease;
    }

    .sidebar-controls .map-btn {
        border: 1px solid rgba(0, 255, 136, 0.35);
    }

    #btn-route-bar {
        width: 54px;
        height: 54px;
    }

    #btn-rotate-map {
        transition: transform 0.3s ease, border-color 0.2s ease;
    }

    #btn-rotate-map.rotated {
        transform: rotate(90deg);
        border-color: var(--accent-color);
        box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
    }

    .leaflet-container {
        transition: transform 0.3s ease;
    }

    /* ==========================================
       MARCADORES
       ========================================== */
    .user-gps-marker,
    .user-navigator-marker {
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        transition: none !important;
        will-change: transform;
    }

    .route-start-marker {
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        animation: pulseStart 1s ease-in-out infinite;
    }

    .route-end-marker {
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        animation: pulseEnd 1.2s ease-in-out infinite;
    }

    @keyframes pulseStart {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
        100% { transform: scale(1); opacity: 1; }
    }

    @keyframes pulseEnd {
        0% { transform: scale(1); }
        50% { transform: scale(1.15); }
        100% { transform: scale(1); }
    }

    .radar-marker-icon {
        background: transparent !important;
        border: none !important;
    }

    .radar-marker-icon img {
        width: 40px !important;
        height: 40px !important;
        object-fit: contain !important;
        display: block !important;
    }

    /* ==========================================
       WIDGET DE VELOCIDADE
       ========================================== */
    .speed-widget {
        position: absolute;
        bottom: -15px;
        left: -25px;
        width: 150px;
        height: 150px;
        z-index: 500;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .speed-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        pointer-events: none;
    }

    .speed-value {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-63%, -60%);
        font-size: 28px;
        font-weight: 700;
        font-family: 'Rajdhani', 'Oswald', 'Arial Narrow', sans-serif;
        color: #000;
        line-height: 1;
        z-index: 2;
        white-space: nowrap;
        text-align: center;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.5px;
        min-width: 3ch;
    }

    /* ==========================================
       SISTEMA DE ALERTAS
       ========================================== */
    #alert-container {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        display: none;
        animation: slideUp 0.3s ease-out;
        pointer-events: none;
    }

    @keyframes slideUp {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.02); background: linear-gradient(90deg, #ff2200, #ee0000); }
        100% { transform: scale(1); }
    }

    .alert-bar {
        background: linear-gradient(90deg, #cc0000, #990000);
        color: white;
        padding: 18px;
        display: flex;
        align-items: center;
        gap: 15px;
        box-shadow: 0 -5px 20px rgba(255, 0, 0, 0.4);
        border-top: 2px solid #ff5555;
        transition: all 0.2s ease;
    }

    .alert-bar-critico {
        animation: pulse 0.8s ease-in-out infinite;
    }

    .alert-bar img {
        width: 50px;
        height: 50px;
        filter: drop-shadow(0 0 5px rgba(0, 0, 0, 0.5));
    }

    .alert-info h3 {
        font-size: 1.2rem;
        margin-bottom: 3px;
        text-transform: uppercase;
        font-weight: 800;
    }

    .alert-info p {
        font-size: 0.95rem;
        opacity: 0.95;
    }

    /* ==========================================
       TOAST
       ========================================== */
    .toast-notification {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        background-color: rgba(20, 20, 20, 0.95);
        color: var(--text-main);
        padding: 12px 25px;
        border-radius: 50px;
        border: 1px solid #444;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
        z-index: 2000;
        opacity: 0;
        font-size: 0.95rem;
        font-weight: 600;
        text-align: center;
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.3s ease;
        white-space: nowrap;
    }

    .toast-notification.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }

    /* ==========================================
       LOADING OVERLAY
       ========================================== */
    .loading-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(20, 20, 20, 0.9);
        padding: 20px 30px;
        border-radius: 12px;
        border: 1px solid var(--accent-color);
        text-align: center;
        z-index: 1001;
        backdrop-filter: blur(5px);
    }

    .loading-spinner {
        border: 3px solid #333;
        border-top: 3px solid var(--accent-color);
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
        margin: 0 auto 10px;
    }

    @keyframes spin {
        100% { transform: rotate(360deg); }
    }

    /* ==========================================
       LOADING FULLSCREEN
       ========================================== */
    .loading-fullscreen {
        position: fixed;
        inset: 0;
        background-color: var(--bg-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .loading-fullscreen.fade-out {
        opacity: 0;
        visibility: hidden;
    }

    .loading-fullscreen .spinner-ring {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        position: relative;
        margin-bottom: 24px;
    }

    .loading-fullscreen .spinner-ring::before,
    .loading-fullscreen .spinner-ring::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 4px solid transparent;
    }

    .loading-fullscreen .spinner-ring::before {
        border-top-color: var(--accent-color);
        border-right-color: var(--accent-color);
        animation: spinRing 1s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite;
    }

    .loading-fullscreen .spinner-ring::after {
        inset: 10px;
        border-bottom-color: #ff3333;
        border-left-color: #ff3333;
        animation: spinRing 1.4s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite reverse;
    }

    @keyframes spinRing {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .loading-fullscreen .loading-text {
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-align: center;
    }

    .loading-fullscreen .loading-text span {
        color: var(--accent-color);
    }

    .loading-fullscreen .loading-sub {
        margin-top: 8px;
        font-size: 0.8rem;
        color: #777;
        animation: pulseText 1.8s ease-in-out infinite;
    }

    @keyframes pulseText {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
    }

    /* ==========================================
       OCULTAÇÕES DO LEAFLET
       ========================================== */
    .leaflet-control-zoom,
    .leaflet-control-attribution,
    .leaflet-routing-container {
        display: none !important;
    }
</style> 
</head>
<body>

  <div class="loading-fullscreen" id="loading-fullscreen">
    <div class="spinner-ring"></div>
    <div class="loading-text">Iniciando <span>Radar X9</span></div>
    <div class="loading-sub">Sincronizando satélites...</div>
  </div>

  <header>
    <div class="header-left">
      <img src="/imagens_app/ic_icon_app.png" onerror="this.style.display='none'" alt="App Icon" class="app-icon">
      <h1>RADAR <span>X9</span> BH</h1>
    </div>

    <!-- BOTÃO MENU NO HEADER -->
    <button class="btn-menu-toggle" id="btn-menu-toggle" aria-label="Abrir menu de controles">
      <div class="menu-hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="menu-label">MENU</div>
    </button>
  </header>

  <div class="map-wrapper">
    <div class="search-container" id="search-bar-radares">
      <input type="text" id="query" placeholder="Buscar radar (tipo, endereço)...">
      <button class="btn-search" id="btn-search-radar" title="Buscar"><img src="/imagens_app/ic_radar_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/646/646094.png'" alt="Busca"></button>
    </div>

    <div class="search-container" id="search-bar-rota">
      <input type="text" id="route-query" placeholder="Digite um endereço para navegar...">
      <button class="btn-search" id="btn-calc-route" title="Traçar Rota" style="background-color: #ff8c00;"><img src="/imagens_app/ic_gps_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7892/7892059.png'" alt="Rota"></button>
    </div>

    <div id="map"></div>
    <div class="toast-notification" id="toast-msg"></div>

    <div class="compass-widget">
      <img src="/imagens_app/ic_compass.png" onerror="this.style.opacity='0.3'; this.src='https://cdn-icons-png.flaticon.com/512/2838/2838773.png'" alt="Bússola" class="compass-base">
      <img src="/imagens_app/ic_compass_ponteira.png" onerror="this.style.opacity='0.5'; this.src='https://cdn-icons-png.flaticon.com/512/1140/1140644.png'" alt="Ponteira" class="compass-needle" id="compass-needle-img">
    </div>

    <div class="speed-widget">
      <img src="/imagens_app/ic_speed_limit.png" onerror="this.style.opacity='0.5'" alt="Velocidade" class="speed-bg">
      <div class="speed-value" id="speed-display">0</div>
    </div>

    <!-- BARRA RETRÁTIL COM TODOS OS BOTÕES -->
    <div class="sidebar-controls" id="sidebar-controls">
      <button class="map-btn" id="btn-rotate-map" title="Rotacionar Mapa (Norte para Cima)"><img src="/imagens_app/ic_girar_map.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/10313/10313225.png'" alt="Rotacionar"></button>
      <button class="map-btn alert-toggle-btn" id="btn-alert-toggle" title="Ligar/Desligar Alerta de Radar"><img id="alert-toggle-icon" src="/imagens_app/ic_sound_on.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/727/727245.png'" alt="Alerta"></button>
      <button class="map-btn" id="btn-search-bar" title="Buscar Radares"><img src="/imagens_app/ic_radar_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/646/646094.png'" alt="busca"></button>
      <button class="map-btn" id="btn-route-bar" title="Navegar / Rota"><img src="/imagens_app/ic_gps_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7892/7892059.png'" alt="Rota"></button>
      <button class="map-btn" id="btn-center" title="Centralizar GPS"><img src="/imagens_app/ic_location_button.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/684/684908.png'" alt="Centro"></button>
      <button class="map-btn" id="btn-refresh" title="Resetar Mapa"><img src="/imagens_app/ic_refresh_button.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2409/2409305.png'" alt="Refresh"></button>
      <button class="map-btn" id="btn-zoom-in" title="Aumentar Zoom"><img src="/imagens_app/ic_zoom_in.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/709/709493.png'" alt="Zoom In"></button>
      <button class="map-btn" id="btn-zoom-out" title="Diminuir Zoom"><img src="/imagens_app/ic_zoom_out.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/709/709506.png'" alt="Zoom Out"></button>
    </div>

    <div id="alert-container">
      <div class="alert-bar">
        <img id="alert-icon" src="/imagens_app/ic_radar_das.png" alt="Radar" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7764/7764406.png'">
        <div class="alert-info">
          <h3 id="alert-title">ATENÇÃO!</h3>
          <p id="alert-text">Radar Próximo</p>
        </div>
      </div>
    </div>

    <div class="loading-overlay" id="loading" style="display:none;">
      <div class="loading-spinner"></div>
      <div style="margin-top:10px; color:#fff;">Processando...</div>
    </div>
  </div>

  <audio id="alert-soud" src="audio_app/alerta.mp3" preload="auto"></audio>

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js" crossorigin="anonymous"></script>

    // ===================================================================
    // FUNÇÕES AUXILIARES

    function criarIconePersonalizado(iconUrl, tamanho, className) {
      return L.icon({ iconUrl: iconUrl, iconSize: [tamanho, tamanho], iconAnchor: [tamanho/2, tamanho], popupAnchor: [0, -tamanho/2], className: className });
    }

    function adicionarMarcadoresRota(originLat, originLng, destLat, destLng) {
      if (!map) return;
      if (startRouteMarker) map.removeLayer(startRouteMarker);
      if (endRouteMarker) map.removeLayer(endRouteMarker);
      if (userMarker) { map.removeLayer(userMarker); userMarker = null; }

      estaEmNavegacao = true;
      ultimaPosicaoMarcador = { lat: null, lng: null };

      var startIcon = criarIconePersonalizado('/imagens_app/ic_navigator_map.png', 50, 'route-start-marker user-navigator-marker');
      startRouteMarker = L.marker([originLat, originLng], { icon: startIcon, zIndexOffset: 1000 }).addTo(map);
      startRouteMarker.bindTooltip("Navegando para destino", { permanent: false, direction: "top", offset: [0, -30] });

      var endIcon = criarIconePersonalizado('/imagens_app/ic_icon_chegada.png', 50, 'route-end-marker');
      endRouteMarker = L.marker([destLat, destLng], { icon: endIcon, zIndexOffset: 900 }).addTo(map);
      endRouteMarker.bindPopup("<b>DESTINO</b><br>Você chegou ao seu destino!", { closeButton: false, autoClose: true, closeOnClick: true });
    }

    function removerMarcadoresRota() {
      if (!map) return;
      if (endRouteMarker) { map.removeLayer(endRouteMarker); endRouteMarker = null; }
    }

    function deveAlertaRadar(tipo) {
      if (!tipo) return true;
      for (var i = 0; i < TIPOS_SEM_ALERTA.length; i++) { if (tipo.includes(TIPOS_SEM_ALERTA[i])) return false; }
      return true;
    }

    function criarIconeRadar(iconeUrl, tamanho) {
      tamanho = tamanho || 40;
      return L.divIcon({
        html: '<img src="' + iconeUrl + '" style="width: ' + tamanho + 'px; height: ' + tamanho + 'px; object-fit: contain; display: block; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));" onerror="this.src=\'/imagens_app/ic_radar_cev_v2.png\'" />',
        iconSize: [tamanho, tamanho], iconAnchor: [tamanho / 2, tamanho], popupAnchor: [0, -tamanho / 2], className: 'radar-marker-icon'
      });
    }

    function getIconUrl(tipo, velocidade) {
      const tipoLimpo = tipo ? tipo.trim() : "";
      if (tipoLimpo.includes('Zona Verde') || tipoLimpo.includes('ZVT') || tipoLimpo.includes('ZVC')) return iconMap['Zona Verde de Trânsito (ZVT)'];
      if (tipoLimpo.includes('Controlador Eletrônico Misto') || tipoLimpo.includes('CEM')) return iconMap['Controlador Eletrônico de Velocidade'] || '/imagens_app/ic_radar_cev_v2.png';
      if (tipoLimpo.includes('Parada sobre Faixa de Pedestres') || tipoLimpo.includes('DPFP')) return iconMap['Detector de Parada sobre Faixa de Pedestres (DPFP)'] || '/imagens_app/ic_radar_dpfp_v2.png';
      if (tipoLimpo === 'Controle de Redução de Velocidade (CRV)') return iconMap['Controle de Redução de Velocidade (CRV)'];
      const isRadarVelocidade = (tipoLimpo.includes('Velocidade') && !tipoLimpo.includes('CRV')) || tipoLimpo.includes('CEM') || tipoLimpo.includes('Controlador Eletrônico');
      if (isRadarVelocidade) {
        const vel = parseInt(velocidade) || 0;
        if (vel === 30) return '/imagens_app/ic_radar_cem_30_v2.png'; if (vel === 40) return '/imagens_app/ic_radar_cem_40_v2.png';
        if (vel === 50) return '/imagens_app/ic_radar_cev_50_v2.png'; if (vel === 60) return '/imagens_app/ic_radar_cev_60_v2.png';
        if (vel === 70) return '/imagens_app/ic_radar_cev_70_v2.png'; if (vel === 80) return '/imagens_app/ic_radar_cev_80_v2.png';
        return '/imagens_app/ic_radar_cev_v2.png';
      }
      let icone = iconMap[tipoLimpo];
      if (!icone) {
        if (tipoLimpo.includes('Semáforo')) icone = iconMap['Detector de Avanço de Semáforo'];
        else if (tipoLimpo.includes('Redutor') || tipoLimpo.includes('Redução')) icone = iconMap['Controle de Redução de Velocidade (CRV)'];
        else if (tipoLimpo.includes('Celular')) icone = iconMap['Detector de Uso de Celular'];
        else if (tipoLimpo.includes('Verde')) icone = iconMap['Zona Verde de Trânsito (ZVT)'];
        else if (tipoLimpo.includes('OCR')) icone = iconMap['Leitor Inteligente de Placas (OCR-P)'];
        else if (tipoLimpo.includes('Facial')) icone = iconMap['Leitor de Reconhecimento Facial (OCR-F)'];
        else if (tipoLimpo.includes('Conversão')) icone = iconMap['Detector de Conversão em Local Proibido'];
        else if (tipoLimpo.includes('Inundações')) icone = iconMap['Zona de Risco - Inundações Recorrentes (ZIR)'];
        else if (tipoLimpo.includes('Invasão')) icone = iconMap['Detector de Invasão de Faixa Exclusiva - MOVE'];
        else if (tipoLimpo.includes('Parada') || tipoLimpo.includes('Pedestres') || tipoLimpo.includes('DPFP')) icone = iconMap['Detector de Parada sobre Faixa de Pedestres (DPFP)'];
        else if (tipoLimpo.includes('Faixa Exclusiva') || tipoLimpo.includes('DIFEX')) icone = iconMap['Detector de Invasão de Faixa Exclusiva (DIFEX)'];
        else if (tipoLimpo.includes('BUS') || tipoLimpo.includes('Faixa Preferencial')) icone = iconMap['Detector de Faixa Preferencial de Ônibus (BUS)'];
      }
      if (!icone) icone = iconMap['default'];
      return icone;
    }

    function showNotification(message) { var $toast = $("#toast-msg"); $toast.text(message).addClass("show"); setTimeout(function() { $toast.removeClass("show"); }, 3500); }
    function hideFullscreenLoading() { var el = document.getElementById('loading-fullscreen'); if (el) { el.classList.add('fade-out'); setTimeout(function() { el.remove(); }, 600); } }
    function calcularDistancia(lat1, lon1, lat2, lon2) {
      var R = 6371e3; var p1 = lat1 * Math.PI / 180; var p2 = lat2 * Math.PI / 180;
      var dp = (lat2 - lat1) * Math.PI / 180; var dl = (lon2 - lon1) * Math.PI / 180;
      var a = Math.sin(dp / 2) * Math.sin(dp / 2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl / 2) * Math.sin(dl / 2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // ===================================================================
    // SUAVIZAÇÃO E ANÁLISE GPS
    // ===================================================================
    function suavizarPosicao(novaLat, novaLng) {
      if (posicaoSuavizada.lat === null) { posicaoSuavizada.lat = novaLat; posicaoSuavizada.lng = novaLng; return { lat: novaLat, lng: novaLng }; }
      var fator = ALERT_CONFIG.SUAVIZACAO_FATOR;
      posicaoSuavizada.lat += (novaLat - posicaoSuavizada.lat) * fator;
      posicaoSuavizada.lng += (novaLng - posicaoSuavizada.lng) * fator;
      return { lat: posicaoSuavizada.lat, lng: posicaoSuavizada.lng };
    }

    function adicionarAoHistorico(lat, lng, timestamp) {
      historicoPosicoes.push({ lat: lat, lng: lng, time: timestamp });
      if (historicoPosicoes.length > ALERT_CONFIG.HISTORICO_TAMANHO) historicoPosicoes.shift();
    }

    function calcularTendenciaDistancia(radarId, distanciaAtual) {
      if (!historicoDistanciasRadar[radarId]) historicoDistanciasRadar[radarId] = [];
      historicoDistanciasRadar[radarId].push({ distancia: distanciaAtual, time: Date.now() });
      if (historicoDistanciasRadar[radarId].length > 5) historicoDistanciasRadar[radarId].shift();
      var historico = historicoDistanciasRadar[radarId];
      if (historico.length < 2) return { estaAproximando: true, estaAfastando: false };
      var diferenca = historico[0].distancia - historico[historico.length - 1].distancia;
      if (diferenca > 5) return { estaAproximando: true, estaAfastando: false, diferenca: diferenca };
      if (diferenca < -5) return { estaAproximando: false, estaAfastando: true, diferenca: diferenca };
      return { estaAproximando: true, estaAfastando: false, diferenca: 0 };
    }

    function moverMarcadorSuavemente(targetLat, targetLng) {
      var marcadorParaMover = estaEmNavegacao ? startRouteMarker : userMarker;
      if (!marcadorParaMover) return;
      if (ultimaPosicaoMarcador.lat === null) {
        ultimaPosicaoMarcador.lat = targetLat; ultimaPosicaoMarcador.lng = targetLng;
        marcadorParaMover.setLatLng([targetLat, targetLng]); return;
      }
      var distanciaUltimoMovimento = calcularDistancia(ultimaPosicaoMarcador.lat, ultimaPosicaoMarcador.lng, targetLat, targetLng);
      if (distanciaUltimoMovimento < ALERT_CONFIG.DISTANCIA_MINIMA_MOVIMENTO) return;
      var inicioLat = ultimaPosicaoMarcador.lat; var inicioLng = ultimaPosicaoMarcador.lng;
      var duracao = 500; var inicioTempo = performance.now();
      if (animacaoMarcadorAtiva) return; animacaoMarcadorAtiva = true;
      function animarFrame(tempoAtual) {
        var progresso = Math.min((tempoAtual - inicioTempo) / duracao, 1);
        var fatorEasing = progresso < 0.5 ? 4 * Math.pow(progresso, 3) : 1 - Math.pow(-2 * progresso + 2, 3) / 2;
        marcadorParaMover.setLatLng([inicioLat + (targetLat - inicioLat) * fatorEasing, inicioLng + (targetLng - inicioLng) * fatorEasing]);
        if (progresso < 1) { requestAnimationFrame(animarFrame); }
        else { ultimaPosicaoMarcador.lat = targetLat; ultimaPosicaoMarcador.lng = targetLng; animacaoMarcadorAtiva = false; }
      }
      requestAnimationFrame(animarFrame);
    }

    function limparHistoricoDistancia(radarId) { if (historicoDistanciasRadar[radarId]) delete historicoDistanciasRadar[radarId]; }

    function verificarDirecaoMelhorada(uLat, uLng, uHeading, radarLat, radarLng, radarId, distanciaAtual) {
      if (!uHeading || uHeading === -1 || isNaN(uHeading)) { var t = calcularTendenciaDistancia(radarId, distanciaAtual); return { estaAproximando: t.estaAproximando, estaAfastando: t.estaAfastando }; }
      var deltaX = radarLng - uLng; var deltaY = radarLat - uLat;
      var anguloRadar = (Math.atan2(deltaY, deltaX) * 180 / Math.PI + 360) % 360;
      var diff = Math.abs(uHeading - anguloRadar); diff = Math.min(diff, 360 - diff);
      var tendencia = calcularTendenciaDistancia(radarId, distanciaAtual);
      return { estaAproximando: (diff < ALERT_CONFIG.ANGULO_APROXIMACAO) || tendencia.estaAproximando, estaAfastando: (diff > ALERT_CONFIG.ANGULO_AFASTANDO) && tendencia.estaAfastando };
    }

    function aplicarTemaMapa() {
      if(!map) return;
      var hora = new Date().getHours();
      var urlAtual = (hora >= 19 || hora < 6) ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
      if (tileLayer) { tileLayer.setUrl(urlAtual); } else { tileLayer = L.tileLayer(urlAtual, { attribution: '', subdomains: 'abcd', maxZoom: 19 }).addTo(map); }
    }

    function atualizarIconeUsuario() {
      if (!userMarker || estaEmNavegacao) return;
      var userIcon = L.icon({ iconUrl: '/imagens_app/ic_gps_marker.png', iconSize: [48, 48], iconAnchor: [24, 48], popupAnchor: [0, -48], className: 'user-gps-marker' });
      userMarker.setIcon(userIcon);
    }

    // ===================================================================
    // ALERTAS
    // ===================================================================
    function fecharAlertaImediatamente() {
      var sound = document.getElementById("alert-soud");
      if (sound) { sound.pause(); sound.currentTime = 0; }
      clearTimeout(alertTimeout);
    }

    function esconderAlertaVisual() {
      $("#alert-container").fadeOut(150);
      $(".alert-bar").css("background", "linear-gradient(90deg, #cc0000, #990000)");
      $(".alert-bar").removeClass("alert-bar-critico");
      contagemTocarSom = 0;
      fecharAlertaImediatamente();
    }

    // ===================================================================
    // PROCESSAR NOVA POSIÇÃO
    // ===================================================================
    function processarNovaPosicao(newLat, newLng, speedKmh, hardwareHeading) {
      if(!map) return;
      var currentTime = Date.now(); var dist = 0;
      adicionarAoHistorico(newLat, newLng, currentTime);
      var posSuave = suavizarPosicao(newLat, newLng);
      var smoothLat = posSuave.lat; var smoothLng = posSuave.lng;
      
      if (speedKmh === 0 && prevLat !== null && prevTime !== null) { dist = calcularDistancia(prevLat, prevLng, newLat, newLng); var time = (currentTime - prevTime) / 1000; if (time > 0) speedKmh = Math.round((dist / time) * 3.6); }
      else if (prevLat !== null) { dist = calcularDistancia(prevLat, prevLng, newLat, newLng); }
      if (speedKmh > 250) speedKmh = 0; $("#speed-display").text(speedKmh);
      
      if (hardwareHeading !== null && !isNaN(hardwareHeading) && hardwareHeading >= 0) { currentHeading = hardwareHeading; }
      else if (dist > 3 && prevLat !== null) { var dy = newLat - prevLat; var dx = (newLng - prevLng) * Math.cos(newLat * Math.PI / 180); if (Math.abs(dx) > 0.0000001 || Math.abs(dy) > 0.0000001) { var calcHeading = (Math.atan2(dx, dy) * 180 / Math.PI); if (calcHeading < 0) calcHeading += 360; if (calcHeading >= 360) calcHeading -= 360; currentHeading = calcHeading; } }
      if (currentHeading !== null && currentHeading !== undefined) atualizarBussola(currentHeading);

      prevLat = newLat; prevLng = newLng; prevTime = currentTime; userLat = newLat; userLng = newLng;

      if (!userMarker && !estaEmNavegacao) {
        var defaultIcon = L.icon({ iconUrl: '/imagens_app/ic_gps_marker.png', iconSize: [48, 48], iconAnchor: [24, 48], popupAnchor: [0, -48], className: 'user-gps-marker' });
        userMarker = L.marker([smoothLat, smoothLng], { icon: defaultIcon, zIndexOffset: 1000, rotationAngle: 0, rotationOrigin: '24px 48px' }).addTo(map);
        userMarker.bindTooltip("Você está aqui", { permanent: false, direction: "top", offset: [0, -48] });
        ultimaPosicaoMarcador.lat = smoothLat; ultimaPosicaoMarcador.lng = smoothLng;
        if (!gpsInitialized) { gpsInitialized = true; hideFullscreenLoading(); }
      } else { moverMarcadorSuavemente(smoothLat, smoothLng); }
      
      atualizarIconeUsuario();
      if (destinoAtual) { atualizarRota(); }
      if (isFollowing) { map.setView([smoothLat, smoothLng], map.getZoom(), { animate: true, duration: 0.8 }); }
      if (alertaHabilitado) { verificarProximidadeRadares(); } else { esconderAlertaVisual(); }
      if (destinoAtual) { verificarChegadaDestino(); }
    }

    function startGPSTracking() {
      if (!navigator.geolocation) { hideFullscreenLoading(); showNotification("GPS não suportado."); return; }
      if (watchId !== null) navigator.geolocation.clearWatch(watchId);
      watchId = navigator.geolocation.watchPosition(
        function(position) {
          if (gpsSource !== 'appinventor') gpsSource = 'browser';
          var newLat = position.coords.latitude; var newLng = position.coords.longitude; var speedKmh = 0;
          if (position.coords.speed !== null && position.coords.speed >= 0) speedKmh = Math.round(position.coords.speed * 3.6);
          processarNovaPosicao(newLat, newLng, speedKmh, position.coords.heading);
        }, showError, { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
      );
      browserGpsTimeout = setTimeout(function() { if (!gpsInitialized && gpsSource === 'none') { showNotification("Aguardando GPS do app..."); hideFullscreenLoading(); } }, 8000);
    }

    // ===================================================================
    // PROXIMIDADE E DISPARO
    // ===================================================================
    function verificarProximidadeRadares() {
      if (!alertaHabilitado || radarMarkers.length === 0) return;
      let radarMaisProximo = null; let menorDistancia = Infinity;
      radarMarkers.forEach(function(marker) {
        const rData = marker.radarData; if (!deveAlertaRadar(rData.tipoOriginal)) return;
        const dist = calcularDistancia(userLat, userLng, rData.latitude, rData.longitude);
        if (dist < menorDistancia) { menorDistancia = dist; radarMaisProximo = rData; }
      });
      if (radarMaisProximo && menorDistancia <= ALERT_CONFIG.DISTANCIA_MAXIMA) {
        const direcao = verificarDirecaoMelhorada(userLat, userLng, currentHeading, radarMaisProximo.latitude, radarMaisProximo.longitude, radarMaisProximo.id, menorDistancia);
        if (menorDistancia <= ALERT_CONFIG.DISTANCIA_PASSAR_RADAR) { esconderAlertaVisual(); ultimoRadarAlertado = radarMaisProximo.id; limparHistoricoDistancia(radarMaisProximo.id); return; }
        if (direcao.estaAfastando) { fecharAlertaImediatamente(); limparHistoricoDistancia(radarMaisProximo.id); if (menorDistancia > ALERT_CONFIG.DISTANCIA_MAXIMA - 30) ultimoRadarAlertado = null; return; }
        if (direcao.estaAproximando) {
          if (ultimoRadarAlertado !== radarMaisProximo.id) { dispararAlerta(radarMaisProximo, menorDistancia); }
          else { atualizarDistanciaAlerta(menorDistancia); if (menorDistancia <= ALERT_CONFIG.DISTANCIA_CRITICA) $(".alert-bar").addClass("alert-bar-critico"); }
        }
      } else {
        if ($("#alert-container").is(":visible")) esconderAlertaVisual();
        if (menorDistancia > ALERT_CONFIG.DISTANCIA_MAXIMA + 80) { ultimoRadarAlertado = null; historicoDistanciasRadar = {}; }
      }
    }

    function atualizarDistanciaAlerta(distancia) {
      if (!$("#alert-container").is(":visible")) return;
      var textoAtual = $("#alert-text").text(); var partes = textoAtual.split(" - a ");
      if (partes.length >= 2) $("#alert-text").text(partes[0] + " - a " + Math.round(distancia) + " metros");
    }

    function dispararAlerta(radar, distancia) {
      const distanciaAtual = calcularDistancia(userLat, userLng, radar.latitude, radar.longitude);
      if (distanciaAtual > ALERT_CONFIG.DISTANCIA_MAXIMA || distanciaAtual <= ALERT_CONFIG.DISTANCIA_PASSAR_RADAR) return;
      const som = document.getElementById("alert-soud"); const tipoAjustado = ajusteNomes[radar.tipoOriginal] || radar.tipoOriginal;
      const velInfo = radar.velocidade_maxima ? " | " + radar.velocidade_maxima + " km/h" : "";
      $("#alert-title").text("ALERTA DE RADAR!"); $("#alert-text").text(tipoAjustado + velInfo + " - a " + Math.round(distanciaAtual) + " metros");
      $("#alert-icon").attr("src", getIconUrl(radar.tipoOriginal, radar.velocidade_maxima)); 
      if (!$("#alert-container").is(":visible")) {
        $("#alert-container").fadeIn(200);
        contagemTocarSom = 0;
      }
      if (alertaHabilitado && som && contagemTocarSom < ALERT_CONFIG.DISPAROS_SOM_ANTES_DE_SILENCIAR) {
        som.pause(); som.currentTime = 0; som.play().catch(function(e) {}); contagemTocarSom++;
      }
      if (distanciaAtual <= ALERT_CONFIG.DISTANCIA_CRITICA) { $(".alert-bar").addClass("alert-bar-critico"); } else { $(".alert-bar").removeClass("alert-bar-critico"); }
      ultimoRadarAlertado = radar.id; clearTimeout(alertTimeout);
      alertTimeout = setTimeout(function() { if ($("#alert-container").is(":visible")) esconderAlertaVisual(); }, ALERT_CONFIG.TEMPO_ALERTA);
    }

    // ===================================================================
    // ROTAS E ENDEREÇOS
    // ===================================================================
    async function buscarCoordenadas(endereco) {
      try {
        var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(endereco + ', Belo Horizonte, Minas Gerais, Brasil');
        var response = await fetch(url);
        var data = await response.json();
        if (data && data.length > 0) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
        return null;
      } catch (e) { console.error("Erro ao buscar coordenadas:", e); return null; }
    }

    function calcularRota(destLat, destLng) {
      if (!map) return;
      if (routingControl) map.removeControl(routingControl);
      destinoAtual = { lat: destLat, lng: destLng };
      adicionarMarcadoresRota(userLat, userLng, destLat, destLng);
      routingControl = L.Routing.control({
        waypoints: [ L.latLng(userLat, userLng), L.latLng(destLat, destLng) ],
        routeWhileDragging: false, addWaypoints: false, language: 'pt-BR', show: false,
        lineOptions: { styles: [{ color: '#ff5500', opacity: 0.95, weight: 7 }, { color: '#ffd1b3', opacity: 1.0, weight: 3 }] },
        createMarker: function() { return null; },
        router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' })
      }).addTo(map);
      routingControl.on('routesfound', function(e) { var summary = e.routes[0].summary; map.fitBounds(L.latLngBounds([userLat, userLng], [destLat, destLng]), { padding: [50, 50] }); $("#loading").hide(); showNotification("Rota: " + (summary.totalDistance / 1000).toFixed(1) + " km"); });
      routingControl.on('routingerror', function() { $("#loading").hide(); showNotification("Erro ao traçar rota."); });
      showNotification("Navegação iniciada!");
    }

    function atualizarRota() {
      if (!map || !destinoAtual || !userLat || !userLng || !routingControl) return;
      routingControl.setWaypoints([ L.latLng(userLat, userLng), L.latLng(destinoAtual.lat, destinoAtual.lng) ]);
    }

    function verificarChegadaDestino() {
      if (!destinoAtual) return;
      var distanciaDestino = calcularDistancia(userLat, userLng, destinoAtual.lat, destinoAtual.lng);
      if (distanciaDestino <= 30) {
        showNotification("Você chegou ao seu destino!");
        if (endRouteMarker) endRouteMarker.openPopup();
        setTimeout(function() { finalizarERestaurarRota(); }, 4000);
      }
    }

    function finalizarERestaurarRota() {
      if (!map) return;
      if (routingControl) { map.removeControl(routingControl); routingControl = null; }
      destinoAtual = null;
      if (startRouteMarker) { map.removeLayer(startRouteMarker); startRouteMarker = null; }
      removerMarcadoresRota();
      estaEmNavegacao = false;
      if (posicaoSuavizada.lat !== null) { ultimaPosicaoMarcador.lat = posicaoSuavizada.lat; ultimaPosicaoMarcador.lng = posicaoSuavizada.lng; } else { ultimaPosicaoMarcador = { lat: null, lng: null }; }
      var defaultIcon = L.icon({ iconUrl: '/imagens_app/ic_gps_marker.png', iconSize: [48, 48], iconAnchor: [24, 48], popupAnchor: [0, -48], className: 'user-gps-marker' });
      userMarker = L.marker([userLat, userLng], { icon: defaultIcon, zIndexOffset: 1000 }).addTo(map);
      userMarker.bindTooltip("Você está aqui", { permanent: false, direction: "top", offset: [0, -48] });
      showNotification("Navegação encerrada");
    }

    function removerRota() { finalizarERestaurarRota(); }

    function resetarMapa() {
      if (!map) return;
      map.setView([posicaoCentralOriginal.lat, posicaoCentralOriginal.lng], posicaoCentralOriginal.zoom, { animate: true, duration: 0.5 });
      map.setBearing(0); document.getElementById('btn-rotate-map')?.classList.remove('rotated');
      isFollowing = false; if (refreshDelayTimer) clearTimeout(refreshDelayTimer);
      refreshDelayTimer = setTimeout(function() {
        var marcadorAtivo = estaEmNavegacao ? startRouteMarker : userMarker;
        if (marcadorAtivo && !isFollowing) { isFollowing = true; map.flyTo(marcadorAtivo.getLatLng(), 20, { duration: 0.8 }); showNotification("Retornando à sua posição atual"); }
        refreshDelayTimer = null;
      }, TEMPO_REFRESH_DELAY);
      removerRota(); esconderAlertaVisual(); showNotification("Mapa resetado");
    }

    function extrairCoordenadas(record) {
      if (!record || record.length < 10) return null;
      var stringLimpa = String(record[9]).replace(/\s+/g, '').trim();
      var parts = stringLimpa.split(',');
      if (parts.length !== 2) return null;
      var lat = parseFloat(parts[0]); var lng = parseFloat(parts[1]);
      if (isNaN(lat) || isNaN(lng) || lat < -90 || lat > 90 || lng < -180 || lng > 180) return null;
      return { lat: lat, lng: lng };
    }

    function atualizarBussola(headingDegrees) { var needle = document.getElementById('compass-needle-img'); if (needle) needle.style.transform = 'rotate(' + headingDegrees + 'deg)'; }

    function inicializarBotaoRotacaoMapa() {
      const rotateBtn = document.getElementById('btn-rotate-map'); let isRotated = false; if (!rotateBtn) return;
      rotateBtn.addEventListener('click', function () {
        if (!map) return;
        if (!isRotated) { map.setBearing((currentHeading > 0 && currentHeading < 360) ? currentHeading : 45); showNotification("Mapa rotacionado"); rotateBtn.classList.add('rotated'); isRotated = true; }
        else { map.setBearing(0); showNotification("Mapa resetado (Norte para cima)"); rotateBtn.classList.remove('rotated'); isRotated = false; }
      });
    }

    function inicializarBotaoAlertaToggle() {
      const alertBtn = document.getElementById('btn-alert-toggle'); const alertIcon = document.getElementById('alert-toggle-icon'); if (!alertBtn) return;
      alertBtn.addEventListener('click', function() {
        alertaHabilitado = !alertaHabilitado;
        if (alertaHabilitado) { alertBtn.classList.remove('alert-off'); if(alertIcon){ alertIcon.src = "/imagens_app/ic_sound_on.png"; alertIcon.onerror = function() { this.src = 'https://cdn-icons-png.flaticon.com/512/727/727245.png'; }; } showNotification("Alerta LIGADO"); }
        else { alertBtn.classList.add('alert-off'); if(alertIcon){ alertIcon.src = "/imagens_app/ic_sound_off.png"; alertIcon.onerror = function() { this.src = 'https://cdn-icons-png.flaticon.com/512/3398/3398405.png'; }; } showNotification("Alerta DESLIGADO"); }
        esconderAlertaVisual();
      });
    }

    // ===================================================================
    // INICIALIZAÇÃO DO MAPA
    // ===================================================================
    function initMap() {
      if (typeof L === 'undefined') {
        hideFullscreenLoading();
        showNotification("Erro de conexão. Os mapas não puderam carregar.");
        console.error("A biblioteca Leaflet não foi carregada.");
        return;
      }

      map = L.map('map', { center: [userLat, userLng], zoom: 17, zoomControl: false, rotate: true, bearing: 0 });
      aplicarTemaMapa(); setInterval(aplicarTemaMapa, 300000);
      
      map.on('dragstart', function() { isFollowing = false; if (returnToGpsTimer) clearTimeout(returnToGpsTimer); });
      map.on('dragend', function() {
        returnToGpsTimer = setTimeout(function() {
          if (!isFollowing) { var marcadorAtivo = estaEmNavegacao ? startRouteMarker : userMarker; if (marcadorAtivo) { isFollowing = true; map.setView(marcadorAtivo.getLatLng(), map.getZoom(), { animate: true, duration: 0.5 }); showNotification("Voltando à sua posição atual"); } }
        }, TEMPO_RETORNO_GPS);
      });

      $("#btn-calc-route").click(async function() {
        var endereco = $("#route-query").val().trim();
        if (endereco.length < 5) { showNotification("Digite um endereço válido."); return; }
        $("#loading").show().html("<div class='loading-spinner'></div><div>Calculando rota...</div>");
        var coords = await buscarCoordenadas(endereco);
        if (coords) { esconderAlertaVisual(); calcularRota(coords.lat, coords.lng); } else { $("#loading").hide(); showNotification("Endereço não encontrado."); }
      });
      
      $("#route-query").keypress(function(e) { if (e.which == 13) $("#btn-calc-route").click(); });

      function fecharTodasBarras() { searchActive = false; routeActive = false; $("#search-bar-radares").removeClass('active'); $("#search-bar-rota").removeClass('active'); }

      $("#btn-search-radar").click(function() { buscarRadares($("#query").val()); });
      $("#query").keypress(function(e) { if (e.which == 13) buscarRadares($("#query").val()); });

      $("#btn-search-bar").click(function() {
        if (searchActive) { fecharTodasBarras(); return; }
        if (routeActive) routeActive = false;
        searchActive = true; $("#search-bar-rota").removeClass('active');
        $("#search-bar-radares").addClass('active');
        // Se a sidebar estiver recolhida, abre para mostrar a barra de busca
        if (!sidebarAberta) {
          sidebarAberta = true;
          document.getElementById('sidebar-controls').classList.remove('retracted');
          document.getElementById('btn-menu-toggle').classList.remove('active');
        }
        setTimeout(function() { $("#query").focus(); }, 300);
      });

      $("#btn-route-bar").click(function() {
        if (routeActive) { fecharTodasBarras(); return; }
        if (searchActive) searchActive = false;
        routeActive = true; $("#search-bar-radares").removeClass('active');
        $("#search-bar-rota").addClass('active');
        if (!sidebarAberta) {
          sidebarAberta = true;
          document.getElementById('sidebar-controls').classList.remove('retracted');
          document.getElementById('btn-menu-toggle').classList.remove('active');
        }
        setTimeout(function() { $("#route-query").focus(); }, 300);
      });

      $("#btn-center").click(function() { fecharTodasBarras(); isFollowing = true; var marcadorAtivo = estaEmNavegacao ? startRouteMarker : userMarker; if (marcadorAtivo) { map.flyTo(marcadorAtivo.getLatLng(), 17, { duration: 0.5 }); showNotification("Centralizando na sua posição"); } else { showNotification("Aguardando sinal GPS..."); } });
      $("#btn-refresh").click(function() { resetarMapa(); carregarRadares(); });
      $("#btn-zoom-in").click(function() { if(map) map.zoomIn(); });
      $("#btn-zoom-out").click(function() { if(map) map.zoomOut(); });
      
      inicializarBotaoRotacaoMapa(); inicializarBotaoAlertaToggle(); startGPSTracking(); carregarRadares();
    }

    async function carregarRadares() {
      if (!map) return;
      if (radarMarkers.length > 0) { radarMarkers.forEach(function(marker) { map.removeLayer(marker); }); radarMarkers = []; }
      $("#loading").show().html("<div class='loading-spinner'></div><div>Carregando radares...</div>");
      try {
        var response = await fetch('radares.json?v=' + Date.now());
        if (!response.ok) throw new Error("Arquivo não encontrado");
        var data = await response.json();
        var records = (Array.isArray(data)) ? data : (data.result?.records || data.records || []);
        if (records.length > 0) { renderizarRadaresNoMapa(records, "radares.json"); } else { throw new Error("Nenhum radar encontrado"); }
      } catch (e) { console.warn("Falha radares.json:", e); $("#loading").hide(); showNotification("Usando dados de fallback."); }
    }

    function renderizarRadaresNoMapa(records, origem) {
      if (!map) return;
      var radaresExternos = records || []; var contador = 0;
      for (var i = 0; i < radaresExternos.length; i++) {
        var record = radaresExternos[i]; var endereco = record[2] || "Endereço não informado";
        var tipo = (record[3] || "Não Identificado").trim(); var velocidade = record[4] || "0";
        var coordsFinais = extrairCoordenadas(record); if (!coordsFinais) continue;
        var iconeUrl = getIconUrl(tipo, velocidade); var iconeRadar = criarIconeRadar(iconeUrl, 40);
        var radarMarker = L.marker([coordsFinais.lat, coordsFinais.lng], { icon: iconeRadar }).addTo(map);
        var tipoExibicao = ajusteNomes[tipo] || tipo; var isIA = tipoExibicao.includes('OCR') || tipoExibicao.includes('FACIAL');
        var tituloPopup = isIA ? '<span style="color:#33aaff">' + tipoExibicao + '</span>' : '<b>' + tipoExibicao + '</b>';
        radarMarker.bindPopup('<div style="color:#222; font-family:\'Inter\'; text-align:center; min-width:200px;">' + tituloPopup + '<br><hr style="border:0; border-top:1px solid #ddd; margin:5px 0;">' + endereco + '<br><div style="color:#d00; font-weight:bold; margin-top:5px;">Máx: ' + velocidade + ' km/h</div></div>');
        radarMarker.radarData = { id: i, latitude: coordsFinais.lat, longitude: coordsFinais.lng, endereco: endereco, velocidade_maxima: velocidade, tipoOriginal: tipo, tipoExibicao: tipoExibicao, isIA: isIA };
        radarMarkers.push(radarMarker); contador++;
      }
      $("#loading").hide();
      if (contador > 0) { showNotification('Base carregada: ' + origem + ' (' + contador + ' radares)'); } else { showNotification("Nenhum radar encontrado."); }
    }
    
    function buscarRadares(query) {
      if (!query || query.length < 2) return; var encontrou = false; var boundsGroup = L.featureGroup(); var q = query.toLowerCase();
      radarMarkers.forEach(function(marker) { var d = marker.radarData; if ((d.endereco + ' ' + d.tipoOriginal + ' ' + d.tipoExibicao).toLowerCase().includes(q)) { encontrou = true; boundsGroup.addLayer(marker); marker.openPopup(); } });
      if (encontrou) { if(map) map.fitBounds(boundsGroup.getBounds().pad(0.2)); isFollowing = false; } else { showNotification("Nenhum radar encontrado para: " + query); }
    }

    function showError(error) {
      if (gpsSource === 'appinventor') return; var msg = "Erro ao obter localização.";
      if (error.code === 1) msg = "Permissão de GPS negada."; if (error.code === 2) msg = "Sinal GPS indisponível."; if (error.code === 3) msg = "Tempo esgotado. Tentando novamente...";
      showNotification(msg); hideFullscreenLoading(); if (error.code === 3) { setTimeout(startGPSTracking, 5000); }
    }
    
    document.addEventListener('click', function desbloquearAudio() {
      var sound = document.getElementById("alert-soud");
      if (sound) { sound.play().then(function() { sound.pause(); sound.currentTime = 0; }).catch(function() {}); }
      document.removeEventListener('click', desbloquearAudio);
    }, { once: true });
    
    window.onload = initMap;
  </script>
</body>
