<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Radar X9 BH - Alerta Inteligente (OSM + IA)</title>

  <!-- =================================================================== -->
  <!-- BIBLIOTECAS EXTERNAS                                               -->
  <!-- =================================================================== -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
  <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

  <style>
    /* =================================================================== */
    /* VARIÁVEIS GLOBAIS - TEMA DARK                                       */
    /* =================================================================== */
    :root {
      --bg-color: #0f1115;        /* Fundo principal escuro */
      --panel-color: #1a1d24;     /* Cor dos painéis */
      --accent-color: #00ff88;    /* Verde destaque */
      --alert-color: #ff3333;     /* Vermelho para alertas */
      --text-main: #ffffff;       /* Texto principal branco */
      --text-muted: #a0a0a0;      /* Texto secundário cinza */
    }
    
    /* Reset básico - remove margens e paddings padrão */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    /* Corpo da página - ocupa toda a tela */
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* =================================================================== */
    /* HEADER - BARRA SUPERIOR DO APLICATIVO                              */
    /* =================================================================== */
    header {
      background-color: var(--panel-color);
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--accent-color);
      box-shadow: 0 4px 15px rgba(0, 255, 136, 0.1);
      z-index: 1000;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .app-icon { width: 50px; height: 40px; border-radius: 8px; object-fit: contain; }
    h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
    h1 span { color: var(--accent-color); }

    /* =================================================================== */
    /* BARRA DE BUSCA - PARA RADARES E ROTAS                               */
    /* =================================================================== */
    .search-container {
      position: absolute; top: 0; left: 0; width: 100%;
      background-color: rgba(26, 29, 36, 0.98);
      backdrop-filter: blur(8px);
      display: flex; gap: 12px; z-index: 1000;
      max-height: 0; overflow: hidden; opacity: 0;
      padding: 0 15px;
      border-bottom: 1px solid transparent;
      transition: all 0.3s ease;
      align-items: center;
    }
    .search-container.active {
      max-height: 90px; opacity: 1; padding: 15px;
      border-bottom: 1px solid #333;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .search-container input {
      flex: 1; padding: 14px 20px; border-radius: 30px; border: 1px solid #444;
      background-color: #000; color: #fff; font-size: 1rem; outline: none;
      font-family: 'Inter', sans-serif;
    }
    .search-container input:focus { border-color: var(--accent-color); }

    /* Botão de busca estilizado */
    .btn-search {
      position: relative; flex-shrink: 0; width: 46px; height: 46px; border-radius: 50%;
      border: none; cursor: pointer; background: rgba(76, 137, 198, 0.95);
      box-shadow: 0 3px 8px rgba(203, 240, 15, 0.5); transition: all 0.2s ease;
      overflow: hidden;
    }
    .btn-search:active { transform: scale(0.9); }
    .btn-search img {
      position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
      object-fit: contain; display: block; transform: translate(-50%, -50%);
    }
    
    /* =================================================================== */
    /* CONTAINER DO MAPA - ÁREA PRINCIPAL                                  */
    /* =================================================================== */
    .map-wrapper { position: relative; flex: 1; display: flex; overflow: hidden; width: 100%; }
    #map { width: 100%; height: 100%; background-color: #2a2a2a; z-index: 1; }

    /* =================================================================== */
    /* BÚSSOLA - WIDGET VISUAL                                            */
    /* =================================================================== */
    .compass-widget {
      position: absolute; top: 20px; left: 5px; width: 80px; height: 80px;
      z-index: 500; display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .compass-base { 
      position: absolute; width: 100%; height: 100%; object-fit: contain;
      z-index: 1; opacity: 0.9;
    }
    .compass-needle {
      position: absolute; width: 55%; height: 55%; object-fit: contain;
      z-index: 2; transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* =================================================================== */
    /* BOTÕES DE CONTROLE DO MAPA (BARRA LATERAL DIREITA)                  */
    /* =================================================================== */
    .map-controls {
      position: absolute; right: 15px; bottom: 30px; display: flex; flex-direction: column;
      align-items: center; gap: 10px; z-index: 500;
    }
    .map-btn {
      width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; cursor: pointer; background: rgba(20, 20, 20, 0.92);
      border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 4px 10px rgba(0,0,0,0.6); 
      transition: all 0.2s ease;
    }
    .map-btn:hover { transform: scale(1.08); border-color: var(--accent-color); }
    .map-btn:active { transform: scale(0.92); }
    .map-btn img { width: 30px; height: 30px; object-fit: contain; pointer-events: none; }

    /* Botão de alerta on/off */
    .alert-toggle-btn {
      background: rgba(29, 28, 28, 0.9);
      border: 2px solid rgba(255,255,255,0.08);
      transition: all 0.3s ease;
    }
    .alert-toggle-btn.alert-off { background: rgba(68, 68, 68, 0.9); border-color: #888; }
    .alert-toggle-btn.alert-off img { filter: grayscale(1); }

    /* Cores específicas para cada botão */
    #btn-route-bar { width: 54px; height: 54px; border: 1px solid rgba(255,140,0,0.5); }
    #btn-search-bar { border: 1px solid rgba(0, 200, 180, 0.35); }
    #btn-center { border: 1px solid rgba(0, 255, 136, 0.35); }
    #btn-alert-toggle { border: 1px solid rgba(255, 51, 51, 0.5); }
    #btn-rotate-map { border: 1px solid rgba(0, 255, 255, 0.35); transition: transform 0.3s ease; }
    #btn-rotate-map.rotated { transform: rotate(90deg); border-color: var(--accent-color); box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }

    /* =================================================================== */
    /* MARCADORES DO USUÁRIO E ROTA                                       */
    /* =================================================================== */
    .user-gps-marker { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
    .user-navigator-marker {
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      animation: pulseMarker 1.5s ease-in-out infinite;
    }
    
    /* Marcador de partida da rota (ícone navegador) */
    .route-start-marker {
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      animation: pulseStart 1s ease-in-out infinite;
    }
    
    /* Marcador de chegada da rota (bandeira/pino) */
    .route-end-marker {
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      animation: pulseEnd 1.2s ease-in-out infinite;
    }
    
    /* Animações de pulsação para os marcadores */
    @keyframes pulseMarker {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    @keyframes pulseStart {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes pulseEnd {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* =================================================================== */
    /* WIDGET DE VELOCIDADE                                               */
    /* =================================================================== */
    .speed-widget { 
      position: absolute; bottom: -15px; left: -25px; width: 150px; height: 150px; 
      z-index: 500; display: flex; align-items: center; justify-content: center; 
    } 
    .speed-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; } 
    .speed-value {
      position: absolute; top: 50%; left: 50%; transform: translate(-62%, -60%);
      font-size: 28px; font-weight: 700; font-family: 'Rajdhani', 'Oswald', 'Arial Narrow', sans-serif;
      color: #000; line-height: 1; z-index: 2; white-space: nowrap; text-align: center;
      font-variant-numeric: tabular-nums; letter-spacing: -0.5px; min-width: 3ch;
    }
    
    /* =================================================================== */
    /* ALERTAS E NOTIFICAÇÕES                                             */
    /* =================================================================== */
    #alert-container { 
      position: absolute; bottom: 0; left: 0; width: 100%; z-index: 1000; 
      display: none; animation: slideUp 0.3s ease-out; pointer-events: none; 
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); background: linear-gradient(90deg, #ff2200, #ee0000); }
      100% { transform: scale(1); }
    }
    .alert-bar { 
      background: linear-gradient(90deg, #cc0000, #990000); color: white; padding: 18px;
      display: flex; align-items: center; gap: 15px; box-shadow: 0 -5px 20px rgba(255, 0, 0, 0.4);
      border-top: 2px solid #ff5555; transition: all 0.2s ease;
    }
    .alert-bar-critico { animation: pulse 0.8s ease-in-out infinite; }
    .alert-bar img { width: 50px; height: 50px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
    .alert-info h3 { font-size: 1.2rem; margin-bottom: 3px; text-transform: uppercase; font-weight: 800; }
    .alert-info p { font-size: 0.95rem; opacity: 0.95; }
    
    /* Toast de notificação temporária */
    .toast-notification { 
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px);
      background-color: rgba(20, 20, 20, 0.95); color: var(--text-main); padding: 12px 25px;
      border-radius: 50px; border: 1px solid #444; box-shadow: 0 10px 25px rgba(0,0,0,0.8);
      z-index: 2000; opacity: 0; font-size: 0.95rem; font-weight: 600; text-align: center;
      pointer-events: none; transition: opacity 0.3s ease, transform 0.3s ease; white-space: nowrap;
    }
    .toast-notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Loading overlay */
    .loading-overlay { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(20, 20, 20, 0.9); padding: 20px 30px; border-radius: 12px;
      border: 1px solid var(--accent-color); text-align: center; z-index: 1001;
      backdrop-filter: blur(5px);
    }
    .loading-spinner { 
      border: 3px solid #333; border-top: 3px solid var(--accent-color); 
      border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; 
      margin: 0 auto 10px; 
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    /* Remove controles padrão do Leaflet */
    .leaflet-control-zoom, .leaflet-control-attribution, .leaflet-routing-container { display: none !important; }
    
    /* Tela de loading inicial */
    .loading-fullscreen { 
      position: fixed; inset: 0; background-color: var(--bg-color);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    .loading-fullscreen.fade-out { opacity: 0; visibility: hidden; }
    .loading-fullscreen .spinner-ring { width: 60px; height: 60px; border-radius: 50%; position: relative; margin-bottom: 24px; }
    .loading-fullscreen .spinner-ring::before, .loading-fullscreen .spinner-ring::after { 
      content: ''; position: absolute; inset: 0; border-radius: 50%; border: 4px solid transparent; 
    }
    .loading-fullscreen .spinner-ring::before { 
      border-top-color: var(--accent-color); border-right-color: var(--accent-color); 
      animation: spinRing 1s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite; 
    }
    .loading-fullscreen .spinner-ring::after { 
      inset: 10px; border-bottom-color: #ff3333; border-left-color: #ff3333; 
      animation: spinRing 1.4s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite reverse; 
    }
    @keyframes spinRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-fullscreen .loading-text { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px; text-align: center; }
    .loading-fullscreen .loading-text span { color: var(--accent-color); }
    .loading-fullscreen .loading-sub { margin-top: 8px; font-size: 0.8rem; color: #777; animation: pulseText 1.8s ease-in-out infinite; }
    @keyframes pulseText { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    /* Estilo dos marcadores de radar */
    .radar-marker-icon {
      background: transparent !important;
      border: none !important;
    }
    .radar-marker-icon img {
      width: 40px !important;
      height: 40px !important;
      object-fit: contain !important;
      display: block !important;
    }
  </style>
</head>
<body>

  <!-- =================================================================== -->
  <!-- TELA DE LOADING INICIAL                                             -->
  <!-- =================================================================== -->
  <div class="loading-fullscreen" id="loading-fullscreen">
    <div class="spinner-ring"></div>
    <div class="loading-text">Iniciando <span>Radar X9</span></div>
    <div class="loading-sub">Sincronizando satélites...</div>
  </div>

  <!-- =================================================================== -->
  <!-- HEADER DO APLICATIVO                                                -->
  <!-- =================================================================== -->
  <header>
    <div class="header-left">
      <img src="/imagens_app/ic_icon_app.png" onerror="this.style.display='none'" alt="App Icon" class="app-icon">
      <h1>RADAR <span>X9</span> BH</h1>
    </div>
  </header>

  <!-- =================================================================== -->
  <!-- ÁREA PRINCIPAL - MAPA E CONTROLES                                   -->
  <!-- =================================================================== -->
  <div class="map-wrapper">
    
    <!-- BARRA DE BUSCA DE RADARES -->
    <div class="search-container" id="search-bar-radares">
      <input type="text" id="query" placeholder="Buscar radar (tipo, endereço)...">
      <button class="btn-search" id="btn-search-radar" title="Buscar">
        <img src="/imagens_app/ic_radar_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/646/646094.png'" alt="Busca">
      </button>
    </div>

    <!-- BARRA DE ROTA/NAVEGAÇÃO -->
    <div class="search-container" id="search-bar-rota">
      <input type="text" id="route-query" placeholder="Digite um endereço para navegar...">
      <button class="btn-search" id="btn-calc-route" title="Traçar Rota" style="background-color: #ff8c00;">
        <img src="/imagens_app/ic_gps_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7892/7892059.png'" alt="Rota">
      </button>
    </div>

    <!-- MAPA (Leaflet) -->
    <div id="map"></div>
    
    <!-- TOAST PARA NOTIFICAÇÕES -->
    <div class="toast-notification" id="toast-msg"></div>

    <!-- WIDGET DE BÚSSOLA VISUAL -->
    <div class="compass-widget">
      <img src="/imagens_app/ic_compass.png" onerror="this.style.opacity='0.3'; this.src='https://cdn-icons-png.flaticon.com/512/2838/2838773.png'" alt="Bússola" class="compass-base">
      <img src="/imagens_app/ic_compass_ponteira.png" onerror="this.style.opacity='0.5'; this.src='https://cdn-icons-png.flaticon.com/512/1140/1140644.png'" alt="Ponteira" class="compass-needle" id="compass-needle-img">
    </div>

    <!-- WIDGET DE VELOCIDADE -->
    <div class="speed-widget">
      <img src="/imagens_app/ic_speed_limit.png" onerror="this.style.opacity='0.5'" alt="Velocidade" class="speed-bg">
      <div class="speed-value" id="speed-display">0</div>
    </div>

    <!-- BOTÕES DE CONTROLE DO MAPA -->
    <div class="map-controls">
      <button class="map-btn" id="btn-rotate-map" title="Rotacionar Mapa (Norte para Cima)">
        <img src="/imagens_app/ic_girar_map.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/10313/10313225.png'" alt="Rotacionar">
      </button>
      <button class="map-btn alert-toggle-btn" id="btn-alert-toggle" title="Ligar/Desligar Alerta de Radar">
        <img id="alert-toggle-icon" src="/imagens_app/ic_sound_on.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/727/727245.png'" alt="Alerta">
      </button>
      <button class="map-btn" id="btn-search-bar" title="Buscar Radares">
        <img src="/imagens_app/ic_radar_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/646/646094.png'" alt="busca">
      </button>
      <button class="map-btn" id="btn-route-bar" title="Navegar / Rota">
        <img src="/imagens_app/ic_gps_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7892/7892059.png'" alt="Rota">
      </button>
      <button class="map-btn" id="btn-center" title="Centralizar GPS">
        <img src="/imagens_app/ic_location_button.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/684/684908.png'" alt="Centro">
      </button>
      <button class="map-btn" id="btn-refresh" title="Resetar Mapa">
        <img src="/imagens_app/ic_refresh_button.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2409/2409305.png'" alt="Refresh">
      </button>
      <button class="map-btn" id="btn-zoom-in" title="Aumentar Zoom">
        <img src="/imagens_app/ic_zoom_in.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/709/709493.png'" alt="Zoom In">
      </button>
      <button class="map-btn" id="btn-zoom-out" title="Diminuir Zoom">
        <img src="/imagens_app/ic_zoom_out.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/709/709506.png'" alt="Zoom Out">
      </button>
    </div>

    <!-- ALERTA DE RADAR PRÓXIMO -->
    <div id="alert-container">
      <div class="alert-bar">
        <img id="alert-icon" src="/imagens_app/ic_radar_das.png" alt="Radar" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7764/7764406.png'">
        <div class="alert-info">
          <h3 id="alert-title">ATENÇÃO!</h3>
          <p id="alert-text">Radar Próximo</p>
        </div>
      </div>
    </div>

    <!-- LOADING OVERLAY PARA OPERAÇÕES -->
    <div class="loading-overlay" id="loading" style="display:none;">
      <div class="loading-spinner"></div>
      <div style="margin-top:10px; color:#fff;">Processando...</div>
    </div>
  </div>

  <!-- ÁUDIO DE ALERTA -->
  <audio id="alert-soud" src="audio_app/alerta.mp3" preload="auto"></audio>

  <!-- =================================================================== -->
  <!-- BIBLIOTECAS EXTERNAS                                                -->
  <!-- =================================================================== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.min.js"></script>

  <script>
    // ===================================================================
    // VARIÁVEIS GLOBAIS
    // ===================================================================
    
    let map;                         // Instância do mapa Leaflet
    let userMarker;                  // Marcador da posição do usuário
    let radarMarkers = [];           // Array com todos os marcadores de radar
    let alertTimeout;                // Timeout para fechar alerta automático
    
    // Posição inicial (Praça Sete - Belo Horizonte)
    let userLat = -19.919055;        
    let userLng = -43.938641;        
    
    let tileLayer;                   // Camada de tiles do mapa
    let routingControl = null;       // Controle de rota
    let searchActive = false;        // Estado da barra de busca
    let routeActive = false;         // Estado da barra de rota
    let prevLat = null;              // Latitude anterior (para cálculo de velocidade)
    let prevLng = null;              // Longitude anterior
    let prevTime = null;             // Tempo anterior
    let isFollowing = true;          // Se o mapa segue o GPS automaticamente
    let watchId = null;              // ID do watcher do GPS
    let gpsSource = 'none';          // Fonte do GPS: 'browser' ou 'appinventor'
    let gpsInitialized = false;      // Flag se o GPS já inicializou
    let browserGpsTimeout = null;    // Timeout para fallback do GPS
    let destinoAtual = null;         // Armazena destino atual para atualizar rota
    let posicaoCentralOriginal = { lat: -19.919055, lng: -43.938641, zoom: 17 };
    
    // Controle do alerta sonoro (LIGADO por padrão)
    let alertaHabilitado = true;
    
    // Variável para controlar o último radar alertado (evita repetição)
    let ultimoRadarAlertado = null;
    
    // Timer para retornar ao GPS quando mapa for mexido
    let returnToGpsTimer = null;
    const TEMPO_RETORNO_GPS = 8000;   // 8 segundos
    
    // ===================================================================
    // MARCADORES DE ROTA (ORIGEM E DESTINO)
    // ===================================================================
    let startRouteMarker = null;      // Marcador de partida (ic_navigator_map.png)
    let endRouteMarker = null;        // Marcador de chegada (ic_icon_chegada.png)
    
    // ===================================================================
    // CONFIGURAÇÕES DE ALERTA
    // ===================================================================
    const ALERT_CONFIG = {
      DISTANCIA_MAXIMA: 80,           // 80 metros (alerta começa aqui)
      DISTANCIA_CRITICA: 40,          // Alerta mais urgente
      TEMPO_ALERTA: 4000,             // 4 segundos de alerta na tela
      DISTANCIA_PASSAR_RADAR: 10      // Distância para considerar que já passou
    };
    
    // ===================================================================
    // VARIÁVEIS DA BÚSSOLA
    // ===================================================================
    let lastHeadingTime = 0;
    let lastHeadingLat = 0;
    let lastHeadingLng = 0;
    let currentHeading = 0;            // Direção atual em graus (0 = Norte)
    
    // ===================================================================
    // URL BASE DA API DA PBH
    // ===================================================================
    const API_PBH_BASE = 'https://dados.pbh.gov.br/api/3/action/';

    // ===================================================================
    // MAPA DE ÍCONES POR TIPO DE RADAR
    // ===================================================================
    const iconMap = {
      'Controlador Eletrônico de Velocidade': '/imagens_app/ic_radar_cev_v2.png',
      'Detector de Avanço de Semáforo': '/imagens_app/ic_radar_das_v2.png',
      'Detector de Tráfego em Local Proibido': '/imagens_app/ic_radar_dtlp_v2.png',

    // ===================================================================

    // Descrição: Adiciona os marcadores de ORIGEM e DESTINO da rota
    //            - ORIGEM: ic_navigator_map.png (início da viagem)
    //            - DESTINO: ic_icon_chegada.png (final da viagem)
    // Parâmetros: originLat, originLng, destLat, destLng
    // ===================================================================
    function adicionarMarcadoresRota(originLat, originLng, destLat, destLng) {
      // Remove marcadores antigos se existirem
      if (startRouteMarker) map.removeLayer(startRouteMarker);
      if (endRouteMarker) map.removeLayer(endRouteMarker);
      
      // ===============================================================
      // MARCADOR DE PARTIDA (ÍNICIO DA ROTA) - ic_navigator_map.png
      // ===============================================================
      var startIcon = criarIconePersonalizado('/imagens_app/ic_navigator_map.png', 45, 'route-start-marker');
      startRouteMarker = L.marker([originLat, originLng], { icon: startIcon, zIndexOffset: 900 }).addTo(map);
      startRouteMarker.bindTooltip("Seu local (partida)", { permanent: false, direction: "top", offset: [0, -25] });
      
      // ===============================================================
      // MARCADOR DE CHEGADA (FINAL DA ROTA) - ic_icon_chegada.png
      // ===============================================================
      var endIcon = criarIconePersonalizado('/imagens_app/ic_icon_chegada.png', 45, 'route-end-marker');
      endRouteMarker = L.marker([destLat, destLng], { icon: endIcon, zIndexOffset: 900 }).addTo(map);
      endRouteMarker.bindTooltip("Destino", { permanent: false, direction: "top", offset: [0, -25] });
    }

    // ===================================================================

    // Parâmetros: tipo (string com o tipo do radar)
    // Retorno: boolean (true = deve alertar, false = não alertar)
    // ===================================================================
    function deveAlertaRadar(tipo) {
      for (var i = 0; i < TIPOS_SEM_ALERTA.length; i++) {
        if (tipo && tipo.includes(TIPOS_SEM_ALERTA[i])) {
          return false;   // Não alerta para faixas de ônibus, etc
        }
      }
      return true;        // Alerta para radares de velocidade, semáforo, etc
    }

    // ===================================================================
    // FUNÇÃO: getIconUrl
    // Descrição: Retorna a URL do ícone baseado no tipo e velocidade do radar
    // Parâmetros: tipo (string), velocidade (string)
    // Retorno: string com o caminho da imagem
    // ===================================================================
    function getIconUrl(tipo, velocidade) {
      const tipoLimpo = tipo ? tipo.trim() : "";
      
      // Radar misto (velocidade + semáforo)
      if (tipoLimpo.includes('Controlador Eletrônico Misto') || tipoLimpo.includes('CEM')) {
        return iconMap['Controlador Eletrônico de Velocidade'] || '/imagens_app/ic_radar_cev_v2.png';
      }
      
      // Radar de parada sobre faixa de pedestres
      if (tipoLimpo.includes('Parada sobre Faixa de Pedestres') || tipoLimpo.includes('DPFP')) {
        return iconMap['Detector de Parada sobre Faixa de Pedestres (DPFP)'] || '/imagens_app/ic_radar_dpfp_v2.png';
      }
      
      // Painel de redução de velocidade
      if (tipoLimpo === 'Controle de Redução de Velocidade (CRV)') {
        return iconMap['Controle de Redução de Velocidade (CRV)'];
      }
      
      // Radar de velocidade - ícone específico por limite (50km/h, 70km/h)
      const isRadarVelocidade = (tipoLimpo.includes('Velocidade') && !tipoLimpo.includes('CRV')) || 
                                (tipoLimpo.includes('Velocidade') && !tipoLimpo.includes('Redução'));
      
      if (isRadarVelocidade) {
        const vel = parseInt(velocidade) || 0;
        if (vel === 50) return '/imagens_app/ic_radar_cev_50_v2.png';
        if (vel === 70) return '/imagens_app/ic_radar_cev_70_v2.png';
        return '/imagens_app/ic_radar_cev_v2.png';
      }
      
      // Busca ícone no mapeamento
      let icone = iconMap[tipoLimpo];
      
      // Fallback por palavras-chave
      if (!icone) {
        if (tipoLimpo.includes('Semáforo')) icone = iconMap['Detector de Avanço de Semáforo'];
        else if (tipoLimpo.includes('Redutor') || tipoLimpo.includes('Redução')) icone = iconMap['Controle de Redução de Velocidade (CRV)'];
        else if (tipoLimpo.includes('Celular')) icone = iconMap['Detector de Uso de Celular'];
        else if (tipoLimpo.includes('OCR')) icone = iconMap['Leitor Inteligente de Placas (OCR-P)'];
        else if (tipoLimpo.includes('Facial')) icone = iconMap['Leitor de Reconhecimento Facial (OCR-F)'];
        else if (tipoLimpo.includes('Conversão')) icone = iconMap['Detector de Conversão em Local Proibido'];
        else if (tipoLimpo.includes('Invasão')) icone = iconMap['Detector de Invasão de Faixa Exclusiva - MOVE'];
        else if (tipoLimpo.includes('Parada') || tipoLimpo.includes('Pedestres') || tipoLimpo.includes('DPFP')) 
          icone = iconMap['Detector de Parada sobre Faixa de Pedestres (DPFP)'];
        else if (tipoLimpo.includes('Faixa Exclusiva') || tipoLimpo.includes('DIFEX')) 
          icone = iconMap['Detector de Invasão de Faixa Exclusiva (DIFEX)'];
      }
      
      if (!icone) icone = iconMap['default'];
      return icone;
    }

    // ===================================================================
    // FUNÇÃO: calcularDistancia
    // Descrição: Calcula distância entre dois pontos usando fórmula de Haversine
    // Parâmetros: lat1, lon1, lat2, lon2 (coordenadas em graus)
    // Retorno: distância em metros
    // ===================================================================
    function calcularDistancia(lat1, lon1, lat2, lon2) {
      var R = 6371e3;               // Raio da Terra em metros
      var p1 = lat1 * Math.PI / 180;
      var p2 = lat2 * Math.PI / 180;
      var dp = (lat2 - lat1) * Math.PI / 180;
      var dl = (lon2 - lon1) * Math.PI / 180;
      var a = Math.sin(dp / 2) * Math.sin(dp / 2) + 
              Math.cos(p1) * Math.cos(p2) * 
              Math.sin(dl / 2) * Math.sin(dl / 2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // ===================================================================
    // FUNÇÃO: verificarDirecao
    // Descrição: Verifica se o usuário está se aproximando ou afastando do radar
    // Parâmetros: uLat, uLng, uHeading, radarLat, radarLng
    // Retorno: objeto com flags estaAproximando, estaAfastando, anguloRadar, diferenca
    // ===================================================================
    function verificarDirecao(uLat, uLng, uHeading, radarLat, radarLng) {
      if (!uHeading || uHeading === -1) return { estaAproximando: true, estaAfastando: false, anguloRadar: 0, diferenca: 0 };
      
      var deltaX = radarLng - uLng;
      var deltaY = radarLat - uLat;
      var anguloRadar = Math.atan2(deltaY, deltaX) * 180 / Math.PI;
      var anguloRadarNormalizado = (anguloRadar + 360) % 360;
      
      var diff = Math.abs(uHeading - anguloRadarNormalizado);
      diff = Math.min(diff, 360 - diff);
      
      var estaAproximando = diff < 45;    // Menos de 45 graus de diferença = aproximando
      var estaAfastando = diff > 135;      // Mais de 135 graus = afastando
      
      return {
        estaAproximando: estaAproximando,
        estaAfastando: estaAfastando,
        anguloRadar: anguloRadarNormalizado,
        diferenca: diff
      };
    }

    // ===================================================================
    // FUNÇÃO: buscarCoordenadas
    // Descrição: Busca coordenadas de um endereço via Nominatim (OpenStreetMap)
    // Parâmetros: endereco (string)
    // Retorno: objeto {lat, lng} ou null se não encontrado
    // ===================================================================
    async function buscarCoordenadas(endereco) {
      try {
        var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + 
                  encodeURIComponent(endereco) + '&countrycodes=br&limit=1';
        var r = await fetch(url);
        var d = await r.json();
        return (d && d.length > 0) ? { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) } : null;
      } catch (e) { 
        return null; 
      }
    }

    //            - Sem navegação: ic_gps_marker.png (pino GPS padrão)
    // ===================================================================
    function atualizarIconeUsuario() {
      if (!userMarker) return;
      
      var estaEmNavegacao = (destinoAtual !== null && routingControl !== null);
      var userIconUrl;
      var iconClassName;
      
      if (estaEmNavegacao) {
        userIconUrl = '/imagens_app/ic_navigator_map.png';   // Ícone de navegação ativa
        iconClassName = 'user-navigator-marker';
      } else {
        userIconUrl = '/imagens_app/ic_gps_marker.png';      // Ícone padrão de GPS
        iconClassName = 'user-gps-marker';
      }
      
      var userIcon = L.icon({
        iconUrl: userIconUrl,
        iconSize: [50, 50],
        iconAnchor: [25, 50],
        popupAnchor: [0, -50],
        className: iconClassName
      });
      
      userMarker.setIcon(userIcon);
    }

    // ===================================================================
    // FUNÇÃO: calcularRota
    // Descrição: Traça rota entre usuário e destino usando OSRM (OpenStreetMap)
    //            Adiciona os marcadores de ORIGEM e DESTINO automaticamente
    // Parâmetros: destLat, destLng (coordenadas do destino)
    // ===================================================================
    function calcularRota(destLat, destLng) {
      // Remove rota anterior se existir
      if (routingControl) map.removeControl(routingControl);
      
      destinoAtual = { lat: destLat, lng: destLng };
      
      // ===============================================================
      // ADICIONA OS MARCADORES DE ORIGEM E DESTINO
      // - ORIGEM: ic_navigator_map.png (ponto de partida)
      // - DESTINO: ic_icon_chegada.png (ponto de chegada)
      // ===============================================================
      adicionarMarcadoresRota(userLat, userLng, destLat, destLng);
      
      // Cria o controle de rota (linha azul no mapa)
      routingControl = L.Routing.control({
        waypoints: [L.latLng(userLat, userLng), L.latLng(destLat, destLng)],
        routeWhileDragging: false,
        addWaypoints: false,
        language: 'pt-BR',
        show: false,
        lineOptions: { 
          styles: [
            { color: '#0044cc', opacity: 0.8, weight: 6 },   // Borda externa
            { color: '#00aaff', opacity: 0.9, weight: 3 }    // Linha principal
          ] 
        },
        createMarker: function() { return null; },            // Não cria marcadores automáticos
        router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' })
      }).addTo(map);
      
      // Atualiza o ícone do usuário para o ícone de navegação
      atualizarIconeUsuario();
      
      showNotification("Navegação iniciada! Siga a rota azul.");
    }

    // ===================================================================
    // FUNÇÃO: atualizarRota
    // Descrição: Atualiza a rota com a posição atual do usuário
    //            Também atualiza o marcador de ORIGEM
    // ===================================================================
    function atualizarRota() {
      if (destinoAtual && userLat && userLng && routingControl) {
        routingControl.setWaypoints([L.latLng(userLat, userLng), L.latLng(destinoAtual.lat, destinoAtual.lng)]);
        // Atualiza também o marcador de origem (partida)
        if (startRouteMarker) {
          startRouteMarker.setLatLng([userLat, userLng]);
        }
      }
    }

    // FUNÇÃO: removerRota
    // Descrição: Remove a rota ativa e volta o ícone do usuário ao padrão
    // ===================================================================
    function removerRota() {
      if (routingControl) {
        map.removeControl(routingControl);
        routingControl = null;

      destinoAtual = null;
      
      // Remove os marcadores de rota
      removerMarcadoresRota();
      
      atualizarIconeUsuario();
      showNotification("Navegação encerrada");

    // ===================================================================
    // FUNÇÃO: converterSIRGAS2000paraWGS84
    // Descrição: Converte coordenadas UTM (SIRGAS2000) para Lat/Lon (WGS84)
    // Parâmetros: xLeste, yNorte (coordenadas UTM)
    // Retorno: objeto {lat, lng}
    // ===================================================================
    function converterSIRGAS2000paraWGS84(xLeste, yNorte) {
      var a = 6378137.0;
      var f = 1 / 298.257222101;
      var k0 = 0.9996;
      var N0 = 10000000.0;
      var E0 = 500000.0;
      var e2 = 2 * f - f * f;
      var ep2 = e2 / (1 - e2);
      var e1 = (1 - Math.sqrt(1 - e2)) / (1 + Math.sqrt(1 - e2));
      var M = yNorte - N0;
      var mu = M / (a * (1 - e2/4 - 3*e2*e2/64 - 5*e2*e2*e2/256));
      var phi1 = mu + (3*e1/2 - 27*e1*e1*e1/32) * Math.sin(2*mu) + 
                 (21*e1*e1/16 - 55*e1*e1*e1*e1/32) * Math.sin(4*mu) + 
                 (151*e1*e1*e1/96) * Math.sin(6*mu);
      var N1 = a / Math.sqrt(1 - e2 * Math.sin(phi1) * Math.sin(phi1));
      var T1 = Math.tan(phi1) * Math.tan(phi1);
      var C1 = ep2 * Math.cos(phi1) * Math.cos(phi1);
      var R1 = a * (1 - e2) / Math.pow(1 - e2 * Math.sin(phi1) * Math.sin(phi1), 1.5);
      var D = (xLeste - E0) / (N1 * k0);
      
      var lat = phi1 - (N1 * Math.tan(phi1) / R1) * (D*D/2 - (5+3*T1+10*C1-4*C1*C1-9*ep2)*Math.pow(D,4)/24 + 
               (61+90*T1+298*C1+45*T1*T1-252*ep2-3*C1*C1)*Math.pow(D,6)/720);
      var lng = (D - (1+2*T1+C1)*Math.pow(D,3)/6 + (5-2*C1+28*T1-3*C1*C1+8*ep2+24*T1*T1)*Math.pow(D,5)/120) / Math.cos(phi1);
      
      lng = (lng * 180 / Math.PI) - 51;
      lat = lat * 180 / Math.PI;
      return { lat: Math.round(lat * 1000000) / 1000000, lng: Math.round(lng * 1000000) / 1000000 };
    }

    // ===================================================================
    // FUNÇÃO: extrairCoordenadas
    // Descrição: Extrai coordenadas do registro do radar (suporta múltiplos formatos)
    // Parâmetros: record (array com os dados do radar)
    // Retorno: objeto {lat, lng} ou null
    // ===================================================================
    function extrairCoordenadas(record) {
      var coordenadasEncontradas = null;
      
      // Tenta extrair do campo 9 (formato padrão)
      if (record[9]) {
        var parts = String(record[9]).replace(/\s+/g, '').split(',').map(Number);
        if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
          coordenadasEncontradas = parts;
        }
      }
      
      // Se não encontrou, busca em qualquer campo que pareça coordenada
      if (!coordenadasEncontradas) {
        for (var i = 0; i < record.length; i++) {
          if (!record[i] || String(record[i]).length > 40) continue;
          var parts = String(record[i]).replace(/\s+/g, '').split(',').map(Number);
          if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
            coordenadasEncontradas = parts;
            break;
          }
        }
      }
      
      if (!coordenadasEncontradas) return null;
      
      var v1 = coordenadasEncontradas[0];
      var v2 = coordenadasEncontradas[1];
      
      // Se os valores são grandes (>1000), provavelmente são UTM (SIRGAS2000)
      if (Math.abs(v1) > 1000 || Math.abs(v2) > 1000) {
        return converterSIRGAS2000paraWGS84(v1, v2);
      }
      
      // Ajuste para formato (lat, lng) correto
      if (v1 < -30 && v2 > -30) return { lat: v2, lng: v1 };
      
      return { lat: v1, lng: v2 };
    }

    // ===================================================================
    // FUNÇÃO: receberCoordenadasDoAppInventor
    // Descrição: Interface para receber coordenadas do App Inventor (GPS externo)
    // Parâmetros: lat, lng, speed (velocidade em km/h)
    // ===================================================================
    function receberCoordenadasDoAppInventor(lat, lng, speed) {
      lat = parseFloat(lat);
      lng = parseFloat(lng);
      speed = parseFloat(speed) || 0;

      if (isNaN(lat) || isNaN(lng)) return;

      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      if (browserGpsTimeout) {
        clearTimeout(browserGpsTimeout);
        browserGpsTimeout = null;
      }

      gpsSource = 'appinventor';
      processarNovaPosicao(lat, lng, speed);
    }

    // ===================================================================
    // FUNÇÃO: processarNovaPosicao
    // Descrição: Função unificada para processar nova posição do GPS
    //            Calcula velocidade, direção, atualiza marcadores e alertas
    // Parâmetros: newLat, newLng, speedKmh, hardwareHeading
    // ===================================================================
    function processarNovaPosicao(newLat, newLng, speedKmh, hardwareHeading) {
      var currentTime = Date.now();
      var dist = 0;

      // Calcula velocidade se não veio do GPS
      if (speedKmh === 0 && prevLat !== null && prevTime !== null) {
        dist = calcularDistancia(prevLat, prevLng, newLat, newLng);
        var time = (currentTime - prevTime) / 1000;
        if (time > 0) speedKmh = Math.round((dist / time) * 3.6);
      } else if (prevLat !== null) {
        dist = calcularDistancia(prevLat, prevLng, newLat, newLng);
      }
      
      // Limita velocidade máxima
      if (speedKmh > 250) speedKmh = 0;
      $("#speed-display").text(speedKmh);
      
      // Calcula direção (heading) se disponível
      if (hardwareHeading !== null && !isNaN(hardwareHeading) && hardwareHeading >= 0) {
        currentHeading = hardwareHeading;
      } 
      else if (dist > 3) {  // Calcula baseado no movimento
        var dy = newLat - prevLat;
        var dx = (newLng - prevLng) * Math.cos(newLat * Math.PI / 180);
        var calcHeading = (Math.atan2(dx, dy) * 180 / Math.PI);
        if (calcHeading < 0) calcHeading += 360;
        if (calcHeading >= 360) calcHeading -= 360;
        currentHeading = calcHeading;
      }
      
      // Atualiza bússola
      if (currentHeading > 0 || currentHeading === 0) {
        atualizarBussola(currentHeading);
      }

      // Atualiza variáveis globais
      prevLat = newLat;
      prevLng = newLng;
      prevTime = currentTime;
      userLat = newLat;
      userLng = newLng;

      // Cria ou atualiza marcador do usuário
      if (!userMarker) {
        var defaultIcon = L.icon({
          iconUrl: '/imagens_app/ic_gps_marker.png',
          iconSize: [50, 50],
          iconAnchor: [25, 50],
          popupAnchor: [0, -50],
          className: 'user-gps-marker'
        });
        userMarker = L.marker([newLat, newLng], { icon: defaultIcon, zIndexOffset: 1000 }).addTo(map);
        userMarker.bindTooltip("Você está aqui", { permanent: false, direction: "top", offset: [0, -25] });
        
        if (!gpsInitialized) {
          gpsInitialized = true;
          hideFullscreenLoading();
        }
      } else {
        userMarker.setLatLng([newLat, newLng]);
      }
      
      // Atualiza ícone baseado no estado de navegação
      atualizarIconeUsuario();
      
      // Atualiza rota se houver destino ativo
      if (destinoAtual) {
        atualizarRota();
        // Atualiza também o marcador de origem da rota
        if (startRouteMarker) {
          startRouteMarker.setLatLng([newLat, newLng]);
        }
      }
      
      // Se o modo "seguir" estiver ativo, centraliza o mapa
      if (isFollowing) {
        map.setView([newLat, newLng], map.getZoom(), { animate: true, duration: 0.5 });
      }
      
      // Verifica proximidade com radares (apenas se alerta estiver ligado)
      if (alertaHabilitado) {
        verificarProximidade(userLat, userLng, currentHeading);
      } else {
        fecharAlertaImediatamente();
      }
    }

    // ===================================================================
    // FUNÇÃO: startGPSTracking
    // Descrição: Inicia o GPS do navegador (fallback quando não tem App Inventor)
    // ===================================================================
    function startGPSTracking() {
      if (!navigator.geolocation) {
        hideFullscreenLoading();
        showNotification("GPS não suportado neste navegador.");
        return;
      }

      if (watchId !== null) navigator.geolocation.clearWatch(watchId);

      watchId = navigator.geolocation.watchPosition(
        function(position) {
          if (gpsSource !== 'appinventor') gpsSource = 'browser';
          var newLat = position.coords.latitude;
          var newLng = position.coords.longitude;
          var speedKmh = 0;
          
          if (position.coords.speed !== null && position.coords.speed >= 0) {
            speedKmh = Math.round(position.coords.speed * 3.6);
          }

          var hardwareHeading = position.coords.heading;
          processarNovaPosicao(newLat, newLng, speedKmh, hardwareHeading);
        },
        showError,
        { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
      );

      browserGpsTimeout = setTimeout(function() {
        if (!gpsInitialized && gpsSource === 'none') {
          showNotification("Aguardando GPS do app...");
          hideFullscreenLoading();
        }
      }, 8000);
    }

    // ===================================================================
    // FUNÇÃO: verificarProximidade
    // Descrição: Versão melhorada com alerta preciso baseado em distância e direção
    // Parâmetros: uLat, uLng, uHeading (posição e direção do usuário)
    // ===================================================================
    function verificarProximidade(uLat, uLng, uHeading) {
      var alertasProximos = [];
      var heading = uHeading || -1;
      
      // Percorre todos os radares
      radarMarkers.forEach(function(marker) {
        var dados = marker.radarData;
        
        // Verifica se este tipo de radar deve gerar alerta
        if (!deveAlertaRadar(dados.tipoOriginal)) {
          return;
        }
        
        var distance = calcularDistancia(uLat, uLng, dados.latitude, dados.longitude);
        
        if (distance < ALERT_CONFIG.DISTANCIA_MAXIMA) {
          var direcaoInfo = verificarDirecao(uLat, uLng, heading, dados.latitude, dados.longitude);
          
          // Se já passou do radar (muito próximo e afastando)
          if (distance < ALERT_CONFIG.DISTANCIA_PASSAR_RADAR && direcaoInfo.estaAfastando) {
            if (ultimoRadarAlertado === marker) {
              fecharAlertaImediatamente();
              ultimoRadarAlertado = null;
            }
            return;
          }
          
          // Ignora se estiver afastando e já longe
          if (direcaoInfo.estaAfastando && distance > 30) {
            return;
          }
          
          // Considera apenas se estiver aproximando
          if (direcaoInfo.estaAproximando) {
            alertasProximos.push({
              distancia: distance,
              dados: dados,
              direcaoInfo: direcaoInfo,
              marker: marker
            });
          }
        } else {
          // Limpa radar alertado se estiver longe
          if (ultimoRadarAlertado === marker && distance > ALERT_CONFIG.DISTANCIA_MAXIMA) {
            ultimoRadarAlertado = null;
          }
        }
      });
      
      // Ordena por distância (mais próximo primeiro)
      alertasProximos.sort(function(a, b) {
        return a.distancia - b.distancia;
      });
      
      // Exibe alerta para o radar mais próximo
      if (alertasProximos.length > 0) {
        var radar = alertasProximos[0];
        var distance = radar.distancia;
        var dados = radar.dados;
        
        // Evita repetir o mesmo radar
        if (ultimoRadarAlertado === radar.marker) {
          return;
        }
        
        if (ultimoRadarAlertado !== null) {
          fecharAlertaImediatamente();
        }
        
        ultimoRadarAlertado = radar.marker;
        
        // Define prioridade do alerta
        var prioridade = distance < ALERT_CONFIG.DISTANCIA_CRITICA ? "critico" : "normal";
        var titulo = dados.isIA ? "⚠️ Câmera IA!" : "📸 Radar à Frente!";
        
        if (prioridade === "critico") {
          titulo = "🚨 ATENÇÃO MÁXIMA! " + titulo;
        }
        
        var textoAlerta = dados.endereco + ' - Máx: ' + dados.velocidade_maxima + 'km/h';
        textoAlerta += ' (a ' + Math.round(distance) + 'm';
        
        if (radar.direcaoInfo && radar.direcaoInfo.diferenca !== undefined && radar.direcaoInfo.diferenca > 0) {
          textoAlerta += ' • ' + radar.direcaoInfo.diferenca.toFixed(0) + '° à frente';
        }
        textoAlerta += ')';
        
        if (distance < 30) {
          textoAlerta += ' ⚠️ MUITO PRÓXIMO!';
        }
        
        // Atualiza elementos visuais do alerta
        $("#alert-icon").attr("src", getIconUrl(dados.tipoOriginal, dados.velocidade_maxima));
        $("#alert-text").text(textoAlerta);
        $("#alert-title").text(titulo);
        
        var alertBar = $(".alert-bar");
        if (prioridade === "critico") {
          alertBar.css("background", "linear-gradient(90deg, #ff0000, #cc0000)");
          alertBar.addClass("alert-bar-critico");
        } else {
          alertBar.css("background", "linear-gradient(90deg, #cc0000, #990000)");
          alertBar.removeClass("alert-bar-critico");
        }
        
        // Toca som de alerta
        if (alertaHabilitado) {
          var sound = document.getElementById("alert-soud");
          if (sound) {
            sound.currentTime = 0;
            sound.volume = prioridade === "critico" ? 0.8 : 0.5;
            sound.play().catch(function(e) { console.warn("Audio blocked:", e); });
          }
        }
        
        // Exibe alerta na tela
        $("#alert-container").stop(true, true).fadeIn(200);
        clearTimeout(alertTimeout);
        alertTimeout = setTimeout(function() { 
          if (ultimoRadarAlertado === radar.marker) {
            $("#alert-container").fadeOut(500);
            $(".alert-bar").css("background", "linear-gradient(90deg, #cc0000, #990000)");
            $(".alert-bar").removeClass("alert-bar-critico");
            ultimoRadarAlertado = null;
          }
        }, ALERT_CONFIG.TEMPO_ALERTA);
      }
    }

    // ===================================================================
    // FUNÇÃO: initMap
    // Descrição: Inicializa o mapa e configura todos os eventos
    // ===================================================================
    function initMap() {
      map = L.map('map', {
        center: [userLat, userLng],
        zoom: 17,
        zoomControl: false,
        rotate: true,
        bearing: 0
      });

      aplicarTemaMapa();
      setInterval(aplicarTemaMapa, 300000);
      
      // Quando o usuário começa a arrastar o mapa, desativa o modo "seguir"
      map.on('dragstart', function() { 
        isFollowing = false;
        if (returnToGpsTimer) {
          clearTimeout(returnToGpsTimer);
        }
      });
      
      // Quando o usuário para de arrastar o mapa, agenda retorno ao GPS
      map.on('dragend', function() {
        returnToGpsTimer = setTimeout(function() {
          if (!isFollowing && userMarker) {
            isFollowing = true;
            map.setView(userMarker.getLatLng(), map.getZoom(), { animate: true, duration: 0.5 });
            showNotification("Voltando à sua posição atual");
          }
        }, TEMPO_RETORNO_GPS);
      });

      // ===============================================================
      // EVENTOS DOS BOTÕES
      // ===============================================================
      
      // Busca radar por texto
      $("#btn-search-radar").click(function() { buscarRadares($("#query").val()); });
      $("#query").keypress(function(e) { if (e.which == 13) buscarRadares($("#query").val()); });
      
      // Calcular rota para endereço
      $("#btn-calc-route").click(async function() {
        var endereco = $("#route-query").val().trim();
        if (endereco.length < 5) { 
          showNotification("Digite um endereço válido."); 
          return; 
        }
        $("#loading").show().html("<div class='loading-spinner'></div><div>Calculando rota...</div>");
        var coords = await buscarCoordenadas(endereco);
        if (coords) {
          calcularRota(coords.lat, coords.lng);
          map.flyTo([coords.lat, coords.lng], 16, { duration: 1.5 });
          isFollowing = false;
          $("#loading").hide();
          fecharTodasBarras();
          showNotification("Rota calculada com sucesso!");
        } else {
          $("#loading").hide();
          showNotification("Endereço não encontrado.");
        }
      });
      $("#route-query").keypress(function(e) { if (e.which == 13) $("#btn-calc-route").click(); });
      
      // Abre/fecha barra de busca de radares
      $("#btn-search-bar").click(function() {
        if (searchActive) { 
          fecharTodasBarras(); 
          return; 
        }
        if (routeActive) routeActive = false;
        searchActive = true;
        $("#search-bar-radares").addClass('active');
        setTimeout(function() { $("#query").focus(); }, 300);
      });
      
      // Abre/fecha barra de rota
      $("#btn-route-bar").click(function() {
        if (routeActive) { 
          fecharTodasBarras(); 
          return; 
        }
        if (searchActive) searchActive = false;
        routeActive = true;
        $("#search-bar-rota").addClass('active');
        setTimeout(function() { $("#route-query").focus(); }, 300);
      });
      
      // Centraliza no GPS
      $("#btn-center").click(function() {
        fecharTodasBarras();
        isFollowing = true;
        if (userMarker) {
          map.flyTo(userMarker.getLatLng(), 17, { duration: 0.5 });
          showNotification("Centralizando na sua posição");
        } else {
          showNotification("Aguardando sinal GPS...");
        }
      });

      // Reset do mapa
      $("#btn-refresh").click(function() { 
        resetarMapa();
        carregarRadares(); 
      });
      
      // Zoom in/out
      $("#btn-zoom-in").click(function() { map.zoomIn(); });
      $("#btn-zoom-out").click(function() { map.zoomOut(); });
      
      // Inicializa botões especiais
      inicializarBotaoRotacaoMapa();
      inicializarBotaoAlertaToggle();
      
      // Inicia GPS e carrega radares
      startGPSTracking();
      carregarRadares();
    }

    // ===================================================================
    // FUNÇÃO: carregarRadares
    // Descrição: Carrega radares do JSON local ou da API da PBH
    // ===================================================================
    async function carregarRadares() {
      // Remove radares existentes
      if (radarMarkers.length > 0) {
        radarMarkers.forEach(function(marker) { map.removeLayer(marker); });
        radarMarkers = [];
      }
      
      // Tenta carregar do arquivo JSON local
      try {
        var response = await fetch('radares.json?v=' + Date.now());
        if (!response.ok) throw new Error("Arquivo não encontrado");
        var data = await response.json();
        var records = (Array.isArray(data)) ? data : (data.result?.records || data.records || []);
        if (records.length > 0) {
          renderizarRadaresNoMapa(records, "JSON Local");
          return;
        }
      } catch (e) { 
        console.warn("Falha JSON local:", e); 
      }
      
      // Tenta carregar da API da PBH
      $("#loading").show().html("<div class='loading-spinner'></div><div>Conectando API PBH...</div>");
      try {
        var metaResponse = await fetch(API_PBH_BASE + 'package_show?id=fiscalizacao-eletronica');
        var metaData = await metaResponse.json();
        if (!metaData.success || !metaData.result.resources) throw new Error("API PBH: Estrutura inválida");
        
        var csvResource = metaData.result.resources.find(function(r) { return r.format.toLowerCase() === 'csv'; });
        if (!csvResource || !csvResource.url) throw new Error("API PBH: CSV não encontrado");
        
        var csvResponse = await fetch(csvResource.url);
        if (!csvResponse.ok) throw new Error("API PBH: Erro download");
        
        var csvText = await csvResponse.text();
        var recordsFromAPI = parseCSVtoRecords(csvText);
        
        if (recordsFromAPI.length > 0) {
          renderizarRadaresNoMapa(recordsFromAPI, "API Oficial PBH");
        } else {
          throw new Error("Nenhum dado extraído.");
        }
      } catch (error) {
        console.warn("Falha API:", error);
        $("#loading").hide();
        renderizarRadaresNoMapa([], "Dados de IA (Offline)");
      }
    }

    // ===================================================================
    // FUNÇÃO: parseCSVtoRecords
    // Descrição: Converte CSV da PBH para o formato interno do sistema
    // Parâmetros: csvText (string com o conteúdo do CSV)
    // Retorno: Array de registros formatados
    // ===================================================================
    function parseCSVtoRecords(csvText) {
      var lines = csvText.split(/\r\n|\n/).map(function(l) { return l.trim(); }).filter(function(l) { return l.length > 0; });
      if (lines.length < 2) return [];
      
      var headers = lines[0].split(';').map(function(h) { return h.toLowerCase().replace(/"/g, '').trim(); });
      var dataLines = lines.slice(1);
      
      var idxEnd = headers.findIndex(function(h) { return h.includes('endere') || h.includes('logrado'); });
      var idxTipo = headers.findIndex(function(h) { return h.includes('tipo') || h.includes('equip'); });
      var idxVel = headers.findIndex(function(h) { return h.includes('veloc'); });
      var idxX = headers.findIndex(function(h) { return h.includes('leste') || h.includes('x'); });
      var idxY = headers.findIndex(function(h) { return h.includes('norte') || h.includes('y'); });
      
      var out = [];
      dataLines.forEach(function(line) {
        var cols = line.split(';').map(function(c) { return c.replace(/^"|"$/g, '').trim(); });
        if (cols.length < 3) return;
        
        var end = idxEnd !== -1 ? cols[idxEnd] : (cols[2] || "S/N");
        var tipo = idxTipo !== -1 ? cols[idxTipo] : "Radar";
        var vel = idxVel !== -1 ? cols[idxVel] : "60";
        var coordStr = null;
        
        if (idxX !== -1 && idxY !== -1 && cols[idxX] && cols[idxY]) {
          coordStr = cols[idxX] + ',' + cols[idxY];
        }
        
        out.push([null, null, end, tipo, vel, null, null, null, null, coordStr]);
      });
      return out;
    }

    // ===================================================================
    // FUNÇÃO: renderizarRadaresNoMapa
    // Descrição: Adiciona os marcadores de radar no mapa
    // Parâmetros: records (array de radares), origem (string para notificação)
    // ===================================================================
    function renderizarRadaresNoMapa(records, origem) {
      var radaresExternos = records || [];
      var todosOsRadares = radaresExternos.concat(injetarRadaresIA());
      var contador = 0;
      
      for (var i = 0; i < todosOsRadares.length; i++) {
        var record = todosOsRadares[i];
        var endereco = record[2] || "Endereço não informado";
        var tipo = (record[3] || "Não Identificado").trim();
        var velocidade = record[4] || "0";
        var coordsFinais = extrairCoordenadas(record);
        
        if (!coordsFinais) continue;
        
        var iconeUrl = getIconUrl(tipo, velocidade);
        var iconeRadar = criarIconeRadar(iconeUrl, 40);
        var radarMarker = L.marker([coordsFinais.lat, coordsFinais.lng], { icon: iconeRadar }).addTo(map);
        
        var tipoExibicao = ajusteNomes[tipo] || tipo;
        var isIA = tipoExibicao.includes('OCR') || tipoExibicao.includes('FACIAL');
        var tituloPopup = isIA ? '🤖 <span style="color:#33aaff">' + tipoExibicao + '</span>' : '<b>' + tipoExibicao + '</b>';
        
        radarMarker.bindPopup('<div style="color:#222; font-family:\'Inter\'; text-align:center; min-width:200px;">' + 
          tituloPopup + '<br><hr style="border:0; border-top:1px solid #ddd; margin:5px 0;">' + 
          endereco + '<br><div style="color:#d00; font-weight:bold; margin-top:5px;">Máx: ' + 
          velocidade + ' km/h</div></div>');
        
        radarMarker.radarData = {
          latitude: coordsFinais.lat,
          longitude: coordsFinais.lng,
          endereco: endereco,
          velocidade_maxima: velocidade,
          tipoOriginal: tipo,
          tipoExibicao: tipoExibicao,
          isIA: isIA
        };
        
        radarMarkers.push(radarMarker);
        contador++;
      }
      
      $("#loading").hide();
      if (contador > 0) {
        showNotification('Base carregada: ' + origem);
      } else {
        showNotification("Nenhum radar encontrado.");
      }
    }
    
    // ===================================================================
    // FUNÇÃO: buscarRadares
    // Descrição: Busca radares por texto (endereço ou tipo) e centraliza no mapa
    // Parâmetros: query (string com o texto da busca)
    // ===================================================================
    function buscarRadares(query) {
      if (!query || query.length < 2) return;
      
      var encontrou = false;
      var boundsGroup = L.featureGroup();
      var q = query.toLowerCase();
      
      radarMarkers.forEach(function(marker) {
        var d = marker.radarData;
        var textoBusca = (d.endereco + ' ' + d.tipoOriginal + ' ' + d.tipoExibicao).toLowerCase();
        
        if (textoBusca.includes(q)) {
          encontrou = true;
          boundsGroup.addLayer(marker);
          marker.openPopup();
        }
      });
      
      if (encontrou) {
        map.fitBounds(boundsGroup.getBounds().pad(0.2));
        isFollowing = false;
      } else {
        showNotification("Nenhum radar encontrado.");
      }
    }

    // ===================================================================
    // FUNÇÃO: showError
    // Descrição: Trata erros de GPS
    // Parâmetros: error (objeto de erro do geolocation)
    // ===================================================================
    function showError(error) {
      if (gpsSource === 'appinventor') return;
      
      var msg = "Erro ao obter localização.";
      if (error.code === 1) msg = "Permissão de GPS negada. Habilite nas configurações do navegador.";
      if (error.code === 2) msg = "Sinal GPS indisponível. Verifique se está ao ar livre.";
      if (error.code === 3) msg = "Tempo de GPS esgotado. Tentando novamente...";
      
      showNotification(msg);
      hideFullscreenLoading();
      
      if (error.code === 3) { 
        setTimeout(startGPSTracking, 5000);
      }
    }
    
    // ===================================================================
    // EVENTO: Desbloqueia áudio no primeiro clique do usuário
    // ===================================================================
    document.addEventListener('click', function desbloquearAudio() {
      var sound = document.getElementById("alert-soud");
      if (sound) {
        sound.play().then(function() { 
          sound.pause(); 
          sound.currentTime = 0; 
        }).catch(function() {});
      }
      document.removeEventListener('click', desbloquearAudio);
    }, { once: true });
    
    // ===================================================================
    // INICIALIZAÇÃO DO APLICATIVO
    // ===================================================================
    window.onload = initMap;
  </script>
</body>
</html>
