<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Cache Control -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Radar X9 BH - Alerta Inteligente (OSM + IA)</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
  
  <!-- Leaflet Rotate Plugin - ESSENCIAL para rotação do mapa -->
  <script src="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.1.4/dist/leaflet-rotate.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

  <style>
    /* ================= VARIÁVEIS GLOBAIS ================= */
    :root {
      --bg-color: #0f1115;
      --panel-color: #1a1d24;
      --accent-color: #00ff88;
      --alert-color: #ff3333;
      --text-main: #ffffff;
      --text-muted: #a0a0a0;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background-color: var(--panel-color);
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--accent-color);
      box-shadow: 0 4px 15px rgba(0, 255, 136, 0.1);
      z-index: 1000;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .app-icon { width: 50px; height: 40px; border-radius: 8px; object-fit: contain; }
    h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
    h1 span { color: var(--accent-color); }

    /* ================= BARRA DE BUSCA ================= */
    .search-container {
      position: absolute; top: 0; left: 0; width: 100%;
      background-color: rgba(26, 29, 36, 0.98);
      backdrop-filter: blur(8px);
      display: flex; gap: 12px; z-index: 1000;
      max-height: 0; overflow: hidden; opacity: 0;
      padding: 0 15px;
      border-bottom: 1px solid transparent;
      transition: all 0.3s ease;
      align-items: center;
    }
    .search-container.active {
      max-height: 90px; opacity: 1; padding: 15px;
      border-bottom: 1px solid #333;
    }
    .search-container input {
      flex: 1; padding: 14px 20px; border-radius: 30px; border: 1px solid #444;
      background-color: #000; color: #fff; font-size: 1rem; outline: none;
    }
    .search-container input:focus { border-color: var(--accent-color); }

    .btn-search {
      position: relative; flex-shrink: 0; width: 46px; height: 46px; border-radius: 50%;
      border: none; cursor: pointer; background: rgba(76, 137, 198, 0.95);
      transition: all 0.2s ease; overflow: hidden;
    }
    .btn-search:active { transform: scale(0.9); }
    .btn-search img {
      position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
      object-fit: contain; transform: translate(-50%, -50%);
    }
    
    .map-wrapper { position: relative; flex: 1; display: flex; overflow: hidden; width: 100%; }
    #map { width: 100%; height: 100%; background-color: #2a2a2a; z-index: 1; }

    /* ================= BÚSSOLA ================= */
    .compass-widget {
      position: absolute; top: 20px; left: 5px; width: 80px; height: 80px;
      z-index: 500; display: flex; align-items: center; justify-content: center; pointer-events: none;
    }
    .compass-base { 
      position: absolute; width: 100%; height: 100%; object-fit: contain; z-index: 1; opacity: 0.9;
    }
    .compass-needle {
      position: absolute; width: 55%; height: 55%; object-fit: contain; z-index: 2;
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ================= BOTÕES DE CONTROLE ================= */
    .map-controls {
      position: absolute; right: 15px; bottom: 30px; display: flex; flex-direction: column;
      align-items: center; gap: 10px; z-index: 500;
    }
    .map-btn {
      width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; cursor: pointer; background: rgba(20, 20, 20, 0.92);
      border: 1px solid rgba(255,255,255,0.08); transition: all 0.2s ease;
    }
    .map-btn:hover { transform: scale(1.08); border-color: var(--accent-color); }
    .map-btn:active { transform: scale(0.92); }
    .map-btn img { width: 30px; height: 30px; object-fit: contain; pointer-events: none; }

    .alert-toggle-btn {
      background: rgba(204, 0, 0, 0.9);
      border: 2px solid #ff5555;
    }
    .alert-toggle-btn.alert-off {
      background: rgba(68, 68, 68, 0.9);
      border-color: #888;
    }
    .alert-toggle-btn.alert-off img { filter: grayscale(1); }

    #btn-route-bar { border: 1px solid rgba(255,140,0,0.5); }
    #btn-search-bar { border: 1px solid rgba(0, 200, 180, 0.35); }
    #btn-center { border: 1px solid rgba(0, 255, 136, 0.35); }
    #btn-alert-toggle { border: 1px solid rgba(255, 51, 51, 0.5); }
    
    /* Botão de Rotação do Mapa */
    #btn-rotate-map {
        border: 1px solid rgba(0, 255, 255, 0.35);
        transition: all 0.3s ease;
    }
    #btn-rotate-map.rotated {
        background: rgba(0, 255, 255, 0.3);
        border-color: var(--accent-color);
        box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
    }

    /* Estilos dos marcadores */
    .user-gps-marker { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
    .user-navigator-marker {
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      animation: pulseMarker 1.5s ease-in-out infinite;
    }
    @keyframes pulseMarker {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    /* ================= WIDGET VELOCIDADE ================= */
    .speed-widget { 
      position: absolute; bottom: -15px; left: -25px; width: 150px; height: 150px; 
      z-index: 500; display: flex; align-items: center; justify-content: center; 
    } 
    .speed-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; } 
    .speed-value {
      position: absolute; top: 50%; left: 50%; transform: translate(-62%, -60%);
      font-size: 28px; font-weight: 700; font-family: 'Rajdhani', sans-serif;
      color: #000; line-height: 1; white-space: nowrap;
    }
    
    /* ================= ALERTAS ================= */
    #alert-container { 
      position: absolute; bottom: 0; left: 0; width: 100%; z-index: 1000; 
      display: none; animation: slideUp 0.3s ease-out; pointer-events: none; 
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); background: linear-gradient(90deg, #ff2200, #ee0000); }
      100% { transform: scale(1); }
    }
    .alert-bar { 
      background: linear-gradient(90deg, #cc0000, #990000); color: white; padding: 18px;
      display: flex; align-items: center; gap: 15px; box-shadow: 0 -5px 20px rgba(255, 0, 0, 0.4);
      border-top: 2px solid #ff5555;
    }
    .alert-bar-critico { animation: pulse 0.8s ease-in-out infinite; }
    .alert-bar img { width: 50px; height: 50px; }
    .alert-info h3 { font-size: 1.2rem; margin-bottom: 3px; text-transform: uppercase; font-weight: 800; }
    .alert-info p { font-size: 0.95rem; opacity: 0.95; }
    
    .toast-notification { 
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px);
      background-color: rgba(20, 20, 20, 0.95); color: var(--text-main); padding: 12px 25px;
      border-radius: 50px; border: 1px solid #444; z-index: 2000; opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease; white-space: nowrap;
    }
    .toast-notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .loading-overlay { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(20, 20, 20, 0.9); padding: 20px 30px; border-radius: 12px;
      border: 1px solid var(--accent-color); text-align: center; z-index: 1001;
    }
    .loading-spinner { 
      border: 3px solid #333; border-top: 3px solid var(--accent-color); 
      border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; 
      margin: 0 auto 10px; 
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    .leaflet-control-zoom, .leaflet-control-attribution, .leaflet-routing-container { display: none !important; }
    
    .loading-fullscreen { 
      position: fixed; inset: 0; background-color: var(--bg-color);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s ease;
    }
    .loading-fullscreen.fade-out { opacity: 0; visibility: hidden; }
    .loading-fullscreen .spinner-ring { width: 60px; height: 60px; position: relative; margin-bottom: 24px; }
    .loading-fullscreen .spinner-ring::before, .loading-fullscreen .spinner-ring::after { 
      content: ''; position: absolute; inset: 0; border-radius: 50%; border: 4px solid transparent; 
    }
    .loading-fullscreen .spinner-ring::before { 
      border-top-color: var(--accent-color); border-right-color: var(--accent-color); 
      animation: spinRing 1s infinite; 
    }
    .loading-fullscreen .spinner-ring::after { 
      inset: 10px; border-bottom-color: #ff3333; border-left-color: #ff3333; 
      animation: spinRing 1.4s infinite reverse; 
    }
    @keyframes spinRing { 100% { transform: rotate(360deg); } }
    .loading-fullscreen .loading-text span { color: var(--accent-color); }

    .radar-marker-icon {
      background: transparent !important;
      border: none !important;
    }
    .radar-marker-icon img {
      width: 40px !important;
      height: 40px !important;
      object-fit: contain !important;
    }
  </style>
</head>
<body>

  <div class="loading-fullscreen" id="loading-fullscreen">
    <div class="spinner-ring"></div>
    <div class="loading-text">Iniciando <span>Radar X9</span></div>
    <div class="loading-sub">Sincronizando satélites...</div>
  </div>

  <header>
    <div class="header-left">
      <img src="/imagens_app/ic_icon_app.png" onerror="this.style.display='none'" alt="App Icon" class="app-icon">
      <h1>RADAR <span>X9</span> BH</h1>
    </div>
  </header>

  <div class="map-wrapper">
    <div class="search-container" id="search-bar-radares">
      <input type="text" id="query" placeholder="Buscar radar (tipo, endereço)...">
      <button class="btn-search" id="btn-search-radar">
        <img src="/imagens_app/ic_radar_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/646/646094.png'">
      </button>
    </div>

    <div class="search-container" id="search-bar-rota">
      <input type="text" id="route-query" placeholder="Digite um endereço para navegar...">
      <button class="btn-search" id="btn-calc-route" style="background-color: #ff8c00;">
        <img src="/imagens_app/ic_gps_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7892/7892059.png'">
      </button>
    </div>

    <div id="map"></div>
    
    <div class="toast-notification" id="toast-msg"></div>

    <div class="compass-widget">
      <img src="/imagens_app/ic_compass.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2838/2838773.png'" class="compass-base">
      <img src="/imagens_app/ic_compass_ponteira.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1140/1140644.png'" class="compass-needle" id="compass-needle-img">
    </div>

    <div class="speed-widget">
      <img src="/imagens_app/ic_speed_limit.png" onerror="this.style.opacity='0.5'" class="speed-bg">
      <div class="speed-value" id="speed-display">0</div>
    </div>

    <div class="map-controls">
      <button class="map-btn" id="btn-rotate-map" title="Alinhar mapa com direção do movimento">
        <img src="/imagens_app/ic_girar_map.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/10313/10313225.png'">
      </button>
      <button class="map-btn alert-toggle-btn" id="btn-alert-toggle">
        <img id="alert-toggle-icon" src="/imagens_app/ic_sound_on.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/727/727245.png'">
      </button>
      <button class="map-btn" id="btn-search-bar">
        <img src="/imagens_app/ic_radar_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/646/646094.png'">
      </button>
      <button class="map-btn" id="btn-route-bar">
        <img src="/imagens_app/ic_gps_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7892/7892059.png'">
      </button>
      <button class="map-btn" id="btn-center">
        <img src="/imagens_app/ic_location_button.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/684/684908.png'">
      </button>
      <button class="map-btn" id="btn-refresh">
        <img src="/imagens_app/ic_refresh_button.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2409/2409305.png'">
      </button>
      <button class="map-btn" id="btn-zoom-in">
        <img src="/imagens_app/ic_zoom_in.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/709/709493.png'">
      </button>
      <button class="map-btn" id="btn-zoom-out">
        <img src="/imagens_app/ic_zoom_out.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/709/709506.png'">
      </button>
    </div>

    <div id="alert-container">
      <div class="alert-bar">
        <img id="alert-icon" src="/imagens_app/ic_radar_das.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7764/7764406.png'">
        <div class="alert-info">
          <h3 id="alert-title">ATENÇÃO!</h3>
          <p id="alert-text">Radar Próximo</p>
        </div>
      </div>
    </div>

    <div class="loading-overlay" id="loading" style="display:none;">
      <div class="loading-spinner"></div>
      <div>Processando...</div>
    </div>
  </div>

  <audio id="alert-soud" src="audio_app/alerta.mp3" preload="auto"></audio>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.min.js"></script>

  <script>
    // ===================================================================
    // VARIÁVEIS GLOBAIS
    // ===================================================================
    let map;
    let userMarker;
    let radarMarkers = [];
    let alertTimeout;
    let userLat = -19.919055;
    let userLng = -43.938641;
    let tileLayer;
    let routingControl = null;
    let searchActive = false;
    let routeActive = false;
    let prevLat = null;
    let prevLng = null;
    let prevTime = null;
    let isFollowing = true;
    let watchId = null;
    let gpsSource = 'none';
    let gpsInitialized = false;
    let browserGpsTimeout = null;
    let destinoAtual = null;
    let posicaoCentralOriginal = { lat: -19.919055, lng: -43.938641, zoom: 17 };
    
    let alertaHabilitado = true;
    let ultimoRadarAlertado = null;
    let returnToGpsTimer = null;
    const TEMPO_RETORNO_GPS = 8000;
    
    // Variáveis da bússola e rotação do mapa
    let currentHeading = 0;
    let mapaRotacionado = false;
    let ultimaRotacaoMapa = 0;
    
    const ALERT_CONFIG = {
      DISTANCIA_MAXIMA: 80,
      DISTANCIA_CRITICA: 40,
      TEMPO_ALERTA: 4000,
      DISTANCIA_PASSAR_RADAR: 10
    };
    
    const API_PBH_BASE = 'https://dados.pbh.gov.br/api/3/action/';

    // ===================================================================
    // MAPA DE ÍCONES
    // ===================================================================
    const iconMap = {
      'Controlador Eletrônico de Velocidade': '/imagens_app/ic_radar_cev_v2.png',
      'Detector de Avanço de Semáforo': '/imagens_app/ic_radar_das_v2.png',
      'Detector de Tráfego em Local Proibido': '/imagens_app/ic_radar_dtlp_v2.png',
      'Detector de Conversão em Local Proibido': '/imagens_app/ic_radar_rcp_v2.png',
      'Detector de Invasão de Faixa Exclusiva - MOVE': '/imagens_app/ic_radar_dife_v2.png',
      'Detector de Invasão de Faixa Exclusiva (DIFEX)': '/imagens_app/ic_radar_difex_v2.png',
      'Detector de Parada sobre Faixa de Pedestres (DPFP)': '/imagens_app/ic_radar_dpfp_v2.png',
      'Detector de Faixa Preferencial de Ônibus (BUS)': '/imagens_app/ic_radar_fpref_v2.png',
      'Detector de Uso de Celular': '/imagens_app/ic_radar_duc_v2.png',
      'Controle de Redução de Velocidade (CRV)': '/imagens_app/ic_radar_crv_v2.png',
      'Leitor Inteligente de Placas (OCR-P)': '/imagens_app/ic_radar_ocr_v2.png',
      'Leitor de Reconhecimento Facial (OCR-F)': '/imagens_app/ic_radar_facial_v2.png',
      'default': '/imagens_app/ic_radar_cev_v2.png'
    };

    const TIPOS_SEM_ALERTA = ['Detector de Faixa Preferencial de Ônibus (BUS)', 'Faixa Preferencial de Ônibus (BUS)', 'BUS'];

    const ajusteNomes = {
      'Controlador Eletrônico de Velocidade': 'Radar de Velocidade (CEV)',
      'Controle de Redução de Velocidade (CRV)': 'Painel de Redução de Velocidade (PRV)',
      'Detector de Parada sobre Faixa de Pedestres (DPFP)': 'Detector de Parada sobre Faixa de Pedestres (DPFP)',
      'Detector de Avanço de Semáforo': 'Radar de Avanço de Semáforo (DAS)',
      'Detector de Conversão em Local Proibido': 'Detector de Conversão em Local Proibido (DCP)',
      'Detector de Tráfego em Local Proibido': 'Zona de Tráfego Proibido (ZTP)',
      'Detector de Invasão de Faixa Exclusiva (DIFEX)': 'Faixa Exclusiva de Ônibus e Táxis (FOT)',
      'Detector de Faixa Preferencial de Ônibus (BUS)': 'Faixa Preferencial de Ônibus (BUS)',
      'Detector de Uso de Celular': 'Radar de Uso de Celular (DUC)',
      'Leitor Inteligente de Placas': 'Leitor de Placas (OCR-P)',
      'Leitor de Reconhecimento Facial': 'Reconhecimento Facial (OCR-F)'
    };

    function deveAlertaRadar(tipo) {
      for (var i = 0; i < TIPOS_SEM_ALERTA.length; i++) {
        if (tipo && tipo.includes(TIPOS_SEM_ALERTA[i])) return false;
      }
      return true;
    }

    function criarIconeRadar(iconeUrl, tamanho = 40) {
      return L.divIcon({
        html: '<img src="' + iconeUrl + '" style="width: ' + tamanho + 'px; height: ' + tamanho + 'px; object-fit: contain; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));" onerror="this.src=\'/imagens_app/ic_radar_cev_v2.png\'" />',
        iconSize: [tamanho, tamanho],
        iconAnchor: [tamanho / 2, tamanho],
        popupAnchor: [0, -tamanho / 2],
        className: 'radar-marker-icon'
      });
    }

    function getIconUrl(tipo, velocidade) {
      const tipoLimpo = tipo ? tipo.trim() : "";
      
      if (tipoLimpo.includes('Controlador Eletrônico Misto')) {
        return iconMap['default'];
      }
      
      const isRadarVelocidade = tipoLimpo.includes('Velocidade') && !tipoLimpo.includes('CRV');
      if (isRadarVelocidade) {
        const vel = parseInt(velocidade) || 0;
        if (vel === 50) return '/imagens_app/ic_radar_cev_50_v2.png';
        if (vel === 70) return '/imagens_app/ic_radar_cev_70_v2.png';
        return '/imagens_app/ic_radar_cev_v2.png';
      }
      
      let icone = iconMap[tipoLimpo];
      if (!icone) icone = iconMap['default'];
      return icone;
    }

    function showNotification(message) {
      $("#toast-msg").text(message).addClass("show");
      setTimeout(function() { $("#toast-msg").removeClass("show"); }, 3500);
    }

    function hideFullscreenLoading() {
      var el = document.getElementById('loading-fullscreen');
      if (el) { 
        el.classList.add('fade-out'); 
        setTimeout(function() { el.remove(); }, 600); 
      }
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
      var R = 6371e3;
      var p1 = lat1 * Math.PI / 180;
      var p2 = lat2 * Math.PI / 180;
      var dp = (lat2 - lat1) * Math.PI / 180;
      var dl = (lon2 - lon1) * Math.PI / 180;
      var a = Math.sin(dp / 2) * Math.sin(dp / 2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl / 2) * Math.sin(dl / 2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function verificarDirecao(uLat, uLng, uHeading, radarLat, radarLng) {
      if (!uHeading || uHeading === -1) return { estaAproximando: true, estaAfastando: false, diferenca: 0 };
      
      var deltaX = radarLng - uLng;
      var deltaY = radarLat - uLat;
      var anguloRadar = Math.atan2(deltaY, deltaX) * 180 / Math.PI;
      var anguloRadarNormalizado = (anguloRadar + 360) % 360;
      var diff = Math.min(Math.abs(uHeading - anguloRadarNormalizado), 360 - Math.abs(uHeading - anguloRadarNormalizado));
      
      return {
        estaAproximando: diff < 45,
        estaAfastando: diff > 135,
        diferenca: diff
      };
    }

    function fecharAlertaImediatamente() {
      $("#alert-container").fadeOut(100);
      clearTimeout(alertTimeout);
      var sound = document.getElementById("alert-soud");
      if (sound) { sound.pause(); sound.currentTime = 0; }
      $(".alert-bar").css("background", "linear-gradient(90deg, #cc0000, #990000)");
      $(".alert-bar").removeClass("alert-bar-critico");
    }

    function aplicarTemaMapa() {
      var hora = new Date().getHours();
      var urlAtual = (hora >= 19 || hora < 6) ? 
        'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 
        'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
      if (tileLayer) tileLayer.setUrl(urlAtual);
      else tileLayer = L.tileLayer(urlAtual, { attribution: '', subdomains: 'abcd', maxZoom: 19 }).addTo(map);
    }

    async function buscarCoordenadas(endereco) {
      try {
        var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(endereco) + '&countrycodes=br&limit=1';
        var r = await fetch(url);
        var d = await r.json();
        return (d && d.length > 0) ? { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) } : null;
      } catch (e) { return null; }
    }

    function atualizarIconeUsuario() {
      if (!userMarker) return;
      var estaEmNavegacao = (destinoAtual !== null && routingControl !== null);
      var userIconUrl = estaEmNavegacao ? '/imagens_app/ic_navigator_map.png' : '/imagens_app/ic_gps_marker.png';
      var iconClassName = estaEmNavegacao ? 'user-navigator-marker' : 'user-gps-marker';
      var userIcon = L.icon({
        iconUrl: userIconUrl,
        iconSize: [50, 50],
        iconAnchor: [25, 50],
        popupAnchor: [0, -50],
        className: iconClassName
      });
      userMarker.setIcon(userIcon);
    }

    function calcularRota(destLat, destLng) {
      if (routingControl) map.removeControl(routingControl);
      destinoAtual = { lat: destLat, lng: destLng };
      routingControl = L.Routing.control({
        waypoints: [L.latLng(userLat, userLng), L.latLng(destLat, destLng)],
        routeWhileDragging: false,
        addWaypoints: false,
        language: 'pt-BR',
        show: false,
        lineOptions: { styles: [{ color: '#0044cc', opacity: 0.8, weight: 6 }] },
        createMarker: function() { return null; },
        router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' })
      }).addTo(map);
      atualizarIconeUsuario();
      showNotification("Navegação iniciada!");
    }

    function atualizarRota() {
      if (destinoAtual && userLat && userLng && routingControl) {
        routingControl.setWaypoints([L.latLng(userLat, userLng), L.latLng(destinoAtual.lat, destinoAtual.lng)]);
      }
    }

    function removerRota() {
      if (routingControl) { map.removeControl(routingControl); routingControl = null; }
      destinoAtual = null;
      atualizarIconeUsuario();
    }

    function resetarMapa() {
      map.setView([posicaoCentralOriginal.lat, posicaoCentralOriginal.lng], posicaoCentralOriginal.zoom, { animate: true });
      map.setBearing(0);
      mapaRotacionado = false;
      document.getElementById('btn-rotate-map')?.classList.remove('rotated');
      isFollowing = true;
      removerRota();
      fecharTodasBarras();
      showNotification("Mapa resetado");
    }

    // ===================================================================
    // FUNÇÃO PRINCIPAL: Rotacionar mapa usando a bússola
    // ===================================================================
    function rotacionarMapaPelaBussola() {
      if (!map || !currentHeading) return;
      
      // Aplica a rotação no mapa usando o bearing (somente se o plugin rotate estiver ativo)
      if (typeof map.setBearing === 'function') {
        map.setBearing(currentHeading);
        mapaRotacionado = true;
        document.getElementById('btn-rotate-map')?.classList.add('rotated');
        showNotification("Mapa alinhado com a direção do movimento");
      } else {
        console.warn("Plugin de rotação não carregado corretamente");
      }
    }

    // ===================================================================
    // FUNÇÃO: resetarRotacaoMapa - Volta o mapa para Norte para cima
    // ===================================================================
    function resetarRotacaoMapa() {
      if (map && typeof map.setBearing === 'function') {
        map.setBearing(0);
        mapaRotacionado = false;
        document.getElementById('btn-rotate-map')?.classList.remove('rotated');
        showNotification("Mapa resetado (Norte para cima)");
      }
    }

    function atualizarBussola(headingDegrees) {
      var needle = document.getElementById('compass-needle-img');
      if (needle) needle.style.transform = 'rotate(' + headingDegrees + 'deg)';
    }

    function converterSIRGAS2000paraWGS84(xLeste, yNorte) {
      var a = 6378137.0, f = 1 / 298.257222101, k0 = 0.9996, N0 = 10000000.0, E0 = 500000.0;
      var e2 = 2 * f - f * f, ep2 = e2 / (1 - e2);
      var e1 = (1 - Math.sqrt(1 - e2)) / (1 + Math.sqrt(1 - e2));
      var M = yNorte - N0;
      var mu = M / (a * (1 - e2/4 - 3*e2*e2/64 - 5*e2*e2*e2/256));
      var phi1 = mu + (3*e1/2 - 27*e1*e1*e1/32) * Math.sin(2*mu) + (21*e1*e1/16 - 55*e1*e1*e1*e1/32) * Math.sin(4*mu) + (151*e1*e1*e1/96) * Math.sin(6*mu);
      var N1 = a / Math.sqrt(1 - e2 * Math.sin(phi1) * Math.sin(phi1));
      var T1 = Math.tan(phi1) * Math.tan(phi1);
      var C1 = ep2 * Math.cos(phi1) * Math.cos(phi1);
      var R1 = a * (1 - e2) / Math.pow(1 - e2 * Math.sin(phi1) * Math.sin(phi1), 1.5);
      var D = (xLeste - E0) / (N1 * k0);
      var lat = phi1 - (N1 * Math.tan(phi1) / R1) * (D*D/2 - (5+3*T1+10*C1-4*C1*C1-9*ep2)*Math.pow(D,4)/24 + (61+90*T1+298*C1+45*T1*T1-252*ep2-3*C1*C1)*Math.pow(D,6)/720);
      var lng = (D - (1+2*T1+C1)*Math.pow(D,3)/6 + (5-2*C1+28*T1-3*C1*C1+8*ep2+24*T1*T1)*Math.pow(D,5)/120) / Math.cos(phi1);
      lng = (lng * 180 / Math.PI) - 51;
      lat = lat * 180 / Math.PI;
      return { lat: Math.round(lat * 1000000) / 1000000, lng: Math.round(lng * 1000000) / 1000000 };
    }

    function extrairCoordenadas(record) {
      var coordenadasEncontradas = null;
      if (record[9]) {
        var parts = String(record[9]).replace(/\s+/g, '').split(',').map(Number);
        if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) coordenadasEncontradas = parts;
      }
      if (!coordenadasEncontradas) {
        for (var i = 0; i < record.length; i++) {
          if (!record[i] || String(record[i]).length > 40) continue;
          var parts = String(record[i]).replace(/\s+/g, '').split(',').map(Number);
          if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) { coordenadasEncontradas = parts; break; }
        }
      }
      if (!coordenadasEncontradas) return null;
      var v1 = coordenadasEncontradas[0], v2 = coordenadasEncontradas[1];
      if (Math.abs(v1) > 1000 || Math.abs(v2) > 1000) return converterSIRGAS2000paraWGS84(v1, v2);
      if (v1 < -30 && v2 > -30) return { lat: v2, lng: v1 };
      return { lat: v1, lng: v2 };
    }

    function inicializarBotaoRotacaoMapa() {
      const rotateBtn = document.getElementById('btn-rotate-map');
      if (!rotateBtn) return;
      rotateBtn.addEventListener('click', function() {
        if (mapaRotacionado) {
          resetarRotacaoMapa();
        } else {
          rotacionarMapaPelaBussola();
        }
      });
    }

    function inicializarBotaoAlertaToggle() {
      const alertBtn = document.getElementById('btn-alert-toggle');
      const alertIcon = document.getElementById('alert-toggle-icon');
      if (!alertBtn) return;
      alertBtn.addEventListener('click', function() {
        alertaHabilitado = !alertaHabilitado;
        if (alertaHabilitado) {
          alertBtn.classList.remove('alert-off');
          if (alertIcon) alertIcon.src = "/imagens_app/ic_sound_on.png";
          showNotification("🔔 Alerta LIGADO");
          fecharAlertaImediatamente();
        } else {
          alertBtn.classList.add('alert-off');
          if (alertIcon) alertIcon.src = "/imagens_app/ic_sound_off.png";
          showNotification("🔕 Alerta DESLIGADO");
          fecharAlertaImediatamente();
        }
      });
    }

    function receberCoordenadasDoAppInventor(lat, lng, speed) {
      lat = parseFloat(lat); lng = parseFloat(lng); speed = parseFloat(speed) || 0;
      if (isNaN(lat) || isNaN(lng)) return;
      if (watchId !== null) navigator.geolocation.clearWatch(watchId);
      if (browserGpsTimeout) clearTimeout(browserGpsTimeout);
      gpsSource = 'appinventor';
      processarNovaPosicao(lat, lng, speed);
    }

    function processarNovaPosicao(newLat, newLng, speedKmh, hardwareHeading) {
      var currentTime = Date.now();
      var dist = 0;

      if (speedKmh === 0 && prevLat !== null && prevTime !== null) {
        dist = calcularDistancia(prevLat, prevLng, newLat, newLng);
        var time = (currentTime - prevTime) / 1000;
        if (time > 0) speedKmh = Math.round((dist / time) * 3.6);
      } else if (prevLat !== null) dist = calcularDistancia(prevLat, prevLng, newLat, newLng);
      
      if (speedKmh > 250) speedKmh = 0;
      $("#speed-display").text(speedKmh);
      
      // Atualiza heading (direção) - PRIORIDADE para a bússola do hardware
      if (hardwareHeading !== null && !isNaN(hardwareHeading) && hardwareHeading >= 0) {
        currentHeading = hardwareHeading;
      } else if (dist > 3) {
        var dy = newLat - prevLat;
        var dx = (newLng - prevLng) * Math.cos(newLat * Math.PI / 180);
        var calcHeading = Math.atan2(dx, dy) * 180 / Math.PI;
        if (calcHeading < 0) calcHeading += 360;
        currentHeading = calcHeading;
      }
      
      atualizarBussola(currentHeading);
      
      // Se o mapa estiver rotacionado, atualiza a rotação conforme a direção
      if (mapaRotacionado && currentHeading > 0) {
        if (typeof map.setBearing === 'function') {
          map.setBearing(currentHeading);
        }
      }

      prevLat = newLat; prevLng = newLng; prevTime = currentTime;
      userLat = newLat; userLng = newLng;

      if (!userMarker) {
        var defaultIcon = L.icon({
          iconUrl: '/imagens_app/ic_gps_marker.png',
          iconSize: [50, 50],
          iconAnchor: [25, 50],
          popupAnchor: [0, -50],
          className: 'user-gps-marker'
        });
        userMarker = L.marker([newLat, newLng], { icon: defaultIcon, zIndexOffset: 1000 }).addTo(map);
        userMarker.bindTooltip("Você está aqui", { permanent: false, direction: "top", offset: [0, -25] });
        if (!gpsInitialized) { gpsInitialized = true; hideFullscreenLoading(); }
      } else userMarker.setLatLng([newLat, newLng]);
      
      atualizarIconeUsuario();
      if (destinoAtual) atualizarRota();
      if (isFollowing) map.setView([newLat, newLng], map.getZoom(), { animate: true });
      if (alertaHabilitado) verificarProximidade(userLat, userLng, currentHeading);
      else fecharAlertaImediatamente();
    }

    function startGPSTracking() {
      if (!navigator.geolocation) {
        hideFullscreenLoading();
        showNotification("GPS não suportado.");
        return;
      }
      if (watchId !== null) navigator.geolocation.clearWatch(watchId);
      watchId = navigator.geolocation.watchPosition(
        function(position) {
          if (gpsSource !== 'appinventor') gpsSource = 'browser';
          processarNovaPosicao(position.coords.latitude, position.coords.longitude, 
            position.coords.speed ? Math.round(position.coords.speed * 3.6) : 0, 
            position.coords.heading);
        },
        showError,
        { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
      );
      browserGpsTimeout = setTimeout(function() {
        if (!gpsInitialized && gpsSource === 'none') {
          showNotification("Aguardando GPS...");
          hideFullscreenLoading();
        }
      }, 8000);
    }

    function verificarProximidade(uLat, uLng, uHeading) {
      var alertasProximos = [];
      var heading = uHeading || -1;
      
      radarMarkers.forEach(function(marker) {
        var dados = marker.radarData;
        if (!deveAlertaRadar(dados.tipoOriginal)) return;
        var distance = calcularDistancia(uLat, uLng, dados.latitude, dados.longitude);
        if (distance < ALERT_CONFIG.DISTANCIA_MAXIMA) {
          var direcaoInfo = verificarDirecao(uLat, uLng, heading, dados.latitude, dados.longitude);
          if (distance < ALERT_CONFIG.DISTANCIA_PASSAR_RADAR && direcaoInfo.estaAfastando) {
            if (ultimoRadarAlertado === marker) { fecharAlertaImediatamente(); ultimoRadarAlertado = null; }
            return;
          }
          if (direcaoInfo.estaAfastando && distance > 30) return;
          if (direcaoInfo.estaAproximando) alertasProximos.push({ distancia: distance, dados: dados, direcaoInfo: direcaoInfo, marker: marker });
        } else if (ultimoRadarAlertado === marker && distance > ALERT_CONFIG.DISTANCIA_MAXIMA) ultimoRadarAlertado = null;
      });
      
      alertasProximos.sort((a, b) => a.distancia - b.distancia);
      if (alertasProximos.length > 0) {
        var radar = alertasProximos[0];
        var distance = radar.distancia;
        var dados = radar.dados;
        if (ultimoRadarAlertado === radar.marker) return;
        if (ultimoRadarAlertado !== null) fecharAlertaImediatamente();
        ultimoRadarAlertado = radar.marker;
        
        var prioridade = distance < ALERT_CONFIG.DISTANCIA_CRITICA ? "critico" : "normal";
        var titulo = dados.isIA ? "⚠️ Câmera IA!" : "📸 Radar à Frente!";
        if (prioridade === "critico") titulo = "🚨 ATENÇÃO MÁXIMA! " + titulo;
        
        var textoAlerta = dados.endereco + ' - Máx: ' + dados.velocidade_maxima + 'km/h (a ' + Math.round(distance) + 'm)';
        if (distance < 30) textoAlerta += ' ⚠️ MUITO PRÓXIMO!';
        
        $("#alert-icon").attr("src", getIconUrl(dados.tipoOriginal, dados.velocidade_maxima));
        $("#alert-text").text(textoAlerta);
        $("#alert-title").text(titulo);
        
        var alertBar = $(".alert-bar");
        if (prioridade === "critico") {
          alertBar.css("background", "linear-gradient(90deg, #ff0000, #cc0000)");
          alertBar.addClass("alert-bar-critico");
        } else {
          alertBar.css("background", "linear-gradient(90deg, #cc0000, #990000)");
          alertBar.removeClass("alert-bar-critico");
        }
        
        if (alertaHabilitado) {
          var sound = document.getElementById("alert-soud");
          if (sound) { sound.currentTime = 0; sound.volume = prioridade === "critico" ? 0.8 : 0.5; sound.play().catch(() => {}); }
        }
        
        $("#alert-container").stop(true, true).fadeIn(200);
        clearTimeout(alertTimeout);
        alertTimeout = setTimeout(() => { 
          if (ultimoRadarAlertado === radar.marker) {
            $("#alert-container").fadeOut(500);
            $(".alert-bar").css("background", "linear-gradient(90deg, #cc0000, #990000)");
            $(".alert-bar").removeClass("alert-bar-critico");
            ultimoRadarAlertado = null;
          }
        }, ALERT_CONFIG.TEMPO_ALERTA);
      }
    }

    function initMap() {
      map = L.map('map', {
        center: [userLat, userLng],
        zoom: 17,
        zoomControl: false,
        rotate: true,      // Habilita rotação
        bearing: 0         // Ângulo inicial
      });

      aplicarTemaMapa();
      setInterval(aplicarTemaMapa, 300000);
      
      map.on('dragstart', () => { 
        isFollowing = false;
        if (returnToGpsTimer) clearTimeout(returnToGpsTimer);
      });
      map.on('dragend', () => {
        returnToGpsTimer = setTimeout(() => {
          if (!isFollowing && userMarker) {
            isFollowing = true;
            map.setView(userMarker.getLatLng(), map.getZoom(), { animate: true });
            showNotification("Voltando à sua posição");
          }
        }, TEMPO_RETORNO_GPS);
      });

      $("#btn-search-radar").click(() => buscarRadares($("#query").val()));
      $("#query").keypress(e => { if (e.which == 13) buscarRadares($("#query").val()); });
      
      $("#btn-calc-route").click(async function() {
        var endereco = $("#route-query").val().trim();
        if (endereco.length < 5) { showNotification("Digite um endereço válido."); return; }
        $("#loading").show().html("<div class='loading-spinner'></div><div>Calculando rota...</div>");
        var coords = await buscarCoordenadas(endereco);
        if (coords) {
          calcularRota(coords.lat, coords.lng);
          map.flyTo([coords.lat, coords.lng], 16, { duration: 1.5 });
          isFollowing = false;
          $("#loading").hide();
          fecharTodasBarras();
        } else { $("#loading").hide(); showNotification("Endereço não encontrado."); }
      });
      $("#route-query").keypress(e => { if (e.which == 13) $("#btn-calc-route").click(); });

      function fecharTodasBarras() {
        searchActive = routeActive = false;
        $("#search-bar-radares, #search-bar-rota").removeClass('active');
      }
      
      $("#btn-search-bar").click(() => {
        if (searchActive) { fecharTodasBarras(); return; }
        routeActive = false; searchActive = true;
        $("#search-bar-radares").addClass('active');
        setTimeout(() => $("#query").focus(), 300);
      });
      
      $("#btn-route-bar").click(() => {
        if (routeActive) { fecharTodasBarras(); return; }
        searchActive = false; routeActive = true;
        $("#search-bar-rota").addClass('active');
        setTimeout(() => $("#route-query").focus(), 300);
      });
      
      $("#btn-center").click(() => {
        fecharTodasBarras();
        isFollowing = true;
        if (userMarker) map.flyTo(userMarker.getLatLng(), 17, { duration: 0.5 });
        else showNotification("Aguardando GPS...");
      });

      $("#btn-refresh").click(() => { resetarMapa(); carregarRadares(); });
      $("#btn-zoom-in").click(() => map.zoomIn());
      $("#btn-zoom-out").click(() => map.zoomOut());
      
      inicializarBotaoRotacaoMapa();
      inicializarBotaoAlertaToggle();
      startGPSTracking();
      carregarRadares();
    }

      return [
        { lat: -19.919007, lng: -43.938792, end: "Av. Afonso Pena, Próx. à Praça Sete", tipo: "Leitor Inteligente de Placas (OCR-P)", vel: "60" },
        { lat: -19.919115, lng: -43.938580, end: "Av. Afonso Pena, Próx. à Praça Sete", tipo: "Leitor de Reconhecimento Facial (OCR-F)", vel: "60" },
        { lat: -19.931347, lng: -43.985536, end: "Rua Conde Pereira Carneiro", tipo: "Detector de Uso de Celular (DUC)", vel: "60" },

      ].map(r => [null, null, r.end, r.tipo, r.vel, null, null, null, null, r.lat + ',' + r.lng]);
    }

    async function carregarRadares() {
      if (radarMarkers.length > 0) { radarMarkers.forEach(m => map.removeLayer(m)); radarMarkers = []; }
      try {
        var response = await fetch('radares.json?v=' + Date.now());
        if (!response.ok) throw new Error();
        var data = await response.json();
        var records = Array.isArray(data) ? data : (data.result?.records || data.records || []);
        if (records.length > 0) { renderizarRadaresNoMapa(records, "JSON Local"); return; }
      } catch (e) { console.warn("Falha JSON local:", e); }
      
      $("#loading").show().html("<div class='loading-spinner'></div><div>Conectando API...</div>");
      try {
        var metaResponse = await fetch(API_PBH_BASE + 'package_show?id=fiscalizacao-eletronica');
        var metaData = await metaResponse.json();
        if (!metaData.success || !metaData.result.resources) throw new Error();
        var csvResource = metaData.result.resources.find(r => r.format.toLowerCase() === 'csv');
        if (!csvResource || !csvResource.url) throw new Error();
        var csvResponse = await fetch(csvResource.url);
        if (!csvResponse.ok) throw new Error();
        var csvText = await csvResponse.text();
        var recordsFromAPI = parseCSVtoRecords(csvText);
        if (recordsFromAPI.length > 0) renderizarRadaresNoMapa(recordsFromAPI, "API Oficial");
        else throw new Error();
      } catch (error) {
        console.warn("Falha API:", error);
        $("#loading").hide();
        renderizarRadaresNoMapa([], "Dados Offline");
      }
    }

    function parseCSVtoRecords(csvText) {
      var lines = csvText.split(/\r\n|\n/).map(l => l.trim()).filter(l => l.length > 0);
      if (lines.length < 2) return [];
      var headers = lines[0].split(';').map(h => h.toLowerCase().replace(/"/g, '').trim());
      var dataLines = lines.slice(1);
      var idxEnd = headers.findIndex(h => h.includes('endere') || h.includes('logrado'));
      var idxTipo = headers.findIndex(h => h.includes('tipo') || h.includes('equip'));
      var idxVel = headers.findIndex(h => h.includes('veloc'));
      var idxX = headers.findIndex(h => h.includes('leste') || h.includes('x'));
      var idxY = headers.findIndex(h => h.includes('norte') || h.includes('y'));
      var out = [];
      dataLines.forEach(line => {
        var cols = line.split(';').map(c => c.replace(/^"|"$/g, '').trim());
        if (cols.length < 3) return;
        var end = idxEnd !== -1 ? cols[idxEnd] : (cols[2] || "S/N");
        var tipo = idxTipo !== -1 ? cols[idxTipo] : "Radar";
        var vel = idxVel !== -1 ? cols[idxVel] : "60";
        var coordStr = null;
        if (idxX !== -1 && idxY !== -1 && cols[idxX] && cols[idxY]) coordStr = cols[idxX] + ',' + cols[idxY];
        out.push([null, null, end, tipo, vel, null, null, null, null, coordStr]);
      });
      return out;
    }

    function renderizarRadaresNoMapa(records, origem) {
      var radaresExternos = records || [];
      var todosOsRadares = radaresExternos.concat(injetarRadaresIA());
      var contador = 0;
      for (var i = 0; i < todosOsRadares.length; i++) {
        var record = todosOsRadares[i];
        var endereco = record[2] || "Endereço não informado";
        var tipo = (record[3] || "Não Identificado").trim();
        var velocidade = record[4] || "0";
        var coordsFinais = extrairCoordenadas(record);
        if (!coordsFinais) continue;
        var iconeUrl = getIconUrl(tipo, velocidade);
        var iconeRadar = criarIconeRadar(iconeUrl, 40);
        var radarMarker = L.marker([coordsFinais.lat, coordsFinais.lng], { icon: iconeRadar }).addTo(map);
        var tipoExibicao = ajusteNomes[tipo] || tipo;
        var isIA = tipoExibicao.includes('OCR') || tipoExibicao.includes('FACIAL');
        var tituloPopup = isIA ? '🤖 <span style="color:#33aaff">' + tipoExibicao + '</span>' : '<b>' + tipoExibicao + '</b>';
        radarMarker.bindPopup('<div style="color:#222; font-family:\'Inter\'; text-align:center;">' + tituloPopup + '<br><hr>' + endereco + '<br><div style="color:#d00; font-weight:bold;">Máx: ' + velocidade + ' km/h</div></div>');
        radarMarker.radarData = {
          latitude: coordsFinais.lat, longitude: coordsFinais.lng, endereco: endereco,
          velocidade_maxima: velocidade, tipoOriginal: tipo, tipoExibicao: tipoExibicao, isIA: isIA
        };
        radarMarkers.push(radarMarker);
        contador++;
      }
      $("#loading").hide();
      if (contador > 0) showNotification('Base carregada: ' + origem);
      else showNotification("Nenhum radar encontrado.");
    }
    
    function buscarRadares(query) {
      if (!query || query.length < 2) return;
      var encontrou = false;
      var boundsGroup = L.featureGroup();
      var q = query.toLowerCase();
      radarMarkers.forEach(marker => {
        var d = marker.radarData;
        var textoBusca = (d.endereco + ' ' + d.tipoOriginal + ' ' + d.tipoExibicao).toLowerCase();
        if (textoBusca.includes(q)) { encontrou = true; boundsGroup.addLayer(marker); marker.openPopup(); }
      });
      if (encontrou) { map.fitBounds(boundsGroup.getBounds().pad(0.2)); isFollowing = false; }
      else showNotification("Nenhum radar encontrado.");
    }

    function showError(error) {
      if (gpsSource === 'appinventor') return;
      var msg = "Erro de GPS.";
      if (error.code === 1) msg = "Permissão negada.";
      if (error.code === 2) msg = "Sinal fraco.";
      showNotification(msg);
      hideFullscreenLoading();
      if (error.code === 3) setTimeout(startGPSTracking, 5000);
    }
    
    document.addEventListener('click', function desbloquearAudio() {
      var sound = document.getElementById("alert-soud");
      if (sound) { sound.play().then(() => { sound.pause(); sound.currentTime = 0; }).catch(() => {}); }
      document.removeEventListener('click', desbloquearAudio);
    }, { once: true });
    
    window.onload = initMap;
  </script>
</body>
</html>
