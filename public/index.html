<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Cache Control -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Radar X9 BH - Alerta Inteligente (OSM + IA)</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

  <!-- JS: SEM integrity — mesma razão -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"
crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"
crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"
crossorigin="anonymous"></script>

<!-- CSS: SEM integrity — Tracking Prevention é só aviso, não bloqueia -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
      crossorigin="anonymous" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"
      crossorigin="anonymous" />

<!-- Favicon inline (elimina 404) -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
  
<style>
    /* ===================================================================
       VARIÁVEIS DE TEMA (cores globais do app)
    =================================================================== */
    :root {
        --bg-color: #0f1115;
        --panel-color: #1a1d24;
        --accent-color: #00ff88;
        --alert-color: #ff3333;
        --text-main: #ffffff;
        --text-muted: #a0a0a0;
        --sidebar-width: 68px;
        --btn-size: 50px;
    }

    /* ===================================================================
       RESET GLOBAL — remove paddings/margins padrão do navegador
    =================================================================== */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
    }

    /* ===================================================================
       BODY — layout principal em coluna, tela cheia, sem scroll
    =================================================================== */
    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* ===================================================================
       HEADER — barra superior com logo, título e botão menu
    =================================================================== */
    header {
        background-color: var(--panel-color);
        padding: 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 2px solid var(--accent-color);
        box-shadow: 0 4px 15px rgba(0, 255, 136, 0.1);
        z-index: 1000;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .app-icon {
        width: 50px;
        height: 40px;
        border-radius: 8px;
        object-fit: contain;
    }

    h1 {
        font-size: 1.2rem;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    h1 span {
        color: var(--accent-color);
    }

    /* ===================================================================
       BOTÃO MENU TOGGLE — hamburger animado com label "MENU"
       Ao clicar, as 3 barras viram um "X" via transform
    =================================================================== */
    .btn-menu-toggle {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        background: none;
        border: 1.5px solid rgba(0, 255, 136, 0.3);
        border-radius: 10px;
        padding: 8px 14px 6px;
        cursor: pointer;
        transition: all 0.25s ease;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-menu-toggle:hover {
        border-color: var(--accent-color);
        background: rgba(0, 255, 136, 0.06);
    }

    .btn-menu-toggle:active {
        transform: scale(0.93);
    }

    .menu-hamburger {
        display: flex;
        flex-direction: column;
        gap: 4px;
        width: 22px;
    }

    .menu-hamburger span {
        display: block;
        height: 2.5px;
        width: 100%;
        background-color: var(--accent-color);
        border-radius: 2px;
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        transform-origin: center;
    }

    /* Animação do X quando o menu está ativo */
    .btn-menu-toggle.active .menu-hamburger span:nth-child(1) {
        transform: translateY(6.5px) rotate(45deg);
    }

    .btn-menu-toggle.active .menu-hamburger span:nth-child(2) {
        opacity: 0;
        transform: scaleX(0);
    }

    .btn-menu-toggle.active .menu-hamburger span:nth-child(3) {
        transform: translateY(-6.5px) rotate(-45deg);
    }

    .menu-label {
        font-size: 0.55rem;
        font-weight: 700;
        letter-spacing: 1.5px;
        color: var(--accent-color);
        text-transform: uppercase;
        line-height: 1;
        margin-top: 2px;
    }

    /* ===================================================================
       SIDEBAR CONTROLS — barra vertical à direita com botões de mapa
       Pode ser retraída via classe .retracted (translateX para fora)
       ✅ NOVO: Quando modoNavegacaoAtivo, a sidebar é escondida
              automaticamente para dar mais visão ao mapa estilo Waze
    =================================================================== */
    .sidebar-controls {
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        width: var(--sidebar-width);
        z-index: 500;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 20px 0;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        transform: translateX(0);
    }

    .sidebar-controls.retracted {
        transform: translateX(calc(var(--sidebar-width) + 10px));
    }

    /* Botões dentro da sidebar — visibilidade controlada pela retração */
    .sidebar-controls .map-btn {
        width: var(--btn-size);
        height: var(--btn-size);
        opacity: 1;
        transition: opacity 0.25s ease 0s, transform 0.2s ease, border-color 0.2s ease;
    }

    .sidebar-controls.retracted .map-btn {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s ease 0s, transform 0.2s ease, border-color 0.2s ease;
    }

    /* ===================================================================
       BARRAS DE BUSCA — search-container para radares e rotas
       Max-height: 0 quando fechada, 90px quando .active
       Desliza para baixo com transição suave
    =================================================================== */
    .search-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        background-color: rgba(26, 29, 36, 0.98);
        backdrop-filter: blur(8px);
        display: flex;
        gap: 12px;
        z-index: 1000;
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        padding: 0 15px;
        border-bottom: 1px solid transparent;
        transition: all 0.3s ease;
        align-items: center;
    }

    .search-container.active {
        max-height: 90px;
        opacity: 1;
        padding: 15px;
        border-bottom: 1px solid #333;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    /* Input de busca — cantos arredondados, fundo preto */
    .search-container input {
        flex: 1;
        padding: 14px 20px;
        border-radius: 30px;
        border: 1px solid #444;
        background-color: #000;
        color: #fff;
        font-size: 1rem;
        outline: none;
        font-family: 'Inter', sans-serif;
    }

    .search-container input:focus {
        border-color: var(--accent-color);
    }

    /* Botão circular de buscar dentro da barra */
    .btn-search {
        position: relative;
        flex-shrink: 0;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        background: rgba(46, 102, 158, 0.95);
        box-shadow: 0 3px 8px rgba(203, 240, 15, 0.5);
        transition: all 0.2s ease;
        overflow: hidden;
    }

    .btn-search:active {
        transform: scale(0.9);
    }

    .btn-search img {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 40px;
        height: 40px;
        object-fit: contain;
        display: block;
        transform: translate(-50%, -50%);
    }

    /* ===================================================================
       MAP-WRAPPER — container flexível que segura o mapa e overlays
       Ocupa todo o espaço restante abaixo do header
    =================================================================== */
    .map-wrapper {
        position: relative;
        flex: 1;
        display: flex;
        overflow: hidden;
        width: 100%;
    }

    /* Mapa Leaflet — preenche todo o wrapper */
    #map {
        width: 100%;
        height: 100%;
        background-color: #2a2a2a;
        z-index: 1;
    }

    /* ===================================================================
       BUSSOLA WIDGET — posição fixa no canto superior esquerdo
       Apenas base + ponteira, sem elementos extras
       pointer-events: none para não interceptar toques no mapa
    =================================================================== */
    .compass-widget {
        position: absolute;
        top: 20px;
        left: 5px;
        width: 65px;
        height: 65px;
        z-index: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
    }

    /* Imagem de fundo da bússola (círculo com pontos cardeais) */
    .compass-base {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: contain;
        z-index: 1;
        opacity: 0.9;
    }

    /* Ponteira da bússola — gira via JS (transform: rotate)
       Transição suave com cubic-bezier para movimento natural */
    .compass-needle {
        position: absolute;
        width: 55%;
        height: 55%;
        object-fit: contain;
        z-index: 2;
        transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ===================================================================
       MAP-BTN — estilo base para todos os botões redondos do mapa
       Fundo semi-transparente escuro, borda sutil, efeito hover/active
    =================================================================== */
    .map-btn {
        width: var(--btn-size);
        height: var(--btn-size);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        cursor: pointer;
        background: rgba(20, 20, 20, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
        transition: all 0.2s ease;
        flex-shrink: 0;
    }

    .map-btn:hover {
        transform: scale(1.08);
        border-color: var(--accent-color);
    }

    .map-btn:active {
        transform: scale(0.92);
    }

    /* Ícone dentro dos botões — tamanho fixo, sem interação de ponteiro */
    .map-btn img {
        width: 30px;
        height: 30px;
        object-fit: contain;
        pointer-events: none;
    }

    /* ===================================================================
       BOTÃO ALERTA TOGGLE — estados LIGADO/DESLIGADO
       Quando .alert-off: fundo avermelhado, ícone com filtro vermelho
    =================================================================== */
    .alert-toggle-btn {
        background: rgba(29, 28, 28, 0.9);
        border: 2px solid rgba(255, 255, 255, 0.08);
        transition: all 0.3s ease;
    }

    .alert-toggle-btn.alert-off {
        background: rgba(222, 127, 127, 0.9);
        border-color: #888;
    }

    .alert-toggle-btn.alert-off img {
        filter: rgba(225, 82, 82, 0.9);
    }

    .alert-toggle-btn img {
        transition: all 0.3s ease;
    }

    /* Borda verde especial nos botões dentro da sidebar */
    .sidebar-controls .map-btn {
        border: 1px solid rgba(0, 255, 136, 0.35);
    }

    /* Botão de rota um pouco maior que os demais */
    #btn-route-bar {
        width: 54px;
        height: 54px;
    }

    /* ===================================================================
       ✅ CSS do botão de rotação — feedback visual + ícone girante
       A DIV do botão NÃO é rotacionada (evita conflito com leaflet-rotate)
       O <img> interno gira via JS inline style quando .rotated está ativo
    =================================================================== */
    #btn-rotate-map {
        transition: border-color 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
    }

    #btn-rotate-map.rotated {
        border-color: var(--accent-color);
        box-shadow: 0 0 18px rgba(0, 255, 136, 0.35), inset 0 0 8px rgba(0, 255, 136, 0.1);
        background-color: rgba(0, 255, 136, 0.08);
    }

    #btn-rotate-map.rotated img {
        filter: brightness(1.2) drop-shadow(0 0 4px rgba(0, 255, 136, 0.5));
        transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.3s ease;
    }

    #btn-rotate-map:not(.rotated) img {
        transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.3s ease;
    }

    /* ===================================================================
       MARCADORES DE USUÁRIO E NAVEGAÇÃO
       ✅ Usamos L.divIcon — o className aplica-se ao <div> container
       background: transparent e border: none removem estilo padrão do Leaflet
       filter e animation aplicam-se ao <img> dentro do divIcon
       transition: none evita que o Leaflet anime a posição (feita via JS)
       will-change: transform otimiza a renderização da movimentação
    =================================================================== */
    .user-gps-marker,
    .user-navigator-marker {
        background: transparent !important;
        border: none !important;
    }

    .user-gps-marker img,
    .user-navigator-marker img {
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        transition: none !important;
        will-change: transform;
    }

    /* ===================================================================
       route-start-marker — ícone de saída da rota (navigator_map)
       Animação pulse para destacar o início da navegação
    =================================================================== */
    .route-start-marker {
        background: transparent !important;
        border: none !important;
    }

    .route-start-marker img {
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        animation: pulseStart 1s ease-in-out infinite;
    }

    /* ===================================================================
       route-end-marker — ícone de chegada da rota (ic_icon_chegada)
       Animação pulse diferente para o destino
    =================================================================== */
    .route-end-marker {
        background: transparent !important;
        border: none !important;
    }

    .route-end-marker img {
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        animation: pulseEnd 1.2s ease-in-out infinite;
    }

    /* Animações de pulso para marcadores de rota */
    @keyframes pulseStart {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
        100% { transform: scale(1); opacity: 1; }
    }

    @keyframes pulseEnd {
        0% { transform: scale(1); }
        50% { transform: scale(1.15); }
        100% { transform: scale(1); }
    }

    /* ===================================================================
       MARCADORES DE RADAR — fundo transparente, sem borda do Leaflet
    =================================================================== */
    .radar-marker-icon {
        background: transparent !important;
        border: none !important;
    }

    .radar-marker-icon img {
        width: 40px !important;
        height: 40px !important;
        object-fit: contain !important;
        display: block !important;
    }

    /* ===================================================================
       SPEED WIDGET — mostrador de velocidade no canto inferior esquerdo
       Posicionado com offset negativo para ficar parcialmente fora da tela
    =================================================================== */
    .speed-widget {
        position: absolute;
        bottom: -15px;
        left: -25px;
        width: 150px;
        height: 150px;
        z-index: 500;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .speed-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        pointer-events: none;
    }

    .speed-value {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-63%, -60%);
        font-size: 28px;
        font-weight: 700;
        font-family: 'Rajdhani', 'Oswald', 'Arial Narrow', sans-serif;
        color: #000;
        line-height: 1;
        z-index: 2;
        white-space: nowrap;
        text-align: center;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.5px;
        min-width: 3ch;
    }

    /* ===================================================================
       ✅ NOVO: Controles de zoom flutuantes estilo Waze
       Aparecem no canto inferior direito APENAS durante a navegação
       Substituem os botões de zoom da sidebar quando em modo rota
       Inicialmente ocultos (display:none), ativados via JS
    =================================================================== */
    .controles-zoom-flutuantes {
        position: absolute;
        right: 16px;
        bottom: 120px;
        display: none;
        flex-direction: column;
        gap: 8px;
        z-index: 1000;
    }

    /* Quando em navegação, os controles aparecem */
    .controles-zoom-flutuantes.visivel {
        display: flex;
    }

    /* Estilo dos botões flutuantes — fundo branco, sombra, circular */
    .controles-zoom-flutuantes button {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.95);
        border: none;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        font-size: 20px;
        font-weight: bold;
        color: #333;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .controles-zoom-flutuantes button:active {
        transform: scale(0.9);
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
    }

    /* ===================================================================
       ALERT CONTAINER — barra de alerta de radar na parte inferior
    =================================================================== */
    #alert-container {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        display: none;
        animation: slideUp 0.3s ease-out;
        pointer-events: none;
    }

    @keyframes slideUp {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.02); background: linear-gradient(90deg, #ff2200, #ee0000); }
        100% { transform: scale(1); }
    }

    .alert-bar {
        background: linear-gradient(90deg, #cc0000, #990000);
        color: white;
        padding: 18px;
        display: flex;
        align-items: center;
        gap: 15px;
        box-shadow: 0 -5px 20px rgba(255, 0, 0, 0.4);
        border-top: 2px solid #ff5555;
        transition: all 0.2s ease;
    }

    .alert-bar-critico {
        animation: pulse 0.8s ease-in-out infinite;
    }

    .alert-bar img {
        width: 50px;
        height: 50px;
        filter: drop-shadow(0 0 5px rgba(0, 0, 0, 0.5));
    }

    .alert-info h3 {
        font-size: 1.2rem;
        margin-bottom: 3px;
        text-transform: uppercase;
        font-weight: 800;
    }

    .alert-info p {
        font-size: 0.95rem;
        opacity: 0.95;
    }

    /* ===================================================================
       TOAST NOTIFICATION — mensagem temporária no topo central
    =================================================================== */
    .toast-notification {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        background-color: rgba(20, 20, 20, 0.95);
        color: var(--text-main);
        padding: 12px 25px;
        border-radius: 50px;
        border: 1px solid #444;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
        z-index: 2000;
        opacity: 0;
        font-size: 0.95rem;
        font-weight: 600;
        text-align: center;
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.3s ease;
        white-space: nowrap;
    }

    .toast-notification.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }

    /* ===================================================================
       LOADING OVERLAY — mini-loading centralizado sobre o mapa
    =================================================================== */
    .loading-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(20, 20, 20, 0.9);
        padding: 20px 30px;
        border-radius: 12px;
        border: 1px solid var(--accent-color);
        text-align: center;
        z-index: 1001;
        backdrop-filter: blur(5px);
    }

    .loading-spinner {
        border: 3px solid #333;
        border-top: 3px solid var(--accent-color);
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
        margin: 0 auto 10px;
    }

    @keyframes spin {
        100% { transform: rotate(360deg); }
    }

    /* ===================================================================
       LOADING FULLSCREEN — tela de carregamento inicial do app
    =================================================================== */
    .loading-fullscreen {
        position: fixed;
        inset: 0;
        background-color: var(--bg-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .loading-fullscreen.fade-out {
        opacity: 0;
        visibility: hidden;
    }

    .loading-fullscreen .spinner-ring {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        position: relative;
        margin-bottom: 24px;
    }

    .loading-fullscreen .spinner-ring::before,
    .loading-fullscreen .spinner-ring::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 4px solid transparent;
    }

    .loading-fullscreen .spinner-ring::before {
        border-top-color: var(--accent-color);
        border-right-color: var(--accent-color);
        animation: spinRing 1s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite;
    }

    .loading-fullscreen .spinner-ring::after {
        inset: 10px;
        border-bottom-color: #ff3333;
        border-left-color: #ff3333;
        animation: spinRing 1.4s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite reverse;
    }

    @keyframes spinRing {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .loading-fullscreen .loading-text {
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-align: center;
    }

    .loading-fullscreen .loading-text span {
        color: var(--accent-color);
    }

    .loading-fullscreen .loading-sub {
        margin-top: 8px;
        font-size: 0.8rem;
        color: #777;
        animation: pulseText 1.8s ease-in-out infinite;
    }

    @keyframes pulseText {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
    }

    /* ===================================================================
       CONTROLES DO LEAFLET ESCONDIDOS
    =================================================================== */

    function getIconUrl(tipo, velocidade) {
      const tipoLimpo = tipo ? tipo.trim() : "";
      if (!tipoLimpo) return iconMap['default'];
      if (tipoLimpo.includes('Zona Verde') || tipoLimpo.includes('ZVT') || tipoLimpo.includes('ZVC')) return iconMap['Zona Verde de Trânsito (ZVT)'];
      if (tipoLimpo.includes('Parada sobre Faixa de Pedestres') || tipoLimpo.includes('DPFP')) return iconMap['Detector de Parada sobre Faixa de Pedestres (DPFP)'];
      if (tipoLimpo.includes('Semáforo') || tipoLimpo.includes('(DAS)')) return iconMap['Detector de Avanço de Semáforo (DAS)'];
      if (tipoLimpo === 'Controle de Redução de Velocidade (CRV)' || tipoLimpo === 'Controle de Redução de Velocidade') return iconMap['Controle de Redução de Velocidade (CRV)'];
      var isRadarVelocidade = tipoLimpo.includes('Velocidade') || tipoLimpo.includes('CEV') || tipoLimpo.includes('CEM') || tipoLimpo.includes('Controlador Eletrônico');
      if (isRadarVelocidade) {
        var velNum = parseInt(String(velocidade || '').trim().replace(/[^0-9]/g, ''), 10);
        if (velNum === 40) return '/imagens_app/ic_radar_cev_40_v2.png';
        if (velNum === 50) return '/imagens_app/ic_radar_cev_50_v2.png';
        if (velNum === 60) return '/imagens_app/ic_radar_cev_60_v2.png';
        if (velNum === 70) return '/imagens_app/ic_radar_cev_70_v2.png';
        if (velNum === 80) return '/imagens_app/ic_radar_cev_80_v2.png';
        if (velNum === 100) return '/imagens_app/ic_radar_cev_100_v2.png';
        return '/imagens_app/ic_radar_cev_v2.png';
      }
      if (iconMap[tipoLimpo]) return iconMap[tipoLimpo];
      var substrings = [
        { keys: ['Olho Vivo', 'COV'], icon: iconMap['Câmera Olho Vivo (COV)'] },
        { keys: ['Facial'], icon: iconMap['Leitor de Reconhecimento Facial (OCR-F)'] },
        { keys: ['OCR-P', 'Placas'], icon: iconMap['Leitor Inteligente de Placas (OCR-P)'] },
        { keys: ['Celular', 'DUC'], icon: iconMap['Detector de Uso de Celular'] },
        { keys: ['Cinto', 'VCS'], icon: iconMap['Verificador de Cinto de Segurança (VCS)'] },
        { keys: ['Acidente', 'AIA'], icon: iconMap['Alerta de Alto Índice de Acidente (AIA)'] },
        { keys: ['Perigo', 'ZPV'], icon: iconMap['Zona de Perigo e Violência (ZPV)'] },
        { keys: ['Inundaç', 'ZIR'], icon: iconMap['Zona de Risco de Inundações Recorrentes (ZIR)'] },
        { keys: ['Redução', 'Redutor', 'DRV', 'CRV'], icon: iconMap['Controle de Redução de Velocidade (CRV)'] },
        { keys: ['Conversão'], icon: iconMap['Detector de Conversão em Local Proibido'] },
        { keys: ['Invasão', 'DIFEX', 'Faixa Exclusiva', 'MOVE'], icon: iconMap['Detector de Invasão de Faixa Exclusiva (DIFEX)'] },
        { keys: ['Tráfego Proibido', 'DTLP'], icon: iconMap['Detector de Tráfego em Local Proibido'] },
        { keys: ['BUS', 'Faixa Preferencial'], icon: iconMap['Detector de Faixa Preferencial de Ônibus (BUS)'] },
      ];
      for (var s = 0; s < substrings.length; s++) {
        var entry = substrings[s];
        for (var k = 0; k < entry.keys.length; k++) { if (tipoLimpo.includes(entry.keys[k])) return entry.icon; }
      }
      return iconMap['default'];
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) { var R = 6371e3; var p1 = lat1 * Math.PI / 180; var p2 = lat2 * Math.PI / 180; var dp = (lat2 - lat1) * Math.PI / 180; var dl = (lon2 - lon1) * Math.PI / 180; var a = Math.sin(dp/2)*Math.sin(dp/2) + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)*Math.sin(dl/2); return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }

    // ===================================================================

    //    Usado pelo sistema de zoom Waze para orientar o mapa na direção

    // ===================================================================
    function calcularBearing(lat1, lng1, lat2, lng2) {
      var dLng = (lng2 - lng1) * Math.PI / 180;
      var lat1Rad = lat1 * Math.PI / 180;
      var lat2Rad = lat2 * Math.PI / 180;
      var y = Math.sin(dLng) * Math.cos(lat2Rad);
      var x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLng);
      var bearing = Math.atan2(y, x) * 180 / Math.PI;
      return (bearing + 360) % 360;
    }

    // ===================================================================
    // SUAVIZAÇÃO E ANÁLISE GPS
    // ===================================================================
    function suavizarPosicao(novaLat, novaLng) {
      if (posicaoSuavizada.lat === null) { posicaoSuavizada.lat = novaLat; posicaoSuavizada.lng = novaLng; return { lat: novaLat, lng: novaLng }; }
      var fator = ALERT_CONFIG.SUAVIZACAO_FATOR;
      posicaoSuavizada.lat += (novaLat - posicaoSuavizada.lat) * fator;
      posicaoSuavizada.lng += (novaLng - posicaoSuavizada.lng) * fator;
      return { lat: posicaoSuavizada.lat, lng: posicaoSuavizada.lng };
    }

    function adicionarAoHistorico(lat, lng, timestamp) { historicoPosicoes.push({ lat: lat, lng: lng, time: timestamp }); if (historicoPosicoes.length > ALERT_CONFIG.HISTORICO_TAMANHO) historicoPosicoes.shift(); }

    function calcularTendenciaDistancia(radarId, distanciaAtual) {
      if (!historicoDistanciasRadar[radarId]) historicoDistanciasRadar[radarId] = [];
      historicoDistanciasRadar[radarId].push({ distancia: distanciaAtual, time: Date.now() });
      if (historicoDistanciasRadar[radarId].length > 5) historicoDistanciasRadar[radarId].shift();
      var historico = historicoDistanciasRadar[radarId];
      if (historico.length < 2) return { estaAproximando: true, estaAfastando: false };
      var diferenca = historico[0].distancia - historico[historico.length - 1].distancia;
      if (diferenca > 5) return { estaAproximando: true, estaAfastando: false, diferenca: diferenca };
      if (diferenca < -5) return { estaAproximando: false, estaAfastando: true, diferenca: diferenca };
      return { estaAproximando: true, estaAfastando: false, diferenca: 0 };
    }

    // ===================================================================
    // moverMarcadorSuavemente — Animação suave estilo Waze
    // Escolhe startRouteMarker ou userMarker baseado no estado
    // ===================================================================
    function moverMarcadorSuavemente(targetLat, targetLng) {
      var marcadorParaMover = estaEmNavegacao ? startRouteMarker : userMarker;
      if (!marcadorParaMover) return;
      if (ultimaPosicaoMarcador.lat === null) { ultimaPosicaoMarcador = { lat: targetLat, lng: targetLng }; marcadorParaMover.setLatLng([targetLat, targetLng]); return; }
      var distancia = calcularDistancia(ultimaPosicaoMarcador.lat, ultimaPosicaoMarcador.lng, targetLat, targetLng);
      if (distancia < ALERT_CONFIG.DISTANCIA_MINIMA_MOVIMENTO) return;
      var inicioLat = ultimaPosicaoMarcador.lat;
      var inicioLng = ultimaPosicaoMarcador.lng;
      var duracao = 300;
      var inicioTempo = performance.now();
      if (animacaoMarcadorAtiva) return;
      animacaoMarcadorAtiva = true;
      function animarFrame(tempoAtual) {
        var progresso = Math.min((tempoAtual - inicioTempo) / duracao, 1);
        var easing = 1 - Math.pow(1 - progresso, 3);
        marcadorParaMover.setLatLng([inicioLat + (targetLat - inicioLat) * easing, inicioLng + (targetLng - inicioLng) * easing]);
        if (progresso < 1) { requestAnimationFrame(animarFrame); } else { ultimaPosicaoMarcador = { lat: targetLat, lng: targetLng }; animacaoMarcadorAtiva = false; }
      }
      requestAnimationFrame(animarFrame);
    }

    function limparHistoricoDistancia(radarId) { if (historicoDistanciasRadar[radarId]) delete historicoDistanciasRadar[radarId]; }

    function verificarDirecaoMelhorada(uLat, uLng, uHeading, radarLat, radarLng, radarId, distanciaAtual) {
      if (!uHeading || uHeading === -1 || isNaN(uHeading)) { var t = calcularTendenciaDistancia(radarId, distanciaAtual); return { estaAproximando: t.estaAproximando, estaAfastando: t.estaAfastando }; }
      var deltaX = radarLng - uLng; var deltaY = radarLat - uLat; var anguloRadar = (Math.atan2(deltaY, deltaX) * 180 / Math.PI + 360) % 360;
      var diff = Math.abs(uHeading - anguloRadar); diff = Math.min(diff, 360 - diff);
      var tendencia = calcularTendenciaDistancia(radarId, distanciaAtual);
      return { estaAproximando: (diff < ALERT_CONFIG.ANGULO_APROXIMACAO) || tendencia.estaAproximando, estaAfastando: (diff > ALERT_CONFIG.ANGULO_AFASTANDO) && tendencia.estaAfastando };
    }

    function aplicarTemaMapa() {
      if (!map) return;
      var hora = new Date().getHours();
      var urlAtual = (hora >= 19 || hora < 6) ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
      if (tileLayer) { tileLayer.setUrl(urlAtual); } else { tileLayer = L.tileLayer(urlAtual, { attribution: '', subdomains: 'abcd', maxZoom: 19 }).addTo(map); }
    }

    // ===================================================================
    // ALERTAS
    // ===================================================================
    function fecharAlertaImediatamente() { var sound = document.getElementById("alert-soud"); if (sound) { sound.pause(); sound.currentTime = 0; } clearTimeout(alertTimeout); }
    function esconderAlertaVisual() { $("#alert-container").fadeOut(150); $(".alert-bar").css("background", "linear-gradient(90deg, #cc0000, #990000)"); $(".alert-bar").removeClass("alert-bar-critico"); contagemTocarSom = 0; fecharAlertaImediatamente(); }

    // ===================================================================
    // adicionarMarcadoresRota — Ícones de saída e chegada via L.divIcon
    // ===================================================================
    function adicionarMarcadoresRota(originLat, originLng, destLat, destLng) {
      if (startRouteMarker) { map.removeLayer(startRouteMarker); startRouteMarker = null; }
      if (endRouteMarker) { map.removeLayer(endRouteMarker); endRouteMarker = null; }
      if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
      estaEmNavegacao = true;
      ultimaPosicaoMarcador = { lat: null, lng: null };

      var startIcon = L.divIcon({
        html: '<img src="/imagens_app/ic_navigator_map.png" onerror="this.src=\'https://cdn-icons-png.flaticon.com/512/7892/7892059.png\'" style="width:50px;height:50px;">',
        className: 'route-start-marker user-navigator-marker', iconSize: [50, 50], iconAnchor: [25, 50], popupAnchor: [0, -50]
      });
      startRouteMarker = L.marker([originLat, originLng], { icon: startIcon, zIndexOffset: 1000 }).addTo(map);
      startRouteMarker.bindTooltip("Navegando para destino", { permanent: false, direction: "top", offset: [0, -30] });

      var endIcon = L.divIcon({
        html: '<img src="/imagens_app/ic_icon_chegada.png" onerror="this.src=\'https://cdn-icons-png.flaticon.com/512/684/684908.png\'" style="width:50px;height:50px;">',
        className: 'route-end-marker', iconSize: [50, 50], iconAnchor: [25, 50], popupAnchor: [0, -50]
      });
      endRouteMarker = L.marker([destLat, destLng], { icon: endIcon, zIndexOffset: 900 }).addTo(map);
      endRouteMarker.bindPopup("<b>DESTINO</b><br>Você chegou ao seu destino!", { closeButton: false, autoClose: true, closeOnClick: true });
    }

    function atualizarRota() {
      if (!destinoAtual || !userLat || !userLng || !routingControl) return;
      routingControl.setWaypoints([L.latLng(userLat, userLng), L.latLng(destinoAtual.lat, destinoAtual.lng)]);
    }

    function verificarChegadaDestino() {
      if (!destinoAtual || !userLat || !userLng) return;
      var distanciaDestino = calcularDistancia(userLat, userLng, destinoAtual.lat, destinoAtual.lng);
      if (distanciaDestino <= 30) {
        showNotification("Você chegou ao seu destino!");
        if (endRouteMarker) endRouteMarker.openPopup();
        setTimeout(function() { finalizarNavegacaoWaze(); }, 4000);
      }
    }

    // ===================================================================
    // finalizarERestaurarRota — Restaura ícone GPS padrão (ic_gps_marker.png)
    // ===================================================================
    function finalizarERestaurarRota() {
      if (!map) return;
      if (routingControl) { map.removeControl(routingControl); routingControl = null; }
      destinoAtual = null;
      estaEmNavegacao = false;
      if (startRouteMarker) { map.removeLayer(startRouteMarker); startRouteMarker = null; }
      if (endRouteMarker) { map.removeLayer(endRouteMarker); endRouteMarker = null; }
      if (posicaoSuavizada && posicaoSuavizada.lat !== null) { ultimaPosicaoMarcador.lat = posicaoSuavizada.lat; ultimaPosicaoMarcador.lng = posicaoSuavizada.lng; } else { ultimaPosicaoMarcador = { lat: null, lng: null }; }
      var defaultIcon = L.divIcon({
        html: '<img src="/imagens_app/ic_gps_marker.png" onerror="this.src=\'https://cdn-icons-png.flaticon.com/512/684/684908.png\'" style="width:50px;height:50px;">',
        className: 'user-gps-marker', iconSize: [50, 50], iconAnchor: [25, 50], popupAnchor: [0, -50]
      });
      userMarker = L.marker([userLat, userLng], { icon: defaultIcon, zIndexOffset: 1000 }).addTo(map);
      userMarker.bindTooltip("Você está aqui", { permanent: false, direction: "top", offset: [0, -25] });
      showNotification("Navegação encerrada");
    }

    function removerRota() { finalizarERestaurarRota(); }

    // ===================================================================
    // ✅ NOVO: iniciarNavegacaoWaze - Ativa modo navegação com zoom dinâmico
    //    Substitui a função criarRota anterior
    //    - Cria marcadores de saída/chegada
    //    - Cria linha de rota (SEM fitSelectedRoutes — controlamos manualmente)
    //    - Ao calcular a rota: extrai heading do primeiro segmento e faz zoom inicial
    //    - Ativa modoNavegacaoAtivo que dispara o sistema de zoom Waze
    // ===================================================================
    function iniciarNavegacaoWaze(destLat, destLng) {
      if (!userLat || !userLng) { showNotification("Aguardando sinal GPS..."); return; }
      if (routingControl) { removerRota(); }

      destinoAtual = { lat: destLat, lng: destLng };
      modoNavegacaoAtivo = true;
      estaEmNavegacao = true;

      // Cria marcadores de saída e chegada
      adicionarMarcadoresRota(userLat, userLng, destLat, destLng);

      // Cria rota sem fit automático (nós controlamos o zoom)
      routingControl = L.Routing.control({
        waypoints: [L.latLng(userLat, userLng), L.latLng(destLat, destLng)],
        routeWhileDragging: false,
        addWaypoints: false,
        draggableWaypoints: false,
        fitSelectedRoutes: false,
        show: false,
        lineOptions: {
          styles: [
            { color: '#ff5500', opacity: 0.95, weight: 7 },
            { color: '#ffd1b3', opacity: 1.0, weight: 3 }
          ]
        },
        createMarker: function() { return null; },
        router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' })
      }).addTo(map);

      // Quando a rota é calculada
      routingControl.on('routesfound', function(e) {
        var route = e.routes[0];

        // Extrai heading do primeiro segmento da rota
        if (route.coordinates && route.coordinates.length >= 2) {
          headingRota = calcularBearing(
            route.coordinates[0].lat, route.coordinates[0].lng,
            route.coordinates[1].lat, route.coordinates[1].lng
          );
        }

        // Zoom inicial estilo Waze (próximo ao carro)
        fazerZoomInicialNavegacao();

        var distanciaKm = (route.summary.totalDistance / 1000).toFixed(1);
        var tempoMin = Math.round(route.summary.totalTime / 60);
        $("#loading").hide();
        showNotification("Rota: " + distanciaKm + " km - " + tempoMin + " min");
      });

      routingControl.on('routingerror', function() {
        $("#loading").hide();
        showNotification("Erro ao traçar rota.");
      });

      showNotification("Navegação iniciada!");
    }

    // ===================================================================
    // ✅ NOVO: fazerZoomInicialNavegacao - Zoom próximo antes de mover
    //    FlyTo suave para zoom 19 (nível rua), ativa follow do GPS
    //    e dispara o detector de movimento para iniciar zoom dinâmico
    // ===================================================================
    function fazerZoomInicialNavegacao() {
      map.flyTo([userLat, userLng], zoomNavegacao, { duration: 1.5, easeLinearity: 0.25 });
      isFollowing = true;
      aguardarMovimentoParaZoom();
    }

    // ===================================================================
    // ✅ NOVO: aguardarMovimentoParaZoom - Detecta quando carro começa a andar
    //    Verifica velocidade a cada 500ms; quando > 5 km/h, inicia o
    //    sistema de zoom dinâmico baseado na velocidade
    // ===================================================================
    function aguardarMovimentoParaZoom() {
      var movimentoDetectado = false;
      var checkMovimento = setInterval(function() {
        if (!modoNavegacaoAtivo) { clearInterval(checkMovimento); return; }
        if (velocidadeAtual > 5 && !movimentoDetectado) {
          movimentoDetectado = true;
          clearInterval(checkMovimento);
          showNotification("Partida detectada!");
          iniciarZoomDinamico();
        }
      }, 500);
    }

    // ===================================================================
    // ✅ NOVO: iniciarZoomDinamico - Loop que ajusta zoom e orientação
    //    Verifica a cada 1 segundo e chama:
    //    - ajustarZoomPorVelocidade(): zoom conforme velocidade
    //    - ajustarOrientacaoMapa(): rotação na direção do movimento
    //    Referência do intervalo salva para limpar ao finalizar navegação
    // ===================================================================
    function iniciarZoomDinamico() {
      if (intervaloZoomDinamico) clearInterval(intervaloZoomDinamico);
      intervaloZoomDinamico = setInterval(function() {
        if (!modoNavegacaoAtivo) { clearInterval(intervaloZoomDinamico); intervaloZoomDinamico = null; return; }
        ajustarZoomPorVelocidade();
        ajustarOrientacaoMapa();
      }, 1000);
    }

    // ===================================================================
    // ✅ NOVO: ajustarZoomPorVelocidade - Lógica Waze de zoom
    //    Velocidade → Zoom:
    //    < 5 km/h (parado)     → zoom 19 (rua, bem próximo)
    //    5-30 km/h (centro)    → zoom 18 (médio-próximo)
    //    30-60 km/h (avenidas) → zoom 17 (médio)
    //    60-90 km/h (rodovias) → zoom 16 (aberto)
    //    > 90 km/h (autoestradas) → zoom 15 (panorâmico)
    //    Só muda se diferença >= 1 nível (evita flicker)
    // ===================================================================
    function ajustarZoomPorVelocidade() {
      var zoomDesejado;
      if (velocidadeAtual < 5) { zoomDesejado = 19; estaEmMovimento = false; }
      else if (velocidadeAtual < 30) { zoomDesejado = 18; estaEmMovimento = true; }
      else if (velocidadeAtual < 60) { zoomDesejado = 17; estaEmMovimento = true; }
      else if (velocidadeAtual < 90) { zoomDesejado = 16; estaEmMovimento = true; }
      else { zoomDesejado = 15; estaEmMovimento = true; }

      if (Math.abs(zoomDesejado - zoomAtualNavegacao) >= 1) {
        zoomAtualNavegacao = zoomDesejado;
        map.flyTo([userLat, userLng], zoomDesejado, { duration: 1.2, easeLinearity: 0.3 });
      }
    }

    // ===================================================================
    // ✅ NOVO: ajustarOrientacaoMapa - Roda mapa na direção do movimento
    //    Prioridades de heading:
    //    1. Bússola hardware (mais preciso em movimento, velocidade > 5)
    //    2. Heading calculado pelo deslocamento GPS (velocidade > 3)
    //    3. Heading da rota (quando parado, usa primeiro segmento)
    //    Aplica suavização para evitar rotação brusca
    // ===================================================================
    function ajustarOrientacaoMapa() {
      if (!modoNavegacaoAtivo || !estaEmMovimento) return;
      var headingParaUsar = null;

      if (bussolaHardwareDisponivel && currentHeading > 0 && velocidadeAtual > 5) {
        headingParaUsar = currentHeading;
      } else if (ultimaPosicaoMarcador.lat !== null && velocidadeAtual > 3) {
        headingParaUsar = calcularBearing(ultimaPosicaoMarcador.lat, ultimaPosicaoMarcador.lng, userLat, userLng);
      } else {
        headingParaUsar = headingRota;
      }

      if (headingParaUsar !== null && typeof map.setBearing === 'function') {
        map.setBearing(suavizarRotacao(headingParaUsar));
      }
    }

    // ===================================================================
    // ✅ NOVO: suavizarRotacao - Evita rotação brusca do mapa
    //    Interpola 20% da diferença por chamada (interpolação exponencial)
    //    Normaliza diferença para -180 a 180 para pegar o caminho curto
    // ===================================================================
    function suavizarRotacao(novaRotacao) {
      var diferenca = novaRotacao - rotacaoAtual;
      while (diferenca > 180) diferenca -= 360;
      while (diferenca < -180) diferenca += 360;
      rotacaoAtual += diferenca * 0.2;
      while (rotacaoAtual < 0) rotacaoAtual += 360;
      while (rotacaoAtual >= 360) rotacaoAtual -= 360;
      return rotacaoAtual;
    }

    // ===================================================================
    // ✅ NOVO: calcularOffsetCentroMapa - Carro fica em 1/3 inferior da tela
    //    Quanto mais rápido, mais o carro desce para mostrar a frente
    //    Converte metros para graus lat (1 grau ≈ 111.32 km)
    // ===================================================================
    function calcularOffsetCentroMapa() {
      var fatorVelocidade = Math.min(velocidadeAtual / 100, 1);
      var offsetMetros = 30 + (fatorVelocidade * 100);
      var offsetLat = offsetMetros / 111320;
      return { lat: offsetLat, lng: 0 };
    }

    // ===================================================================
    // ✅ NOVO: finalizarNavegacaoWaze - Restaura estado normal ao encerrar navegação
    //    Para tudo: modo navegação, intervalo de zoom, rotação, marcadores
    //    Recria userMarker com ic_gps_marker.png, restaura zoom e sidebar
    // ===================================================================
    function finalizarNavegacaoWaze() {
      modoNavegacaoAtivo = false;
      estaEmNavegacao = false;
      estaEmMovimento = false;
      velocidadeAtual = 0;

      // Para o loop de zoom dinâmico
      if (intervaloZoomDinamico) { clearInterval(intervaloZoomDinamico); intervaloZoomDinamico = null; }

      // Remove rota
      if (routingControl) { map.removeControl(routingControl); routingControl = null; }
      destinoAtual = null;

      // Remove marcadores de rota
      if (startRouteMarker) { map.removeLayer(startRouteMarker); startRouteMarker = null; }
      if (endRouteMarker) { map.removeLayer(endRouteMarker); endRouteMarker = null; }

      // Reseta rotação suavizada e do mapa
      rotacaoAtual = 0;
      if (typeof map.setBearing === 'function') { map.setBearing(0); }

      // Reseta o ícone do botão de rotação manual
      var rotateBtnIcon = document.getElementById('rotate-btn-icon');
      if (rotateBtnIcon) { rotateBtnIcon.style.transform = 'rotate(0deg)'; }
      var rotateBtn = document.getElementById('btn-rotate-map');
      if (rotateBtn) rotateBtn.classList.remove('rotated');
      mapaRotacionado = false;

      // Esconde controles de zoom flutuantes
      document.getElementById('controles-zoom-flutuantes').classList.remove('visivel');

      // Mostra sidebar novamente
      var sidebar = document.getElementById('sidebar-controls');
      if (sidebar) sidebar.classList.remove('retracted');
      sidebarAberta = true;
      var btnMenu = document.getElementById('btn-menu-toggle');
      if (btnMenu) btnMenu.classList.remove('active');

      // Restaura zoom padrão
      map.flyTo([userLat, userLng], 17, { duration: 1 });

      // Reseta posição da animação
      if (posicaoSuavizada && posicaoSuavizada.lat !== null) { ultimaPosicaoMarcador.lat = posicaoSuavizada.lat; ultimaPosicaoMarcador.lng = posicaoSuavizada.lng; } else { ultimaPosicaoMarcador = { lat: null, lng: null }; }

      // Recria marcador GPS padrão (ic_gps_marker.png)
      var defaultIcon = L.divIcon({
        html: '<img src="/imagens_app/ic_gps_marker.png" onerror="this.src=\'https://cdn-icons-png.flaticon.com/512/684/684908.png\'" style="width:50px;height:50px;">',
        className: 'user-gps-marker', iconSize: [50, 50], iconAnchor: [25, 50], popupAnchor: [0, -50]
      });
      userMarker = L.marker([userLat, userLng], { icon: defaultIcon, zIndexOffset: 1000 }).addTo(map);
      userMarker.bindTooltip("Você está aqui", { permanent: false, direction: "top", offset: [0, -25] });

      showNotification("Navegação encerrada");
    }

    // ===================================================================
    // ROTAS E ENDEREÇOS
    // ===================================================================
    async function buscarCoordenadas(endereco) {
      try {
        var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(endereco + ', Belo Horizonte, Minas Gerais, Brasil');
        var response = await fetch(url); var data = await response.json();
        if (data && data.length > 0) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
        return null;
      } catch (e) { console.error("Erro ao buscar coordenadas:", e); return null; }
    }

    function resetarMapa() {
      if (!map) return;
      mapaRotacionado = false;
      if (typeof map.setBearing === 'function') { map.setBearing(0); }
      var rotateBtnIcon = document.getElementById('rotate-btn-icon');
      if (rotateBtnIcon) { rotateBtnIcon.style.transform = 'rotate(0deg)'; }
      var rotateBtn = document.getElementById('btn-rotate-map');
      if (rotateBtn) rotateBtn.classList.remove('rotated');
      map.setView([posicaoCentralOriginal.lat, posicaoCentralOriginal.lng], posicaoCentralOriginal.zoom, { animate: true, duration: 0.5 });
      isFollowing = false;
      if (refreshDelayTimer) clearTimeout(refreshDelayTimer);
      refreshDelayTimer = setTimeout(function() {
        var marcadorAtivo = estaEmNavegacao ? startRouteMarker : userMarker;
        if (marcadorAtivo && !isFollowing) { isFollowing = true; map.flyTo(marcadorAtivo.getLatLng(), 20, { duration: 0.8 }); showNotification("Retornando à sua posição atual"); }
        refreshDelayTimer = null;
      }, TEMPO_REFRESH_DELAY);
      finalizarNavegacaoWaze();
      esconderAlertaVisual();
      showNotification("Mapa resetado");
    }

    function extrairCoordenadas(record) {
      if (!record || record.length < 10) return null;
      var stringOriginal = String(record[9]).trim();
      var stringLimpa = stringOriginal.replace(/\s*,\s*/g, ',').trim();
      if (!stringLimpa.includes('.') && stringLimpa.includes(',')) { var pv = stringLimpa.indexOf(','); if (pv !== -1) { stringLimpa = stringLimpa.substring(0, pv) + '.' + stringLimpa.substring(pv + 1); } }
      var parts = stringLimpa.split(','); if (parts.length !== 2) return null;
      var lat = parseFloat(parts[0]); var lng = parseFloat(parts[1]);
      if (isNaN(lat) || isNaN(lng) || lat < -90 || lat > 90 || lng < -180 || lng > 180) return null;
      return { lat: lat, lng: lng };
    }

    function atualizarBussola(headingDegrees) { var needle = document.getElementById('compass-needle-img'); if (needle) needle.style.transform = 'rotate(' + headingDegrees + 'deg)'; }

    // ===================================================================
    // Atualizar rotação do mapa (modo manual, não navegação) + gira ícone botão
    // ===================================================================
    function atualizarRotacaoMapa() {
      if (!mapaRotacionado || !map || modoNavegacaoAtivo) return;
      var agora = Date.now();
      if (agora - ultimaAtualizacaoRotacao < 200) return;
      ultimaAtualizacaoRotacao = agora;
      if (typeof map.setBearing === 'function') { map.setBearing(currentHeading); }
      var rotateBtnIcon = document.getElementById('rotate-btn-icon');
      if (rotateBtnIcon) { rotateBtnIcon.style.transform = 'rotate(' + currentHeading + 'deg)'; }
    }

    function inicializarBussolaHardware() {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') { return; }
      if (typeof DeviceOrientationEvent !== 'undefined') {
        window.addEventListener('deviceorientation', function(event) {
          if (event.webkitCompassHeading !== undefined && event.webkitCompassHeading !== null) { currentHeading = event.webkitCompassHeading; bussolaHardwareDisponivel = true; }
          else if (event.alpha !== null && event.absolute === true) { currentHeading = event.alpha; bussolaHardwareDisponivel = true; }
          atualizarRotacaoMapa();
        }, true);
      }
    }

    async function solicitarPermissaoBussolaIOS() {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try { var r = await DeviceOrientationEvent.requestPermission(); if (r === 'granted') { window.addEventListener('deviceorientation', function(event) { if (event.webkitCompassHeading !== undefined && event.webkitCompassHeading !== null) { currentHeading = event.webkitCompassHeading; bussolaHardwareDisponivel = true; } atualizarRotacaoMapa(); }, true); return true; } return false; } catch (e) { return false; }
      }
      return false;
    }

    // ===================================================================
    // processarNovaPosicao — AJUSTADA PARA ZOOM WAZE
    // ✅ Quando modoNavegacaoAtivo e isFollowing: usa panTo com offset
    //    para posicionar o carro no terço inferior da tela (mostra a frente)
    // ✅ Quando NÃO está em navegação: usa setView normal
    // ===================================================================
    function processarNovaPosicao(newLat, newLng, speedKmh, hardwareHeading) {
      if (!map) return;
      var currentTime = Date.now();
      var dist = 0;

      adicionarAoHistorico(newLat, newLng, currentTime);
      var posSuave = suavizarPosicao(newLat, newLng);
      var smoothLat = posSuave.lat;
      var smoothLng = posSuave.lng;

      if (speedKmh === 0 && prevLat !== null && prevTime !== null) {
        dist = calcularDistancia(prevLat, prevLng, newLat, newLng);
        var time = (currentTime - prevTime) / 1000;
        if (time > 0) speedKmh = Math.round((dist / time) * 3.6);
      } else if (prevLat !== null) { dist = calcularDistancia(prevLat, prevLng, newLat, newLng); }

      if (speedKmh > 250) speedKmh = 0;
      $("#speed-display").text(speedKmh);

      // Atualiza velocidade global para o sistema de zoom Waze
      velocidadeAtual = speedKmh || 0;

      // Lógica de heading — prioriza bússola hardware
      if (hardwareHeading !== null && !isNaN(hardwareHeading) && hardwareHeading >= 0) {
        if (!bussolaHardwareDisponivel) { currentHeading = hardwareHeading; }
      } else if (!bussolaHardwareDisponivel && dist > 3 && prevLat !== null) {
        var dy = newLat - prevLat; var dx = (newLng - prevLng) * Math.cos(newLat * Math.PI / 180);
        if (Math.abs(dx) > 0.0000001 || Math.abs(dy) > 0.0000001) {
          var calcHeading = (Math.atan2(dx, dy) * 180 / Math.PI);
          if (calcHeading < 0) calcHeading += 360;
          if (calcHeading >= 360) calcHeading -= 360;
          currentHeading = calcHeading;
        }
      }

      if (currentHeading !== null && currentHeading !== undefined) { atualizarBussola(currentHeading); }
      atualizarRotacaoMapa();

      prevLat = newLat; prevLng = newLng; prevTime = currentTime;
      userLat = newLat; userLng = newLng;

      if (!userMarker && !estaEmNavegacao) {
        var defaultIcon = L.divIcon({
          html: '<img src="/imagens_app/ic_gps_marker.png" onerror="this.src=\'https://cdn-icons-png.flaticon.com/512/684/684908.png\'" style="width:50px;height:50px;">',
          className: 'user-gps-marker', iconSize: [50, 50], iconAnchor: [25, 50], popupAnchor: [0, -50]
        });
        userMarker = L.marker([smoothLat, smoothLng], { icon: defaultIcon, zIndexOffset: 1000 }).addTo(map);
        userMarker.bindTooltip("Você está aqui", { permanent: false, direction: "top", offset: [0, -25] });
        ultimaPosicaoMarcador.lat = smoothLat; ultimaPosicaoMarcador.lng = smoothLng;
        if (!gpsInitialized) { gpsInitialized = true; hideFullscreenLoading(); }
      } else {
        moverMarcadorSuavemente(smoothLat, smoothLng);
      }

      if (destinoAtual && routingControl) { atualizarRota(); }

      // ========================================
      // 🎯 ZOOM WAZE: Ajusta view do mapa
      // Em navegação: panTo com offset (carro no terço inferior)
      // Fora de navegação: setView normal (carro centrado)
      // ========================================
      if (modoNavegacaoAtivo && isFollowing) {
        var offset = calcularOffsetCentroMapa();
        map.panTo([smoothLat + offset.lat, smoothLng + offset.lng], { animate: true, duration: 0.3, easeLinearity: 0.5 });
      } else if (isFollowing) {
        map.setView([smoothLat, smoothLng], map.getZoom(), { animate: true, duration: 0.8 });
      }

      if (alertaHabilitado) { verificarProximidadeRadares(); } else { fecharAlertaImediatamente(); }
      if (destinoAtual) { verificarChegadaDestino(); }
    }

    function startGPSTracking() {
      if (!navigator.geolocation) { hideFullscreenLoading(); showNotification("GPS não suportado."); return; }
      if (watchId !== null) navigator.geolocation.clearWatch(watchId);
      watchId = navigator.geolocation.watchPosition(
        function(position) {
          if (gpsSource !== 'appinventor') gpsSource = 'browser';
          var newLat = position.coords.latitude; var newLng = position.coords.longitude;
          var speedKmh = 0;
          if (position.coords.speed !== null && position.coords.speed >= 0) speedKmh = Math.round(position.coords.speed * 3.6);
          processarNovaPosicao(newLat, newLng, speedKmh, position.coords.heading);
        }, showError, { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
      );
      browserGpsTimeout = setTimeout(function() { if (!gpsInitialized && gpsSource === 'none') { showNotification("Aguardando GPS do app..."); hideFullscreenLoading(); } }, 8000);
    }

    // ===================================================================
    // PROXIMIDADE E DISPARO DE RADAR
    // ===================================================================
    function verificarProximidadeRadares() {
      if (!alertaHabilitado || radarMarkers.length === 0) return;
      let radarMaisProximo = null; let menorDistancia = Infinity;
      radarMarkers.forEach(function(marker) { const rData = marker.radarData; if (!deveAlertaRadar(rData.tipoOriginal)) return; const dist = calcularDistancia(userLat, userLng, rData.latitude, rData.longitude); if (dist < menorDistancia) { menorDistancia = dist; radarMaisProximo = rData; } });
      if (radarMaisProximo && menorDistancia <= ALERT_CONFIG.DISTANCIA_MAXIMA) {
        const direcao = verificarDirecaoMelhorada(userLat, userLng, currentHeading, radarMaisProximo.latitude, radarMaisProximo.longitude, radarMaisProximo.id, menorDistancia);
        if (menorDistancia <= ALERT_CONFIG.DISTANCIA_PASSAR_RADAR) { esconderAlertaVisual(); ultimoRadarAlertado = radarMaisProximo.id; limparHistoricoDistancia(radarMaisProximo.id); return; }
        if (direcao.estaAfastando) { fecharAlertaImediatamente(); limparHistoricoDistancia(radarMaisProximo.id); if (menorDistancia > ALERT_CONFIG.DISTANCIA_MAXIMA - 30) ultimoRadarAlertado = null; return; }
        if (direcao.estaAproximando) { if (ultimoRadarAlertado !== radarMaisProximo.id) { dispararAlerta(radarMaisProximo, menorDistancia); } else { atualizarDistanciaAlerta(menorDistancia); if (menorDistancia <= ALERT_CONFIG.DISTANCIA_CRITICA) $(".alert-bar").addClass("alert-bar-critico"); } }
      } else { if ($("#alert-container").is(":visible")) esconderAlertaVisual(); if (menorDistancia > ALERT_CONFIG.DISTANCIA_MAXIMA + 80) { ultimoRadarAlertado = null; historicoDistanciasRadar = {}; } }
    }

    function atualizarDistanciaAlerta(distancia) { if (!$("#alert-container").is(":visible")) return; var textoAtual = $("#alert-text").text(); var partes = textoAtual.split(" - a "); if (partes.length >= 2) $("#alert-text").text(partes[0] + " - a " + Math.round(distancia) + " metros"); }

    function dispararAlerta(radar, distancia) {
      const distanciaAtual = calcularDistancia(userLat, userLng, radar.latitude, radar.longitude);
      if (distanciaAtual > ALERT_CONFIG.DISTANCIA_MAXIMA || distanciaAtual <= ALERT_CONFIG.DISTANCIA_PASSAR_RADAR) return;
      const som = document.getElementById("alert-soud");
      const tipoAjustado = ajusteNomes[radar.tipoOriginal] || radar.tipoOriginal;
      const velInfo = radar.velocidade_maxima ? " | " + radar.velocidade_maxima + " km/h" : "";
      $("#alert-title").text("ALERTA DE RADAR!"); $("#alert-text").text(tipoAjustado + velInfo + " - a " + Math.round(distanciaAtual) + " metros");
      $("#alert-icon").attr("src", getIconUrl(radar.tipoOriginal, radar.velocidade_maxima));
      if (!$("#alert-container").is(":visible")) { $("#alert-container").fadeIn(200); contagemTocarSom = 0; }
      if (alertaHabilitado && som && contagemTocarSom < ALERT_CONFIG.DISPAROS_SOM_ANTES_DE_SILENCIAR) { som.pause(); som.currentTime = 0; som.play().catch(function(e) {}); contagemTocarSom++; }
      if (distanciaAtual <= ALERT_CONFIG.DISTANCIA_CRITICA) { $(".alert-bar").addClass("alert-bar-critico"); } else { $(".alert-bar").removeClass("alert-bar-critico"); }
      ultimoRadarAlertado = radar.id;
      clearTimeout(alertTimeout);
      alertTimeout = setTimeout(function() { if ($("#alert-container").is(":visible")) esconderAlertaVisual(); }, ALERT_CONFIG.TEMPO_ALERTA);
    }

    // ===================================================================
    // BOTÃO DE ROTAÇÃO
    // ===================================================================
    function inicializarBotaoRotacaoMapa() {
      const rotateBtn = document.getElementById('btn-rotate-map');
      if (!rotateBtn) return;
      if (typeof map !== 'undefined' && map && typeof map.setBearing !== 'function') {
        rotateBtn.style.opacity = '0.3'; rotateBtn.style.pointerEvents = 'none'; showNotification('Plugin de rotação não carregou.'); return;
      }
      rotateBtn.addEventListener('click', async function () {
        if (!map || typeof map.setBearing !== 'function' || modoNavegacaoAtivo) return;
        if (!bussolaHardwareDisponivel) { await solicitarPermissaoBussolaIOS(); }
        if (!mapaRotacionado) {
          mapaRotacionado = true;
          var anguloRotacao = (currentHeading > 0 && currentHeading < 360) ? currentHeading : 0;
          map.setBearing(anguloRotacao); rotateBtn.classList.add('rotated');
          var ri = document.getElementById('rotate-btn-icon'); if (ri) { ri.style.transform = 'rotate(' + anguloRotacao + 'deg)'; }
          if (bussolaHardwareDisponivel) { showNotification('Mapa rotacionado — bússola ativa'); } else if (currentHeading > 0) { showNotification('Mapa rotacionado ' + Math.round(currentHeading) + '° (GPS)'); } else { showNotification('Mapa rotacionado — aguardando direção...'); }
        } else {
          mapaRotacionado = false; map.setBearing(0); rotateBtn.classList.remove('rotated');
          var ri = document.getElementById('rotate-btn-icon'); if (ri) { ri.style.transform = 'rotate(0deg)'; }
          showNotification('Mapa resetado (Norte para cima)');
        }
      });
    }

    // ===================================================================
    // BOTÃO ALERTA TOGGLE
    // ===================================================================
    function inicializarBotaoAlertaToggle() {
      const alertBtn = document.getElementById('btn-alert-toggle');
      const alertIcon = document.getElementById('alert-toggle-icon');
      if (!alertBtn) return;
      alertBtn.addEventListener('click', function() {
        alertaHabilitado = !alertaHabilitado;
        if (alertaHabilitado) { alertBtn.classList.remove('alert-off'); if (alertIcon) { alertIcon.src = "/imagens_app/ic_sound_on.png"; alertIcon.onerror = function() { this.src = 'https://cdn-icons-png.flaticon.com/512/727/727245.png'; }; } showNotification("Alerta LIGADO"); }
        else { alertBtn.classList.add('alert-off'); if (alertIcon) { alertIcon.src = "/imagens_app/ic_sound_off.png"; alertIcon.onerror = function() { this.src = 'https://cdn-icons-png.flaticon.com/512/3398/3398405.png'; }; } showNotification("Alerta DESLIGADO"); }
        esconderAlertaVisual();
      });
    }

    // ===================================================================
    // INICIALIZAÇÃO DO MAPA
    // ===================================================================
    function initMap() {
      if (typeof L === 'undefined') { hideFullscreenLoading(); showNotification("Erro de conexão."); return; }
      map = L.map('map', { center: [userLat, userLng], zoom: 17, zoomControl: false, rotate: true, bearing: 0 });
      aplicarTemaMapa();
      setInterval(aplicarTemaMapa, 300000);
      inicializarBussolaHardware();

      map.on('dragstart', function() { isFollowing = false; if (returnToGpsTimer) clearTimeout(returnToGpsTimer); });
      map.on('dragend', function() {
        returnToGpsTimer = setTimeout(function() {
          if (!isFollowing) { var m = estaEmNavegacao ? startRouteMarker : userMarker; if (m) { isFollowing = true; map.setView(m.getLatLng(), map.getZoom(), { animate: true, duration: 0.5 }); showNotification("Voltando à sua posição atual"); } }
        }, TEMPO_RETORNO_GPS);
      });

      // ===================================================================
      // EVENTOS DOS BOTÕES
      // ===================================================================

      // ✅ Botão "Traçar Rota" agora chama iniciarNavegacaoWaze (sistema Waze)
      $("#btn-calc-route").click(async function() {
        var endereco = $("#route-query").val().trim();
        if (endereco.length < 5) { showNotification("Digite um endereço válido."); return; }
        $("#loading").show().html("<div class='loading-spinner'></div><div>Calculando rota...</div>");
        var coords = await buscarCoordenadas(endereco);
        if (coords) { esconderAlertaVisual(); iniciarNavegacaoWaze(coords.lat, coords.lng); }
        else { $("#loading").hide(); showNotification("Endereço não encontrado."); }
      });

      $("#route-query").keypress(function(e) { if (e.which == 13) $("#btn-calc-route").click(); });

      function fecharTodasBarras() { searchActive = false; routeActive = false; $("#search-bar-radares").classList.remove('active'); $("#search-bar-rota").classList.remove('active'); }

      $("#btn-search-radar").click(function() { buscarRadares($("#query").val()); });
      $("#query").keypress(function(e) { if (e.which == 13) buscarRadares($("#query").val()); });

      $("#btn-search-bar").click(function() {
        if (searchActive) { fecharTodasBarras(); return; }
        if (routeActive) routeActive = false;
        searchActive = true;
        $("#search-bar-rota").removeClass('active'); $("#search-bar-radares").addClass('active');
        if (!sidebarAberta) { sidebarAberta = true; document.getElementById('sidebar-controls').classList.remove('retracted'); document.getElementById('btn-menu-toggle').classList.remove('active'); }
        setTimeout(function() { $("#query").focus(); }, 300);
      });

      $("#btn-route-bar").click(function() {
        if (routeActive) { fecharTodasBarras(); return; }
        if (searchActive) searchActive = false;
        routeActive = true;
        $("#search-bar-radares").removeClass('active'); $("#search-bar-rota").addClass('active');
        if (!sidebarAberta) { sidebarAberta = true; document.getElementById('sidebar-controls').classList.remove('retracted'); document.getElementById('btn-menu-toggle').classList.remove('active'); }
        setTimeout(function() { $("#route-query").focus(); }, 300);
      });

      $("#btn-center").click(function() {
        fecharTodasBarras(); isFollowing = true;
        var m = estaEmNavegacao ? startRouteMarker : userMarker;
        if (m) { map.flyTo(m.getLatLng(), estaEmNavegacao ? zoomAtualNavegacao : 17, { duration: 0.5 }); showNotification("Centralizando na sua posição"); }
        else { showNotification("Aguardando sinal GPS..."); }
      });

      $("#btn-refresh").click(function() { resetarMapa(); carregarRadares(); });

      // ✅ Zoom in/out da sidebar: desabilitados durante navegação Waze
      // (o sistema Waze controla o zoom automaticamente)
      $("#btn-zoom-in").click(function() { if (map && !modoNavegacaoAtivo) map.zoomIn(); });
      $("#btn-zoom-out").click(function() { if (map && !modoNavegacaoAtivo) map.zoomOut(); });

      // ===================================================================
      // ✅ NOVO: Botões de zoom flutuantes estilo Waze
      // Aparecem durante navegação e permitem ajuste manual do zoom
      // Sempre respeitam os limites de 14-20
      // ===================================================================
      $("#btn-nav-zoom-in").click(function() {
        if (modoNavegacaoAtivo) {
          zoomAtualNavegacao = Math.min(zoomAtualNavegacao + 1, 20);
          map.setZoom(zoomAtualNavegacao);
        }
      });

      $("#btn-nav-zoom-out").click(function() {
        if (modoNavegacaoAtivo) {
          zoomAtualNavegacao = Math.max(zoomAtualNavegacao - 1, 14);
          map.setZoom(zoomAtualNavegacao);
        }
      });

      inicializarBotaoRotacaoMapa();
      inicializarBotaoAlertaToggle();
      startGPSTracking();
      carregarRadares();
    }

    // ===================================================================
    // CARREGAR RADARES
    // ===================================================================
    async function carregarRadares() {
      if (!map) return;
      if (radarMarkers.length > 0) { radarMarkers.forEach(function(marker) { map.removeLayer(marker); }); radarMarkers = []; }
      $("#loading").show().html("<div class='loading-spinner'></div><div>Carregando radares...</div>");
      try {
        var response = await fetch('radares.json?v=' + Date.now());
        if (!response.ok) throw new Error("HTTP " + response.status);
        var data = await response.json();
        var records = (Array.isArray(data)) ? data : (data.result?.records || data.records || []);
        if (records.length > 0) { renderizarRadaresNoMapa(records, "radares.json"); } else { throw new Error("Nenhum radar encontrado"); }
      } catch (e) { console.warn("[Radar X9] Falha:", e.message); $("#loading").hide(); showNotification("Erro ao carregar radares: " + e.message); }
    }

    function renderizarRadaresNoMapa(records, origem) {
      if (!map) return;
      var contador = 0;
      for (var i = 0; i < records.length; i++) {
        var record = records[i];
        var endereco = record[2] || "Endereço não informado";
        var tipo = (record[3] || "Não Identificado").trim();
        var velocidade = record[4] || "0";
        var coordsFinais = extrairCoordenadas(record);
        if (!coordsFinais) continue;
        var iconeUrl = getIconUrl(tipo, velocidade);
        var fallbackUrl = '/imagens_app/ic_radar_cev_v2.png';
        var iconeRadar = criarIconeRadar(iconeUrl, 40, fallbackUrl);
        var radarMarker = L.marker([coordsFinais.lat, coordsFinais.lng], { icon: iconeRadar }).addTo(map);
        setTimeout(function() { var imgEl = radarMarker.getElement()?.querySelector('img'); if (imgEl) imgEl.setAttribute('data-fallback', fallbackUrl); }, 100);
        var tipoExibicao = ajusteNomes[tipo] || tipo;
        var isIA = tipoExibicao.includes('OCR') || tipoExibicao.includes('FACIAL');
        var tituloPopup = isIA ? '<span style="color:#33aaff">' + tipoExibicao + '</span>' : '<b>' + tipoExibicao + '</b>';
        radarMarker.bindPopup('<div style="color:#222;font-family:\'Inter\';text-align:center;min-width:200px;">' + tituloPopup + '<br><hr style="border:0;border-top:1px solid #ddd;margin:5px 0;">' + endereco + '<br><div style="color:#d00;font-weight:bold;margin-top:5px;">Máx: ' + velocidade + ' km/h</div></div>');
        radarMarker.radarData = { id: i, latitude: coordsFinais.lat, longitude: coordsFinais.lng, endereco: endereco, velocidade_maxima: velocidade, tipoOriginal: tipo, tipoExibicao: tipoExibicao, isIA: isIA };
        radarMarkers.push(radarMarker);
        contador++;
      }
      $("#loading").hide();
      if (contador > 0) { showNotification('Base carregada: ' + origem + ' (' + contador + ' radares)'); } else { showNotification("Nenhum radar encontrado."); }
    }

    function buscarRadares(query) {
      if (!query || query.length < 2) return;
      var encontrou = false; var boundsGroup = L.featureGroup(); var q = query.toLowerCase();
      radarMarkers.forEach(function(marker) { var d = marker.radarData; if ((d.endereco + ' ' + d.tipoOriginal + ' ' + d.tipoExibicao).toLowerCase().includes(q)) { encontrou = true; boundsGroup.addLayer(marker); marker.openPopup(); } });
      if (encontrou) { if (map) map.fitBounds(boundsGroup.getBounds().pad(0.2)); isFollowing = false; } else { showNotification("Nenhum radar encontrado para: " + query); }
    }

    function showError(error) {
      if (gpsSource === 'appinventor') return;
      var msg = "Erro ao obter localização.";
      if (error.code === 1) msg = "Permissão de GPS negada.";
      if (error.code === 2) msg = "Sinal GPS indisponível.";
      if (error.code === 3) msg = "Tempo esgotado. Tentando novamente...";
      showNotification(msg); hideFullscreenLoading();
      if (error.code === 3) { setTimeout(startGPSTracking, 5000); }
    }

    // Desbloqueio de áudio
    document.addEventListener('click', function desbloquearAudio() {
      var sound = document.getElementById("alert-soud");
      if (sound) { sound.play().then(function() { sound.pause(); sound.currentTime = 0; }).catch(function() {}); }
      document.removeEventListener('click', desbloquearAudio);
    }, { once: true });

    window.onload = initMap;
  </script>
</body>
