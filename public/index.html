<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Cache Control -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Radar X9 BH - Alerta Inteligente (OSM + IA)</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

  <!-- JS: SEM integrity — mesma razão -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"
crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"
crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"
crossorigin="anonymous"></script>

<!-- CSS: SEM integrity — Tracking Prevention é só aviso, não bloqueia -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
      crossorigin="anonymous" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"
      crossorigin="anonymous" />

<!-- Favicon inline (elimina 404) -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
  
<style>
  /* ===================================================================
     VARIÁVEIS DE TEMA
  =================================================================== */
  :root {
    --bg-color: #0f1115;
    --panel-color: #1a1d24;
    --accent-color: #00ff88;
    --alert-color: #ff3333;
    --text-main: #ffffff;
    --text-muted: #a0a0a0;
    --sidebar-width: 68px;
    --btn-size: 50px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-color);
    color: var(--text-main);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ===================================================================
     HEADER
  =================================================================== */
  header {
    background-color: var(--panel-color);
    padding: 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--accent-color);
    box-shadow: 0 4px 15px rgba(0, 255, 136, 0.1);
    z-index: 1000;
    position: relative;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .app-icon {
    width: 50px;
    height: 40px;
    border-radius: 8px;
    object-fit: contain;
  }

  h1 {
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  h1 span {
    color: var(--accent-color);
  }

  /* ===================================================================
     BOTÃO MENU TOGGLE
  =================================================================== */
  .btn-menu-toggle {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    background: none;
    border: 1.5px solid rgba(0, 255, 136, 0.3);
    border-radius: 10px;
    padding: 8px 14px 6px;
    cursor: pointer;
    transition: all 0.25s ease;
    user-select: none;
    -webkit-user-select: none;
  }

  .btn-menu-toggle:hover {
    border-color: var(--accent-color);
    background: rgba(0, 255, 136, 0.06);
  }

  .btn-menu-toggle:active {
    transform: scale(0.93);
  }

  .menu-hamburger {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 22px;
  }

  .menu-hamburger span {
    display: block;
    height: 2.5px;
    width: 100%;
    background-color: var(--accent-color);
    border-radius: 2px;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    transform-origin: center;
  }

  .btn-menu-toggle.active .menu-hamburger span:nth-child(1) {
    transform: translateY(6.5px) rotate(45deg);
  }

  .btn-menu-toggle.active .menu-hamburger span:nth-child(2) {
    opacity: 0;
    transform: scaleX(0);
  }

  .btn-menu-toggle.active .menu-hamburger span:nth-child(3) {
    transform: translateY(-6.5px) rotate(-45deg);
  }

  .menu-label {
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--accent-color);
    text-transform: uppercase;
    line-height: 1;
    margin-top: 2px;
  }

  /* ===================================================================
     MAIN CONTAINER — envolve mapa + overlays absolutos
  =================================================================== */
  .main-container {
    position: relative;
    flex: 1;
    display: flex;
    overflow: hidden;
    width: 100%;
  }

  /* ===================================================================
     MAP-WRAPPER — apenas o mapa Leaflet
  =================================================================== */
  .map-wrapper {
    position: relative;
    flex: 1;
    overflow: hidden;
  }

  /* ===================================================================
     MAPA LEAFLET
  =================================================================== */
  #map {
    width: 100%;
    height: 100%;
    background-color: #2a2a2a;
    z-index: 1;
  }

  /* ===================================================================
     OVERLAYS ABSOLUTOS — FORA do fluxo do mapa, acima de tudo
     Todos com z-index altíssimo, isolados em contexto próprio
  =================================================================== */
  .overlay-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 999999;
    /* Isolamento completo do contexto de empilhamento */
    isolation: isolate;
  }

  .overlay-layer > * {
    pointer-events: auto;
  }

  /* ===================================================================
     BÚSSOLA — dentro de overlay-layer, garantidamente acima
  =================================================================== */
  .compass-widget {
    position: absolute;
    top: 20px;
    left: 5px;
    width: 65px;
    height: 65px;
    z-index: 999999;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    /* Forçar composição em layer separado */
    transform: translateZ(0);
    will-change: transform;
  }

  .compass-base {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 1;
    background-image: url('/imagens_app/ic_compass.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.9;
  }

  .compass-needle {
    position: absolute;
    width: 55%;
    height: 55%;
    z-index: 2;
    object-fit: contain;
    transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  /* ===================================================================
     TOAST — dentro de overlay-layer
  =================================================================== */
  .toast-notification {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background-color: rgba(20, 20, 20, 0.95);
    color: var(--text-main);
    padding: 12px 25px;
    border-radius: 50px;
    border: 1px solid #444;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
    z-index: 999999;
    opacity: 0;
    font-size: 0.95rem;
    font-weight: 600;
    text-align: center;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    white-space: nowrap;
  }

  .toast-notification.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===================================================================
     SPEED WIDGET — dentro de overlay-layer
  =================================================================== */
  .speed-widget {
    position: absolute;
    bottom: -15px;
    left: -25px;
    width: 150px;
    height: 150px;
    z-index: 999999;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .speed-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
  }

  .speed-value {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-64%, -60%);
    font-size: 28px;
    font-weight: 700;
    font-family: 'Rajdhani', 'Oswald', 'Arial Narrow', sans-serif;
    color: #000;
    line-height: 1;
    z-index: 2;
    white-space: nowrap;
    text-align: center;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
    min-width: 3ch;
  }

  /* ===================================================================
     ALERT CONTAINER — dentro de overlay-layer
  =================================================================== */
  #alert-container {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 999999;
    display: none;
    animation: slideUp 0.3s ease-out;
    pointer-events: none;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); background: linear-gradient(90deg, #ff2200, #ee0000); }
    100% { transform: scale(1); }
  }

  .alert-bar {
    background: linear-gradient(90deg, #cc0000, #990000);
    color: white;
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 15px;
    box-shadow: 0 -5px 20px rgba(255, 0, 0, 0.4);
    border-top: 2px solid #ff5555;
    transition: all 0.2s ease;
  }

  .alert-bar-critico {
    animation: pulse 0.8s ease-in-out infinite;
  }

  .alert-bar img {
    width: 50px;
    height: 50px;
    filter: drop-shadow(0 0 5px rgba(0, 0, 0, 0.5));
  }

  .alert-info h3 {
    font-size: 1.2rem;
    margin-bottom: 3px;
    text-transform: uppercase;
    font-weight: 800;
  }

  .alert-info p {
    font-size: 0.95rem;
    opacity: 0.95;
  }

  /* ===================================================================
     SIDEBAR CONTROLS — dentro de overlay-layer
  =================================================================== */
  .sidebar-controls {
    position: absolute;
    top: 0;
    right: 0;
    height: 100%;
    width: var(--sidebar-width);
    z-index: 999999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 20px 0;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    transform: translateX(0);
  }

  .sidebar-controls.retracted {
    transform: translateX(calc(var(--sidebar-width) + 10px));
  }

  .sidebar-controls .map-btn {
    width: var(--btn-size);
    height: var(--btn-size);
    opacity: 1;
    transition: opacity 0.25s ease 0s, transform 0.2s ease, border-color 0.2s ease;
  }

  .sidebar-controls.retracted .map-btn {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease 0s, transform 0.2s ease, border-color 0.2s ease;
  }

  /* ===================================================================
     BARRAS DE BUSCA — dentro de overlay-layer
  =================================================================== */
  .search-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    background-color: rgba(26, 29, 36, 0.98);
    backdrop-filter: blur(8px);
    display: flex;
    gap: 12px;
    z-index: 999999;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    padding: 0 15px;
    border-bottom: 1px solid transparent;
    transition: all 0.3s ease;
    align-items: center;
  }

  .search-container.active {
    max-height: 90px;
    opacity: 1;
    padding: 15px;
    border-bottom: 1px solid #333;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
  }

  .search-container input {
    flex: 1;
    padding: 14px 20px;
    border-radius: 30px;
    border: 1px solid #444;
    background-color: #000;
    color: #fff;
    font-size: 1rem;
    outline: none;
    font-family: 'Inter', sans-serif;
  }

  .search-container input:focus {
    border-color: var(--accent-color);
  }

  .btn-search {
    position: relative;
    flex-shrink: 0;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: rgba(46, 102, 158, 0.95);
    box-shadow: 0 3px 8px rgba(203, 240, 15, 0.5);
    transition: all 0.2s ease;
    overflow: hidden;
  }

  .btn-search:active {
    transform: scale(0.9);
  }

  .btn-search img {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 40px;
    height: 40px;
    object-fit: contain;
    display: block;
    transform: translate(-50%, -50%);
  }

  /* ===================================================================
     MAP-BTN — estilo base
  =================================================================== */
  .map-btn {
    width: var(--btn-size);
    height: var(--btn-size);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    cursor: pointer;
    background: rgba(20, 20, 20, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .map-btn:hover {
    transform: scale(1.08);
    border-color: var(--accent-color);
  }

  .map-btn:active {
    transform: scale(0.92);
  }

  .map-btn img {
    width: 30px;
    height: 30px;
    object-fit: contain;
    pointer-events: none;
  }

  /* ===================================================================
     BOTÃO ALERTA TOGGLE
  =================================================================== */
  .alert-toggle-btn {
    background: rgba(29, 28, 28, 0.9);
    border: 2px solid rgba(255, 255, 255, 0.08);
    transition: all 0.3s ease;
  }

  .alert-toggle-btn.alert-off {
    background: rgba(222, 127, 127, 0.9);
    border-color: #888;
  }

  .alert-toggle-btn.alert-off img {
    filter: rgba(225, 82, 82, 0.9);
  }

  .alert-toggle-btn img {
    transition: all 0.3s ease;
  }

  .sidebar-controls .map-btn {
    border: 1px solid rgba(0, 255, 136, 0.35);
  }

  #btn-route-bar {
    width: 54px;
    height: 54px;
  }

  /* ===================================================================
     BOTÃO ROTAÇÃO
  =================================================================== */
  #btn-rotate-map {
    transition: border-color 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
  }

  #btn-rotate-map.rotated {
    border-color: var(--accent-color);
    box-shadow: 0 0 18px rgba(0, 255, 136, 0.35), inset 0 0 8px rgba(0, 255, 136, 0.1);
    background-color: rgba(0, 255, 136, 0.08);
  }

  #btn-rotate-map.rotated img {
    filter: brightness(1.2) drop-shadow(0 0 4px rgba(0, 255, 136, 0.5));
    transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.3s ease;
  }

  #btn-rotate-map:not(.rotated) img {
    transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.3s ease;
  }

  /* ===================================================================
     MARCADORES
  =================================================================== */
  .user-gps-marker,
  .user-navigator-marker {
    background: transparent !important;
    border: none !important;
  }

  .user-gps-marker img,
  .user-navigator-marker img {
    filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
    transition: none !important;
    will-change: transform;
  }

  .route-start-marker {
    background: transparent !important;
    border: none !important;
  }

  .route-start-marker img {
    filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
    animation: pulseStart 1s ease-in-out infinite;
  }

  .route-end-marker {
    background: transparent !important;
    border: none !important;
  }

  .route-end-marker img {
    filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
    animation: pulseEnd 1.2s ease-in-out infinite;
  }

  @keyframes pulseStart {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.8; }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes pulseEnd {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  .radar-marker-icon {
    background: transparent !important;
    border: none !important;
  }

  .radar-marker-icon img {
    width: 40px !important;
    height: 40px !important;
    object-fit: contain !important;
    display: block !important;
  }

  /* ===================================================================
     LOADING OVERLAYS
  =================================================================== */
  .loading-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(20, 20, 20, 0.9);
    padding: 20px 30px;
    border-radius: 12px;
    border: 1px solid var(--accent-color);
    text-align: center;
    z-index: 9999999;
    backdrop-filter: blur(5px);
  }

  .loading-spinner {
    border: 3px solid #333;
    border-top: 3px solid var(--accent-color);
    border-radius: 50%;
    width: 24px;
    height: 24px;
    animation: spin 1s linear infinite;
    margin: 0 auto 10px;
  }

  @keyframes spin {
    100% { transform: rotate(360deg); }
  }

  .loading-fullscreen {
    position: fixed;
    inset: 0;
    background-color: var(--bg-color);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999999;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }

  .loading-fullscreen.fade-out {
    opacity: 0;
    visibility: hidden;
  }

  .loading-fullscreen .spinner-ring {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    position: relative;
    margin-bottom: 24px;
  }

  .loading-fullscreen .spinner-ring::before,
  .loading-fullscreen .spinner-ring::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 4px solid transparent;
  }

  .loading-fullscreen .spinner-ring::before {
    border-top-color: var(--accent-color);
    border-right-color: var(--accent-color);
    animation: spinRing 1s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite;
  }

  .loading-fullscreen .spinner-ring::after {
    inset: 10px;
    border-bottom-color: #ff3333;
    border-left-color: #ff3333;
    animation: spinRing 1.4s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite reverse;
  }

  @keyframes spinRing {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .loading-fullscreen .loading-text {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-align: center;
  }

  .loading-fullscreen .loading-text span {
    color: var(--accent-color);
  }

  .loading-fullscreen .loading-sub {
    margin-top: 8px;
    font-size: 0.8rem;
    color: #777;
    animation: pulseText 1.8s ease-in-out infinite;
  }

  @keyframes pulseText {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* ===================================================================
     CONTROLES LEAFLET ESCONDIDOS
  =================================================================== */
  .leaflet-control-zoom,
  .leaflet-control-attribution,
  .leaflet-routing-container {
    display: none !important;
  }
</style>
</head>
<body>

<!-- LOADING FULLSCREEN -->
<div class="loading-fullscreen" id="loading-fullscreen">
  <div class="spinner-ring"></div>
  <div class="loading-text">Iniciando <span>Radar X9</span></div>
  <div class="loading-sub">Sincronizando satélites...</div>
</div>

<!-- HEADER -->
<header>
  <div class="header-left">
    <img src="/imagens_app/ic_icon_app.png" onerror="this.style.display='none'" alt="App Icon" class="app-icon">
    <h1>RADAR <span>X9</span> BH</h1>
  </div>
  <button class="btn-menu-toggle" id="btn-menu-toggle" aria-label="Abrir menu de controles">
    <div class="menu-hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="menu-label">MENU</div>
  </button>
</header>

<!-- MAIN CONTAINER: mapa + overlays -->
<div class="main-container">

  <!-- MAPA LEAFLET (apenas o mapa, nada mais) -->
  <div class="map-wrapper">
    <div id="map"></div>
  </div>

  <!-- OVERLAY LAYER: TUDO que deve ficar acima do mapa -->
  <div class="overlay-layer">

    <!-- Barras de busca -->
    <div class="search-container" id="search-bar-radares">
      <input type="text" id="query" placeholder="Buscar radar (tipo, endereço)...">
      <button class="btn-search" id="btn-search-radar" title="Buscar">
        <img src="/imagens_app/ic_radar_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/646/646094.png'" alt="Busca">
      </button>
    </div>

    <div class="search-container" id="search-bar-rota">
      <input type="text" id="route-query" placeholder="Digite um endereço para navegar...">
      <button class="btn-search" id="btn-calc-route" title="Traçar Rota" style="background-color: #ff8c00;">
        <img src="/imagens_app/ic_gps_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7892/7892059.png'" alt="Rota">
      </button>
    </div>

    <!-- BÚSSOLA — garantidamente acima de todos os marcadores -->
    <div class="compass-widget">
      <div class="compass-base" id="compass-base-img"></div>
      <img src="/imagens_app/ic_compass_ponteira.png" class="compass-needle" id="compass-needle-img" alt="Ponteira">
    </div>

    <!-- Toast -->
    <div class="toast-notification" id="toast-msg"></div>

    <!-- Speed -->
    <div class="speed-widget">
      <img src="/imagens_app/ic_speed_limit.png" onerror="this.style.opacity='0.5'" alt="Velocidade" class="speed-bg">
      <div class="speed-value" id="speed-display">0</div>
    </div>

    <!-- Sidebar -->

    function getIconUrl(tipo, velocidade) {
      const tipoLimpo = tipo ? tipo.trim() : "";
      if (!tipoLimpo) return iconMap['default'];
      if (tipoLimpo.includes('Misto') || tipoLimpo.includes('CEM')) return '/imagens_app/ic_radar_cem_v2.png';
      if (tipoLimpo.includes('Zona Verde') || tipoLimpo.includes('ZVT') || tipoLimpo.includes('ZVC')) return iconMap['Zona Verde de Trânsito (ZVT)'];
      if (tipoLimpo.includes('Perigo') || tipoLimpo.includes('ZPV')) return iconMap['Zona de Perigo e Violência (ZPV)'];
      if (tipoLimpo.includes('Parada sobre Faixa de Pedestres') || tipoLimpo.includes('DPFP')) return iconMap['Detector de Parada sobre Faixa de Pedestres (DPFP)'];
      if (tipoLimpo.includes('Semáforo') || tipoLimpo.includes('(DAS)')) return iconMap['Detector de Avanço de Semáforo (DAS)'];
      if (tipoLimpo === 'Controle de Redução de Velocidade (CRV)' || tipoLimpo === 'Controle de Redução de Velocidade') return iconMap['Controle de Redução de Velocidade (CRV)'];
      var isRadarVelocidade = tipoLimpo.includes('Velocidade') || tipoLimpo.includes('CEV') || tipoLimpo.includes('Controlador Eletrônico');
      if (isRadarVelocidade) {
        var velNum = parseInt(String(velocidade || '').trim().replace(/[^0-9]/g, ''), 10);
        if (velNum === 40) return '/imagens_app/ic_radar_cev_40_v2.png';
        if (velNum === 50) return '/imagens_app/ic_radar_cev_50_v2.png';
        if (velNum === 60) return '/imagens_app/ic_radar_cev_60_v2.png';
        if (velNum === 70) return '/imagens_app/ic_radar_cev_70_v2.png';
        if (velNum === 80) return '/imagens_app/ic_radar_cev_80_v2.png';
        if (velNum === 110) return '/imagens_app/ic_radar_cev_110_v2.png';
        return '/imagens_app/ic_radar_cev_v2.png';
      }
      if (iconMap[tipoLimpo]) return iconMap[tipoLimpo];
      var substrings = [
        { keys: ['Olho Vivo', 'COV'], icon: iconMap['Câmera Olho Vivo (COV)'] },
        { keys: ['Facial'], icon: iconMap['Leitor de Reconhecimento Facial (OCR-F)'] },
        { keys: ['OCR-P', 'Placas'], icon: iconMap['Leitor Inteligente de Placas (OCR-P)'] },
        { keys: ['Celular', 'DUC'], icon: iconMap['Detector de Uso de Celular'] },
        { keys: ['Cinto', 'VCS'], icon: iconMap['Verificador de Cinto de Segurança (VCS)'] },
        { keys: ['Acidente', 'AIA'], icon: iconMap['Alerta de Alto Índice de Acidente (AIA)'] },
        { keys: ['Perigo', 'ZPV'], icon: iconMap['Zona de Perigo e Violência (ZPV)'] },
        { keys: ['Inundaç', 'ZIR'], icon: iconMap['Zona de Risco de Inundações Recorrentes (ZIR)'] },
        { keys: ['Redução', 'Redutor', 'DRV', 'CRV'], icon: iconMap['Controle de Redução de Velocidade (CRV)'] },
        { keys: ['Conversão'], icon: iconMap['Detector de Conversão em Local Proibido'] },
        { keys: ['Invasão', 'DIFEX', 'Faixa Exclusiva', 'MOVE'], icon: iconMap['Detector de Invasão de Faixa Exclusiva (DIFEX)'] },
        { keys: ['Tráfego Proibido', 'DTLP'], icon: iconMap['Detector de Tráfego em Local Proibido'] },
        { keys: ['BUS', 'Faixa Preferencial'], icon: iconMap['Detector de Faixa Preferencial de Ônibus (BUS)'] },
      ];
      for (var s = 0; s < substrings.length; s++) {
        var entry = substrings[s];
        for (var k = 0; k < entry.keys.length; k++) { if (tipoLimpo.includes(entry.keys[k])) return entry.icon; }
      }
      return iconMap['default'];
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
      var R = 6371e3; var p1 = lat1 * Math.PI / 180; var p2 = lat2 * Math.PI / 180;
      var dp = (lat2 - lat1) * Math.PI / 180; var dl = (lon2 - lon1) * Math.PI / 180;
      var a = Math.sin(dp/2)*Math.sin(dp/2) + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)*Math.sin(dl/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function calcularBearing(lat1, lng1, lat2, lng2) {
      var dLng = (lng2 - lng1) * Math.PI / 180; var lat1Rad = lat1 * Math.PI / 180; var lat2Rad = lat2 * Math.PI / 180;
      var y = Math.sin(dLng) * Math.cos(lat2Rad);
      var x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLng);
      var bearing = Math.atan2(y, x) * 180 / Math.PI;
      return (bearing + 360) % 360;
    }

    function suavizarPosicao(novaLat, novaLng) {
      if (posicaoSuavizada.lat === null) { posicaoSuavizada.lat = novaLat; posicaoSuavizada.lng = novaLng; return { lat: novaLat, lng: novaLng }; }
      var fator = ALERT_CONFIG.SUAVIZACAO_FATOR;
      posicaoSuavizada.lat += (novaLat - posicaoSuavizada.lat) * fator;
      posicaoSuavizada.lng += (novaLng - posicaoSuavizada.lng) * fator;
      return { lat: posicaoSuavizada.lat, lng: posicaoSuavizada.lng };
    }

    function adicionarAoHistorico(lat, lng, timestamp) { historicoPosicoes.push({ lat: lat, lng: lng, time: timestamp }); if (historicoPosicoes.length > ALERT_CONFIG.HISTORICO_TAMANHO) historicoPosicoes.shift(); }

    function calcularTendenciaDistancia(radarId, distanciaAtual) {
      if (!historicoDistanciasRadar[radarId]) historicoDistanciasRadar[radarId] = [];
      historicoDistanciasRadar[radarId].push({ distancia: distanciaAtual, time: Date.now() });
      if (historicoDistanciasRadar[radarId].length > 5) historicoDistanciasRadar[radarId].shift();
      var historico = historicoDistanciasRadar[radarId];
      if (historico.length < 2) return { estaAproximando: true, estaAfastando: false };
      var diferenca = historico[0].distancia - historico[historico.length - 1].distancia;
      if (diferenca > 5) return { estaAproximando: true, estaAfastando: false, diferenca: diferenca };
      if (diferenca < -5) return { estaAproximando: false, estaAfastando: true, diferenca: diferenca };
      return { estaAproximando: true, estaAfastando: false, diferenca: 0 };
    }

    function moverMarcadorSuavemente(targetLat, targetLng) {
      var marcadorParaMover = estaEmNavegacao ? startRouteMarker : userMarker;
      if (!marcadorParaMover) return;
      if (ultimaPosicaoMarcador.lat === null) { ultimaPosicaoMarcador = { lat: targetLat, lng: targetLng }; marcadorParaMover.setLatLng([targetLat, targetLng]); return; }
      var distancia = calcularDistancia(ultimaPosicaoMarcador.lat, ultimaPosicaoMarcador.lng, targetLat, targetLng);
      if (distancia < ALERT_CONFIG.DISTANCIA_MINIMA_MOVIMENTO) return;

      var encontrou = false; var boundsGroup = L.featureGroup(); var q = query.toLowerCase();
      radarMarkers.forEach(function(m) { var d = m.radarData; if ((d.endereco + ' ' + d.tipoOriginal + ' ' + d.tipoExibicao).toLowerCase().includes(q)) { encontrou = true; boundsGroup.addLayer(m); m.openPopup(); } });
      if (encontrou) { if (map) map.fitBounds(boundsGroup.getBounds().pad(0.2)); isFollowing = false; } else { showNotification("Nenhum radar encontrado para: " + query); }
    }

    function showError(error) {
      if (gpsSource === 'appinventor') return;
      var msg = "Erro ao obter localização.";
      if (error.code === 1) msg = "Permissão de GPS negada.";
      if (error.code === 2) msg = "Sinal GPS indisponível.";
      if (error.code === 3) msg = "Tempo esgotado. Tentando novamente...";
      showNotification(msg); hideFullscreenLoading();
      if (error.code === 3) setTimeout(startGPSTracking, 5000);
    }

    document.addEventListener('click', function desbloquearAudio() {
      var sound = document.getElementById("alert-soud");
      if (sound) { sound.play().then(function() { sound.pause(); sound.currentTime = 0; }).catch(function() {}); }
      document.removeEventListener('click', desbloquearAudio);
    }, { once: true });

    window.onload = initMap;
  </script>


</body>
</html>
