<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Radar X9 BH - Alerta Inteligente (OSM + IA)</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" crossorigin="anonymous" />

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js" crossorigin="anonymous"></script>

  <link rel="icon" type="image/x-icon" href="/favicon_io/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png">
  <link rel="manifest" href="/favicon_io/site.webmanifest">

  <style>
    :root {
        --bg-color: #0f1115;
        --panel-color: #1a1d24;
        --accent-color: #00ff88;
        --alert-color: #ff3333;
        --text-main: #ffffff;
        --text-muted: #a0a0a0;
        --sidebar-width: 68px;
        --btn-size: 50px;
        --gps-ok: #00ff88;
        --gps-instavel: #ffcc00;
        --gps-sem: #ff3333;
        --destaque-color: #1fc7c7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    header { background-color: var(--panel-color); padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--accent-color); box-shadow: 0 4px 15px rgba(0, 255, 136, 0.1); z-index: 1000; flex-shrink: 0; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .app-icon { width: 50px; height: 40px; border-radius: 8px; object-fit: contain; }
    h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
    h1 span { color: var(--accent-color); }

    .gps-status-wrapper { display: flex; align-items: center; gap: 6px; margin-left: 8px; padding: 4px 10px; border-radius: 20px; background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.06); cursor: default; user-select: none; transition: border-color 0.4s ease; }
    .gps-status-wrapper.gps-ok { border-color: rgba(0,255,136,0.25); }
    .gps-status-wrapper.gps-warn { border-color: rgba(255,204,0,0.3); }
    .gps-status-wrapper.gps-err { border-color: rgba(255,51,51,0.3); }
    .gps-status-dot { width: 10px; height: 10px; border-radius: 50%; background-color: var(--gps-sem); position: relative; flex-shrink: 0; transition: background-color 0.4s ease; }
    .gps-status-dot::after { content: ''; position: absolute; inset: -3px; border-radius: 50%; background-color: inherit; opacity: 0.5; animation: gpsPulse 2s ease-in-out infinite; }
    .gps-status-dot.ok { background-color: var(--gps-ok); }
    .gps-status-dot.warn { background-color: var(--gps-instavel); }
    .gps-status-dot.err { background-color: var(--gps-sem); }
    @keyframes gpsPulse { 0%,100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(2.2); opacity: 0; } }
    .gps-status-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted); white-space: nowrap; transition: color 0.4s ease; }
    .gps-status-wrapper.gps-ok .gps-status-label { color: var(--gps-ok); }
    .gps-status-wrapper.gps-warn .gps-status-label { color: var(--gps-instavel); }
    .gps-status-wrapper.gps-err .gps-status-label { color: var(--gps-sem); }

    .btn-menu-toggle { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; background: none; border: 1.5px solid rgba(0, 255, 136, 0.3); border-radius: 10px; padding: 8px 14px 6px; cursor: pointer; transition: all 0.25s ease; user-select: none; position: relative; z-index: 1001; }
    .btn-menu-toggle:hover { border-color: var(--accent-color); background: rgba(0, 255, 136, 0.06); }
    .btn-menu-toggle:active { transform: scale(0.93); }
    .menu-hamburger { display: flex; flex-direction: column; gap: 4px; width: 22px; }
    .menu-hamburger span { display: block; height: 2.5px; width: 100%; background-color: var(--accent-color); border-radius: 2px; transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: center; }
    .btn-menu-toggle.active .menu-hamburger span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .btn-menu-toggle.active .menu-hamburger span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .btn-menu-toggle.active .menu-hamburger span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
    .menu-label { font-size: 0.55rem; font-weight: 700; letter-spacing: 1.5px; color: var(--accent-color); text-transform: uppercase; line-height: 1; margin-top: 2px; }

    .sidebar-controls { position: absolute; top: -30px; right: 0; height: 100%; width: var(--sidebar-width); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 20px 0; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(0); pointer-events: auto; }
    .sidebar-controls.retracted { transform: translateX(calc(var(--sidebar-width) + 15px)); pointer-events: none; }
    .sidebar-controls .map-btn { width: var(--btn-size); height: var(--btn-size); opacity: 1; transition: opacity 0.3s ease 0s, transform 0.2s ease, border-color 0.2s ease; }
    .sidebar-controls.retracted .map-btn { opacity: 0; pointer-events: none; transition: opacity 0.2s ease 0s, transform 0.2s ease, border-color 0.2s ease; }

    .search-container { position: absolute; top: 0; left: 0; width: 100%; background-color: rgba(26, 29, 36, 0.98); backdrop-filter: blur(8px); display: flex; gap: 12px; z-index: 1000; max-height: 0; overflow: hidden; opacity: 0; padding: 0 15px; border-bottom: 1px solid transparent; transition: all 0.3s ease; align-items: center; }
    .search-container.active { max-height: 90px; opacity: 1; padding: 15px; border-bottom: 1px solid #333; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); }
    .search-container input { flex: 1; padding: 14px 20px; border-radius: 30px; border: 1px solid #444; background-color: #000; color: #fff; font-size: 1rem; outline: none; font-family: 'Inter', sans-serif; }
    .search-container input:focus { border-color: var(--accent-color); }
    .btn-search { position: relative; flex-shrink: 0; width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer; background: rgba(46, 102, 158, 0.95); box-shadow: 0 3px 8px rgba(203, 240, 15, 0.5); transition: all 0.2s ease; overflow: hidden; }
    .btn-search:active { transform: scale(0.9); }
    .btn-search img { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; object-fit: contain; display: block; transform: translate(-50%, -50%); }

    .map-wrapper { position: relative; flex: 1; display: flex; overflow: hidden; width: 100%; }
    #map { width: 100%; height: 100%; background-color: #2a2a2a; z-index: 1; position: relative; }

    .compass-widget { position: absolute; top: 10px; left: 5px; width: 65px; height: 65px; z-index: 999999 !important; transform: translateZ(0); will-change: transform; display: flex; align-items: center; justify-content: center; pointer-events: none; transition: opacity 0.3s ease, top 0.3s cubic-bezier(0.4, 0, 0.2, 1); opacity: 1; }
    .compass-widget.hidden { opacity: 0; pointer-events: none; }
    .compass-widget.busca-ativo { top: 75px; }
    .compass-base { position: absolute; width: 100%; height: 100%; z-index: 1; background-image: url('/imagens_app/ic_compass.png'); background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0.9; }
    .compass-needle { position: absolute; width: 55%; height: 55%; z-index: 2; object-fit: contain; transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

    .leaflet-pane, .leaflet-map-pane, .leaflet-tile-pane, .leaflet-overlay-pane, .leaflet-shadow-pane, .leaflet-marker-pane, .leaflet-popup-pane, .leaflet-control-pane, .leaflet-tooltip-pane { z-index: 1 !important; }

    .map-btn { width: var(--btn-size); height: var(--btn-size); display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; background: rgba(20, 20, 20, 0.92); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6); transition: all 0.2s ease; flex-shrink: 0; }
    .map-btn:hover { transform: scale(1.08); border-color: var(--accent-color); }
    .map-btn:active { transform: scale(0.92); }
    .map-btn img { width: 30px; height: 30px; object-fit: contain; pointer-events: none; }
    .sidebar-controls .map-btn { border: 1px solid rgba(0, 255, 136, 0.35); }
    .alert-toggle-btn { background: rgba(29, 28, 28, 0.9); border: 2px solid rgba(255, 255, 255, 0.08); transition: all 0.3s ease; }
    .alert-toggle-btn.alert-off { background: rgba(222, 127, 127, 0.9); border-color: #888; }
    .alert-toggle-btn.alert-off img { filter: rgba(225, 82, 82, 0.9); }
    #btn-rotate-map { transition: border-color 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease; }
    #btn-rotate-map.rotated { border-color: var(--accent-color); box-shadow: 0 0 18px rgba(0, 255, 136, 0.35), inset 0 0 8px rgba(0, 255, 136, 0.1); background-color: rgba(0, 255, 136, 0.08); }
    #btn-rotate-map.rotated img { filter: brightness(1.2) drop-shadow(0 0 4px rgba(0, 255, 136, 0.5)); transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.3s ease; }

    .user-gps-marker, .user-navigator-marker { background: transparent !important; border: none !important; }
    .user-gps-marker img, .user-navigator-marker img { filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3)); transition: none !important; will-change: transform; }
    .route-start-marker { background: transparent !important; border: none !important; }
    .route-start-marker img { filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3)); animation: pulseStart 1s ease-in-out infinite; }
    .route-end-marker { background: transparent !important; border: none !important; }
    .route-end-marker img { filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3)); animation: pulseEnd 1.2s ease-in-out infinite; }
    @keyframes pulseStart { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes pulseEnd { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

    .radar-marker-icon { background: transparent !important; border: none !important; }
    .radar-marker-icon img { width: 40px !important; height: 40px !important; object-fit: contain !important; display: block !important; }

    .speed-widget { position: absolute; bottom: -15px; left: -25px; width: 150px; height: 150px; z-index: 500; display: flex; align-items: center; justify-content: center; transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important; }
    .speed-widget.alerta-ativo { bottom: 75px !important; }
    .speed-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
    .speed-value { position: absolute; top: 50%; left: 50%; transform: translate(-64%, -60%); font-size: 28px; font-weight: 700; font-family: 'Rajdhani', 'Oswald', 'Arial Narrow', sans-serif; color: #000; line-height: 1; z-index: 2; white-space: nowrap; text-align: center; font-variant-numeric: tabular-nums; letter-spacing: -0.5px; min-width: 3ch; }

    #alert-container { position: absolute; bottom: 0; left: 0; width: 100%; z-index: 1000; display: none; animation: slideUp 0.3s ease-out; pointer-events: none; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes pulseAlerta { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.02); filter: brightness(1.4); } 100% { transform: scale(1); filter: brightness(1); } }

    .alert-bar { color: white; padding: 18px; display: flex; align-items: center; gap: 15px; transition: all 0.2s ease; }
    .alert-bar-radar { background: linear-gradient(90deg, #cc0000, #990000); border-top: 2px solid #ff5555; box-shadow: 0 -5px 20px rgba(255, 0, 0, 0.4); }
    .alert-bar-risco { background: linear-gradient(90deg, #e6a800, #b38600); border-top: 2px solid #ffcc00; box-shadow: 0 -5px 20px rgba(230, 168, 0, 0.4); }
    .alert-bar-mobilidade { background: linear-gradient(90deg, #00b359, #008040); border-top: 2px solid #00e066; box-shadow: 0 -5px 20px rgba(0, 179, 89, 0.4); }
    .alert-bar-destaque { background: linear-gradient(90deg, #1fc7c7, #109090); border-top: 2px solid #5fecec; box-shadow: 0 -5px 20px rgba(31, 199, 199, 0.5); }
    .alert-bar-critico, .alert-bar-risco-critico, .alert-bar-mobilidade-critico, .alert-bar-destaque-critico { animation: pulseAlerta 0.8s ease-in-out infinite; }
    .alert-bar img { width: 50px; height: 50px; filter: drop-shadow(0 0 5px rgba(0, 0, 0, 0.5)); }
    .alert-info h3 { font-size: 1.2rem; margin-bottom: 3px; text-transform: uppercase; font-weight: 800; }
    .alert-info p { font-size: 0.95rem; opacity: 0.95; }

    .toast-notification { position: absolute; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px); background-color: rgba(20, 20, 20, 0.95); color: var(--text-main); padding: 12px 25px; border-radius: 50px; border: 1px solid #444; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8); z-index: 2000; opacity: 0; font-size: 0.95rem; font-weight: 600; text-align: center; pointer-events: none; transition: opacity 0.3s ease, transform 0.3s ease; white-space: nowrap; }
    .toast-notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .loading-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20, 20, 20, 0.9); padding: 20px 30px; border-radius: 12px; border: 1px solid var(--accent-color); text-align: center; z-index: 1001; backdrop-filter: blur(5px); }
    .loading-spinner { border: 3px solid #333; border-top: 3px solid var(--accent-color); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    .loading-fullscreen { position: fixed; inset: 0; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease, visibility 0.5s ease; }
    .loading-fullscreen.fade-out { opacity: 0; visibility: hidden; }
    .loading-fullscreen .spinner-ring { width: 60px; height: 60px; border-radius: 50%; position: relative; margin-bottom: 24px; }
    .loading-fullscreen .spinner-ring::before, .loading-fullscreen .spinner-ring::after { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 4px solid transparent; }
    .loading-fullscreen .spinner-ring::before { border-top-color: var(--accent-color); border-right-color: var(--accent-color); animation: spinRing 1s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite; }
    .loading-fullscreen .spinner-ring::after { inset: 10px; border-bottom-color: #ff3333; border-left-color: #ff3333; animation: spinRing 1.4s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite reverse; }
    @keyframes spinRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-fullscreen .loading-text { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px; text-align: center; }
    .loading-fullscreen .loading-text span { color: var(--accent-color); }
    .loading-fullscreen .loading-sub { margin-top: 8px; font-size: 0.8rem; color: #777; animation: pulseText 1.8s ease-in-out infinite; }
    @keyframes pulseText { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    .leaflet-control-zoom, .leaflet-control-attribution, .leaflet-routing-container { display: none !important; }

    .btn-add-radar { position: absolute; bottom: 10px; right: 10px !important; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #00cc66, #00994d); border: 2px solid rgba(0, 255, 136, 0.4); box-shadow: 0 4px 20px rgba(0, 204, 102, 0.5); cursor: pointer; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); animation: pulsePlus 2s ease-in-out infinite; }
    @keyframes pulsePlus { 0%, 100% { box-shadow: 0 4px 20px rgba(0, 204, 102, 0.5); } 50% { box-shadow: 0 4px 35px rgba(0, 204, 102, 0.8); } }
    .btn-add-radar:hover { transform: scale(1.12); box-shadow: 0 4px 30px rgba(0, 204, 102, 0.7); }
    .btn-add-radar:active { transform: scale(0.92); }
    .btn-add-radar .plus-icon { font-size: 40px; font-weight: 300; color: white; line-height: 1; text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3); margin-top: -2px; }

    .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; animation: modalFadeIn 0.3s ease-out; }
    .modal-overlay.active { display: flex; }
    @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    .modal-content { background: #1a1d24; border: 1px solid #333; border-radius: 20px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid #333; position: sticky; top: 0; background: #1a1d24; z-index: 5; }
    .modal-header h2 { font-size: 1.2rem; color: var(--accent-color); margin: 0; }
    .modal-close { background: none; border: none; color: #888; font-size: 28px; cursor: pointer; padding: 4px 10px; border-radius: 8px; transition: all 0.2s ease; }
    .modal-close:hover { color: #fff; background: rgba(255, 255, 255, 0.08); }
    .modal-body { padding: 24px; }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-select, .form-input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #333; background: #0f1115; color: #fff; font-size: 1rem; font-family: 'Inter', sans-serif; transition: border-color 0.3s ease; outline: none; }
    .form-select:focus, .form-input:focus { border-color: var(--accent-color); }
    .form-select option { background: #1a1d24; color: #fff; padding: 8px; }

    #destaque-lugar-group { display: none; }
    #destaque-lugar-group.ativo { display: block; animation: modalFadeIn 0.25s ease-out; }
    #destaque-lugar-group label { color: var(--destaque-color); }

    .speed-buttons-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 4px; }
    .speed-btn { padding: 10px 0; border: 2px solid #333; border-radius: 10px; background: #0f1115; color: var(--text-muted); font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.25s ease; font-family: 'Inter', sans-serif; }
    .speed-btn:hover { border-color: var(--accent-color); color: var(--text-main); background: rgba(0, 255, 136, 0.05); }
    .speed-btn.selected { border-color: var(--accent-color); background: rgba(0, 255, 136, 0.15); color: var(--accent-color); box-shadow: 0 0 20px rgba(0, 255, 136, 0.15); }
    .speed-btn.selected-30 { border-color: #ff6b6b; color: #ff6b6b; background: rgba(255, 107, 107, 0.1); }
    .speed-btn.selected-40 { border-color: #ffa94d; color: #ffa94d; background: rgba(255, 169, 77, 0.1); }
    .speed-btn.selected-50 { border-color: #ffd93d; color: #ffd93d; background: rgba(255, 217, 61, 0.1); }
    .speed-btn.selected-60 { border-color: #6bcb77; color: #6bcb77; background: rgba(107, 203, 119, 0.1); }
    .speed-btn.selected-70 { border-color: #4d96ff; color: #4d96ff; background: rgba(77, 150, 255, 0.1); }
    .speed-btn.selected-80 { border-color: #9b59b6; color: #9b59b6; background: rgba(155, 89, 182, 0.1); }
    .speed-btn.selected-100 { border-color: #ff6b9d; color: #ff6b9d; background: rgba(255, 107, 157, 0.1); }
    .speed-btn.selected-110 { border-color: #ff4757; color: #ff4757; background: rgba(255, 71, 87, 0.1); }

    .icon-preview { display: flex; align-items: center; background: #0f1115; padding: 12px 16px; border-radius: 12px; border: 1px solid #333; }
    .icon-preview img { width: 40px; height: 40px; object-fit: contain; }
    .icon-preview span { font-size: 0.95rem; color: var(--text-main); }

    .btn-capture-location { width: 100%; padding: 14px 16px; border-radius: 12px; border: 2px dashed rgba(0, 255, 136, 0.4); background: rgba(0, 255, 136, 0.05); color: var(--accent-color); font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease; font-family: 'Inter', sans-serif; margin-bottom: 4px; text-align: center; }
    .btn-capture-location:hover { background: rgba(0, 255, 136, 0.15); border-style: solid; }
    .btn-capture-location:active { transform: scale(0.98); }
    .btn-capture-location.captured { border-style: solid; border-color: var(--accent-color); background: rgba(0, 255, 136, 0.12); color: var(--text-main); }

    .coords-inputs-container { display: none; flex-direction: row; gap: 10px; margin-top: 8px; }
    .coord-field { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .coord-label { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

    get rawUrl() { return `https://raw.githubusercontent.com/${this.owner}/${this.repo}/main/${this.path}`; }
};

let RADAR_PENDENTES_SINCRONIZAR = [];

// ===================================================================
// FUNÇÕES AUXILIARES
// ===================================================================
function showToast(msg, duracao) {
    const toast = document.getElementById('toast-msg');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(function() {
        toast.classList.remove('show');
    }, duracao || 2500);
}

function hideFullscreenLoading() {
    const el = document.getElementById('loading-fullscreen');
    if (el) { el.classList.add('fade-out'); setTimeout(function() { el.remove(); }, 600); }
}

function calcularDistancia(lat1, lon1, lat2, lon2) {
    var R = 6371e3;
    var p1 = lat1 * Math.PI / 180;
    var p2 = lat2 * Math.PI / 180;
    var dp = (lat2 - lat1) * Math.PI / 180;
    var dl = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dp/2)*Math.sin(dp/2) + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)*Math.sin(dl/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function suavizarBearing(alvo, atual, fator) {
    var diff = alvo - atual;
    while (diff > 180) diff -= 360;
    while (diff < -180) diff += 360;
    return (atual + diff * fator + 360) % 360;
}

// ===================================================================
// GPS STATUS INDICATOR
// ===================================================================
function atualizarStatusGPS(position) {
    const dot = document.getElementById('gps-status-dot');
    const wrapper = document.getElementById('gps-status-wrapper');
    const label = document.getElementById('gps-status-label');
    if (!dot || !wrapper || !label) return;
    if (!position || !position.coords) {
        dot.className = 'gps-status-dot err';
        wrapper.className = 'gps-status-wrapper gps-err';
        label.textContent = 'SEM GPS';
        wrapper.title = 'GPS: Sem sinal';
        return;
    }
    const acc = position.coords.accuracy || 999;
    gpsAccuracyAtual = acc;
    gpsLastUpdateTime = Date.now();
    if (acc <= 80) {
        dot.className = 'gps-status-dot ok';
        wrapper.className = 'gps-status-wrapper gps-ok';
        label.textContent = 'GPS OK';
        wrapper.title = 'GPS: Preciso (' + Math.round(acc) + 'm)';
    } else if (acc <= 150) {
        dot.className = 'gps-status-dot warn';
        wrapper.className = 'gps-status-wrapper gps-warn';
        label.textContent = 'INSTÁVEL';
        wrapper.title = 'GPS: Instável (' + Math.round(acc) + 'm)';
    } else {
        dot.className = 'gps-status-dot err';
        wrapper.className = 'gps-status-wrapper gps-err';
        label.textContent = 'SEM GPS';
        wrapper.title = 'GPS: Fraco (' + Math.round(acc) + 'm)';
    }
}

setInterval(function() {
    if (gpsLastUpdateTime > 0 && (Date.now() - gpsLastUpdateTime) > 15000) {
        atualizarStatusGPS(null);
    }
}, 5000);

const ICON_DESTAQUE_FALLBACK = '/imagens_app/ic_destaque_generico.png';

function obterIconeRadar(tipoRadar) {
    if (!tipoRadar) return '/imagens_app/ic_radar_das.png';
    if (iconMap[tipoRadar]) return iconMap[tipoRadar];
    if (tipoRadar.indexOf('ALE') !== -1 || tipoRadar.indexOf('Lugares em Destaque') !== -1) {
        return ICON_DESTAQUE_FALLBACK;
    }
    return '/imagens_app/ic_radar_das.png';
}

function detectarTipoAlerta(tipoRadar) {
    if (!tipoRadar) return { classe: 'alert-bar-radar', somId: 'alert-sound-radar' };
    const t = String(tipoRadar).toLowerCase();
    if (t.indexOf('lugares em destaque') !== -1 || t.indexOf('(ale)') !== -1) {
        return { classe: 'alert-bar-destaque', somId: 'alert-sound-destaque' };
    }
    if (t.indexOf('inunda') !== -1 || t.indexOf('risco') !== -1 ||
        t.indexOf('perigo') !== -1 || t.indexOf('violência') !== -1 ||
        t.indexOf('acidente') !== -1) {
        return { classe: 'alert-bar-risco', somId: 'alert-sound-risco' };
    }
    if (t.indexOf('zona verde') !== -1 || t.indexOf('trânsito local') !== -1) {
        return { classe: 'alert-bar-mobilidade', somId: 'alert-sound-aviso' };
    }
    return { classe: 'alert-bar-radar', somId: 'alert-sound-radar' };
}

function exibirAlerta(radar, distancia, critico) {
    const container = document.getElementById('alert-container');
    const alertBar = container.querySelector('.alert-bar');
    const iconEl = document.getElementById('alert-icon');
    const titleEl = document.getElementById('alert-title');
    const textEl = document.getElementById('alert-text');

    alertBar.className = 'alert-bar';
    const tipoInfo = detectarTipoAlerta(radar.tipo);
    alertBar.classList.add(tipoInfo.classe);
    if (critico) alertBar.classList.add(tipoInfo.classe + '-critico');

    const iconSrc = obterIconeRadar(radar.tipo);
    iconEl.src = iconSrc;
    iconEl.onerror = function() {
        this.onerror = null;
        if (radar.tipo && radar.tipo.indexOf('ALE') !== -1) {
            this.src = 'https://cdn-icons-png.flaticon.com/512/684/684908.png';
        } else {
            this.src = 'https://cdn-icons-png.flaticon.com/512/7764/7764406.png';
        }
    };

    if (radar.tipo && radar.tipo.indexOf('ALE') !== -1) {
        const match = radar.tipo.match(/-\s*(.+?)(?:\s*-\s*(.+))?$/);
        const lugar = match ? match[1] : 'Lugar em Destaque';
        const categoria = match && match[2] ? match[2] : '';
        titleEl.textContent = '📍 ' + lugar.toUpperCase();
        textEl.textContent = categoria
            ? 'Ponto turístico: ' + categoria + ' • ' + Math.round(distancia) + 'm'
            : 'Lugar em destaque próximo • ' + Math.round(distancia) + 'm';
    } else {
        titleEl.textContent = 'ATENÇÃO!';
        const vel = radar.velocidade ? ' • Limite: ' + radar.velocidade + ' km/h' : '';
        textEl.textContent = (radar.tipo || 'Radar') + ' • ' + Math.round(distancia) + 'm' + vel;
    }

    container.style.display = 'block';
    document.querySelector('.speed-widget').classList.add('alerta-ativo');

    if (alertaHabilitado) {
        const audio = document.getElementById(tipoInfo.somId);
        if (audio) {
            try {
                audio.currentTime = 0;
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.catch(function(err) {
                        console.warn('[Radar X9] Som bloqueado pelo navegador:', err);
                    });
                }
            } catch (e) { console.warn('[Radar X9] Erro ao tocar áudio:', e); }
        }
    }

    if (alertTimeout) clearTimeout(alertTimeout);
    alertTimeout = setTimeout(function() {
        ocultarAlerta();
    }, ALERT_CONFIG.TEMPO_ALERTA || 15000);
}

function ocultarAlerta() {
    const container = document.getElementById('alert-container');
    container.style.display = 'none';
    document.querySelector('.speed-widget').classList.remove('alerta-ativo');
    tipoAlertaAtivo = null;
}

// ===================================================================
// CRIAR RADAR NO MAPA
// ===================================================================
function criarRadarNoMapa(radarData) {
    if (!map) return null;
    
    const iconeUrl = obterIconeRadar(radarData.tipo);
    const icone = L.icon({
        iconUrl: iconeUrl,
        iconSize: [40, 40],
        iconAnchor: [20, 20],
        popupAnchor: [0, -20],
        className: 'radar-marker-icon'
    });
    
    const marker = L.marker([radarData.latitude, radarData.longitude], { icon: icone }).addTo(map);
    
    const tipoExibicao = radarData.tipo || 'Radar';
    const velInfo = radarData.velocidade ? ' | ' + radarData.velocidade + ' km/h' : '';
    marker.bindPopup(
        '<div style="color:#222; text-align:center; min-width:180px;">' +
        '<b>' + tipoExibicao + '</b><br>' +
        (radarData.endereco || 'Endereço não informado') + '<br>' +
        '<span style="color:#d00; font-weight:bold;">Máx: ' + (radarData.velocidade || 'N/A') + ' km/h</span>' +
        '</div>'
    );
    
    marker.radarData = radarData;
    return marker;
}

// ===================================================================
// BUSCAR RADARES
// ===================================================================
function buscarRadares(query) {
    if (!query || query.length < 2) return;
    var encontrou = false;
    var boundsGroup = L.featureGroup();
    var q = query.toLowerCase();
    radarMarkers.forEach(function(marker) {
        var d = marker.radarData;
        if (d && (d.tipo || '').toLowerCase().includes(q) || (d.endereco || '').toLowerCase().includes(q)) {
            encontrou = true;
            boundsGroup.addLayer(marker);
            marker.openPopup();
        }
    });
    if (encontrou && map) {
        map.fitBounds(boundsGroup.getBounds().pad(0.2));
        isFollowing = false;
    } else {
        showToast("Nenhum radar encontrado para: " + query);
    }
}

// ===================================================================
// BUSCAR COORDENADAS PARA ROTA
// ===================================================================
async function buscarCoordenadas(endereco) {
    try {
        document.getElementById('loading').style.display = 'block';
        const response = await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + 
            encodeURIComponent(endereco + ', Belo Horizonte, Minas Gerais, Brasil'));
        const data = await response.json();
        document.getElementById('loading').style.display = 'none';
        if (data && data.length > 0) {
            const lat = parseFloat(data[0].lat);
            const lng = parseFloat(data[0].lon);
            showToast('🗺️ Rota calculada!');
            // Animação simples - centralizar no destino
            if (map) {
                map.flyTo([lat, lng], 15, { duration: 1.5 });
                // Adicionar marcador de destino
                const destIcon = L.divIcon({
                    html: '<img src="/imagens_app/ic_icon_chegada.png" style="width:40px;height:40px;">',
                    className: 'route-end-marker',
                    iconSize: [40, 40],
                    iconAnchor: [20, 40]
                });
                L.marker([lat, lng], { icon: destIcon }).addTo(map).bindPopup('📍 ' + endereco);
            }
        } else {
            showToast('❌ Endereço não encontrado');
        }
    } catch(e) {
        document.getElementById('loading').style.display = 'none';
        showToast('❌ Erro ao buscar endereço');
        console.error(e);
    }
}

// ===================================================================
// CARREGAR RADARES DO GITHUB
// ===================================================================
async function carregarRadares() {
    if (!map) return;
    if (radarMarkers.length > 0) {
        radarMarkers.forEach(function(marker) { map.removeLayer(marker); });
        radarMarkers = [];
    }
    
    document.getElementById('loading').style.display = 'block';
    
    let records = [];
    let fonte = '';
    
    try {
        // Tentar carregar do GitHub
        const response = await fetch(GITHUB_CONFIG.rawUrl + '?v=' + Date.now());
        if (response.ok) {
            const data = await response.json();
            records = data.records || [];
            fonte = 'GitHub';
        }
    } catch(e) {
        console.warn('[Radar X9] GitHub falhou:', e);
    }
    
    // Fallback: arquivo local
    if (records.length === 0) {
        try {
            const response = await fetch('radares.json?v=' + Date.now());
            if (response.ok) {
                const data = await response.json();
                records = data.records || [];
                fonte = 'Local';
            }
        } catch(e) {
            console.warn('[Radar X9] Local falhou:', e);
        }
    }
    
    document.getElementById('loading').style.display = 'none';
    
    if (records.length > 0) {
        records.forEach(function(record) {
            if (record.length >= 10) {
                const coords = record[9] ? record[9].split(',').map(function(s) { return parseFloat(s.trim()); }) : null;
                if (coords && coords.length === 2 && !isNaN(coords[0]) && !isNaN(coords[1])) {
                    const radar = {
                        tipo: record[3] || 'Não Identificado',
                        velocidade: record[4] || '0',
                        endereco: record[2] || 'Endereço não informado',
                        latitude: coords[0],
                        longitude: coords[1]
                    };
                    const marker = criarRadarNoMapa(radar);
                    if (marker) radarMarkers.push(marker);
                }
            }
        });
        showToast('📡 ' + radarMarkers.length + ' radares carregados (' + fonte + ')');
    } else {
        showToast('⚠️ Nenhum radar encontrado');
    }
}

// ===================================================================
// GPS TRACKING
// ===================================================================
function startGPSTracking() {
    if (!navigator.geolocation) {
        hideFullscreenLoading();
        showToast("GPS não suportado.");
        return;
    }
    
    if (watchId !== null) navigator.geolocation.clearWatch(watchId);
    
    watchId = navigator.geolocation.watchPosition(
        function(position) {
            gpsSource = 'browser';
            userLat = position.coords.latitude;
            userLng = position.coords.longitude;
            
            gpsInitialized = true;
            atualizarStatusGPS(position);
            
            // Atualizar velocidade
            if (position.coords.speed !== null && position.coords.speed >= 0) {
                velocidadeAtual = Math.round(position.coords.speed * 3.6);
                document.getElementById('speed-display').textContent = velocidadeAtual;
            }
            
            // Atualizar marcador do usuário
            if (!userMarker) {
                const userIcon = L.divIcon({
                    html: '<img src="/imagens_app/ic_gps_marker.png" style="width:40px;height:40px;">',
                    className: 'user-gps-marker',
                    iconSize: [40, 40],
                    iconAnchor: [20, 40]
                });
                userMarker = L.marker([userLat, userLng], { icon: userIcon, zIndexOffset: 1000 }).addTo(map);
                userMarker.bindTooltip('Você está aqui', { permanent: false, direction: 'top', offset: [0, -20] });
            } else {
                userMarker.setLatLng([userLat, userLng]);
            }
            
            if (isFollowing && map) {
                map.setView([userLat, userLng], map.getZoom(), { animate: true });
            }
            
            hideFullscreenLoading();
        },
        function(error) {
            console.warn('[Radar X9] GPS error:', error);
            if (error.code === 1) showToast("Permissão de GPS negada.");
            else if (error.code === 2) showToast("Sinal GPS indisponível.");
            else showToast("Erro ao obter localização.");
            hideFullscreenLoading();
        },
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
    );
    
    // Timeout para loading
    setTimeout(function() {
        if (!gpsInitialized) {
            hideFullscreenLoading();
            showToast("Aguardando GPS...");
        }
    }, 8000);
}

// ===================================================================
// EVENTOS DO MODAL - ALE
// ===================================================================
document.addEventListener('DOMContentLoaded', function() {
    const radarTypeSelect = document.getElementById('radar-type');
    const destaqueGroup = document.getElementById('destaque-lugar-group');
    const destaqueLugarSelect = document.getElementById('destaque-lugar');

    if (radarTypeSelect) {
        radarTypeSelect.addEventListener('change', function() {
            if (this.value === 'Alerta de Lugares em Destaque (ALE)') {
                destaqueGroup.classList.add('ativo');
            } else {
                destaqueGroup.classList.remove('ativo');
                if (destaqueLugarSelect) destaqueLugarSelect.value = '';
            }
        });
    }
});

// ===================================================================
// INICIALIZAÇÃO
// ===================================================================
window.onload = initMap;
</script>
