<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Radar X9 BH - Alerta Inteligente (OSM + IA)</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" crossorigin="anonymous" />

  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js" crossorigin="anonymous"></script>

  <link rel="icon" type="image/x-icon" href="/favicon_io/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png">
  <link rel="manifest" href="/favicon_io/site.webmanifest">

  <style>
    :root {
        --bg-color: #0f1115;
        --panel-color: #1a1d24;
        --accent-color: #00ff88;
        --alert-color: #ff3333;
        --text-main: #ffffff;
        --text-muted: #a0a0a0;
        --sidebar-width: 68px;
        --btn-size: 50px;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    header {
        background-color: var(--panel-color);
        padding: 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 2px solid var(--accent-color);
        box-shadow: 0 4px 15px rgba(0, 255, 136, 0.1);
        z-index: 1000;
        flex-shrink: 0;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .app-icon {
        width: 50px;
        height: 40px;
        border-radius: 8px;
        object-fit: contain;
    }

    h1 {
        font-size: 1.2rem;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    h1 span { color: var(--accent-color); }

    .btn-menu-toggle {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        background: none;
        border: 1.5px solid rgba(0, 255, 136, 0.3);
        border-radius: 10px;
        padding: 8px 14px 6px;
        cursor: pointer;
        transition: all 0.25s ease;
        user-select: none;
        -webkit-user-select: none;
        position: relative;
        z-index: 1001;
    }

    .btn-menu-toggle:hover {
        border-color: var(--accent-color);
        background: rgba(0, 255, 136, 0.06);
    }

    .btn-menu-toggle:active { transform: scale(0.93); }

    .menu-hamburger {
        display: flex;
        flex-direction: column;
        gap: 4px;
        width: 22px;
    }

    .menu-hamburger span {
        display: block;
        height: 2.5px;
        width: 100%;
        background-color: var(--accent-color);
        border-radius: 2px;
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        transform-origin: center;
    }

    .btn-menu-toggle.active .menu-hamburger span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .btn-menu-toggle.active .menu-hamburger span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .btn-menu-toggle.active .menu-hamburger span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    .menu-label {
        font-size: 0.55rem;
        font-weight: 700;
        letter-spacing: 1.5px;
        color: var(--accent-color);
        text-transform: uppercase;
        line-height: 1;
        margin-top: 2px;
    }

    .sidebar-controls {
        position: absolute;
        top: -30px;
        right: 0;
        height: 100%;
        width: var(--sidebar-width);
        z-index: 500;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 20px 0;
        transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        transform: translateX(0);
        pointer-events: auto;
    }

    .sidebar-controls.retracted {
        transform: translateX(calc(var(--sidebar-width) + 15px));
        pointer-events: none;
    }

    .sidebar-controls .map-btn {
        width: var(--btn-size);
        height: var(--btn-size);
        opacity: 1;
        transition: opacity 0.3s ease 0s, transform 0.2s ease, border-color 0.2s ease;
    }

    .sidebar-controls.retracted .map-btn {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease 0s, transform 0.2s ease, border-color 0.2s ease;
    }

    .search-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        background-color: rgba(26, 29, 36, 0.98);
        backdrop-filter: blur(8px);
        display: flex;
        gap: 12px;
        z-index: 1000;
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        padding: 0 15px;
        border-bottom: 1px solid transparent;
        transition: all 0.3s ease;
        align-items: center;
    }

    .search-container.active {
        max-height: 90px;
        opacity: 1;
        padding: 15px;
        border-bottom: 1px solid #333;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    .search-container input {
        flex: 1;
        padding: 14px 20px;
        border-radius: 30px;
        border: 1px solid #444;
        background-color: #000;
        color: #fff;
        font-size: 1rem;
        outline: none;
        font-family: 'Inter', sans-serif;
    }

    .search-container input:focus { border-color: var(--accent-color); }

    .btn-search {
        position: relative;
        flex-shrink: 0;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        background: rgba(46, 102, 158, 0.95);
        box-shadow: 0 3px 8px rgba(203, 240, 15, 0.5);
        transition: all 0.2s ease;
        overflow: hidden;
    }

    .btn-search:active { transform: scale(0.9); }

    .btn-search img {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 40px;
        height: 40px;
        object-fit: contain;
        display: block;
        transform: translate(-50%, -50%);
    }

    .map-wrapper {
        position: relative;
        flex: 1;
        display: flex;
        overflow: hidden;
        width: 100%;
    }

    #map {
        width: 100%;
        height: 100%;
        background-color: #2a2a2a;
        z-index: 1;
        position: relative;
    }

    .compass-widget {
        position: absolute;
        top: 10px;
        left: 5px;
        width: 65px;
        height: 65px;
        z-index: 999999 !important;
        transform: translateZ(0);
        will-change: transform;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        transition: opacity 0.3s ease, top 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        opacity: 1;
    }

    .compass-widget.hidden { opacity: 0; pointer-events: none; }
    .compass-widget.busca-ativo { top: 75px; }

    .compass-base {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 1;
        background-image: url('/imagens_app/ic_compass.png');
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        opacity: 0.9;
    }

    .compass-needle {
        position: absolute;
        width: 55%;
        height: 55%;
        z-index: 2;
        object-fit: contain;
        transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .leaflet-pane, .leaflet-map-pane, .leaflet-tile-pane, .leaflet-overlay-pane,
    .leaflet-shadow-pane, .leaflet-marker-pane, .leaflet-popup-pane,
    .leaflet-control-pane, .leaflet-tooltip-pane { z-index: 1 !important; }

    .map-btn {
        width: var(--btn-size);
        height: var(--btn-size);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        cursor: pointer;
        background: rgba(20, 20, 20, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
        transition: all 0.2s ease;
        flex-shrink: 0;
    }

    .map-btn:hover { transform: scale(1.08); border-color: var(--accent-color); }
    .map-btn:active { transform: scale(0.92); }

    .map-btn img {
        width: 30px;
        height: 30px;
        object-fit: contain;
        pointer-events: none;
    }

    .sidebar-controls .map-btn { border: 1px solid rgba(0, 255, 136, 0.35); }

    .alert-toggle-btn {
        background: rgba(29, 28, 28, 0.9);
        border: 2px solid rgba(255, 255, 255, 0.08);
        transition: all 0.3s ease;
    }

    .alert-toggle-btn.alert-off { background: rgba(222, 127, 127, 0.9); border-color: #888; }
    .alert-toggle-btn.alert-off img { filter: rgba(225, 82, 82, 0.9); }

    #btn-rotate-map { transition: border-color 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease; }

    #btn-rotate-map.rotated {
        border-color: var(--accent-color);
        box-shadow: 0 0 18px rgba(0, 255, 136, 0.35), inset 0 0 8px rgba(0, 255, 136, 0.1);
        background-color: rgba(0, 255, 136, 0.08);
    }

    #btn-rotate-map.rotated img {
        filter: brightness(1.2) drop-shadow(0 0 4px rgba(0, 255, 136, 0.5));
        transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.3s ease;
    }

    .user-gps-marker, .user-navigator-marker { background: transparent !important; border: none !important; }
    .user-gps-marker img, .user-navigator-marker img {
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        transition: none !important;
        will-change: transform;
    }

    .route-start-marker { background: transparent !important; border: none !important; }
    .route-start-marker img { filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3)); animation: pulseStart 1s ease-in-out infinite; }

    .route-end-marker { background: transparent !important; border: none !important; }
    .route-end-marker img { filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3)); animation: pulseEnd 1.2s ease-in-out infinite; }

    @keyframes pulseStart { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes pulseEnd { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

    .radar-marker-icon { background: transparent !important; border: none !important; }
    .radar-marker-icon img { width: 40px !important; height: 40px !important; object-fit: contain !important; display: block !important; }

    .speed-widget {
        position: absolute;
        bottom: -15px;
        left: -25px;
        width: 150px;
        height: 150px;
        z-index: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
    }

    .speed-widget.alerta-ativo { bottom: 75px !important; }

    .speed-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        pointer-events: none;
    }

    .speed-value {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-64%, -60%);
        font-size: 28px;
        font-weight: 700;
        font-family: 'Rajdhani', 'Oswald', 'Arial Narrow', sans-serif;
        color: #000;
        line-height: 1;
        z-index: 2;
        white-space: nowrap;
        text-align: center;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.5px;
        min-width: 3ch;
    }

    #alert-container {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        display: none;
        animation: slideUp 0.3s ease-out;
        pointer-events: none;
    }

    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes pulseAlerta { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.02); filter: brightness(1.4); } 100% { transform: scale(1); filter: brightness(1); } }

    .alert-bar { color: white; padding: 18px; display: flex; align-items: center; gap: 15px; transition: all 0.2s ease; }

    .alert-bar-radar, .alert-bar:not([class*="-risco"]):not([class*="-mobilidade"]) {
        background: linear-gradient(90deg, #cc0000, #990000);
        border-top: 2px solid #ff5555;
        box-shadow: 0 -5px 20px rgba(255, 0, 0, 0.4);
    }

    .alert-bar-risco {
        background: linear-gradient(90deg, #e6a800, #b38600);
        border-top: 2px solid #ffcc00;
        box-shadow: 0 -5px 20px rgba(230, 168, 0, 0.4);
    }

    .alert-bar-mobilidade {
        background: linear-gradient(90deg, #00b359, #008040);
        border-top: 2px solid #00e066;
        box-shadow: 0 -5px 20px rgba(0, 179, 89, 0.4);
    }

    .alert-bar-critico, .alert-bar-risco-critico, .alert-bar-mobilidade-critico { animation: pulseAlerta 0.8s ease-in-out infinite; }

    .alert-bar img { width: 50px; height: 50px; filter: drop-shadow(0 0 5px rgba(0, 0, 0, 0.5)); }
    .alert-info h3 { font-size: 1.2rem; margin-bottom: 3px; text-transform: uppercase; font-weight: 800; }
    .alert-info p { font-size: 0.95rem; opacity: 0.95; }

    .toast-notification {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        background-color: rgba(20, 20, 20, 0.95);
        color: var(--text-main);
        padding: 12px 25px;
        border-radius: 50px;
        border: 1px solid #444;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
        z-index: 2000;
        opacity: 0;
        font-size: 0.95rem;
        font-weight: 600;
        text-align: center;
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.3s ease;
        white-space: nowrap;
    }

    .toast-notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .loading-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(20, 20, 20, 0.9);
        padding: 20px 30px;
        border-radius: 12px;
        border: 1px solid var(--accent-color);
        text-align: center;
        z-index: 1001;
        backdrop-filter: blur(5px);
    }

    .loading-spinner {
        border: 3px solid #333;
        border-top: 3px solid var(--accent-color);
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
        margin: 0 auto 10px;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    .loading-fullscreen {
        position: fixed;
        inset: 0;
        background-color: var(--bg-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .loading-fullscreen.fade-out { opacity: 0; visibility: hidden; }

    .loading-fullscreen .spinner-ring { width: 60px; height: 60px; border-radius: 50%; position: relative; margin-bottom: 24px; }
    .loading-fullscreen .spinner-ring::before, .loading-fullscreen .spinner-ring::after { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 4px solid transparent; }
    .loading-fullscreen .spinner-ring::before { border-top-color: var(--accent-color); border-right-color: var(--accent-color); animation: spinRing 1s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite; }
    .loading-fullscreen .spinner-ring::after { inset: 10px; border-bottom-color: #ff3333; border-left-color: #ff3333; animation: spinRing 1.4s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite reverse; }
    @keyframes spinRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .loading-fullscreen .loading-text { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px; text-align: center; }
    .loading-fullscreen .loading-text span { color: var(--accent-color); }
    .loading-fullscreen .loading-sub { margin-top: 8px; font-size: 0.8rem; color: #777; animation: pulseText 1.8s ease-in-out infinite; }
    @keyframes pulseText { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    .leaflet-control-zoom, .leaflet-control-attribution, .leaflet-routing-container { display: none !important; }

    /* ===================================================================
       BOTÃO + (ADICIONAR RADAR)
    =================================================================== */
    .btn-add-radar {
        position: absolute;
        bottom: 10px;
        right: 10px !important;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #00cc66, #00994d);
        border: 2px solid rgba(0, 255, 136, 0.4);
        box-shadow: 0 4px 20px rgba(0, 204, 102, 0.5);
        cursor: pointer;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        animation: pulsePlus 2s ease-in-out infinite;
    }

    @keyframes pulsePlus {
        0%, 100% { box-shadow: 0 4px 20px rgba(0, 204, 102, 0.5); }
        50% { box-shadow: 0 4px 35px rgba(0, 204, 102, 0.8); }
    }

    .btn-add-radar:hover { transform: scale(1.12); box-shadow: 0 4px 30px rgba(0, 204, 102, 0.7); }
    .btn-add-radar:active { transform: scale(0.92); }

    .btn-add-radar .plus-icon {
        font-size: 40px;
        font-weight: 300;
        color: white;
        line-height: 1;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        margin-top: -2px;
    }

    /* ===================================================================
       ESTADO "RADAR ADICIONADO" — laranja + ✓
    =================================================================== */
    .btn-add-radar.added {
        background: linear-gradient(135deg, #ff8c00, #e67600) !important;
        border-color: rgba(255, 165, 0, 0.7) !important;
        box-shadow: 0 4px 28px rgba(255, 140, 0, 0.65) !important;
        animation: none !important;
        pointer-events: none;
    }

    .btn-add-radar.added .plus-icon {
        font-size: 34px;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
    }

    @keyframes popIn {
        0%   { transform: scale(0.7); opacity: 0; }
        60%  { transform: scale(1.15); }
        100% { transform: scale(1); opacity: 1; }
    }

    .radar-recem-adicionado {
        animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* ===================================================================
       MODAL DE INCLUSÃO
    =================================================================== */
    .modal-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        z-index: 2000;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        animation: modalFadeIn 0.3s ease-out;
    }

    .modal-overlay.active { display: flex; }

    @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    .modal-content {
        background: #1a1d24;
        border: 1px solid #333;
        border-radius: 20px;
        max-width: 500px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
    }

    .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 24px;
        border-bottom: 1px solid #333;
    }

    .modal-header h2 { font-size: 1.2rem; color: var(--accent-color); margin: 0; }

    .modal-close {
        background: none;
        border: none;
        color: #888;
        font-size: 28px;
        cursor: pointer;
        padding: 4px 10px;
        border-radius: 8px;
        transition: all 0.2s ease;
    }

    .modal-close:hover { color: #fff; background: rgba(255, 255, 255, 0.08); }

    .modal-body { padding: 24px; }

    .form-group { margin-bottom: 18px; }

    .form-group label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .form-select, .form-input {
        width: 100%;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid #333;
        background: #0f1115;
        color: #fff;
        font-size: 1rem;
        font-family: 'Inter', sans-serif;
        transition: border-color 0.3s ease;
        outline: none;
    }

    .form-select:focus, .form-input:focus { border-color: var(--accent-color); }
    .form-select option { background: #1a1d24; color: #fff; padding: 8px; }

    .speed-buttons-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 4px; }

    .speed-btn {
        padding: 10px 0;
        border: 2px solid #333;
        border-radius: 10px;
        background: #0f1115;
        color: var(--text-muted);
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.25s ease;
        font-family: 'Inter', sans-serif;
    }

        iconAnchor: [20, 20],
        popupAnchor: [0, -22],
        className: 'radar-marker-icon'
    });
}

function calcularDistancia(lat1, lon1, lat2, lon2) {
    var R = 6371000;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
}

function calcularBearing(lat1, lon1, lat2, lon2) {
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
    var x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
            Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function classificarTipoAlerta(tipo) {
    if (!tipo) return 'radar';
    var t = tipo.toUpperCase();
    if (t.indexOf('ZONA VERDE') !== -1 || t.indexOf('ZVT') !== -1 || t.indexOf('ZVC') !== -1) return 'mobilidade';
    if (t.indexOf('ZONA DE RISCO') !== -1 || t.indexOf('ZIR') !== -1 ||
        t.indexOf('ZONA DE PERIGO') !== -1 || t.indexOf('ZPV') !== -1 ||
        t.indexOf('ACIDENTE') !== -1 || t.indexOf('AIA') !== -1 ||
        t.indexOf('NUCLEAR') !== -1 || t.indexOf('ZEN') !== -1 ||
        t.indexOf('TUNEL') !== -1 || t.indexOf('TUV') !== -1 ||
        t.indexOf('ESCAPE') !== -1 || t.indexOf('ARE') !== -1) return 'risco';
    return 'radar';
}

function getAlertIcon(tipo) {
    var cls = classificarTipoAlerta(tipo);
    if (cls === 'mobilidade') return '/imagens_app/ic_zona_verde.png';
    if (cls === 'risco') return '/imagens_app/ic_radar_perigo_v2.png';
    return '/imagens_app/ic_radar_das.png';
}

            .then(function(result) {

// ===================================================================
// GPS
// ===================================================================
function iniciarGPS() {
    if (!navigator.geolocation) { console.warn('[GPS] Geolocalizacao nao suportada'); return; }

    watchId = navigator.geolocation.watchPosition(
        function(pos) {
            userLat = pos.coords.latitude;
            userLng = pos.coords.longitude;
            gpsSource = 'browser';
            gpsInitialized = true;

            if (pos.coords.speed !== null && pos.coords.speed >= 0) {
                velocidadeAtual = Math.round(pos.coords.speed * 3.6);
            }
            if (pos.coords.heading !== null && !isNaN(pos.coords.heading)) {
                currentHeading = pos.coords.heading;
            }

            // Calcular velocidade por delta se GPS não informou
            if (pos.coords.speed === null && prevLat !== null && prevTime !== null) {
                var dist = calcularDistancia(prevLat, prevLng, userLat, userLng);
                var dt = (Date.now() - prevTime) / 1000;
                if (dt > 0 && dist > ALERT_CONFIG.DISTANCIA_MINIMA_MOVIMENTO) {
                    velocidadeAtual = Math.round((dist / dt) * 3.6);
                    currentHeading = calcularBearing(prevLat, prevLng, userLat, userLng);
                }
            }

            prevLat = userLat;
            prevLng = userLng;
            prevTime = Date.now();

            estaEmMovimento = velocidadeAtual > 5;

            atualizarVelocidade();
            atualizarMarcadorUsuario();
            if (isFollowing) atualizarCamera();
            if (mapaRotacionado && map.setBearing) map.setBearing(currentHeading);
            atualizarBussola();
            verificarProximidadeRadares();
        },
        function(err) { console.warn('[GPS] Erro:', err.message); },
        { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
    );
}

function atualizarVelocidade() {
    var el = document.getElementById('speed-display');
    if (el) el.textContent = velocidadeAtual;
}

function atualizarMarcadorUsuario() {
    var iconeSrc = estaEmNavegacao ? '/imagens_app/ic_navegacao_arrow.png' : '/imagens_app/ic_gps_dot.png';
    var icone = L.icon({
        iconUrl: iconeSrc,
        iconSize: estaEmNavegacao ? [36, 36] : [24, 24],
        iconAnchor: estaEmNavegacao ? [18, 18] : [12, 12],
        className: estaEmNavegacao ? 'user-navigator-marker' : 'user-gps-marker'
    });

    if (userMarker) {
        userMarker.setLatLng([userLat, userLng]);
        userMarker.setIcon(icone);
        if (estaEmNavegacao) {
            var el = userMarker.getElement();
            if (el) {
                var img = el.querySelector('img');
                if (img) img.style.transform = 'rotate(' + currentHeading + 'deg)';
            }
        }
    } else {
        userMarker = L.marker([userLat, userLng], { icon: icone, zIndexOffset: 1000 }).addTo(map);
    }
}

function atualizarCamera() {
    var agora = Date.now();
    if (agora - ultimaAtualizacaoCamera < INTERVALO_CAMERA_MS) return;
    ultimaAtualizacaoCamera = agora;
    map.setView([userLat, userLng], map.getZoom(), { animate: false });
}

function atualizarBussola() {
    var needle = document.getElementById('compass-needle-img');
    if (needle) {
        needle.style.transform = mapaRotacionado ? 'rotate(' + (-currentHeading) + 'deg)' : 'rotate(0deg)';
    }
}

// ===================================================================
// VERIFICAÇÃO DE PROXIMIDADE COM RADARES
// ===================================================================
function verificarProximidadeRadares() {
    if (!alertaHabilitado || !gpsValido()) return;

    var radarMaisProximo = null;
    var menorDistancia = Infinity;

    for (var i = 0; i < radarMarkers.length; i++) {
        var rm = radarMarkers[i];
        var dist = calcularDistancia(userLat, userLng, rm.lat, rm.lng);
        if (dist < menorDistancia) {
            menorDistancia = dist;
            radarMaisProximo = rm;
        }
    }

    var container = document.getElementById('alert-container');
    var alertIcon = document.getElementById('alert-icon');
    var alertTitle = document.getElementById('alert-title');
    var alertText = document.getElementById('alert-text');

    if (menorDistancia <= ALERT_CONFIG.DISTANCIA_MAXIMA && radarMaisProximo) {
        var radarId = radarMaisProximo.lat + ',' + radarMaisProximo.lng;

        if (ultimoRadarAlertado !== radarId) {
            ultimoRadarAlertado = radarId;
            var tipoAlerta = classificarTipoAlerta(radarMaisProximo.tipo);
            var critico = menorDistancia <= ALERT_CONFIG.DISTANCIA_CRITICA;

            var barClass = 'alert-bar alert-bar-' + tipoAlerta;
            if (critico) barClass += '-' + tipoAlerta.substring(0, 4) + 'critico';
            container.querySelector('.alert-bar').className = barClass;

            alertIcon.src = getAlertIcon(radarMaisProximo.tipo);
            alertTitle.textContent = critico ? '⚠️ ATENÇÃO CRÍTICA!' : 'ATENÇÃO!';
            alertText.textContent = radarMaisProximo.tipo + (radarMaisProximo.velocidade ? ' — ' + radarMaisProximo.velocidade + ' km/h' : '') + ' (' + Math.round(menorDistancia) + 'm)';

            container.style.display = 'block';
            var speedWidget = document.getElementById('speed-widget');
            if (speedWidget) speedWidget.classList.add('alerta-ativo');

            // Som
            try {
                var somId = tipoAlerta === 'mobilidade' ? 'alert-sound-aviso' : (tipoAlerta === 'risco' ? 'alert-sound-risco' : 'alert-sound-radar');
                var somEl = document.getElementById(somId);
                if (somEl) { somEl.currentTime = 0; somEl.play().catch(function() {}); }
            } catch (e) {}

            if (alertTimeout) clearTimeout(alertTimeout);
            alertTimeout = setTimeout(function() {
                container.style.display = 'none';
                if (speedWidget) speedWidget.classList.remove('alerta-ativo');
                ultimoRadarAlertado = null;
            }, ALERT_CONFIG.TEMPO_ALERTA);
        }
    } else if (menorDistancia > ALERT_CONFIG.DISTANCIA_MAXIMA + 50) {
        if (container.style.display === 'block') {
            container.style.display = 'none';
            var sw = document.getElementById('speed-widget');
            if (sw) sw.classList.remove('alerta-ativo');
            ultimoRadarAlertado = null;
        }
    }
}

// ===================================================================
// CARREGAR RADARES DO GITHUB
// ===================================================================
function carregarRadaresDoGitHub() {
    if (!GITHUB_CONFIG.token) {
        console.warn('[Radar X9] Sem token — pulando carga de radares.');
        showToast('⚠️ Token nao configurado — radares nao carregados');
        return;
    }

    var url = 'https://api.github.com/repos/' + GITHUB_CONFIG.owner + '/' + GITHUB_CONFIG.repo + '/contents/' + GITHUB_CONFIG.path;

    fetch(url, {
        headers: { 'Authorization': 'token ' + GITHUB_CONFIG.token, 'Accept': 'application/vnd.github.v3+json' }
    })
    .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
    })
    .then(function(fd) {
        var radares = JSON.parse(atob(fd.content));
        console.log('[Radar X9] ' + radares.length + ' radares carregados.');

        for (var i = 0; i < radares.length; i++) {
            var r = radares[i];
            if (!r.lat || !r.lng) continue;

            var icone = criarIconeLeaflet(r.tipo);
            var m = L.marker([r.lat, r.lng], { icon: icone }).addTo(map);

            var velHTML = r.velocidade
                ? '<br><span style="color:#cc0000;font-weight:800;font-size:1.15rem;">' + r.velocidade + ' km/h</span>'
                : '';

            m.bindPopup(
                '<div style="font-family:Inter,sans-serif;color:#111;min-width:200px;line-height:1.4;">' +
                    '<strong style="font-size:0.9rem;">' + (r.tipo || 'Radar') + '</strong>' +
                    velHTML +
                    '<br><span style="font-size:0.78rem;color:#555;">' + (r.endereco || '') + '</span>' +
                '</div>'
            );

            radarMarkers.push({ marker: m, tipo: r.tipo, velocidade: r.velocidade || 0, lat: r.lat, lng: r.lng, endereco: r.endereco || '' });
        }

        showToast('📡 ' + radares.length + ' radares carregados');
    })
    .catch(function(e) {
        console.warn('[Radar X9] Nao foi possivel carregar radares:', e.message);
        showToast('⚠️ Erro ao carregar radares do GitHub');
    });
}

// ===================================================================
// ROTA / NAVEGAÇÃO
// ===================================================================
function calcularRota(query) {
    showToast('⏳ Buscando endereco...');
    fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query) + '&limit=1&accept-language=pt-BR', { headers: { 'User-Agent': 'RadarX9/1.0' } })
        .then(function(r) { return r.json(); })
        .then(function(dados) {
            if (!dados.length) { showToast('❌ Endereco nao encontrado'); return; }

            var dest = { lat: parseFloat(dados[0].lat), lng: parseFloat(dados[0].lon) };
            destinoAtual = dest;
            estaEmNavegacao = true;

            if (routingControl) map.removeControl(routingControl);

            routingControl = L.Routing.control({
                waypoints: [L.latLng(userLat, userLng), L.latLng(dest.lat, dest.lng)],
                routeWhileDragging: false,
                addWaypoints: false,
                show: false,
                createMarker: function() { return null; },
                lineOptions: { styles: [{ color: '#0088ff', weight: 6, opacity: 0.7 }] }
            }).addTo(map);

            if (endRouteMarker) map.removeLayer(endRouteMarker);
            var endIcon = L.icon({ iconUrl: '/imagens_app/ic_destino.png', iconSize: [32, 32], iconAnchor: [16, 32], className: 'route-end-marker' });
            endRouteMarker = L.marker([dest.lat, dest.lng], { icon: endIcon }).addTo(map);
            endRouteMarker.bindPopup('<strong>Destino:</strong><br>' + dados[0].display_name).openPopup();

            map.setView([dest.lat, dest.lng], 15, { animate: true });
            document.getElementById('search-bar-rota').classList.remove('active');
            routeActive = false;
            document.getElementById('compass-widget').classList.remove('busca-ativo');
            showToast('🚗 Rota calculada!');
        })
        .catch(function(e) {
            console.error('[Rota] Erro:', e);
            showToast('❌ Erro ao calcular rota');
        });
}

// ===================================================================
// BUSCAR RADAR POR TEXTO
// ===================================================================
function buscarRadarTexto() {
    var q = document.getElementById('query').value.trim().toLowerCase();
    if (!q) { showToast('⚠️ Digite para buscar'); return; }

    var encontrados = 0;
    var primeiro = null;

    for (var i = 0; i < radarMarkers.length; i++) {
        var rm = radarMarkers[i];
        var match = (rm.tipo && rm.tipo.toLowerCase().indexOf(q) !== -1) ||
                    (rm.endereco && rm.endereco.toLowerCase().indexOf(q) !== -1);
        if (match) {
            rm.marker.openPopup();
            encontrados++;
            if (!primeiro) primeiro = rm;
        }
    }

    if (encontrados === 0) {
        showToast('🔍 Nenhum radar encontrado para "' + q + '"');
    } else {
        showToast('🔍 ' + encontrados + ' radar(es) encontrado(s)');
        if (primeiro) map.setView([primeiro.lat, primeiro.lng], 17, { animate: true });
    }

    document.getElementById('search-bar-radares').classList.remove('active');
    searchActive = false;
    document.getElementById('compass-widget').classList.remove('busca-ativo');
}

function inicializarApp() {
    carregarConfigGitHub().then(function() {
        // Criar mapa
        map = L.map('map', {
            center: [posicaoCentralOriginal.lat, posicaoCentralOriginal.lng],
            zoom: posicaoCentralOriginal.zoom,
            zoomControl: false,
            attributionControl: false,
            rotate: true,
            bearing: 0
        });

        tileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 20,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // GPS
        iniciarGPS();

        // Carregar radares
        carregarRadaresDoGitHub();

        // Esconder loading
        setTimeout(function() {
            var ld = document.getElementById('loading-fullscreen');
            if (ld) ld.classList.add('fade-out');
            setTimeout(function() { if (ld) ld.style.display = 'none'; }, 600);
        }, 1500);
    });

    // --- CONTROLES DO SIDEBAR ---

    document.getElementById('btn-menu-toggle').addEventListener('click', function() {
        sidebarAberta = !sidebarAberta;
        this.classList.toggle('active', sidebarAberta);
        document.getElementById('sidebar-controls').classList.toggle('retracted', !sidebarAberta);
    });

    document.getElementById('btn-center').addEventListener('click', function() {
        if (gpsValido()) { map.setView([userLat, userLng], 17, { animate: true }); isFollowing = true; }
        else showToast('⚠️ Sem GPS ainda');
    });

    document.getElementById('btn-zoom-in').addEventListener('click', function() { map.zoomIn(); });
    document.getElementById('btn-zoom-out').addEventListener('click', function() { map.zoomOut(); });

    document.getElementById('btn-refresh').addEventListener('click', function() {
        if (refreshDelayTimer) clearTimeout(refreshDelayTimer);
        refreshDelayTimer = setTimeout(function() {
            if (routingControl) { map.removeControl(routingControl); routingControl = null; }
            if (endRouteMarker) { map.removeLayer(endRouteMarker); endRouteMarker = null; }
            estaEmNavegacao = false;
            destinoAtual = null;
            map.setView([posicaoCentralOriginal.lat, posicaoCentralOriginal.lng], posicaoCentralOriginal.zoom, { animate: true });
            isFollowing = true;
            showToast('🗺️ Mapa resetado');
            refreshDelayTimer = null;
        }, TEMPO_REFRESH_DELAY);
    });

    document.getElementById('btn-rotate-map').addEventListener('click', function() {
        mapaRotacionado = !mapaRotacionado;
        this.classList.toggle('rotated', mapaRotacionado);
        if (!mapaRotacionado && map.setBearing) map.setBearing(0);
        showToast(mapaRotacionado ? '🧭 Rotacao ligada' : '🧭 Rotacao desligada');
    });

    document.getElementById('btn-alert-toggle').addEventListener('click', function() {
        alertaHabilitado = !alertaHabilitado;
        this.classList.toggle('alert-off', !alertaHabilitado);
        document.getElementById('alert-toggle-icon').src = alertaHabilitado ? '/imagens_app/ic_sound_on.png' : '/imagens_app/ic_sound_off.png';
        showToast(alertaHabilitado ? '🔊 Alertas ligados' : '🔇 Alertas desligados');
        if (!alertaHabilitado) {
            document.getElementById('alert-container').style.display = 'none';
            var sw = document.getElementById('speed-widget');
            if (sw) sw.classList.remove('alerta-ativo');
        }
    });

    document.getElementById('btn-search-bar').addEventListener('click', function() {
        searchActive = !searchActive;
        if (routeActive) { routeActive = false; document.getElementById('search-bar-rota').classList.remove('active'); }
        document.getElementById('search-bar-radares').classList.toggle('active', searchActive);
        document.getElementById('compass-widget').classList.toggle('busca-ativo', searchActive);
        if (searchActive) document.getElementById('query').focus();
    });

    document.getElementById('btn-route-bar').addEventListener('click', function() {
        routeActive = !routeActive;
        if (searchActive) { searchActive = false; document.getElementById('search-bar-radares').classList.remove('active'); }
        document.getElementById('search-bar-rota').classList.toggle('active', routeActive);
        document.getElementById('compass-widget').classList.toggle('busca-ativo', routeActive);
        if (routeActive) document.getElementById('route-query').focus();
    });

    document.getElementById('btn-search-radar').addEventListener('click', buscarRadarTexto);
    document.getElementById('query').addEventListener('keydown', function(e) { if (e.key === 'Enter') buscarRadarTexto(); });

    document.getElementById('btn-calc-route').addEventListener('click', function() {
        var q = document.getElementById('route-query').value.trim();
        if (!q) { showToast('⚠️ Digite um endereco'); return; }
        calcularRota(q);
    });
    document.getElementById('route-query').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('btn-calc-route').click();
    });

    // Retornar ao GPS ao mover o mapa
    map.on('dragstart', function() { isFollowing = false; });
}

document.addEventListener('DOMContentLoaded', inicializarApp);
</script>

</body>
</html>
