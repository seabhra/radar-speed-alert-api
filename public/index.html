<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Cache Control - Evita que o navegador armazene versões antigas -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Radar X9 BH - Alerta Inteligente (OSM + IA)</title>

  <!-- Leaflet CSS - Biblioteca de mapas -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
  
  <!-- Leaflet Rotate Plugin - Para rotação do mapa -->
  <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>

  <!-- Google Fonts para tipografia moderna -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

  <style>
    /* ================= VARIÁVEIS GLOBAIS (Tema Dark) ================= */
    :root {
      --bg-color: #0f1115;
      --panel-color: #1a1d24;
      --accent-color: #00ff88;
      --alert-color: #ff3333;
      --text-main: #ffffff;
      --text-muted: #a0a0a0;
    }
    
    /* Reset básico - Remove margens e paddings padrão */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    /* ================= ESTRUTURA PRINCIPAL ================= */
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ================= HEADER (BARRA SUPERIOR) ================= */
    header {
      background-color: var(--panel-color);
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--accent-color);
      box-shadow: 0 4px 15px rgba(0, 255, 136, 0.1);
      z-index: 1000;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .app-icon { width: 50px; height: 40px; border-radius: 8px; object-fit: contain; }
    h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
    h1 span { color: var(--accent-color); }

    /* ================= BARRA DE BUSCA ================= */
    .search-container {
      position: absolute; top: 0; left: 0; width: 100%;
      background-color: rgba(26, 29, 36, 0.98);
      backdrop-filter: blur(8px);
      display: flex; gap: 12px; z-index: 1000;
      max-height: 0; overflow: hidden; opacity: 0;
      padding: 0 15px;
      border-bottom: 1px solid transparent;
      transition: all 0.3s ease;
      align-items: center;
    }
    .search-container.active {
      max-height: 90px; opacity: 1; padding: 15px;
      border-bottom: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .search-container input {
      flex: 1; padding: 14px 20px; border-radius: 30px; border: 1px solid #444;
      background-color: #000; color: #fff; font-size: 1rem; outline: none; font-family: 'Inter', sans-serif;
    }
    .search-container input:focus { border-color: var(--accent-color); }

    /* Botão de busca estilizado */
    .btn-search {
      position: relative; flex-shrink: 0; width: 46px; height: 46px; border-radius: 50%;
      border: none; cursor: pointer; background: rgba(46, 102, 158, 0.95);
      box-shadow: 0 3px 8px rgba(203, 240, 15, 0.5); transition: all 0.2s ease; overflow: hidden;
    }
    .btn-search:active { transform: scale(0.9); }
    .btn-search img {
      position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
      object-fit: contain; display: block; transform: translate(-50%, -50%);
    }
    
    /* ================= CONTAINER DO MAPA ================= */
    .map-wrapper { position: relative; flex: 1; display: flex; overflow: hidden; width: 100%; }
    #map { width: 100%; height: 100%; background-color: #2a2a2a; z-index: 1; }

    /* ================= BÚSSOLA (WIDGET VISUAL) ================= */
    .compass-widget {
      position: absolute; top: 20px; left: 5px; width: 80px; height: 80px;
      z-index: 500; display: flex; align-items: center; justify-content: center; pointer-events: none;
    }
    .compass-base { 
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
      opacity: 0.9;
    }

    .compass-needle {
      position: absolute;
      width: 55%;
      height: 55%;
      object-fit: contain;
      z-index: 2;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ================= BOTÕES DE CONTROLE DO MAPA ================= */
    .map-controls {
      position: absolute; right: 15px; bottom: 30px; display: flex; flex-direction: column;
      align-items: center; gap: 10px; z-index: 500;
    }
    .map-btn {
      width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; cursor: pointer; background: rgba(20, 20, 20, 0.92);
      border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 4px 10px rgba(0,0,0,0.6); 
      transition: all 0.2s ease;
    }
    .map-btn:hover { transform: scale(1.08); border-color: var(--accent-color); }
    .map-btn:active { transform: scale(0.92); }
    .map-btn img { width: 30px; height: 30px; object-fit: contain; pointer-events: none; }

    /* Botão de alerta on/off com ícones de som */
    .alert-toggle-btn {
      background: rgba(29, 28, 28, 0.9);
      border: 2px solid rgba(255,255,255,0.08);
      transition: all 0.3s ease;
    }
    .alert-toggle-btn.alert-off {
      background: rgba(68, 68, 68, 0.9);
      border-color: #888;
    }
    .alert-toggle-btn.alert-off img {
      filter: grayscale(1);
    }
    .alert-toggle-btn img {
      transition: all 0.3s ease;
    }

    /* Botões com destaques específicos */
    #btn-route-bar { width: 54px; height: 54px; border: 1px solid rgba(255,140,0,0.5); }
    #btn-search-bar { border: 1px solid rgba(0, 200, 180, 0.35); }
    #btn-center { border: 1px solid rgba(0, 255, 136, 0.35); }
    #btn-alert-toggle { border: 1px solid rgba(255, 51, 51, 0.5); }
    
    /* Botão de Rotação do Mapa */
    #btn-rotate-map {
        border: 1px solid rgba(0, 255, 255, 0.35);
        transition: transform 0.3s ease;
    }
    #btn-rotate-map.rotated {
        transform: rotate(90deg);
        border-color: var(--accent-color);
        box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
    }

    /* Suporte para rotação do mapa */
    .leaflet-container {
        transition: transform 0.3s ease;
    }
    
    /* Estilos dos marcadores do usuário */
    .user-gps-marker {
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }
    
    .user-navigator-marker {
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      animation: pulseMarker 1.5s ease-in-out infinite;
    }
    
    /* ESTILOS DOS MARCADORES DE ROTA */
    .route-start-marker {
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      animation: pulseStart 1s ease-in-out infinite;
    }
    
    .route-end-marker {
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      animation: pulseEnd 1.2s ease-in-out infinite;
    }
    
    @keyframes pulseMarker {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    
    @keyframes pulseStart {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
    
    @keyframes pulseEnd {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* ================= WIDGET DE VELOCIDADE ================= */
    .speed-widget { 
      position: absolute; bottom: -15px; left: -25px; width: 150px; height: 150px; 
      z-index: 500; display: flex; align-items: center; justify-content: center; 
    } 
    .speed-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; } 
    
    .speed-value {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-62%, -60%);
      font-size: 28px;
      font-weight: 700;
      font-family: 'Rajdhani', 'Oswald', 'Arial Narrow', sans-serif;
      color: #000;
      line-height: 1;
      z-index: 2;
      white-space: nowrap;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px;
      min-width: 3ch;
    }
    
    /* ================= ALERTAS E NOTIFICAÇÕES ================= */
    #alert-container { 
      position: absolute; bottom: 0; left: 0; width: 100%; z-index: 1000; 
      display: none; animation: slideUp 0.3s ease-out; pointer-events: none; 
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    /* Animação de pulso para alerta crítico */
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); background: linear-gradient(90deg, #ff2200, #ee0000); }
      100% { transform: scale(1); }
    }
    
    .alert-bar { 
      background: linear-gradient(90deg, #cc0000, #990000); color: white; padding: 18px;
      display: flex; align-items: center; gap: 15px; box-shadow: 0 -5px 20px rgba(255, 0, 0, 0.4);
      border-top: 2px solid #ff5555; transition: all 0.2s ease;
    }
    .alert-bar-critico {
      animation: pulse 0.8s ease-in-out infinite;
    }
    .alert-bar img { width: 50px; height: 50px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
    .alert-info h3 { font-size: 1.2rem; margin-bottom: 3px; text-transform: uppercase; font-weight: 800; }
    .alert-info p { font-size: 0.95rem; opacity: 0.95; }
    
    /* Toast de notificação temporária */
    .toast-notification { 
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px);
      background-color: rgba(20, 20, 20, 0.95); color: var(--text-main); padding: 12px 25px;
      border-radius: 50px; border: 1px solid #444; box-shadow: 0 10px 25px rgba(0,0,0,0.8);
      z-index: 2000; opacity: 0; font-size: 0.95rem; font-weight: 600; text-align: center;
      pointer-events: none; transition: opacity 0.3s ease, transform 0.3s ease; white-space: nowrap;
    }
    .toast-notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ================= LOADINGS E OVERLAYS ================= */
    .loading-overlay { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(20, 20, 20, 0.9); padding: 20px 30px; border-radius: 12px;
      border: 1px solid var(--accent-color); text-align: center; z-index: 1001;
      backdrop-filter: blur(5px);
    }
    .loading-spinner { 
      border: 3px solid #333; border-top: 3px solid var(--accent-color); 
      border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; 
      margin: 0 auto 10px; 
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    /* Remove controles padrão do Leaflet */
    .leaflet-control-zoom, .leaflet-control-attribution, .leaflet-routing-container { display: none !important; }
    
    /* Loading Fullscreen (tela inicial) */
    .loading-fullscreen { 
      position: fixed; inset: 0; background-color: var(--bg-color);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    .loading-fullscreen.fade-out { opacity: 0; visibility: hidden; }
    .loading-fullscreen .spinner-ring { width: 60px; height: 60px; border-radius: 50%; position: relative; margin-bottom: 24px; }
    .loading-fullscreen .spinner-ring::before, .loading-fullscreen .spinner-ring::after { 
      content: ''; position: absolute; inset: 0; border-radius: 50%; border: 4px solid transparent; 
    }
    .loading-fullscreen .spinner-ring::before { 
      border-top-color: var(--accent-color); border-right-color: var(--accent-color); 
      animation: spinRing 1s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite; 
    }
    .loading-fullscreen .spinner-ring::after { 
      inset: 10px; border-bottom-color: #ff3333; border-left-color: #ff3333; 
      animation: spinRing 1.4s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite reverse; 
    }
    @keyframes spinRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-fullscreen .loading-text { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px; text-align: center; }
    .loading-fullscreen .loading-text span { color: var(--accent-color); }
    .loading-fullscreen .loading-sub { margin-top: 8px; font-size: 0.8rem; color: #777; animation: pulseText 1.8s ease-in-out infinite; }
    @keyframes pulseText { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    /* ================= ESTILOS DOS ÍCONES DO MAPA ================= */
    .radar-marker-icon {
      background: transparent !important;
      border: none !important;
    }
    .radar-marker-icon img {
      width: 40px !important;
      height: 40px !important;
      object-fit: contain !important;
      display: block !important;
    }
  </style>
</head>
<body>

  <!-- TELA DE LOADING INICIAL -->
  <div class="loading-fullscreen" id="loading-fullscreen">
    <div class="spinner-ring"></div>
    <div class="loading-text">Iniciando <span>Radar X9</span></div>
    <div class="loading-sub">Sincronizando satélites...</div>
  </div>

  <!-- HEADER DO APP -->
  <header>
    <div class="header-left">
      <img src="/imagens_app/ic_icon_app.png" onerror="this.style.display='none'" alt="App Icon" class="app-icon">
      <h1>RADAR <span>X9</span> BH</h1>
    </div>
  </header>

  <div class="map-wrapper">
    <!-- BARRA DE BUSCA DE RADARES -->
    <div class="search-container" id="search-bar-radares">
      <input type="text" id="query" placeholder="Buscar radar (tipo, endereço)...">
      <button class="btn-search" id="btn-search-radar" title="Buscar">
        <img src="/imagens_app/ic_radar_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/646/646094.png'" alt="Busca">
      </button>
    </div>

    <!-- BARRA DE ROTA/NAVEGAÇÃO -->
    <div class="search-container" id="search-bar-rota">
      <input type="text" id="route-query" placeholder="Digite um endereço para navegar...">
      <button class="btn-search" id="btn-calc-route" title="Traçar Rota" style="background-color: #ff8c00;">
        <img src="/imagens_app/ic_gps_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7892/7892059.png'" alt="Rota">
      </button>
    </div>

    <!-- MAPA (Leaflet) -->
    <div id="map"></div>
    
    <!-- TOAST PARA NOTIFICAÇÕES -->
    <div class="toast-notification" id="toast-msg"></div>

    <!-- WIDGET DE BÚSSOLA VISUAL -->
    <div class="compass-widget">
      <img src="/imagens_app/ic_compass.png" onerror="this.style.opacity='0.3'; this.src='https://cdn-icons-png.flaticon.com/512/2838/2838773.png'" alt="Bússola" class="compass-base">
      <img src="/imagens_app/ic_compass_ponteira.png" onerror="this.style.opacity='0.5'; this.src='https://cdn-icons-png.flaticon.com/512/1140/1140644.png'" alt="Ponteira" class="compass-needle" id="compass-needle-img">
    </div>

    <!-- WIDGET DE VELOCIDADE -->
    <div class="speed-widget">
      <img src="/imagens_app/ic_speed_limit.png" onerror="this.style.opacity='0.5'" alt="Velocidade" class="speed-bg">
      <div class="speed-value" id="speed-display">0</div>
    </div>

    <!-- BOTÕES DE CONTROLE DO MAPA -->
    <div class="map-controls">
       <button class="map-btn" id="btn-rotate-map" title="Rotacionar Mapa (Norte para Cima)">
        <img src="/imagens_app/ic_girar_map.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/10313/10313225.png'" alt="Rotacionar">
      </button>
      <button class="map-btn alert-toggle-btn" id="btn-alert-toggle" title="Ligar/Desligar Alerta de Radar">
        <img id="alert-toggle-icon" src="/imagens_app/ic_sound_on.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/727/727245.png'" alt="Alerta">
      </button>
      <button class="map-btn" id="btn-search-bar" title="Buscar Radares">
        <img src="/imagens_app/ic_radar_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/646/646094.png'" alt="busca">
      </button>
      <button class="map-btn" id="btn-route-bar" title="Navegar / Rota">
        <img src="/imagens_app/ic_gps_busca.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7892/7892059.png'" alt="Rota">
      </button>
      <button class="map-btn" id="btn-center" title="Centralizar GPS">
        <img src="/imagens_app/ic_location_button.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/684/684908.png'" alt="Centro">
      </button>
      <button class="map-btn" id="btn-refresh" title="Resetar Mapa">
        <img src="/imagens_app/ic_refresh_button.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2409/2409305.png'" alt="Refresh">
      </button>
      <button class="map-btn" id="btn-zoom-in" title="Aumentar Zoom">
        <img src="/imagens_app/ic_zoom_in.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/709/709493.png'" alt="Zoom In">
      </button>
      <button class="map-btn" id="btn-zoom-out" title="Diminuir Zoom">
        <img src="/imagens_app/ic_zoom_out.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/709/709506.png'" alt="Zoom Out">
      </button>
    </div>

    <!-- ALERTA DE RADAR PRÓXIMO -->
    <div id="alert-container">
      <div class="alert-bar">
        <img id="alert-icon" src="/imagens_app/ic_radar_das.png" alt="Radar" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7764/7764406.png'">
        <div class="alert-info">
          <h3 id="alert-title">ATENÇÃO!</h3>
          <p id="alert-text">Radar Próximo</p>
        </div>
      </div>
    </div>

    <!-- LOADING OVERLAY PARA OPERAÇÕES -->
    <div class="loading-overlay" id="loading" style="display:none;">
      <div class="loading-spinner"></div>
      <div style="margin-top:10px; color:#fff;">Processando...</div>
    </div>
  </div>

  <!-- ÁUDIO DE ALERTA -->
  <audio id="alert-soud" src="audio_app/alerta.mp3" preload="auto"></audio>

  <!-- BIBLIOTECAS EXTERNAS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.min.js"></script>

  <script>
    // ===================================================================
    // VARIÁVEIS GLOBAIS
    // ===================================================================
    let map;                              // Instância do mapa Leaflet
    let userMarker;                       // Marcador da posição do usuário
    let radarMarkers = [];                // Array com todos os marcadores de radar
    let alertTimeout;                     // Timeout para fechamento automático do alerta
    let userLat = -19.919055;             // Latitude inicial (Praça Sete - BH)
    let userLng = -43.938641;             // Longitude inicial (Praça Sete - BH)
    let tileLayer;                        // Camada de tiles do mapa
    let routingControl = null;            // Controle de rota do Leaflet Routing Machine
    let searchActive = false;             // Flag para barra de busca ativa
    let routeActive = false;              // Flag para barra de rota ativa
    let prevLat = null;                   // Latitude anterior para cálculo de velocidade
    let prevLng = null;                   // Longitude anterior para cálculo de velocidade
    let prevTime = null;                  // Tempo anterior para cálculo de velocidade
    let isFollowing = true;               // Flag para seguir posição do usuário
    let watchId = null;                   // ID do watcher de geolocalização
    let gpsSource = 'none';               // Fonte do GPS ('browser', 'appinventor' ou 'none')
    let gpsInitialized = false;           // Flag para indicação de GPS inicializado
    let browserGpsTimeout = null;         // Timeout para fallback de GPS
    let destinoAtual = null;              // Destino atual da navegação
    let posicaoCentralOriginal = { lat: -19.919055, lng: -43.938641, zoom: 17 }; // Posição inicial do mapa
    
    // VARIÁVEIS DOS MARCADORES DE ROTA
    // Marcador de partida (ic_navigator_map.png)
    // Marcador de chegada (ic_icon_chegada.png)
    var startRouteMarker = null;          // Marcador de início da rota
    var endRouteMarker = null;            // Marcador de destino da rota
    
    let alertaHabilitado = true;          // Flag para alertas ligados/desligados
    let ultimoRadarAlertado = null;       // ID do último radar que gerou alerta
    let returnToGpsTimer = null;          // Timeout para retorno ao GPS
    const TEMPO_RETORNO_GPS = 8000;       // Tempo para voltar ao GPS após interação (ms)
    
    // Configurações dos alertas de radar
    const ALERT_CONFIG = {
      DISTANCIA_MAXIMA: 80,               // Distância máxima para alerta (metros)
      DISTANCIA_CRITICA: 40,              // Distância crítica para alerta reforçado (metros)
      TEMPO_ALERTA: 4000,                 // Tempo que o alerta fica visível (ms)
      DISTANCIA_PASSAR_RADAR: 10          // Distância para considerar que passou pelo radar (metros)
    };
    
    let currentHeading = 0;               // Direção atual do usuário em graus
    const API_PBH_BASE = 'https://dados.pbh.gov.br/api/3/action/'; // API da prefeitura de BH

    // ===================================================================
    // MAPA DE ÍCONES - Mapeia tipos de radar para URLs de ícones
    // ===================================================================
    const iconMap = {
      'Controlador Eletrônico de Velocidade': '/imagens_app/ic_radar_cev_v2.png',
      'Detector de Avanço de Semáforo': '/imagens_app/ic_radar_das_v2.png',
      'Detector de Tráfego em Local Proibido': '/imagens_app/ic_radar_dtlp_v2.png',
      'Detector de Conversão em Local Proibido': '/imagens_app/ic_radar_rcp_v2.png',
      'Detector de Invasão de Faixa Exclusiva - MOVE': '/imagens_app/ic_radar_dife_v2.png',

    // ===================================================================
    // FUNÇÃO: getIconUrl - Retorna a URL do ícone baseado no tipo e velocidade
    // IMPORTANTE: Esta função agora suporta ic_radar_cem_30_v2.png e ic_radar_cem_40_v2.png
    // ===================================================================
    function getIconUrl(tipo, velocidade) {
      var tipoLimpo = tipo ? tipo.trim() : "";
      
      // NOVO: Verifica Zona Verde primeiro (prioridade máxima)
      if (tipoLimpo.includes('Zona Verde') || tipoLimpo.includes('ZVT') || tipoLimpo.includes('ZVC')) {
        return iconMap['Zona Verde de Trânsito (ZVT)'];
      }
      
      // Verifica Controlador Eletrônico Misto
      if (tipoLimpo.includes('Controlador Eletrônico Misto') || tipoLimpo.includes('CEM')) {
        return iconMap['Controlador Eletrônico de Velocidade'] || '/imagens_app/ic_radar_cev_v2.png';
      }
      
      // Verifica Detector de Parada sobre Faixa de Pedestres
      if (tipoLimpo.includes('Parada sobre Faixa de Pedestres') || tipoLimpo.includes('DPFP')) {
        return iconMap['Detector de Parada sobre Faixa de Pedestres (DPFP)'] || '/imagens_app/ic_radar_dpfp_v2.png';
      }
      
      // Verifica Controle de Redução de Velocidade
      if (tipoLimpo === 'Controle de Redução de Velocidade (CRV)') {
        return iconMap['Controle de Redução de Velocidade (CRV)'];
      }
      
      // NOVO: Ícones específicos para radar CEM com velocidade 30 e 40 km/h
      // Detecta se é um radar de velocidade (inclui CEM, Controlador Eletrônico, etc.)
      var isRadarVelocidade = (tipoLimpo.includes('Velocidade') && !tipoLimpo.includes('CRV')) || 
                              (tipoLimpo.includes('Velocidade') && !tipoLimpo.includes('Redução')) ||
                              tipoLimpo.includes('CEM') ||
                              tipoLimpo.includes('Controlador Eletrônico');
      
      if (isRadarVelocidade) {
        var vel = parseInt(velocidade) || 0;
        // NOVO: Retorna ícones específicos para 30 e 40 km/h
        if (vel === 30) return '/imagens_app/ic_radar_cem_30_v2.png';     // ✓ Ícone 30km/h
        if (vel === 40) return '/imagens_app/ic_radar_cem_40_v2.png';     // ✓ Ícone 40km/h
        if (vel === 50) return '/imagens_app/ic_radar_cev_50_v2.png';
        if (vel === 60) return '/imagens_app/ic_radar_cev_60_v2.png';
        if (vel === 70) return '/imagens_app/ic_radar_cev_70_v2.png';
        if (vel === 80) return '/imagens_app/ic_radar_cev_80_v2.png';
        return '/imagens_app/ic_radar_cev_v2.png';  // Ícone padrão
      }
      
      // Busca o ícone no mapa pelo tipo exato
      var icone = iconMap[tipoLimpo];
      
      // Se não encontrou, tenta busca aproximada por palavras-chave
      if (!icone) {
        if (tipoLimpo.includes('Semáforo')) icone = iconMap['Detector de Avanço de Semáforo'];
        else if (tipoLimpo.includes('Redutor') || tipoLimpo.includes('Redução')) icone = iconMap['Controle de Redução de Velocidade (CRV)'];
        else if (tipoLimpo.includes('Celular')) icone = iconMap['Detector de Uso de Celular'];
        else if (tipoLimpo.includes('Verde')) icone = iconMap['Zona Verde de Trânsito (ZVT)'];
        else if (tipoLimpo.includes('OCR')) icone = iconMap['Leitor Inteligente de Placas (OCR-P)'];
        else if (tipoLimpo.includes('Facial')) icone = iconMap['Leitor de Reconhecimento Facial (OCR-F)'];
        else if (tipoLimpo.includes('Conversão')) icone = iconMap['Detector de Conversão em Local Proibido'];
        else if (tipoLimpo.includes('Invasão')) icone = iconMap['Detector de Invasão de Faixa Exclusiva - MOVE'];
        else if (tipoLimpo.includes('Parada') || tipoLimpo.includes('Pedestres') || tipoLimpo.includes('DPFP')) 
          icone = iconMap['Detector de Parada sobre Faixa de Pedestres (DPFP)'];
        else if (tipoLimpo.includes('Faixa Exclusiva') || tipoLimpo.includes('DIFEX')) 
          icone = iconMap['Detector de Invasão de Faixa Exclusiva (DIFEX)'];
        else if (tipoLimpo.includes('BUS') || tipoLimpo.includes('Faixa Preferencial')) 
          icone = iconMap['Detector de Faixa Preferencial de Ônibus (BUS)'];
      }
      
      // Fallback para ícone padrão se nenhum foi encontrado
      if (!icone) icone = iconMap['default'];
      return icone;
    }

    // ===================================================================
    // FUNÇÃO: calcularDistancia - Calcula distância em metros entre dois pontos
    // ===================================================================
    function calcularDistancia(lat1, lon1, lat2, lon2) {
      var R = 6371e3;  // Raio da Terra em metros
      var p1 = lat1 * Math.PI / 180;
      var p2 = lat2 * Math.PI / 180;
      var dp = (lat2 - lat1) * Math.PI / 180;
      var dl = (lon2 - lon1) * Math.PI / 180;
      var a = Math.sin(dp / 2) * Math.sin(dp / 2) + 
              Math.cos(p1) * Math.cos(p2) * 
              Math.sin(dl / 2) * Math.sin(dl / 2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // ===================================================================
    // FUNÇÃO: verificarDirecao - Verifica direção do usuário em relação ao radar
    // ===================================================================
    function verificarDirecao(uLat, uLng, uHeading, radarLat, radarLng) {
      // Se não tem heading, assume que está se aproximando (alerta padrão)
      if (!uHeading || uHeading === -1) return { estaAproximando: true, estaAfastando: false, anguloRadar: 0, diferenca: 0 };
      
      // Calcula o ângulo do radar em relação ao usuário
      var deltaX = radarLng - uLng;
      var deltaY = radarLat - uLat;
      var anguloRadar = Math.atan2(deltaY, deltaX) * 180 / Math.PI;
      var anguloRadarNormalizado = (anguloRadar + 360) % 360;
      
      // Calcula a diferença entre a direção do usuário e a direção do radar
      var diff = Math.abs(uHeading - anguloRadarNormalizado);
      diff = Math.min(diff, 360 - diff);
      
      // Se a diferença for menor que 45°, está aproximando
      var estaAproximando = diff < 45;
      // Se a diferença for maior que 135°, está afastando
      var estaAfastando = diff > 135;
      
      return {
        estaAproximando: estaAproximando,
        estaAfastando: estaAfastando,
        anguloRadar: anguloRadarNormalizado,
        diferenca: diff
      };
    }

    async function buscarCoordenadas(endereco) {
      try {
        var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + 
                  encodeURIComponent(endereco) + '&countrycodes=br&limit=1';
        var r = await fetch(url);
        var d = await r.json();
        return (d && d.length > 0) ? { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) } : null;
      } catch (e) { 
        return null; 
      }
    }

    // ===================================================================
    // FUNÇÃO: calcularRota - Traça rota COM ZOOM e ícones personalizados
    // ===================================================================
    function calcularRota(destLat, destLng) {
      // Remove rota anterior se existir
      if (routingControl) map.removeControl(routingControl);

      destinoAtual = { lat: destLat, lng: destLng };

      // IMPORTANTE: Adiciona marcadores de SAÍDA e DESTINO personalizados
      adicionarMarcadoresRota(userLat, userLng, destLat, destLng);

      // Configura o controle de rotação (sem marcadores automáticos)
      routingControl = L.Routing.control({
        waypoints: [
          L.latLng(userLat, userLng),
          L.latLng(destLat, destLng)
        ],
        routeWhileDragging: false,
        addWaypoints: false,
        language: 'pt-BR',
        show: false,
        lineOptions: { 
          styles: [
            { color: '#ff5500', opacity: 0.95, weight: 7 },
            { color: '#ffd1b3', opacity: 1.0, weight: 3 }
          ] 
        },
        createMarker: function() { return null; },  // Desabilita marcadores automáticos
        router: L.Routing.osrmv1({
          serviceUrl: 'https://router.project-osrm.org/route/v1'
        })
      }).addTo(map);

      // Ajusta o zoom para mostrar toda a rota
      var bounds = L.latLngBounds(
        [userLat, userLng],
        [destLat, destLng]
      );
      
      map.fitBounds(bounds, { padding: [50, 50] });

      atualizarIconeUsuario();
      showNotification("🚗 Navegação iniciada! Siga a rota laranja.");
    }

        routingControl.setWaypoints([L.latLng(userLat, userLng), L.latLng(destinoAtual.lat, destinoAtual.lng)]);
        // Atualiza também o marcador de partida
        if (startRouteMarker) {
          startRouteMarker.setLatLng([userLat, userLng]);
        }
      }
    }

    // ===================================================================
    // FUNÇÃO: converterSIRGAS2000paraWGS84 - Converte coordenadas UTM para Lat/Lon
    // ===================================================================
    function converterSIRGAS2000paraWGS84(xLeste, yNorte) {
      // Parâmetros do elipsóide WGS84
      var a = 6378137.0;           // Semi-eixo maior
      var f = 1 / 298.257222101;   // Achatamento
      var k0 = 0.9996;             // Fator de escala do meridiano central
      var N0 = 10000000.0;         // Falso norte (hemisfério sul)
      var E0 = 500000.0;           // Falso leste
      
      var e2 = 2 * f - f * f;
      var ep2 = e2 / (1 - e2);
      var e1 = (1 - Math.sqrt(1 - e2)) / (1 + Math.sqrt(1 - e2));
      
      var M = yNorte - N0;
      var mu = M / (a * (1 - e2/4 - 3*e2*e2/64 - 5*e2*e2*e2/256));
      var phi1 = mu + (3*e1/2 - 27*e1*e1*e1/32) * Math.sin(2*mu) + 
                 (21*e1*e1/16 - 55*e1*e1*e1*e1/32) * Math.sin(4*mu) + 
                 (151*e1*e1*e1/96) * Math.sin(6*mu);
      
      var N1 = a / Math.sqrt(1 - e2 * Math.sin(phi1) * Math.sin(phi1));
      var T1 = Math.tan(phi1) * Math.tan(phi1);
      var C1 = ep2 * Math.cos(phi1) * Math.cos(phi1);
      var R1 = a * (1 - e2) / Math.pow(1 - e2 * Math.sin(phi1) * Math.sin(phi1), 1.5);
      var D = (xLeste - E0) / (N1 * k0);
      
      var lat = phi1 - (N1 * Math.tan(phi1) / R1) * (D*D/2 - (5+3*T1+10*C1-4*C1*C1-9*ep2)*Math.pow(D,4)/24 + 
               (61+90*T1+298*C1+45*T1*T1-252*ep2-3*C1*C1)*Math.pow(D,6)/720);
      var lng = (D - (1+2*T1+C1)*Math.pow(D,3)/6 + (5-2*C1+28*T1-3*C1*C1+8*ep2+24*T1*T1)*Math.pow(D,5)/120) / Math.cos(phi1);
      
      lng = (lng * 180 / Math.PI) - 51;  // Meridiano central de BH é 51°W
      lat = lat * 180 / Math.PI;
      return { lat: Math.round(lat * 1000000) / 1000000, lng: Math.round(lng * 1000000) / 1000000 };
    }

    // ===================================================================
    // FUNÇÃO: extrairCoordenadas - Extrai coordenadas de diferentes formatos
    // ===================================================================
    function extrairCoordenadas(record) {
      var coordenadasEncontradas = null;
      
      // Tenta extrair do campo 9 (campo padrão de coordenadas)
      if (record[9]) {
        var parts = String(record[9]).replace(/\s+/g, '').split(',').map(Number);
        if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
          coordenadasEncontradas = parts;
        }
      }
      
      // Se não encontrou, busca em todos os campos
      if (!coordenadasEncontradas) {
        for (var i = 0; i < record.length; i++) {
          if (!record[i] || String(record[i]).length > 40) continue;
          var parts = String(record[i]).replace(/\s+/g, '').split(',').map(Number);
          if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
            coordenadasEncontradas = parts;
            break;
          }
        }
      }
      
      if (!coordenadasEncontradas) return null;
      
      var v1 = coordenadasEncontradas[0];
      var v2 = coordenadasEncontradas[1];
      
      // Se os valores são grandes (>1000), provavelmente estão em UTM
      if (Math.abs(v1) > 1000 || Math.abs(v2) > 1000) {
        return converterSIRGAS2000paraWGS84(v1, v2);
      }
      
      // Ajusta ordem se necessário (lat/lng vs lng/lat)
      if (v1 < -30 && v2 > -30) return { lat: v2, lng: v1 };
      
      return { lat: v1, lng: v2 };
    }

    // ===================================================================
    // FUNÇÃO: atualizarBussola - Aplica rotação na bússola visual
    // ===================================================================
    function atualizarBussola(headingDegrees) {
      var needle = document.getElementById('compass-needle-img');
      if (needle) { 
        needle.style.transform = 'rotate(' + headingDegrees + 'deg)'; 
      }
    }

    // ===================================================================
    // FUNÇÃO: atualizarPosicaoUsuario - Atualiza posição do marcador do usuário
    // ===================================================================
    function atualizarPosicaoUsuario(lat, lng, heading) {
      if (!userMarker) return;
      
      userMarker.setLatLng([lat, lng]);
      
      if (heading !== null && !isNaN(heading) && heading >= 0) {
        currentHeading = heading;
        atualizarBussola(currentHeading);
      }
    }

    // ===================================================================
    // FUNÇÃO: processarNovaPosicao - Processa nova posição do GPS (CORAÇÃO DO SISTEMA)
    // ===================================================================
    function processarNovaPosicao(newLat, newLng, speedKmh, hardwareHeading) {
      var currentTime = Date.now();
      var dist = 0;

      // Calcula velocidade se não veio do hardware
      if (speedKmh === 0 && prevLat !== null && prevTime !== null) {
        dist = calcularDistancia(prevLat, prevLng, newLat, newLng);
        var time = (currentTime - prevTime) / 1000;
        if (time > 0) speedKmh = Math.round((dist / time) * 3.6);
      } else if (prevLat !== null) {
        dist = calcularDistancia(prevLat, prevLng, newLat, newLng);
      }
      
      // Limita velocidade máxima para evitar valores anômalos
      if (speedKmh > 250) speedKmh = 0;
      $("#speed-display").text(speedKmh);
      
      // Calcula direção (heading) se não veio do hardware
      if (hardwareHeading !== null && !isNaN(hardwareHeading) && hardwareHeading >= 0) {
        currentHeading = hardwareHeading;
      } 
      else if (dist > 3) {  // Calcula heading baseado no movimento
        var dy = newLat - prevLat;
        var dx = (newLng - prevLng) * Math.cos(newLat * Math.PI / 180);
        var calcHeading = (Math.atan2(dx, dy) * 180 / Math.PI);
        if (calcHeading < 0) calcHeading += 360;
        if (calcHeading >= 360) calcHeading -= 360;
        currentHeading = calcHeading;
      }
      
      // Atualiza a bússola visual
      if (currentHeading > 0 || currentHeading === 0) {
        atualizarBussola(currentHeading);
      }

      // Salva posição anterior para próximos cálculos
      prevLat = newLat;
      prevLng = newLng;
      prevTime = currentTime;
      userLat = newLat;
      userLng = newLng;

      // Cria ou atualiza o marcador do usuário
      if (!userMarker) {
        var defaultIcon = L.icon({
          iconUrl: '/imagens_app/ic_gps_marker.png',
          iconSize: [50, 50],
          iconAnchor: [25, 50],
          popupAnchor: [0, -50],
          className: 'user-gps-marker'
        });
        userMarker = L.marker([newLat, newLng], { icon: defaultIcon, zIndexOffset: 1000 }).addTo(map);
        userMarker.bindTooltip("Você está aqui", { permanent: false, direction: "top", offset: [0, -25] });
        
        if (!gpsInitialized) {
          gpsInitialized = true;
          hideFullscreenLoading();
        }
      } else {
        userMarker.setLatLng([newLat, newLng]);
      }
      
      atualizarIconeUsuario();
      
      // Atualiza rota se estiver em modo navegação
      if (destinoAtual) {
        atualizarRota();
        if (startRouteMarker) {
          startRouteMarker.setLatLng([newLat, newLng]);
        }
      }
      
      // Centraliza o mapa se estiver em modo "seguir"
      if (isFollowing) {
        map.setView([newLat, newLng], map.getZoom(), { animate: true, duration: 0.5 });
      }
      
      // VERIFICAÇÃO DE RADARES PRÓXIMOS - Coração do sistema de alerta
      if (alertaHabilitado) {
        verificarProximidadeRadares();
      } else {
        fecharAlertaImediatamente();
      }
    }

    // ===================================================================
    // FUNÇÃO: startGPSTracking - Inicia rastreamento GPS do navegador
    // ===================================================================
    function startGPSTracking() {
      if (!navigator.geolocation) {
        hideFullscreenLoading();
        showNotification("GPS não suportado neste navegador.");
        return;
      }

      if (watchId !== null) navigator.geolocation.clearWatch(watchId);

      watchId = navigator.geolocation.watchPosition(
        function(position) {
          if (gpsSource !== 'appinventor') gpsSource = 'browser';
          var newLat = position.coords.latitude;
          var newLng = position.coords.longitude;
          var speedKmh = 0;
          
          if (position.coords.speed !== null && position.coords.speed >= 0) {
            speedKmh = Math.round(position.coords.speed * 3.6);
          }

          var hardwareHeading = position.coords.heading;
          processarNovaPosicao(newLat, newLng, speedKmh, hardwareHeading);
        },
        showError,
        { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
      );

      // Timeout para fallback se o GPS demorar muito
      browserGpsTimeout = setTimeout(function() {
        if (!gpsInitialized && gpsSource === 'none') {
          showNotification("Aguardando GPS do app...");
          hideFullscreenLoading();
        }
      }, 8000);
    }

    // ===================================================================
    // FUNÇÃO: verificarProximidadeRadares - O CORAÇÃO DO ALERTA
    // Verifica todos os radares e dispara alerta se necessário
    // ===================================================================
    function verificarProximidadeRadares() {
      if (!alertaHabilitado || radarMarkers.length === 0) return;

      var radarMaisProximo = null;
      var menorDistancia = Infinity;

      // Encontra o radar mais próximo dentro do raio de alerta
      radarMarkers.forEach(function(marker) {
        var rData = marker.radarData;
        
        // FILTRO CRÍTICO: Não alerta tipos irrelevantes (BUS, Zona Verde, etc.)
        if (!deveAlertaRadar(rData.tipo)) return;

        // Calcula distância entre usuário e radar
        var dist = calcularDistancia(userLat, userLng, rData.lat, rData.lng);
        
        if (dist < menorDistancia) {
          menorDistancia = dist;
          radarMaisProximo = rData;
        }
      });

      // LÓGICA PRINCIPAL DE ALERTA
      if (radarMaisProximo && menorDistancia <= ALERT_CONFIG.DISTANCIA_MAXIMA) {
        
        // Verifica se o usuário está indo em direção ao radar
        var direcao = verificarDirecao(userLat, userLng, currentHeading, radarMaisProximo.lat, radarMaisProximo.lng);
        
        // Só dispara se estiver aproximando OU se a velocidade for muito baixa (parado/estacionado)
        var velocidadeAtual = parseFloat($("#speed-display").text()) || 0;
        var deveDisparar = direcao.estaAproximando || velocidadeAtual < 5;

        if (deveDisparar) {
          // Evita repetir o alerta para o mesmo radar seguidamente
          if (ultimoRadarAlertado !== radarMaisProximo.id) {
            dispararAlerta(radarMaisProximo, menorDistancia);
          } else if (menorDistancia <= ALERT_CONFIG.DISTANCIA_CRITICA) {
            // Se já alertou mas entrou na zona crítica, reforça o visual
            $(".alert-bar").addClass("alert-bar-critico");
          }
        }
        
        // Lógica de Auto-Fechamento: Se passou pelo radar (distância muito pequena ou afastando)
        if (menorDistancia < ALERT_CONFIG.DISTANCIA_PASSAR_RADAR || direcao.estaAfastando) {
          fecharAlertaImediatamente();
          ultimoRadarAlertado = radarMaisProximo.id;
        }

      } else {
        // Se não há nenhum radar no raio de alcance, garante que o alerta suma
        if ($("#alert-container").is(":visible")) {
          fecharAlertaImediatamente();
        }
        ultimoRadarAlertado = null;  // Reseta para permitir novo alerta do mesmo radar
      }
    }

    // ===================================================================
    // FUNÇÃO: dispararAlerta - Executa som e mostra a barra de alerta
    // ===================================================================
    function dispararAlerta(radar, distancia) {
      var som = document.getElementById("alert-soud");
      var tipoAjustado = ajusteNomes[radar.tipo] || radar.tipo;
      var velInfo = radar.velocidade ? ' | ' + radar.velocidade + ' km/h' : "";

      // Atualiza interface do alerta
      $("#alert-title").text("ALERTA DE RADAR!");
      $("#alert-text").text(tipoAjustado + velInfo + ' - a ' + Math.round(distancia) + 'm');
      
      // Troca o ícone do alerta para o ícone específico do radar
      var iconeUrl = getIconUrl(radar.tipo, radar.velocidade);
      $("#alert-icon").attr("src", iconeUrl);

      // Exibe a barra com animação
      $("#alert-container").fadeIn(200);

      // Toca o áudio (Reinicia se já estiver tocando)
      if (alertaHabilitado && som) {
        som.pause();
        som.currentTime = 0;
        som.play().catch(function(e) { console.log("Erro ao tocar áudio: Interação do usuário necessária."); });
      }

      // Se for distância crítica, aplica o pulso vermelho
      if (distancia <= ALERT_CONFIG.DISTANCIA_CRITICA) {
        $(".alert-bar").addClass("alert-bar-critico");
      } else {
        $(".alert-bar").removeClass("alert-bar-critico");
      }

      ultimoRadarAlertado = radar.id;
    }

    // ===================================================================
    // FUNÇÃO: initMap - Inicializa o mapa e configura todos os eventos
    // ===================================================================
    function initMap() {
      map = L.map('map', {
        center: [userLat, userLng],
        zoom: 17,
        zoomControl: false,
        rotate: true,
        bearing: 0
      });

      aplicarTemaMapa();
      setInterval(aplicarTemaMapa, 300000);  // Atualiza tema a cada 5 minutos
      
      // Eventos de interação com o mapa
      map.on('dragstart', function() { 
        isFollowing = false;
        if (returnToGpsTimer) clearTimeout(returnToGpsTimer);
      });
      
      map.on('dragend', function() {
        returnToGpsTimer = setTimeout(function() {
          if (!isFollowing && userMarker) {
            isFollowing = true;
            map.setView(userMarker.getLatLng(), map.getZoom(), { animate: true, duration: 0.5 });
            showNotification("Voltando à sua posição atual");
          }
        }, TEMPO_RETORNO_GPS);
      });

      // ===============================================================
      // EVENTO DO BOTÃO DE ROTA - COM ÍCONES PERSONALIZADOS
      // ===============================================================
      $("#btn-calc-route").click(async function() {
        var endereco = $("#route-query").val().trim();
        if (endereco.length < 5) { 
          showNotification("Digite um endereço válido."); 
          return; 
        }
        
        $("#loading").show().html("<div class='loading-spinner'></div><div>Calculando rota...</div>");
        
        var coords = await buscarCoordenadas(endereco);
        
        if (coords) {
          // Limpa rota e marcadores antigos antes de criar novos
          if (routingControl) {
            map.removeControl(routingControl);
          }
          removerMarcadoresRota();

          // Configura o Routing Control com createMarker nulo (usa os nossos ícones)
          routingControl = L.Routing.control({
            waypoints: [
              L.latLng(userLat, userLng),
              L.latLng(coords.lat, coords.lng)
            ],
            createMarker: function() { return null; },  // CRUCIAL: Bloqueia os ícones padrão
            lineOptions: {
              styles: [{ color: '#ff8c00', weight: 6, opacity: 0.8 }]
            },
            addWaypoints: false,
            draggableWaypoints: false,
            fitSelectedRoutes: true,
            showAlternatives: false
          }).addTo(map);

          // Quando a rota for encontrada, insere os ícones de partida e chegada
          routingControl.on('routesfound', function(e) {
            var summary = e.routes[0].summary;
            
            // Chama a função de ícones personalizados
            adicionarMarcadoresRota(userLat, userLng, coords.lat, coords.lng);
            
            destinoAtual = { lat: coords.lat, lng: coords.lng };
            atualizarIconeUsuario();
            
            $("#loading").hide();
            fecharTodasBarras();
            showNotification("✅ Rota: " + (summary.totalDistance / 1000).toFixed(1) + " km");
          });

          routingControl.on('routingerror', function() {
            $("#loading").hide();
            showNotification("❌ Erro ao traçar rota.");
          });

          isFollowing = false;
        } else {
          $("#loading").hide();
          showNotification("❌ Endereço não encontrado.");
        }
      });
      
      // Eventos das barras de busca
      $("#route-query").keypress(function(e) { if (e.which == 13) $("#btn-calc-route").click(); });
      
      $("#btn-search-radar").click(function() { buscarRadares($("#query").val()); });
      $("#query").keypress(function(e) { if (e.which == 13) buscarRadares($("#query").val()); });
      
      $("#btn-search-bar").click(function() {
        if (searchActive) { 
          fecharTodasBarras(); 
          return; 
        }
        if (routeActive) routeActive = false;
        searchActive = true;
        $("#search-bar-radares").addClass('active');
        setTimeout(function() { $("#query").focus(); }, 300);
      });
      
      $("#btn-route-bar").click(function() {
        if (routeActive) { 
          fecharTodasBarras(); 
          return; 
        }
        if (searchActive) searchActive = false;
        routeActive = true;
        $("#search-bar-rota").addClass('active');
        setTimeout(function() { $("#route-query").focus(); }, 300);
      });
      
      $("#btn-center").click(function() {
        fecharTodasBarras();
        isFollowing = true;
        if (userMarker) {
          map.flyTo(userMarker.getLatLng(), 17, { duration: 0.5 });
          showNotification("Centralizando na sua posição");
        } else {
          showNotification("Aguardando sinal GPS...");
        }
      });

      $("#btn-refresh").click(function() { 
        resetarMapa();
        carregarRadares();   // Recarrega os radares do arquivo JSON
      });
      
      $("#btn-zoom-in").click(function() { map.zoomIn(); });
      $("#btn-zoom-out").click(function() { map.zoomOut(); });
      
      inicializarBotaoRotacaoMapa();
      inicializarBotaoAlertaToggle();
      startGPSTracking();
      carregarRadares();      // Carrega os radares do arquivo JSON local
    }

    // ===================================================================
    // FUNÇÃO: carregarRadares - Carrega radares do arquivo JSON local (GITHUB)
    // CORREÇÃO: Agora usa APENAS o arquivo radares.json, sem chamar APIs externas
    // ===================================================================
    async function carregarRadares() {
      // Remove marcadores existentes antes de carregar novos
      if (radarMarkers.length > 0) {
        radarMarkers.forEach(function(marker) { map.removeLayer(marker); });
        radarMarkers = [];
      }
      
      $("#loading").show().html("<div class='loading-spinner'></div><div>Carregando base de radares...</div>");
      
      try {
        // CORREÇÃO PRINCIPAL: Carrega APENAS do arquivo radares.json local
        // Usa timestamp para evitar cache do navegador
        var response = await fetch('radares.json?v=' + Date.now());
        
        if (!response.ok) {
          throw new Error("Arquivo radares.json não encontrado. Status: " + response.status);
        }
        
        var data = await response.json();
        console.log("Dados carregados do radares.json:", data);
        
        // Extrai os registros (suporta diferentes formatos de JSON)
        var records = [];
        if (Array.isArray(data)) {
          records = data;
        } else if (data.result && data.result.records) {
          records = data.result.records;
        } else if (data.records) {
          records = data.records;
        } else if (data.radares) {
          records = data.radares;
        } else {
          // Se o JSON tem estrutura desconhecida, tenta converter
          records = Object.values(data).filter(function(item) {
            return item && typeof item === 'object' && (item.lat || item.latitude || item[9]);
          });
        }
        
        if (records.length > 0) {
          renderizarRadaresNoMapa(records, "JSON Local");
          $("#loading").hide();
        } else {
          throw new Error("Nenhum registro encontrado no arquivo JSON");
        }
        
      } catch (error) {
        console.error("Erro ao carregar radares.json:", error);
        $("#loading").hide();
        
        // Fallback: Usa dados de IA se o JSON não carregar
        showNotification("Erro ao carregar radares.json. Usando base local de emergência.");
        renderizarRadaresNoMapa(injetarRadaresIA(), "Base de Emergência (Local)");
      }
    }

    // ===================================================================
    // FUNÇÃO: renderizarRadaresNoMapa - Renderiza todos os radares no mapa
    // ===================================================================
    function renderizarRadaresNoMapa(records, origem) {
      var radaresExternos = records || [];
      var todosOsRadares = radaresExternos.concat(injetarRadaresIA());  // Adiciona fallback
      var contador = 0;
      
      console.log("Renderizando " + todosOsRadares.length + " radares...");
      
      for (var i = 0; i < todosOsRadares.length; i++) {
        var record = todosOsRadares[i];
        
        // Suporta diferentes formatos de dados (array ou objeto)
        var endereco, tipo, velocidade, radarId, coordsFinais;
        
        if (Array.isArray(record)) {
          // Formato array: [null, null, endereco, tipo, velocidade, ..., coordenadas, id]
          endereco = record[2] || "Endereço não informado";
          tipo = (record[3] || "Não Identificado").trim();
          velocidade = record[4] || "0";
          radarId = record[10] || ('radar_' + i);
          coordsFinais = extrairCoordenadas(record);
        } else {
          // Formato objeto: { lat, lng, endereco, tipo, velocidade, id }
          if (record.lat && record.lng) {
            coordsFinais = { lat: parseFloat(record.lat), lng: parseFloat(record.lng) };
          } else if (record.latitude && record.longitude) {
            coordsFinais = { lat: parseFloat(record.latitude), lng: parseFloat(record.longitude) };
          } else if (record.coordenadas) {
            var parts = String(record.coordenadas).split(',');
            if (parts.length === 2) {
              coordsFinais = { lat: parseFloat(parts[0]), lng: parseFloat(parts[1]) };
            }
          }
          endereco = record.endereco || record.end || record.local || "Endereço não informado";
          tipo = (record.tipo || record.tipo_equipamento || "Não Identificado").trim();
          velocidade = record.velocidade || record.velocidade_via || record.vel || "0";
          radarId = record.id || ('radar_' + i);
        }
        
        if (!coordsFinais || isNaN(coordsFinais.lat) || isNaN(coordsFinais.lng)) continue;
        
        // Obtém o ícone correto baseado no tipo e velocidade
        var iconeUrl = getIconUrl(tipo, velocidade);
        var iconeRadar = criarIconeRadar(iconeUrl, 40);
        var radarMarker = L.marker([coordsFinais.lat, coordsFinais.lng], { icon: iconeRadar }).addTo(map);
        
        var tipoExibicao = ajusteNomes[tipo] || tipo;
        var isIA = tipoExibicao.includes('OCR') || tipoExibicao.includes('FACIAL');
        var tituloPopup = isIA ? '🤖 <span style="color:#33aaff">' + tipoExibicao + '</span>' : '<b>' + tipoExibicao + '</b>';
        
        radarMarker.bindPopup('<div style="color:#222; font-family:\'Inter\'; text-align:center; min-width:200px;">' + 
          tituloPopup + '<br><hr style="border:0; border-top:1px solid #ddd; margin:5px 0;">' + 
          endereco + '<br><div style="color:#d00; font-weight:bold; margin-top:5px;">Máx: ' + 
          velocidade + ' km/h</div></div>');
        
        // Armazena dados do radar no marcador para uso nos alertas
        radarMarker.radarData = {
          id: radarId,
          lat: coordsFinais.lat,
          lng: coordsFinais.lng,
          endereco: endereco,
          tipo: tipo,
          tipoExibicao: tipoExibicao,
          velocidade: velocidade,
          isIA: isIA
        };
        
        radarMarkers.push(radarMarker);
        contador++;
      }
      
      $("#loading").hide();
      hideFullscreenLoading();
      
      if (contador > 0) {
        showNotification('✅ Base carregada: ' + contador + ' radares (' + origem + ')');
        console.log('Total de radares carregados: ' + contador);
      } else {
        showNotification("⚠️ Nenhum radar encontrado na base de dados.");
      }
    }
    
    // ===================================================================
    // FUNÇÃO: buscarRadares - Busca radares por texto (endereço ou tipo)
    // ===================================================================
    function buscarRadares(query) {
      if (!query || query.length < 2) return;
      
      var encontrou = false;
      var boundsGroup = L.featureGroup();
      var q = query.toLowerCase();
      
      radarMarkers.forEach(function(marker) {
        var d = marker.radarData;
        var textoBusca = (d.endereco + ' ' + d.tipo + ' ' + d.tipoExibicao).toLowerCase();
        
        if (textoBusca.includes(q)) {
          encontrou = true;
          boundsGroup.addLayer(marker);
          marker.openPopup();
        }
      });
      
      if (encontrou) {
        map.fitBounds(boundsGroup.getBounds().pad(0.2));
        isFollowing = false;
        showNotification("🔍 " + boundsGroup.getLayers().length + " radar(es) encontrado(s)");
      } else {
        showNotification("❌ Nenhum radar encontrado para: " + query);
      }
    }

    // ===================================================================
    // FUNÇÃO: showError - Trata erros de GPS
    // ===================================================================
    function showError(error) {
      if (gpsSource === 'appinventor') return;
      
      var msg = "Erro ao obter localização.";
      if (error.code === 1) msg = "Permissão de GPS negada. Habilite nas configurações do navegador.";
      if (error.code === 2) msg = "Sinal GPS indisponível. Verifique se está ao ar livre.";
      if (error.code === 3) msg = "Tempo de GPS esgotado. Tentando novamente...";
      
      showNotification(msg);
      hideFullscreenLoading();
      
      if (error.code === 3) { 
        setTimeout(startGPSTracking, 5000);
      }
    }
    
    // ===================================================================
    // DESBLOQUEIO DE ÁUDIO - Necessário para navegadores modernos
    // ===================================================================
    document.addEventListener('click', function desbloquearAudio() {
      var sound = document.getElementById("alert-soud");
      if (sound) {
        sound.play().then(function() { 
          sound.pause(); 
          sound.currentTime = 0; 
        }).catch(function() {});
      }
      document.removeEventListener('click', desbloquearAudio);
    }, { once: true });
    
    // ===================================================================
    // INICIALIZAÇÃO DO SISTEMA - Aguarda o DOM carregar completamente
    // ===================================================================
    window.onload = initMap;
  </script>
</body>
</html>
