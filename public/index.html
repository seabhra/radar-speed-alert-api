<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Radar X9 BH - Alerta Inteligente (OSM)</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  
  <!-- Fontes -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    :root {
      --bg-color: #0f1115;
      --panel-color: #1a1d24;
      --accent-color: #00ff88;
      --alert-color: #ff3333;
      --text-main: #ffffff;
      --text-muted: #a0a0a0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      background-color: var(--panel-color);
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--accent-color);
      box-shadow: 0 4px 15px rgba(0, 255, 136, 0.1);
      z-index: 1000;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }
    .app-icon { width: 50px; height: 40px; border-radius: 8px; }
    h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; }
    h1 span { color: var(--accent-color); }

    /* Search Bar */
    .search-container {
      background-color: var(--panel-color);
      padding: 10px 15px;
      display: flex;
      gap: 10px;
      z-index: 1000;
    }

    .search-container input {
      flex: 1;
      padding: 12px 15px;
      border-radius: 30px;
      border: 1px solid #333;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-size: 0.9rem;
      outline: none;
    }

    .search-container input:focus { border-color: var(--accent-color); }

    .btn-search {
      background-image: url('/imagens_app/ic_radar_busca.png');
      background-size: 40px 40px;
      background-repeat: no-repeat;
      background-position: center;
      width: 45px; height: 45px;
      background-color: var(--bg-color);
      border: 1px solid #333;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-search:hover { border-color: var(--accent-color); transform: scale(1.05); }

    /* Map Container */
    .map-wrapper {
      position: relative;
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
      background-color: #bbb7b7;
    }

 /* NOVO: Widget de Velocidade (Descido e Número Preto Centralizado) */ 
.speed-widget {
  position: absolute;
  bottom: 50px;
  left: 5px;
  width: 150px; 
  height: 150px; 
  z-index: 500;
}

/* Imagem de fundo */
.speed-bg {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100%;
  height: 100%;
  object-fit: contain;

  transform: translate(-30%, -30%); /* antes -50%, agora desce a imagem */
  pointer-events: none;
}

/* Número centralizado REAL */

.speed-value {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(10%, -4%); /* antes -50%, agora desce um pouco */

  font-size: 35px;
  font-weight: 800;
  color: #000;
  line-height: 1;
  text-align: center;
  min-width: 2ch;
}    

    /* NOVO: Botões do Mapa Maiores */
    .map-controls {
      position: absolute;
      right: 15px;
      bottom: 40px; /* Alinhado à altura da placa de velocidade */
      display: flex;
      flex-direction: column;
      gap: 12px; /* Mais espaço entre eles */
      z-index: 500;
    }

    .map-btn {
      width: 60px; /* AUMENTADO (era 45) */
      height: 60px; /* AUMENTADO (era 45) */
      background-color: rgba(26, 29, 36, 0.9);
      border: 1px solid #333;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
      transition: 0.2s;
    }

    .map-btn:hover { border-color: var(--accent-color); background-color: rgba(26, 29, 36, 1); }
    .map-btn img { 
      width: 40px; /* ÍCONES AUMENTADOS (era 24) */
      height: 40px; /* ÍCONES AUMENTADOS (era 24) */
      pointer-events: none; 
    }

    /* Alert Bar (Bottom) */
    #alert-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      display: none;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .alert-bar {
      background-color: var(--alert-color);
      color: white;
      padding: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 -5px 20px rgba(255, 0, 0, 0.4);
    }

    .alert-bar img { width: 40px; height: 40px; }
    .alert-info h3 { font-size: 1.1rem; margin-bottom: 3px; text-transform: uppercase; font-weight: 800; }
    .alert-info p { font-size: 0.85rem; opacity: 0.9; }

    /* Loading State */
    .loading-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: var(--panel-color);
      padding: 20px 30px;
      border-radius: 10px;
      border: 1px solid var(--accent-color);
      text-align: center;
      z-index: 1001;
    }
    .loading-spinner { border: 3px solid #333; border-top: 3px solid var(--accent-color); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Esconde os controles padrão de zoom do Leaflet */
    .leaflet-control-zoom { display: none !important; }
  </style>
</head>
<body>

  <!-- HEADER LIMPO -->
  <header>
    <div class="header-left">
      <img src="/imagens_app/ic_icon_app.png" alt="App Icon" class="app-icon">
      <h1>RADAR <span>X9</span> BH</h1>
    </div>
  </header>

  <div class="search-container">
    <input type="text" id="query" placeholder="Buscar endereço ou tipo de radar...">
    <button class="btn-search" id="btn-search" title="Buscar"></button>
  </div>

  <div class="map-wrapper">
    <!-- Mapa OSM -->
    <div id="map"></div>

    <!-- WIDGET DE VELOCIDADE -->
    <div class="speed-widget">
      <img src="/imagens_app/ic_speed_limit.png" alt="Velocidade" class="speed-bg">
      <div class="speed-value" id="speed-display">0</div>
    </div>

    <!-- Controles do Mapa (Maiores) -->
    <div class="map-controls">
      <button class="map-btn" id="btn-center" title="Minha Localização">
        <img src="/imagens_app/ic_location_button.png" alt="Centro">
      </button>
      <button class="map-btn" id="btn-refresh" title="Atualizar Radares">
        <img src="/imagens_app/ic_refresh_button.png" alt="Refresh">
      </button>
      <button class="map-btn" id="btn-zoom-in" title="Zoom In">
        <img src="/imagens_app/ic_zoom_in.png" alt="Zoom In">
      </button>
      <button class="map-btn" id="btn-zoom-out" title="Zoom Out">
        <img src="/imagens_app/ic_zoom_out.png" alt="Zoom Out">
      </button>
      
    </div>

    <!-- Caixa de Alerta -->
    <div id="alert-container">
      <div class="alert-bar">
        <img id="alert-icon" src="/imagens_app/ic_radar_das.png" alt="Tipo Radar">
        <div class="alert-info">
          <h3>Atenção! Radar Detectado</h3>
          <p id="alert-text">Você está próximo a um radar.</p>
        </div>
      </div>
    </div>

    <!-- Loading -->
    <div class="loading-overlay" id="loading">
      <div class="loading-spinner"></div>
      <div>Carregando Radares...</div>
    </div>
  </div>

  <!-- Áudio de Alerta -->
  <audio id="alert-sound" src="alerta.mp3" preload="auto"></audio>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    let map;
    let userMarker;
    let radarMarkers = [];
    let alertTimeout;
    let radaresData = [];
    let userLat = -19.9167;
    let userLng = -43.9345;

    // Variáveis para cálculo de velocidade
    let prevLat = null;
    let prevLng = null;
    let prevTime = null;

    const iconMap = {
      'cem': '/imagens_app/ic_radar_cem.png',
      'cev': '/imagens_app/ic_radar_cev.png',
      'das': '/imagens_app/ic_radar_das.png',
      'dife': '/imagens_app/ic_radar_dife.png',
      'dfpr': '/imagens_app/ic_radar_dfpr.png',
      'dtlp': '/imagens_app/ic_radar_dtlp.png',
      'duc': '/imagens_app/ic_radar_duc.png',
      'ocr': '/imagens_app/ic_radar_ocr.png',
      'rcp': '/imagens_app/ic_radar_rcp.png',
      'rev': '/imagens_app/ic_radar_rev.png',
      'default': '/imagens_app/ic_radar_cem.png'
    };

    function getIconUrl(tipo) {
      const tipoLimpo = String(tipo).toLowerCase().trim();
      return iconMap[tipoLimpo] || iconMap['default'];
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
      const R = 6371e3; 
      const p1 = lat1 * Math.PI / 180;
      const p2 = lat2 * Math.PI / 180;
      const dp = (lat2 - lat1) * Math.PI / 180;
      const dl = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dp / 2) * Math.sin(dp / 2) +
                Math.cos(p1) * Math.cos(p2) *
                Math.sin(dl / 2) * Math.sin(dl / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c; 
    }

    function initMap() {
      map = L.map('map', {
        center: [userLat, userLng],
        zoom: 14,
        zoomControl: false
      });

      L.tileLayer('', {
        attribution: <a href="https://www.openstreetmap.org/copyright"></a> <a href="https://carto.com/"></a>',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);

      $("#btn-search").click(() => buscarRadares($("#query").val()));
      $("#query").keypress((e) => { if (e.which == 13) buscarRadares($("#query").val()); });
      
      $("#btn-center").click(() => {
        if (userMarker) map.setView(userMarker.getLatLng(), map.getZoom());
      });
      
      $("#btn-zoom-in").click(() => map.zoomIn());
      $("#btn-zoom-out").click(() => map.zoomOut());
      $("#btn-refresh").click(() => carregarRadares());

      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(updateUserLocation, showError, { enableHighAccuracy: true, maximumAge: 5000 });
      } else {
        $("#loading").html("<div style='color: red'>GPS não suportado.</div>");
      }

      carregarRadares();
    }

    function updateUserLocation(position) {
      const newLat = position.coords.latitude;
      const newLng = position.coords.longitude;
      const userPosition = [newLat, newLng];

      // Cálculo de Velocidade
      let speedKmh = 0;
      const currentTime = Date.now();

      if (prevLat !== null && prevTime !== null) {
        const distanceMeters = calcularDistancia(prevLat, prevLng, newLat, newLng);
        const timeSeconds = (currentTime - prevTime) / 1000;

        if (timeSeconds > 0) {
          speedKmh = Math.round((distanceMeters / timeSeconds) * 3.6); 
        }
      }

      if (speedKmh > 250) {
        speedKmh = 0;
      }

      $("#speed-display").text(speedKmh);

      prevLat = newLat;
      prevLng = newLng;
      prevTime = currentTime;

      userLat = newLat;
      userLng = newLng;

      const userIcon = L.icon({
        iconUrl: '/imagens_app/ic_gps_marker.png',
        iconSize: [40, 40],
        iconAnchor: [20, 40]
      });

  const userMarker = L.marker([lat, lng], { icon: userIcon })
  .addTo(map)
  .bindTooltip("📍 Local do Usuário", {
    permanent: true,
    direction: "top",
    offset: [0, -30]
  });

      if (!userMarker) {
        userMarker = L.marker(userPosition, { icon: userIcon }).addTo(map);
        map.setView(userPosition, 15);
      } else {
        userMarker.setLatLng(userPosition);
      }

      verificarProximidade(userLat, userLng);
    }

    function carregarRadares() {
      $("#loading").show();

      fetch("radares.json")
        .then(response => {
          if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);
          return response.json();
        })
        .then(data => {
          radaresData = data;
          radarMarkers.forEach(marker => map.removeLayer(marker));
          radarMarkers = [];

          data.forEach(radar => {
            const lat = parseFloat(radar.latitude);
            const lng = parseFloat(radar.longitude);
            if (isNaN(lat) || isNaN(lng)) return;

            const iconeRadar = L.icon({
              iconUrl: getIconUrl(radar.tipo),
              iconSize: [40, 40],
              iconAnchor: [20, 40],
              popupAnchor: [0, -40]
            });

            const radarMarker = L.marker([lat, lng], { icon: iconeRadar }).addTo(map);
            
            const popupContent = `
              <div style="color:#000; font-family:Inter; text-align:center;">
                <b>${radar.tipo.toUpperCase()}</b><br>
                ${radar.endereco}<br>
                <span style="color:red; font-weight:bold;">Máx: ${radar.velocidade_maxima} km/h</span>
              </div>
            `;
            radarMarker.bindPopup(popupContent);
            radarMarker.radarData = radar;
            radarMarkers.push(radarMarker);
          });

          $("#loading").hide();
        })
        .catch(error => {
          console.error("Erro ao carregar radares:", error);
          $("#loading").html("<div style='color: red'>Falha ao carregar radares.json</div>");
        });
    }

    function verificarProximidade(uLat, uLng) {
      let alertTriggered = false;

      radarMarkers.forEach(marker => {
        if (alertTriggered) return;

        const dados = marker.radarData;
        const rLat = parseFloat(dados.latitude);
        const rLng = parseFloat(dados.longitude);

        const distance = calcularDistancia(uLat, uLng, rLat, rLng);

        if (distance < 300) { 
          alertTriggered = true;
          const iconeTipo = getIconUrl(dados.tipo);

          $("#alert-icon").attr("src", iconeTipo);
          $("#alert-text").text(`${dados.endereco} - Máx: ${dados.velocidade_maxima}km/h (${Math.round(distance)}m)`);

          const sound = document.getElementById('alert-sound');
          sound.currentTime = 0;
          sound.play().catch(e => console.log("Erro ao tocar áudio:", e));

          $("#alert-container").fadeIn(200);

          clearTimeout(alertTimeout);
          alertTimeout = setTimeout(() => {
            $("#alert-container").fadeOut(500);
          }, 5000);
        }
      });
    }

    function buscarRadares(query) {
      if (!query || query.length < 3) return;

      let encontrou = false;
      const boundsGroup = L.featureGroup(); 

      radarMarkers.forEach(marker => {
        const titulo = `${marker.radarData.tipo} - ${marker.radarData.endereco}`.toLowerCase();
        
        if (titulo.includes(query.toLowerCase())) {
          encontrou = true;
          boundsGroup.addLayer(marker);
          marker.openPopup(); 
        }
      });

      if (encontrou) {
        map.fitBounds(boundsGroup.getBounds().pad(0.5)); 
      } else {
        alert("Nenhum radar encontrado para essa busca.");
      }
    }

    function showError(error) {
      console.warn(`Erro de GPS: ${error.message}`);
      $("#loading").html("<div style='color: orange'>Ative seu GPS para usar o app.</div>");
    }

    
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
      .then(() => console.log('SW OK'))
      .catch(err => console.log('SW Fail', err));
  });
}
    window.onload = initMap;
  </script>
</body>
</html>
