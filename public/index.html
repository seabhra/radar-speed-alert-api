    function getIconUrl(tipo, velocidade) {

      if (tipoLimpo.includes('Parada sobre Faixa de Pedestres') || tipoLimpo.includes('DPFP')) return iconMap['Detector de Parada sobre Faixa de Pedestres (DPFP)'];
      if (tipoLimpo.includes('Semáforo') || tipoLimpo.includes('(DAS)')) return iconMap['Detector de Avanço de Semáforo (DAS)'];
      if (tipoLimpo === 'Controle de Redução de Velocidade (CRV)' || tipoLimpo === 'Controle de Redução de Velocidade') return iconMap['Controle de Redução de Velocidade (CRV)'];
      let isRadarVelocidade = tipoLimpo.includes('Velocidade') || tipoLimpo.includes('CEV') || tipoLimpo.includes('Controlador Eletrônico');
      if (isRadarVelocidade) {
        let velNum = parseInt(String(velocidade || '').trim().replace(/[^0-9]/g, ''), 10);
        if (velNum === 40) return '/imagens_app/ic_radar_cev_40_v2.png';
        if (velNum === 50) return '/imagens_app/ic_radar_cev_50_v2.png';
        if (velNum === 60) return '/imagens_app/ic_radar_cev_60_v2.png';

        if (velNum === 80) return '/imagens_app/ic_radar_cev_80_v2.png';
        if (velNum === 110) return '/imagens_app/ic_radar_cev_110_v2.png';
        return '/imagens_app/ic_radar_cev_v2.png';
      }
      if (iconMap[tipoLimpo]) return iconMap[tipoLimpo];
      let substrings = [
        { keys: ['Olho Vivo', 'COV'], icon: iconMap['Câmera Olho Vivo (COV)'] },
        { keys: ['Facial'], icon: iconMap['Leitor de Reconhecimento Facial (OCR-F)'] },

        { keys: ['Inundaç', 'ZIR'], icon: iconMap['Zona de Risco de Inundações Recorrentes (ZIR)'] },
        { keys: ['Redução', 'Redutor', 'DRV', 'CRV'], icon: iconMap['Controle de Redução de Velocidade (CRV)'] },
        { keys: ['Conversão'], icon: iconMap['Detector de Conversão em Local Proibido'] },
        { keys: ['Invasão', 'DIFEX', 'Faixa Exclusiva', 'MOVE'], icon: iconMap['Detector de Invasão de Faixa Exclusiva (DIFEX)'] },
        { keys: ['Tráfego Proibido', 'DTLP'], icon: iconMap['Detector de Tráfego em Local Proibido'] },
        { keys: ['BUS', 'Faixa Preferencial'], icon: iconMap['Detector de Faixa Preferencial de Ônibus (BUS)'] },
      ];
      for (let s = 0; s < substrings.length; s++) {
        let entry = substrings[s];
        for (let k = 0; k < entry.keys.length; k++) { if (tipoLimpo.includes(entry.keys[k])) return entry.icon; }
      }
      return iconMap['default'];
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
      let R = 6371e3; let p1 = lat1 * Math.PI / 180; let p2 = lat2 * Math.PI / 180;
      let dp = (lat2 - lat1) * Math.PI / 180; let dl = (lon2 - lon1) * Math.PI / 180;
      let a = Math.sin(dp/2)*Math.sin(dp/2) + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)*Math.sin(dl/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    
    function calcularBearing(lat1, lng1, lat2, lng2) {
      let dLng = (lng2 - lng1) * Math.PI / 180; let lat1Rad = lat1 * Math.PI / 180; let lat2Rad = lat2 * Math.PI / 180;
      let y = Math.sin(dLng) * Math.cos(lat2Rad);
      let x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLng);
      let bearing = Math.atan2(y, x) * 180 / Math.PI;
      return (bearing + 360) % 360;
    }
    
    function suavizarPosicao(novaLat, novaLng) {
      if (posicaoSuavizada.lat === null) { posicaoSuavizada.lat = novaLat; posicaoSuavizada.lng = novaLng; return { lat: novaLat, lng: novaLng }; }
      let fator = ALERT_CONFIG.SUAVIZACAO_FATOR;
      posicaoSuavizada.lat += (novaLat - posicaoSuavizada.lat) * fator;
      posicaoSuavizada.lng += (novaLng - posicaoSuavizada.lng) * fator;
      return { lat: posicaoSuavizada.lat, lng: posicaoSuavizada.lng };
    }
    
    function adicionarAoHistorico(lat, lng, timestamp) { historicoPosicoes.push({ lat: lat, lng: lng, time: timestamp }); if (historicoPosicoes.length > ALERT_CONFIG.HISTORICO_TAMANHO) historicoPosicoes.shift(); }
    
    function calcularTendenciaDistancia(radarId, distanciaAtual) {
      if (!historicoDistanciasRadar[radarId]) historicoDistanciasRadar[radarId] = [];
      historicoDistanciasRadar[radarId].push({ distancia: distanciaAtual, time: Date.now() });
      if (historicoDistanciasRadar[radarId].length > 5) historicoDistanciasRadar[radarId].shift();
      let historico = historicoDistanciasRadar[radarId];
      if (historico.length < 2) return { estaAproximando: true, estaAfastando: false };
      let diferenca = historico[0].distancia - historico[historico.length - 1].distancia;
      if (diferenca > 5) return { estaAproximando: true, estaAfastando: false, diferenca: diferenca };
      if (diferenca < -5) return { estaAproximando: false, estaAfastando: true, diferenca: diferenca };
      return { estaAproximando: true, estaAfastando: false, diferenca: 0 };
    }
    
    function moverMarcadorSuavemente(targetLat, targetLng) {
      let marcadorParaMover = estaEmNavegacao ? startRouteMarker : userMarker;
      if (!marcadorParaMover) return;
      if (ultimaPosicaoMarcador.lat === null) { ultimaPosicaoMarcador = { lat: targetLat, lng: targetLng }; marcadorParaMover.setLatLng([targetLat, targetLng]); return; }
      let distancia = calcularDistancia(ultimaPosicaoMarcador.lat, ultimaPosicaoMarcador.lng, targetLat, targetLng);
      if (distancia < ALERT_CONFIG.DISTANCIA_MINIMA_MOVIMENTO) return;
      let inicioLat = ultimaPosicaoMarcador.lat; let inicioLng = ultimaPosicaoMarcador.lng;
      let duracao = 300; let inicioTempo = performance.now();
      if (animacaoMarcadorAtiva) return;
      animacaoMarcadorAtiva = true;
      function animarFrame(tempoAtual) {
        let progresso = Math.min((tempoAtual - inicioTempo) / duracao, 1);
        let easing = 1 - Math.pow(1 - progresso, 3);
        marcadorParaMover.setLatLng([inicioLat + (targetLat - inicioLat) * easing, inicioLng + (targetLng - inicioLng) * easing]);
        if (progresso < 1) { requestAnimationFrame(animarFrame); } else { ultimaPosicaoMarcador = { lat: targetLat, lng: targetLng }; animacaoMarcadorAtiva = false; }
      }
      requestAnimationFrame(animarFrame);
    }
    
    function limparHistoricoDistancia(radarId) { if (historicoDistanciasRadar[radarId]) delete historicoDistanciasRadar[radarId]; }
    
    function verificarDirecaoMelhorada(uLat, uLng, uHeading, radarLat, radarLng, radarId, distanciaAtual) {
      if (!uHeading || uHeading === -1 || isNaN(uHeading)) { let t = calcularTendenciaDistancia(radarId, distanciaAtual); return { estaAproximando: t.estaAproximando, estaAfastando: t.estaAfastando }; }
      let deltaX = radarLng - uLng; let deltaY = radarLat - uLat; let anguloRadar = (Math.atan2(deltaY, deltaX) * 180 / Math.PI + 360) % 360;
      let diff = Math.abs(uHeading - anguloRadar); diff = Math.min(diff, 360 - diff);
      let tendencia = calcularTendenciaDistancia(radarId, distanciaAtual);
      return { estaAproximando: (diff < ALERT_CONFIG.ANGULO_APROXIMACAO) || tendencia.estaAproximando, estaAfastando: (diff > ALERT_CONFIG.ANGULO_AFASTANDO) && tendencia.estaAfastando };
    }
    
    function aplicarTemaMapa() {

    function extrairCoordenadas(record, index) {

        console.warn('Radar #' + (index !== undefined ? index : '?') + ': record muito curto (' + (record ? record.length : 0) + ' campos)');
        return null;
      }

      let s = String(record[9]).trim();
      console.log('Radar #' + (index !== undefined ? index : '?') + ': coordenada bruta = "' + s + '"');

      // NOVA LÓGICA: Detectar formato e converter corretamente
      let lat, lng;

      // Tentar formato com ponto decimal padrão: "-19.919055,-43.938641"
      if (s.includes('.')) {
        let parts = s.split(',').map(function(p) { return p.trim(); });
        if (parts.length === 2) {
          lat = parseFloat(parts[0]);
          lng = parseFloat(parts[1]);
        }
      }
      // Formato brasileiro com vírgula decimal: "-19,919055;-43,938641" (ponto-e-vírgula como separador)
      else if (s.includes(';')) {
        let parts = s.split(';').map(function(p) { return p.trim().replace(',', '.'); });
        if (parts.length === 2) {
          lat = parseFloat(parts[0]);
          lng = parseFloat(parts[1]);
        }
      }
      // Formato brasileiro com vírgula decimal E vírgula como separador (problemático)
      // "-19,919055,-43,938641" → precisa de lógica mais inteligente
      else if ((s.match(/,/g) || []).length >= 3) {
        // Assumir que a coordenada está no formato lat,decimal_lng,decimal
        // Estratégia: encontrar o separador entre os dois números (vírgula entre número completo e sinal negativo)
        let match = s.match(/(-?\d+,\d+),(-?\d+,\d+)/);
        if (match) {
          lat = parseFloat(match[1].replace(',', '.'));
          lng = parseFloat(match[2].replace(',', '.'));
        }
      }
      // Último recurso: tentar split simples
      else {
        let parts = s.split(',').map(function(p) { return p.trim().replace(',', '.'); });
        if (parts.length === 2) {
          lat = parseFloat(parts[0]);
          lng = parseFloat(parts[1]);
        }
      }

      if (isNaN(lat) || isNaN(lng) || lat < -90 || lat > 90 || lng < -180 || lng > 180) {
        console.warn('Radar #' + (index !== undefined ? index : '?') + ': coordenadas inválidas (lat=' + lat + ', lng=' + lng + ')');
        return null;
      }

      return { lat: lat, lng: lng };
    }

      ab.addEventListener('click', function() {
        alertaHabilitado = !alertaHabilitado;
        if (alertaHabilitado) { ab.classList.remove('alert-off'); if (ai) { ai.src = "/imagens_app/ic_sound_on.png"; ai.onerror = function() { this.src = 'https://cdn-icons-png.flaticon.com/512/727/727245.png'; }; } showNotification("Alerta LIGADO"); }
        else { ab.classList.add('alert-off'); if (ai) { ai.src = "/imagens_app/ic_sound_off.png"; ai.onerror = function() { this.src = 'https://cdn-icons-png.flaticon.com/512/3398/3398405.png'; }; } showNotification("Alerta DESLIGADO"); }
        esconderAlertaVisual();
      });
    }
    
    // ===================================================================
    // INICIALIZAÇÃO DO MAPA
    // ===================================================================
    function initMap() {
      if (typeof L === 'undefined') { hideFullscreenLoading(); showNotification("Erro de conexão."); return; }
      map = L.map('map', { center: [userLat, userLng], zoom: 17, zoomControl: false, rotate: true, bearing: 0 });
      aplicarTemaMapa();
      setInterval(aplicarTemaMapa, 300000);
      inicializarBussolaHardware();
    
      map.on('dragstart', function() { isFollowing = false; if (returnToGpsTimer) clearTimeout(returnToGpsTimer); });
      map.on('dragend', function() {
        returnToGpsTimer = setTimeout(function() {
          if (!isFollowing) {
            let m = estaEmNavegacao ? startRouteMarker : userMarker;
            if (m) {
              isFollowing = true;
              if (modoNavegacaoAtivo) { let c = calcularCentroMapaComOffsetParaCoordenadas(ultimaPosicaoMarcador.lat || userLat, ultimaPosicaoMarcador.lng || userLng); map.setView([c.lat, c.lng], zoomAtualNavegacao, { animate: false }); }
              else { map.setView(m.getLatLng(), map.getZoom(), { animate: true, duration: 0.5 }); }
              showNotification("Voltando à sua posição");
            }
          }
        }, TEMPO_RETORNO_GPS);
      });
    
      $("#btn-calc-route").click(async function() {
        let endereco = document.getElementById('route-query').value.trim();
        if (endereco.length < 5) { showNotification("Digite um endereço válido."); return; }
        $("#loading").show().html("<div class='loading-spinner'></div><div>Calculando rota...</div>");
        let coords = await buscarCoordenadas(endereco);
        if (coords) {
          fecharTodasBarras();
          esconderAlertaVisual();
          iniciarNavegacao3D(coords.lat, coords.lng);
        } else { $("#loading").hide(); showNotification("Endereço não encontrado."); }
      });
    
      $("#route-query").keypress(function(e) { if (e.which == 13) $("#btn-calc-route").click(); });
      $("#btn-search-radar").click(function() { buscarRadares(document.getElementById('query').value); });
      $("#query").keypress(function(e) { if (e.which == 13) buscarRadares(document.getElementById('query').value); });
    
      $("#btn-search-bar").click(function() {
        let barraRadares = document.getElementById('search-bar-radares');
        let barraRota = document.getElementById('search-bar-rota');
        let sidebar = document.getElementById('sidebar-controls');
        let btnMenu = document.getElementById('btn-menu-toggle');
        if (searchActive) { fecharTodasBarras(); return; }
        if (routeActive) routeActive = false;
        searchActive = true;
        barraRota.classList.remove('active');
        barraRadares.classList.add('active');
        if (!sidebarAberta) { sidebarAberta = true; sidebar.classList.remove('retracted'); btnMenu.classList.remove('active'); }
        setTimeout(function() { document.getElementById('query').focus(); }, 300);
      });
    
      $("#btn-route-bar").click(function() {
        let barraRadares = document.getElementById('search-bar-radares');
        let barraRota = document.getElementById('search-bar-rota');
        let sidebar = document.getElementById('sidebar-controls');
        let btnMenu = document.getElementById('btn-menu-toggle');
        if (routeActive) { fecharTodasBarras(); return; }
        if (searchActive) searchActive = false;
        routeActive = true;
        barraRadares.classList.remove('active');
        barraRota.classList.add('active');
        if (!sidebarAberta) { sidebarAberta = true; sidebar.classList.remove('retracted'); btnMenu.classList.remove('active'); }
        setTimeout(function() { document.getElementById('route-query').focus(); }, 300);
      });
    
      $("#btn-center").click(function() {
        resetarTotalMapa();
        isFollowing = true;
        showNotification("Centralizando na sua posição...");
      });
    
      $("#btn-refresh").click(function() { resetarTotalMapa(); carregarRadares(); });
    
      $("#btn-zoom-in").click(function() { if (map) map.zoomIn(); });
      $("#btn-zoom-out").click(function() { if (map) map.zoomOut(); });
    
      inicializarBotaoRotacaoMapa();
      inicializarBotaoAlertaToggle();
      startGPSTracking();
      carregarRadares();
    }
    
    // ===================================================================
    // CARREGAR RADARES
    // ===================================================================
    async function carregarRadares() {
      if (!map) return;
      if (radarMarkers.length > 0) { radarMarkers.forEach(function(m) { map.removeLayer(m); }); radarMarkers = []; }
      $("#loading").show().html("<div class='loading-spinner'></div><div>Carregando radares...</div>");
      try {
        let response = await fetch('radares.json?v=' + Date.now());
        if (!response.ok) throw new Error("HTTP " + response.status);
        let data = await response.json();
        let records = (Array.isArray(data)) ? data : (data.result?.records || data.records || []);
        if (records.length > 0) renderizarRadaresNoMapa(records, "radares.json");
        else throw new Error("Nenhum radar encontrado");
      } catch (e) { console.warn("[Radar X9] Falha:", e.message); $("#loading").hide(); showNotification("Erro ao carregar radares: " + e.message); }
    }
    
    // ===================================================================
    // RENDERIZAR RADARES NO MAPA — VERSÃO MELHORADA COM LOGS
    // ===================================================================
    function renderizarRadaresNoMapa(records, origem) {
      if (!map) return;
      let contador = 0;
      let falhasCoords = 0;
      let falhasValidacao = 0;

      for (let i = 0; i < records.length; i++) {
        let record = records[i];
        let endereco = record[2] || "Endereço não informado";
        let tipo = (record[3] || "Não Identificado").trim();
        let velocidade = record[4] || "0";
        let coordsFinais = extrairCoordenadas(record, i);
        if (!coordsFinais) {
          falhasCoords++;
          continue;
        }
        let iconeUrl = getIconUrl(tipo, velocidade);
        let fallbackUrl = '/imagens_app/ic_radar_cev_v2.png';
        let iconeRadar = criarIconeRadar(iconeUrl, 40, fallbackUrl);
        let radarMarker = L.marker([coordsFinais.lat, coordsFinais.lng], { icon: iconeRadar }).addTo(map);

        setTimeout(function() { 
          let el = radarMarker.getElement(); 
          if (el) {
            let imgEl = el.querySelector('img'); 
            if (imgEl) imgEl.setAttribute('data-fallback', fallbackUrl); 
          }
        }, 100);

        let tipoExibicao = ajusteNomes[tipo] || tipo;
        let isIA = tipoExibicao.includes('OCR') || tipoExibicao.includes('FACIAL');
        let tituloPopup = isIA ? '<span style="color:#33aaff">' + tipoExibicao + '</span>' : '<b>' + tipoExibicao + '</b>';
        radarMarker.bindPopup(
          '<div style="color:#222;font-family:Inter;text-align:center;min-width:200px;">' +
          tituloPopup +
          '<br><hr style="border:0;border-top:1px solid #ddd;margin:5px 0;">' +
          endereco +
          '<br><div style="color:#d00;font-weight:bold;margin-top:5px;">Máx: ' +
          velocidade +
          ' km/h</div></div>'
        );
        radarMarker.radarData = { id: i, latitude: coordsFinais.lat, longitude: coordsFinais.lng, endereco: endereco, velocidade_maxima: velocidade, tipoOriginal: tipo, tipoExibicao: tipoExibicao, isIA: isIA };
        radarMarkers.push(radarMarker);
        contador++;
      }
      console.log('Total: ' + records.length + ', Sucesso: ' + contador + ', Falhas: ' + falhasCoords);
      $("#loading").hide();
      if (contador > 0) showNotification('Base carregada: ' + origem + ' (' + contador + ' radares)');
      else showNotification("Nenhum radar encontrado.");
    }
    
    function buscarRadares(query) {
      if (!query || query.length < 2) return;
      let encontrou = false; let boundsGroup = L.featureGroup(); let q = query.toLowerCase();
      radarMarkers.forEach(function(m) { let d = m.radarData; if ((d.endereco + ' ' + d.tipoOriginal + ' ' + d.tipoExibicao).toLowerCase().includes(q)) { encontrou = true; boundsGroup.addLayer(m); m.openPopup(); } });
      if (encontrou) { if (map) map.fitBounds(boundsGroup.getBounds().pad(0.2)); isFollowing = false; } else { showNotification("Nenhum radar encontrado para: " + query); }
    }
    
    function showError(error) {
      if (gpsSource === 'appinventor') return;
      let msg = "Erro ao obter localização.";
      if (error.code === 1) msg = "Permissão de GPS negada.";
      if (error.code === 2) msg = "Sinal GPS indisponível.";
      if (error.code === 3) msg = "Tempo esgotado. Tentando novamente...";
      showNotification(msg); hideFullscreenLoading();
      if (error.code === 3) setTimeout(startGPSTracking, 5000);
    }
    
    document.addEventListener('click', function desbloquearAudio() {
      let sound = document.getElementById("alert-soud");
      if (sound) { sound.play().then(function() { sound.pause(); sound.currentTime = 0; }).catch(function() {}); }
      document.removeEventListener('click', desbloquearAudio);
    }, { once: true });
    
    window.onload = initMap;
</script>
