<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Radar X9 BH - Alerta Inteligente (OSM + IA)</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
  <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    :root {
      --bg-color: #0f1115;
      --panel-color: #1a1d24;
      --accent-color: #00ff88;
      --alert-color: #ff3333;
      --text-main: #ffffff;
      --text-muted: #a0a0a0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background-color: var(--panel-color);
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--accent-color);
      box-shadow: 0 4px 15px rgba(0, 255, 136, 0.1);
      z-index: 1000;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }
    .app-icon { width: 50px; height: 40px; border-radius: 8px; }
    h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; }
    h1 span { color: var(--accent-color); }

    .search-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background-color: rgba(26, 29, 36, 0.95);
      backdrop-filter: blur(5px);
      display: flex;
      gap: 10px;
      z-index: 1000;
      max-height: 0px; 
      overflow: hidden;
      opacity: 0;
      padding: 0px 15px;
      border-bottom: 1px solid transparent;
      transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease, border 0.3s ease;
    }

    .search-container.active {
      max-height: 70px;
      opacity: 1;
      padding: 10px 15px;
      border-bottom: 1px solid #333;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .search-container input {
      flex: 1;
      padding: 12px 15px;
      border-radius: 30px;
      border: 1px solid #333;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-size: 0.9rem;
      outline: none;
    }

    .map-wrapper {
      position: relative;
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
      background-color: #bbb7b7;
    }
    
    .speed-widget {
      position: absolute;
      bottom: -15px; 
      left: -25px; 
      width: 150px; 
      height: 150px; 
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .speed-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .speed-value {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      font-size: 28px;
      font-weight: 700;
      font-family: 'Rajdhani', 'Oswald', 'Arial Narrow', sans-serif;
      color: #000;
      line-height: 1;
      text-align: center;
      z-index: 2;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      letter-spacing: -1px;
    }    
    
    .btn-search,
    .map-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      --btn-size: 45px;
      --icon-scale: 0.85;
      width: var(--btn-size);
      height: var(--btn-size);
      background-size: calc(var(--btn-size) * var(--icon-scale));
      background-repeat: no-repeat;
      background-position: center;
      background-color: var(--bg-color);
      border: 1px solid #333;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.2s;
      flex-shrink: 0;
    }
    .btn-search:hover,
    .map-btn:hover {
      border-color: var(--accent-color);
      transform: scale(1.05);
    }

    #btn-route-bar {
      --btn-size: 50px;
      --icon-scale: 0.95;
      background-color: rgba(255, 165, 0, 0.9);
      border: 2px solid rgba(255, 165, 0, 0.6);
      box-shadow: 0 0 15px rgba(255, 165, 0, 0.3);
      z-index: 10;
    }

    .map-controls {
      position: absolute;
      right: 15px;
      bottom: 40px;
      display: flex;
      flex-direction: column;
      align-items: center; 
      gap: 12px;
      z-index: 500;
    }

    .map-btn img,
    .control-btn img {
      width: calc(var(--btn-size) * var(--icon-scale));
      height: calc(var(--btn-size) * var(--icon-scale));
      object-fit: contain;
      pointer-events: none;
      transition: 0.2s;
    }

    #btn-search-bar { background-color: rgba(76, 220, 205, 0.9); }
    #btn-center { background-color: rgba(0, 255, 136, 0.9); border: 2px solid rgba(0, 255, 136, 0.5); }
    #btn-refresh { background-color: rgba(100, 100, 255, 0.9); }
    #btn-zoom-in, #btn-zoom-out { background-color: rgba(150, 150, 150, 0.8); --icon-scale: 0.6; }
    
    #alert-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      display: none;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .alert-bar {
      background-color: var(--alert-color);
      color: white;
      padding: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 -5px 20px rgba(255, 0, 0, 0.4);
    }

    .alert-bar img { width: 40px; height: 40px; }
    .alert-info h3 { font-size: 1.1rem; margin-bottom: 3px; text-transform: uppercase; color: white; font-weight: 800; }
    .alert-info p { font-size: 0.85rem; opacity: 0.9; }

    .toast-notification {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background-color: var(--panel-color);
      color: var(--text-main);
      padding: 15px 25px;
      border-radius: 30px;
      border: 1px solid #555;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
      z-index: 2000;
      opacity: 0;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      white-space: nowrap;
    }

    .toast-notification.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .loading-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: var(--panel-color);
      padding: 20px 30px;
      border-radius: 10px;
      border: 1px solid var(--accent-color);
      text-align: center;
      z-index: 1001;
    }
    .loading-spinner { border: 3px solid #333; border-top: 3px solid var(--accent-color); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    .leaflet-control-zoom { display: none !important; }
    .leaflet-control-attribution { display: none !important; } 
    .leaflet-routing-container { display: none !important; }

    .loading-fullscreen {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .loading-fullscreen.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    .loading-fullscreen .spinner-ring {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      position: relative;
      margin-bottom: 24px;
    }

    .loading-fullscreen .spinner-ring::before,
    .loading-fullscreen .spinner-ring::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 4px solid transparent;
    }

    .loading-fullscreen .spinner-ring::before {
      border-top-color: var(--accent-color);
      border-right-color: var(--accent-color);
      animation: spinRing 1s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite;
    }

    .loading-fullscreen .spinner-ring::after {
      inset: 8px;
      border-bottom-color: #ff3333;
      border-left-color: #ff3333;
      animation: spinRing 1.4s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite reverse;
    }

    @keyframes spinRing {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-fullscreen .loading-text {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-align: center;
      padding: 0 20px;
    }

    .loading-fullscreen .loading-text span {
      color: var(--accent-color);
      font-weight: 800;
    }

    .loading-fullscreen .loading-sub {
      margin-top: 8px;
      font-size: 0.75rem;
      color: #555;
      animation: pulseText 1.8s ease-in-out infinite;
    }

    @keyframes pulseText {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="loading-fullscreen" id="loading-fullscreen">
    <div class="spinner-ring"></div>

  </header>

  <div class="map-wrapper">
    
    <div class="search-container" id="search-bar-radares">

      'Detector de Uso de Celular (DUC)': '/imagens_app/ic_radar_duc.png',

      'default': '/imagens_app/ic_radar_cev.png'
    };

    const ajusteNomes = {
      'Controlador Eletrônico de Velocidade': 'Controlador Eletrônico de Velocidade (CEV)',
      'Detector de Avanço de Semáforo': 'Detector de Avanço de Semáforo (DAS)',
      'Detector de Trânsito em Local Proibido': 'Detector de Trânsito em Local Proibido (DTLP)',
      'Detector de Uso de Celular': 'Detector de Uso de Celular (DUC)',
      'Detector de Redução de Velocidade': 'Detector de Redução de Velocidade (DRV)',
      'Leitor Inteligente de Placas': 'Leitor Inteligente de Placas (OCR-P)',
      'Leitor de Reconhecimento Facial': 'Leitor de Reconhecimento Facial (OCR-F)'
    };

    /* ==========================================================================
       FUNÇÃO MELHORADA PARA BUSCAR ÍCONE
       ========================================================================== */
    function getIconUrl(tipo) {
      // Tenta encontrar o ícone diretamente
      if (iconMap[tipo]) return iconMap[tipo];
      
      // Tenta encontrar ignorando espaços e hífens
      const tipoNormalizado = tipo.replace(/\s*-\s*/g, ' - ');
      if (iconMap[tipoNormalizado]) return iconMap[tipoNormalizado];
      
      // Fallback baseado em palavras-chave
      if (tipo.includes('Velocidade')) return iconMap['Controlador Eletrônico de Velocidade'];
      if (tipo.includes('Semáforo')) return iconMap['Detector de Avanço de Semáforo'];
      if (tipo.includes('Conversão') || tipo.includes('Retorno')) return iconMap['Detector de Conversão/Retorno em local Proibido'];
      if (tipo.includes('Invasão')) return iconMap['Detector de Invasão de Faixa de Exclusiva - MOVE'];
      if (tipo.includes('Celular')) return iconMap['Detector de Uso de Celular'];
      if (tipo.includes('Redução')) return iconMap['Detector de Redução de Velocidade'];
      if (tipo.includes('OCR')) return iconMap['Leitor Inteligente de Placas (OCR-P)'];
      if (tipo.includes('Facial')) return iconMap['Leitor de Reconhecimento Facial (OCR-F)'];
      if (tipo.includes('Misto') || tipo.includes('CEM')) return iconMap['Controlador Eletrônico Misto (CEM)- Velocidade (CEV) e Semáforo (DAS)'];
      
      return iconMap['default'];
    }

    function showNotification(message) {
      const $toast = $("#toast-msg");
      $toast.text(message).addClass("show");
      
      setTimeout(() => {
        $toast.removeClass("show");

    }

    /* ==========================================================================
       RADARES DE INTELIGÊNCIA ARTIFICIAL
       ========================================================================== */

        { lat: -19.9255, lng: -43.9390, end: "Av. Afonso Pena, Próx. à Praça Sete", tipo: "Leitor Inteligente de Placas (OCR-P)", vel: "60" },
        { lat: -19.9190, lng: -43.9370, end: "Av. Afonso Pena em frente ao Cine Theatro Brasil", tipo: "Leitor de Reconhecimento Facial (OCR-F)", vel: "40" },

    function hideFullscreenLoading() {
      const el = document.getElementById('loading-fullscreen');
      if (!el) return;
      el.classList.add('fade-out');
      setTimeout(() => { el.remove(); }, 600);
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
      const R = 6371e3; 
      const p1 = lat1 * Math.PI / 180;
      const p2 = lat2 * Math.PI / 180;
      const dp = (lat2 - lat1) * Math.PI / 180;
      const dl = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dp / 2) * Math.sin(dp / 2) +
                Math.cos(p1) * Math.cos(p2) *
                Math.sin(dl / 2) * Math.sin(dl / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c; 
    }

    function aplicarTemaMapa() {
      const hora = new Date().getHours();
      const urlDia = 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
      const urlNoite = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
      const urlAtual = (hora >= 19 || hora < 6) ? urlNoite : urlDia;

      if (tileLayer) {
        tileLayer.setUrl(urlAtual);
      } else {
        tileLayer = L.tileLayer(urlAtual, {
          attribution: '', subdomains: 'abcd', maxZoom: 19
        }).addTo(map);
      }
    }

    async function buscarCoordenadas(endereco) {
      try {
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}&countrycodes=br&limit=1`;
        const response = await fetch(url);
        const data = await response.json();
        if (data && data.length > 0) {
          return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
        }
        return null;
      } catch (error) {
        console.error("Erro ao buscar endereço:", error);
        return null;
      }
    }

    function calcularRota(destLat, destLng) {
      if (routingControl) {
        map.removeControl(routingControl);
      }
      routingControl = L.Routing.control({
        waypoints: [ L.latLng(userLat, userLng), L.latLng(destLat, destLng) ],
        routeWhileDragging: false,
        addWaypoints: false,
        language: 'pt-BR',
        show: false,
        lineOptions: {
          styles: [
            { color: '#0044cc', opacity: 0.8, weight: 7 }, 
            { color: '#33aaff', opacity: 1, weight: 4 }   
          ]
        },
        createMarker: function() { return null; }
      }).addTo(map);
    }

    function initMap() {
      map = L.map('map', {
        center: [userLat, userLng], 
        zoom: 16, 
        zoomControl: false
      });

      aplicarTemaMapa();
      setInterval(aplicarTemaMapa, 300000);

      $("#btn-search-radar").click(() => buscarRadares($("#query").val()));
      $("#query").keypress((e) => { if (e.which == 13) buscarRadares($("#query").val()); });

      $("#btn-calc-route").click(async () => {
        const endereco = $("#route-query").val().trim();
        if (endereco.length < 5) {
          showNotification("Digite um endereço mais completo.");
          return;
        }
        
        $("#loading").show().html("<div class='loading-spinner'></div><div>Calculando rota...</div>");
        const coords = await buscarCoordenadas(endereco);
        
        if (coords) {
          calcularRota(coords.lat, coords.lng);
          map.setView([coords.lat, coords.lng], 16);
          $("#loading").hide();
        } else {
          $("#loading").hide();
          showNotification("Endereço não encontrado. Tente ser mais específico.");
        }
      });
      
      $("#route-query").keypress((e) => { if (e.which == 13) $("#btn-calc-route").click(); });

      function fecharTodasBarras() {
        searchActive = false;
        routeActive = false;
        $("#search-bar-radares").removeClass('active');
        $("#search-bar-rota").removeClass('active');
      }

      $("#btn-search-bar").click(() => {
        if (searchActive) { fecharTodasBarras(); return; }
        if (routeActive) routeActive = false;
        searchActive = true;
        $("#search-bar-radares").addClass('active');
        setTimeout(() => $("#query").focus(), 300);
      });

      $("#btn-route-bar").click(() => {
        if (routeActive) { fecharTodasBarras(); return; }
        if (searchActive) searchActive = false;
        routeActive = true;
        $("#search-bar-rota").addClass('active');
        setTimeout(() => $("#route-query").focus(), 300);
      });

      $("#btn-center").click(() => {
        fecharTodasBarras();
        if (userMarker) map.setView(userMarker.getLatLng(), map.getZoom());
      });

      map.on('click', () => { fecharTodasBarras(); });

      $("#btn-zoom-in").click(() => map.zoomIn());
      $("#btn-zoom-out").click(() => map.zoomOut());
      $("#btn-refresh").click(() => carregarRadares());

      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(updateUserLocation, showError, { enableHighAccuracy: true, maximumAge: 5000 });
      } else {
        hideFullscreenLoading();
        showNotification("GPS não suportado neste dispositivo.");
      }

      carregarRadares();
    }

    function updateUserLocation(position) {
      const newLat = position.coords.latitude;
      const newLng = position.coords.longitude;
      const userPosition = [newLat, newLng];

      let speedKmh = 0;
      const currentTime = Date.now();

      if (prevLat !== null && prevTime !== null) {
        const distanceMeters = calcularDistancia(prevLat, prevLng, newLat, newLng);
        const timeSeconds = (currentTime - prevTime) / 1000;
        if (timeSeconds > 0) speedKmh = Math.round((distanceMeters / timeSeconds) * 3.6); 
      }

      if (speedKmh > 250) speedKmh = 0;

      $("#speed-display").text(speedKmh);

      prevLat = newLat;
      prevLng = newLng;
      prevTime = currentTime;

      userLat = newLat;
      userLng = newLng;

      const userIcon = L.icon({
        iconUrl: '/imagens_app/ic_gps_marker.png',
        iconSize: [40, 40],
        iconAnchor: [20, 40]
      });

      if (!userMarker) {
        userMarker = L.marker(userPosition, { icon: userIcon }).addTo(map);
        userMarker.bindTooltip("Você", { permanent: true, direction: "top", offset: [0, -30] });
        map.setView(userPosition, 16); 
      } else {
        userMarker.setLatLng(userPosition);
      }

      verificarProximidade(userLat, userLng);
    }

            /* ====================================================================
                 FUNÇÃO CARREGAR RADARES
               ==================================================================== */
        function carregarRadares() {
      fetch("radares.json")
        .then(response => {
          if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);
          return response.json();
        })
        .then(async data => {
          // Limpa marcadores antigos
          radarMarkers.forEach(marker => map.removeLayer(marker));
          radarMarkers = [];

          let records = data.records || [];
          
          const radaresIA = injetarRadaresIA();
          const todosOsRadares = [...records, ...radaresIA];
          
          for (let i = 0; i < todosOsRadares.length; i++) {
            const record = todosOsRadares[i];
            const endereco = record[2] || "Endereço não informado";
            let tipo = record[3] || "Não Identificado";
            const velocidade = record[4] || "0";
            const geometryStr = record[9] || "";

            tipo = tipo.trim();
            
            // Separa as coordenadas (tratando possíveis espaços extras)
            const rawCoords = geometryStr.replace(/\s+/g, '').split(',').map(Number);
            
            // Ignora se não tiver exatamente 2 números válidos
            if (rawCoords.length !== 2 || isNaN(rawCoords[0]) || isNaN(rawCoords[1])) continue; 

            /* ====================================================================
               1. CORREÇÃO SIRGAS 2000 PARA WGS84 (Transformação Helmert 2D)
               (Isso corrige o deslocamento de dezenas de metros do datum)
               ==================================================================== */
            let lat = rawCoords[0];
            let lng = rawCoords[1];
            
            // NOTA: Se o seu JSON estiver vindo no formato "Leste, Norte" (X, Y), 
            // ao invés de "Lat, Lng", comente as duas linhas acima e descomente as de baixo:
            // let lng = rawCoords[0]; 
            // let lat = rawCoords[1];

            // Parâmetros oficiais IBGE para SIRGAS 2000 -> WGS84
            const a = 0.00155; 
            const b = -0.00077;
            const dx = -0.0015; 
            const dy = 0.0024;

            // Aplica a transformação
            const phi = lat * Math.PI / 180;
            const wgsLat = lat + dx + a * Math.cos(phi);
            const wgsLng = lng + dy + b * Math.sin(phi);

            /* ====================================================================
               2. LÓGICA DE "SNAP" PARA A RUA (Garante que o ícone não fique no prédio)
               ==================================================================== */
            let finalLat = wgsLat;
            let finalLng = wgsLng;

            try {
                // Busca a rua mais próxima usando a API de ruas do OSM (Overpass)
                const overpassUrl = `https://overpass-api.de/api/interpreter?data=[out:json];way(around:30,${wgsLat},${wgsLng})["highway"];out center;`;
                const osmResponse = await fetch(overpassUrl);
                const osmData = await osmResponse.json();

                if (osmData.elements && osmData.elements.length > 0) {
                    let menorDistancia = Infinity;
                    let ruaMaisProxima = null;

                    // Analisa as ruas encontradas num raio de 30 metros
                    osmData.elements.forEach(rua => {
                        if (rua.center) {
                            const dist = calcularDistancia(wgsLat, wgsLng, rua.center.lat, rua.center.lon);
                            if (dist < menorDistancia) {
                                menorDistancia = dist;
                                ruaMaisProxima = rua.center;
                            }
                        }
                    });

                    // Se encontrou uma rua a menos de 25 metros, "gruda" o ícone nela
                    if (ruaMaisProxima && menorDistancia < 25) {
                        finalLat = ruaMaisProxima.lat;
                        finalLng = ruaMaisProxima.lon;
                    }
                }
            } catch (e) {
                // Se a internet estiver ruim, falha silenciosamente e usa a coordenada corrigida matematicamente
                console.warn("Snap falhou, usando correção matemática.", e);
            }

            /* ====================================================================
               3. CRIAÇÃO DO ÍCONE NO MAPA
               ==================================================================== */
            const iconeRadar = L.icon({
              iconUrl: getIconUrl(tipo), 
              iconSize: [40, 40],
              iconAnchor: [20, 40],
              popupAnchor: [0, -40]
            });

            const radarMarker = L.marker([finalLat, finalLng], { icon: iconeRadar }).addTo(map);
            const tipoExibicao = ajusteNomes[tipo] || tipo;
            
            const isIA = tipoExibicao.includes('(OCR)') || tipoExibicao.includes('(FACIAL)') || tipoExibicao.includes('Leitor Inteligente');
            const tituloPopup = isIA 
              ? `🤖 <span style="color:#33aaff">${tipoExibicao}</span>` 
              : `<b>${tipoExibicao}</b>`;

            const popupContent = `
              <div style="color:#000; font-family:Inter; text-align:center; max-width: 250px;">
                ${tituloPopup}<br>
                ${endereco}<br>
                <span style="color:red; font-weight:bold;">Máx: ${velocidade} km/h</span>
              </div>
            `;
            
            radarMarker.bindPopup(popupContent);
            radarMarker.radarData = { 
              latitude: finalLat, 
              longitude: finalLng, 
              endereco: endereco, 
              velocidade_maxima: velocidade, 
              tipoOriginal: tipo, 
              tipoExibicao: tipoExibicao,
              isIA: isIA
            };
            radarMarkers.push(radarMarker);
          }

          map.setView([userLat, userLng], 16);
          
          hideFullscreenLoading();
          $("#loading").hide();
        })
        .catch(error => {
          console.error("Erro ao carregar radares:", error);
          hideFullscreenLoading();
          showNotification("Falha ao conectar com o banco de radares.");
        });
    }

    function verificarProximidade(uLat, uLng) {
      let alertTriggered = false;

      radarMarkers.forEach(marker => {
        if (alertTriggered) return;
        const dados = marker.radarData;
        const distance = calcularDistancia(uLat, uLng, dados.latitude, dados.longitude);

        if (distance < 300) { 
          alertTriggered = true;
          $("#alert-icon").attr("src", getIconUrl(dados.tipoOriginal));
          $("#alert-text").text(`${dados.endereco} - Máx: ${dados.velocidade_maxima}km/h (${Math.round(distance)}m)`);

          if(dados.isIA) {
            $("#alert-title").text("⚠️ Câmera Inteligente Detectada!");
          } else {
            $("#alert-title").text("Atenção! Radar Detectado");
          }

          const sound = document.getElementById("alert-soud");
          sound.currentTime = 0;
          sound.play().catch(e => console.log("Erro ao tocar áudio:", e));

          $("#alert-container").fadeIn(200);
          clearTimeout(alertTimeout);
          alertTimeout = setTimeout(() => { $("#alert-container").fadeOut(500); }, 5000);
        }
      });
    }

    function buscarRadares(query) {
      if (!query || query.length < 2) return;
      let encontrou = false;
      const boundsGroup = L.featureGroup(); 
      const queryLower = query.toLowerCase();

      radarMarkers.forEach(marker => {
        const dados = marker.radarData;
        const textoParaBuscar = `${dados.endereco} ${dados.tipoOriginal} ${dados.tipoExibicao} ia ocr facial`.toLowerCase();
        
        if (textoParaBuscar.includes(queryLower)) {
          encontrou = true;
          boundsGroup.addLayer(marker);
          marker.openPopup(); 
        }
      });

      if (encontrou) { 
        map.fitBounds(boundsGroup.getBounds().pad(0.5)); 
      } else { 
        showNotification("Nenhum radar encontrado para essa busca."); 
      }
    }

    function showError(error) {
      console.warn(`Erro de GPS: ${error.message}`);
      hideFullscreenLoading();
      showNotification("Ative seu GPS para usar o app.");
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(() => console.log('SW OK')).catch(err => console.log('SW Fail', err));
      });
    }
    
    window.onload = initMap;
  </script>
