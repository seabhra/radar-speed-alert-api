<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Cache Control - Evita que o navegador armazene versões antigas -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Radar X9 BH - Alerta Inteligente</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

  <style>
    /* ================= VARIÁVEIS GLOBAIS (Tema Dark) ================= */
    :root {
      --bg-color: #0f1115;
      --panel-color: #1a1d24;
      --accent-color: #00ff88;
      --alert-color: #ff3333;
      --text-main: #ffffff;
      --text-muted: #a0a0a0;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background-color: var(--panel-color);
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--accent-color);
      z-index: 1000;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .app-icon { width: 50px; height: 40px; border-radius: 8px; object-fit: contain; }
    h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
    h1 span { color: var(--accent-color); }

    .search-container {
      position: absolute; top: 0; left: 0; width: 100%;
      background-color: rgba(26, 29, 36, 0.98);
      backdrop-filter: blur(8px);
      display: flex; gap: 12px; z-index: 1000;
      max-height: 0; overflow: hidden; opacity: 0;
      padding: 0 15px;
      border-bottom: 1px solid transparent;
      transition: all 0.3s ease;
      align-items: center;
    }
    .search-container.active {
      max-height: 90px; opacity: 1; padding: 15px;
      border-bottom: 1px solid #333;
    }
    .search-container input {
      flex: 1; padding: 14px 20px; border-radius: 30px; border: 1px solid #444;
      background-color: #000; color: #fff; font-size: 1rem; outline: none;
    }
    .search-container input:focus { border-color: var(--accent-color); }

    .btn-search {
      position: relative; flex-shrink: 0; width: 46px; height: 46px; border-radius: 50%;
      border: none; cursor: pointer; background: rgba(46, 102, 158, 0.95);
      transition: all 0.2s ease; overflow: hidden;
    }
    .btn-search:active { transform: scale(0.9); }
    .btn-search img {
      position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
      object-fit: contain; transform: translate(-50%, -50%);
    }
    
    .map-wrapper { position: relative; flex: 1; display: flex; overflow: hidden; width: 100%; }
    #map { width: 100%; height: 100%; background-color: #1a1a2e; z-index: 1; }

    .compass-widget {
      position: absolute; top: 20px; left: 5px; width: 80px; height: 80px;
      z-index: 500; display: flex; align-items: center; justify-content: center; pointer-events: none;
    }
    .compass-base { 
      position: absolute; width: 100%; height: 100%; object-fit: contain; z-index: 1; opacity: 0.9;
    }
    .compass-needle {
      position: absolute; width: 55%; height: 55%; object-fit: contain; z-index: 2;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .speed-widget { 
      position: absolute; bottom: -15px; left: -25px; width: 150px; height: 150px; 
      z-index: 500; display: flex; align-items: center; justify-content: center; 
    } 
    .speed-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; } 
    .speed-value {
      position: absolute; top: 50%; left: 50%; transform: translate(-62%, -60%);
      font-size: 28px; font-weight: 700; font-family: 'Rajdhani', sans-serif;
      color: #000; line-height: 1; z-index: 2; white-space: nowrap;
      text-align: center; font-variant-numeric: tabular-nums; min-width: 3ch;
    }

    .map-controls {
      position: absolute; right: 15px; bottom: 30px; display: flex; flex-direction: column;
      align-items: center; gap: 10px; z-index: 500;
    }
    .map-btn {
      width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; cursor: pointer; background: rgba(20, 20, 20, 0.92);
      border: 1px solid rgba(255,255,255,0.08); transition: all 0.2s ease;
    }
    .map-btn:hover { transform: scale(1.08); border-color: var(--accent-color); }
    .map-btn:active { transform: scale(0.92); }
    .map-btn img { width: 30px; height: 30px; object-fit: contain; pointer-events: none; }

    .alert-toggle-btn.alert-off { background: rgba(68, 68, 68, 0.9); border-color: #888; }
    .alert-toggle-btn.alert-off img { filter: grayscale(1); }

    #alert-container { 
      position: absolute; bottom: 0; left: 0; width: 100%; z-index: 1000; 
      display: none; animation: slideUp 0.3s ease-out; pointer-events: none; 
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); background: linear-gradient(90deg, #ff2200, #ee0000); }
      100% { transform: scale(1); }
    }
    
    .alert-bar { 
      background: linear-gradient(90deg, #cc0000, #990000); color: white; padding: 18px;
      display: flex; align-items: center; gap: 15px; border-top: 2px solid #ff5555;
    }
    .alert-bar-critico { animation: pulse 0.8s ease-in-out infinite; }
    .alert-bar img { width: 50px; height: 50px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
    .alert-info h3 { font-size: 1.2rem; margin-bottom: 3px; text-transform: uppercase; font-weight: 800; }
    .alert-info p { font-size: 0.95rem; opacity: 0.95; }
    
    .toast-notification { 
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px);
      background-color: rgba(20, 20, 20, 0.95); color: var(--text-main); padding: 12px 25px;
      border-radius: 50px; border: 1px solid #444; z-index: 2000; opacity: 0;
      font-weight: 600; text-align: center; pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease; white-space: nowrap;
    }
    .toast-notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .loading-overlay { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(20, 20, 20, 0.9); padding: 20px 30px; border-radius: 12px;
      border: 1px solid var(--accent-color); text-align: center; z-index: 1001;
      backdrop-filter: blur(5px);
    }
    .loading-spinner { 
      border: 3px solid #333; border-top: 3px solid var(--accent-color); 
      border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; 
      margin: 0 auto 10px; 
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    .leaflet-control-zoom, .leaflet-control-attribution, .leaflet-routing-container { display: none !important; }
    
    .loading-fullscreen { 
      position: fixed; inset: 0; background-color: var(--bg-color);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    .loading-fullscreen.fade-out { opacity: 0; visibility: hidden; }
    .loading-fullscreen .spinner-ring { width: 60px; height: 60px; border-radius: 50%; position: relative; margin-bottom: 24px; }
    .loading-fullscreen .spinner-ring::before, .loading-fullscreen .spinner-ring::after { 
      content: ''; position: absolute; inset: 0; border-radius: 50%; border: 4px solid transparent; 
    }
    .loading-fullscreen .spinner-ring::before { 
      border-top-color: var(--accent-color); border-right-color: var(--accent-color); 
      animation: spinRing 1s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite; 
    }
    .loading-fullscreen .spinner-ring::after { 
      inset: 10px; border-bottom-color: #ff3333; border-left-color: #ff3333; 
      animation: spinRing 1.4s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite reverse; 
    }
    @keyframes spinRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-fullscreen .loading-text { font-size: 1.1rem; font-weight: 600; text-align: center; }
    .loading-fullscreen .loading-text span { color: var(--accent-color); }

    .radar-marker-icon {
      background: transparent !important;
      border: none !important;
    }
    .radar-marker-icon img {
      width: 40px !important;
      height: 40px !important;
      object-fit: contain !important;
      display: block !important;
    }
  </style>
</head>
<body>

  <div class="loading-fullscreen" id="loading-fullscreen">
    <div class="spinner-ring"></div>
    <div class="loading-text">Iniciando <span>Radar X9</span></div>
  </div>

  <header>
    <div class="header-left">
      <h1>RADAR <span>X9</span> BH</h1>
    </div>
  </header>

  <div class="map-wrapper">
    <div class="search-container" id="search-bar-radares">
      <input type="text" id="query" placeholder="Buscar radar...">
      <button class="btn-search" id="btn-search-radar" title="Buscar">
        <img src="https://cdn-icons-png.flaticon.com/512/646/646094.png" alt="Busca">
      </button>
    </div>

    <div class="search-container" id="search-bar-rota">
      <input type="text" id="route-query" placeholder="Digite um endereço...">
      <button class="btn-search" id="btn-calc-route" title="Traçar Rota" style="background-color: #ff8c00;">
        <img src="https://cdn-icons-png.flaticon.com/512/7892/7892059.png" alt="Rota">
      </button>
    </div>

    <div id="map"></div>
    
    <div class="toast-notification" id="toast-msg"></div>

    <div class="compass-widget">
      <img src="https://cdn-icons-png.flaticon.com/512/2838/2838773.png" alt="Bússola" class="compass-base">
      <img src="https://cdn-icons-png.flaticon.com/512/1140/1140644.png" alt="Ponteira" class="compass-needle" id="compass-needle-img">
    </div>

    <div class="speed-widget">
      <div class="speed-value" id="speed-display">0</div>
    </div>

    <div class="map-controls">
      <button class="map-btn alert-toggle-btn" id="btn-alert-toggle" title="Ligar/Desligar Alerta">
        <img id="alert-toggle-icon" src="https://cdn-icons-png.flaticon.com/512/727/727245.png" alt="Alerta">
      </button>
      <button class="map-btn" id="btn-search-bar" title="Buscar Radares">
        <img src="https://cdn-icons-png.flaticon.com/512/646/646094.png" alt="busca">
      </button>
      <button class="map-btn" id="btn-route-bar" title="Navegar / Rota">
        <img src="https://cdn-icons-png.flaticon.com/512/7892/7892059.png" alt="Rota">
      </button>
      <button class="map-btn" id="btn-center" title="Centralizar GPS">
        <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" alt="Centro">
      </button>
      <button class="map-btn" id="btn-refresh" title="Resetar">
        <img src="https://cdn-icons-png.flaticon.com/512/2409/2409305.png" alt="Refresh">
      </button>
      <button class="map-btn" id="btn-zoom-in" title="Zoom +">
        <img src="https://cdn-icons-png.flaticon.com/512/709/709493.png" alt="Zoom In">
      </button>
      <button class="map-btn" id="btn-zoom-out" title="Zoom -">
        <img src="https://cdn-icons-png.flaticon.com/512/709/709506.png" alt="Zoom Out">
      </button>
    </div>

    <div id="alert-container">
      <div class="alert-bar">
        <img id="alert-icon" src="https://cdn-icons-png.flaticon.com/512/7764/7764406.png" alt="Radar">
        <div class="alert-info">
          <h3 id="alert-title">ATENÇÃO!</h3>
          <p id="alert-text">Radar Próximo</p>
        </div>
      </div>
    </div>

    <div class="loading-overlay" id="loading" style="display:none;">
      <div class="loading-spinner"></div>
      <div>Processando...</div>
    </div>
  </div>

  <audio id="alert-sound" preload="auto"></audio>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>

  <script>
    // ===================================================================
    // VARIÁVEIS GLOBAIS
    // ===================================================================
    let map;
    let userMarker;
    let radarMarkers = [];
    let userLat = -19.919055;
    let userLng = -43.938641;
    let tileLayer;
    let routingControl = null;
    let watchId = null;
    let isFollowing = true;
    let alertaHabilitado = true;
    let currentHeading = 0;
    let destinoAtual = null;
    let startRouteMarker = null;
    let endRouteMarker = null;
    let ultimoRadarAlertado = null;

    const ALERT_CONFIG = {
      DISTANCIA_MAXIMA: 80,
      DISTANCIA_CRITICA: 40
    };

    // ===================================================================
    // MAPA DE ÍCONES
    // ===================================================================
    const iconMap = {
      'Controlador Eletrônico de Velocidade': '/imagens_app/ic_radar_cev_v2.png',
      'Detector de Avanço de Semáforo': '/imagens_app/ic_radar_das_v2.png',
      'Detector de Tráfego em Local Proibido': '/imagens_app/ic_radar_dtlp_v2.png',
      'Detector de Conversão em Local Proibido': '/imagens_app/ic_radar_rcp_v2.png',
      'Detector de Parada sobre Faixa de Pedestres (DPFP)': '/imagens_app/ic_radar_dpfp_v2.png',
      'Detector de Faixa Preferencial de Ônibus (BUS)': '/imagens_app/ic_radar_fpref_v2.png',
      'Zona Verde de Trânsito (ZVT)': '/imagens_app/ic_zona_verde.png',
      'Detector de Uso de Celular': '/imagens_app/ic_radar_duc_v2.png',
      'Controle de Redução de Velocidade (CRV)': '/imagens_app/ic_radar_crv_v2.png',
      'default': '/imagens_app/ic_radar_cev_v2.png'
    };

    const TIPOS_SEM_ALERTA = ['BUS', 'Zona Verde', 'Faixa Preferencial'];

    // ===================================================================
    // FUNÇÃO: getIconUrl - Retorna URL do ícone baseado no tipo e velocidade
    // ===================================================================
    function getIconUrl(tipo, velocidade) {
      var tipoLimpo = tipo ? tipo.trim() : "";
      
      if (tipoLimpo.includes('Zona Verde')) {
        return '/imagens_app/ic_zona_verde.png';
      }
      
      if (tipoLimpo.includes('Velocidade') || tipoLimpo.includes('CEM') || tipoLimpo.includes('Controlador')) {
        var vel = parseInt(velocidade) || 0;
        if (vel === 30) return '/imagens_app/ic_radar_cem_30_v2.png';
        if (vel === 40) return '/imagens_app/ic_radar_cem_40_v2.png';
        if (vel === 50) return '/imagens_app/ic_radar_cev_50_v2.png';
        if (vel === 60) return '/imagens_app/ic_radar_cev_60_v2.png';
        return '/imagens_app/ic_radar_cev_v2.png';
      }
      
      return iconMap[tipoLimpo] || iconMap['default'];
    }

    // ===================================================================
    // FUNÇÃO: criarIconeRadar - Cria ícone para radares
    // ===================================================================
    function criarIconeRadar(iconeUrl, tamanho) {
      tamanho = tamanho || 40;
      return L.divIcon({
        html: '<img src="' + iconeUrl + '" style="width: ' + tamanho + 'px; height: ' + tamanho + 'px; object-fit: contain; display: block;" onerror="this.src=\'/imagens_app/ic_radar_cev_v2.png\'" />',
        iconSize: [tamanho, tamanho],
        iconAnchor: [tamanho / 2, tamanho],
        popupAnchor: [0, -tamanho / 2],
        className: 'radar-marker-icon'
      });
    }

    // ===================================================================
    // FUNÇÃO: calcularDistancia - Calcula distância em metros
    // ===================================================================
    function calcularDistancia(lat1, lon1, lat2, lon2) {
      var R = 6371e3;
      var p1 = lat1 * Math.PI / 180;
      var p2 = lat2 * Math.PI / 180;
      var dp = (lat2 - lat1) * Math.PI / 180;
      var dl = (lon2 - lon1) * Math.PI / 180;
      var a = Math.sin(dp / 2) * Math.sin(dp / 2) + 
              Math.cos(p1) * Math.cos(p2) * 
              Math.sin(dl / 2) * Math.sin(dl / 2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // ===================================================================
    // FUNÇÃO: deveAlertaRadar - Verifica se o tipo deve gerar alerta
    // ===================================================================
    function deveAlertaRadar(tipo) {
      for (var i = 0; i < TIPOS_SEM_ALERTA.length; i++) {
        if (tipo && tipo.includes(TIPOS_SEM_ALERTA[i])) {
          return false;
        }
      }
      return true;
    }

    // ===================================================================
    // FUNÇÃO: fecharAlerta - Fecha o alerta atual
    // ===================================================================
    function fecharAlerta() {
      $("#alert-container").fadeOut(200);
      var sound = document.getElementById("alert-sound");
      if (sound) {
        sound.pause();
        sound.currentTime = 0;
      }
    }

    // ===================================================================
    // FUNÇÃO: dispararAlerta - Mostra alerta e toca som
    // ===================================================================
    function dispararAlerta(radar, distancia) {
      $("#alert-title").text("⚠️ ALERTA DE RADAR!");
      $("#alert-text").text(radar.tipo + ' - ' + Math.round(distancia) + 'm');
      $("#alert-container").fadeIn(200);
      
      if (distancia <= ALERT_CONFIG.DISTANCIA_CRITICA) {
        $(".alert-bar").addClass("alert-bar-critico");
      }
      
      ultimoRadarAlertado = radar.id;
      setTimeout(fecharAlerta, 4000);
    }

    // ===================================================================
    // FUNÇÃO: verificarProximidadeRadares - VERIFICA RADARES PRÓXIMOS
    // ===================================================================
    function verificarProximidadeRadares() {
      if (!alertaHabilitado || radarMarkers.length === 0) return;

      for (var i = 0; i < radarMarkers.length; i++) {
        var marker = radarMarkers[i];
        var rData = marker.radarData;
        
        if (!deveAlertaRadar(rData.tipo)) continue;
        
        var dist = calcularDistancia(userLat, userLng, rData.lat, rData.lng);
        
        if (dist <= ALERT_CONFIG.DISTANCIA_MAXIMA) {
          if (ultimoRadarAlertado !== rData.id) {
            dispararAlerta(rData, dist);
          }
          return;
        }
      }
    }

    // ===================================================================
    // FUNÇÃO: processarNovaPosicao - Processa posição do GPS
    // ===================================================================
    function processarNovaPosicao(position) {
      var newLat = position.coords.latitude;
      var newLng = position.coords.longitude;
      var speed = position.coords.speed ? Math.round(position.coords.speed * 3.6) : 0;
      var heading = position.coords.heading || 0;
      
      userLat = newLat;
      userLng = newLng;
      currentHeading = heading;
      
      $("#speed-display").text(speed);
      
      var needle = document.getElementById('compass-needle-img');
      if (needle) needle.style.transform = 'rotate(' + heading + 'deg)';
      
      if (!userMarker) {
        var userIcon = L.icon({
          iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
          iconSize: [40, 40],
          iconAnchor: [20, 40]
        });
        userMarker = L.marker([newLat, newLng], { icon: userIcon }).addTo(map);
        document.getElementById('loading-fullscreen')?.classList.add('fade-out');
      } else {
        userMarker.setLatLng([newLat, newLng]);
      }
      
      if (isFollowing) {
        map.setView([newLat, newLng], map.getZoom());
      }
      
      // CHAMA A VERIFICAÇÃO DE RADAR
      verificarProximidadeRadares();
    }

    // ===================================================================
    // FUNÇÃO: carregarRadares - Carrega radares do radares.json
    // ===================================================================
    async function carregarRadares() {
      if (radarMarkers.length > 0) {
        radarMarkers.forEach(function(marker) { map.removeLayer(marker); });
        radarMarkers = [];
      }
      
      $("#loading").show();
      
      try {
        // CORREÇÃO: Carrega APENAS do arquivo radares.json
        var response = await fetch('./radares.json?v=' + Date.now());
        
        if (!response.ok) {
          throw new Error("Arquivo radares.json não encontrado");
        }
        
        var text = await response.text();
        
        // CORREÇÃO: Limpa caracteres problemáticos
        var cleanedText = text.replace(/[\u0000-\u001F]+/g, ' ').trim();
        var data = JSON.parse(cleanedText);
        
        var records = Array.isArray(data) ? data : (data.records || data.radares || []);
        
        if (records.length === 0) {
          throw new Error("Nenhum radar encontrado");
        }
        
        // Processa cada radar
        for (var i = 0; i < records.length; i++) {
          var item = records[i];
          
          var lat = item.latitude || item.lat;
          var lng = item.longitude || item.lng;
          var tipo = item.tipo || item.tipo_equipamento || "Radar";
          var velocidade = item.velocidade || item.velocidade_via || "0";
          var endereco = item.endereco || item.local || "";
          
          // Se for array, tenta extrair coordenadas
          if (Array.isArray(item) && !lat) {
            var coords = extractCoordinatesFromArray(item);
            if (coords) {
              lat = coords.lat;
              lng = coords.lng;
            }
            tipo = item[3] || tipo;
            velocidade = item[4] || velocidade;
            endereco = item[2] || endereco;
          }
          
          if (lat && lng && !isNaN(lat) && !isNaN(lng)) {
            var iconUrl = getIconUrl(tipo, velocidade);
            var icon = criarIconeRadar(iconUrl, 40);
            var marker = L.marker([parseFloat(lat), parseFloat(lng)], { icon: icon }).addTo(map);
            
            marker.radarData = {
              id: i,
              lat: parseFloat(lat),
              lng: parseFloat(lng),
              tipo: tipo,
              velocidade: velocidade,
              endereco: endereco
            };
            
            marker.bindPopup('<b>' + tipo + '</b><br>' + endereco + '<br>Velocidade: ' + velocidade + ' km/h');
            radarMarkers.push(marker);
          }
        }
        
        $("#loading").hide();
        console.log(radarMarkers.length + " radares carregados com sucesso!");
        
      } catch (error) {
        console.error("Erro ao carregar radares:", error);
        $("#loading").hide();
        
        // Dados de exemplo para teste
        var exampleRadares = [
          { lat: -19.919055, lng: -43.938641, tipo: "Controlador Eletrônico de Velocidade", velocidade: "40", endereco: "Av. Afonso Pena, 1000" },
          { lat: -19.924500, lng: -43.935200, tipo: "Zona Verde de Trânsito (ZVT)", velocidade: "30", endereco: "Rua da Bahia, 500" }
        ];
        
        for (var j = 0; j < exampleRadares.length; j++) {
          var ex = exampleRadares[j];
          var exIconUrl = getIconUrl(ex.tipo, ex.velocidade);
          var exIcon = criarIconeRadar(exIconUrl, 40);
          var exMarker = L.marker([ex.lat, ex.lng], { icon: exIcon }).addTo(map);
          exMarker.radarData = { id: j, lat: ex.lat, lng: ex.lng, tipo: ex.tipo };
          radarMarkers.push(exMarker);
        }
      }
    }

    // ===================================================================
    // FUNÇÃO: extractCoordinatesFromArray - Extrai coordenadas de array
    // ===================================================================
    function extractCoordinatesFromArray(arr) {
      for (var i = 0; i < arr.length; i++) {
        if (typeof arr[i] === 'string' && arr[i].includes(',')) {
          var parts = arr[i].split(',');
          if (parts.length === 2) {
            var lat = parseFloat(parts[0]);
            var lng = parseFloat(parts[1]);
            if (!isNaN(lat) && !isNaN(lng)) {
              return { lat: lat, lng: lng };
            }
          }
        }
      }
      return null;
    }

    // ===================================================================
    // FUNÇÃO: showNotification - Exibe notificação temporária
    // ===================================================================
    function showNotification(msg) {
      $("#toast-msg").text(msg).addClass("show");
      setTimeout(function() { $("#toast-msg").removeClass("show"); }, 3000);
    }

    // ===================================================================
    // FUNÇÃO: buscarCoordenadas - Busca endereço via Nominatim
    // ===================================================================
    async function buscarCoordenadas(endereco) {
      try {
        var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(endereco) + '&limit=1';
        var r = await fetch(url);
        var d = await r.json();
        return d.length > 0 ? { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) } : null;
      } catch(e) {
        return null;
      }
    }

    // ===================================================================
    // FUNÇÃO: initMap - Inicializa o mapa
    // ===================================================================
    function initMap() {
      map = L.map('map').setView([userLat, userLng], 15);
      
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);
      
      // Botões
      $("#btn-center").click(function() {
        if (userMarker) {
          map.setView(userMarker.getLatLng(), 17);
          isFollowing = true;
        }
      });
      
      $("#btn-refresh").click(function() {
        map.setView([userLat, userLng], 15);
        carregarRadares();
      });
      
      $("#btn-zoom-in").click(function() { map.zoomIn(); });
      $("#btn-zoom-out").click(function() { map.zoomOut(); });
      
      $("#btn-search-bar").click(function() {
        $("#search-bar-radares").toggleClass('active');
      });
      
      $("#btn-search-radar").click(function() {
        var query = $("#query").val().toLowerCase();
        if (!query) return;
        
        var encontrou = false;
        radarMarkers.forEach(function(m) {
          if (m.radarData.tipo.toLowerCase().includes(query) || m.radarData.endereco.toLowerCase().includes(query)) {
            m.openPopup();
            encontrou = true;
          }
        });
        if (!encontrou) showNotification("Nenhum radar encontrado");
      });
      
      $("#btn-route-bar").click(function() {
        $("#search-bar-rota").toggleClass('active');
      });
      
      $("#btn-calc-route").click(async function() {
        var endereco = $("#route-query").val();
        if (!endereco) return;
        
        var coords = await buscarCoordenadas(endereco);
        if (coords && userMarker) {
          if (routingControl) map.removeControl(routingControl);
          
          routingControl = L.Routing.control({
            waypoints: [userMarker.getLatLng(), L.latLng(coords.lat, coords.lng)],
            createMarker: function() { return null; },
            lineOptions: { styles: [{ color: '#ff8c00', weight: 5 }] }
          }).addTo(map);
          
          showNotification("Rota calculada!");
          $("#search-bar-rota").removeClass('active');
        } else {
          showNotification("Endereço não encontrado");
        }
      });
      
      $("#btn-alert-toggle").click(function() {
        alertaHabilitado = !alertaHabilitado;
        $(this).toggleClass('alert-off');
        showNotification(alertaHabilitado ? "Alertas LIGADOS" : "Alertas DESLIGADOS");
        if (!alertaHabilitado) fecharAlerta();
      });
      
      // Inicia GPS
      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(processarNovaPosicao, function(err) {
          console.log("Erro GPS:", err);
          document.getElementById('loading-fullscreen')?.classList.add('fade-out');
        }, { enableHighAccuracy: true, maximumAge: 5000 });
      } else {
        document.getElementById('loading-fullscreen')?.classList.add('fade-out');
      }
      
      carregarRadares();
    }
    
    // Inicializa quando o DOM estiver pronto
    $(document).ready(function() {
      // Aguarda o Leaflet carregar
      if (typeof L !== 'undefined') {
        initMap();
      } else {
        setTimeout(function() {
          if (typeof L !== 'undefined') initMap();
        }, 1000);
      }
    });
  </script>
</body>
