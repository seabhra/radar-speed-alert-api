<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Radar X9 BH - Alerta Inteligente (OSM + IA)</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0f1115;
      --panel-color: #1a1d24;
      --accent-color: #00ff88;
      --alert-color: #ff3333;
      --text-main: #ffffff;
      --text-muted: #a0a0a0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      background-color: var(--panel-color);
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--accent-color);
      box-shadow: 0 4px 15px rgba(0, 255, 136, 0.1);
      z-index: 1000;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .app-icon { width: 50px; height: 40px; border-radius: 8px; }
    h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; }
    h1 span { color: var(--accent-color); }
    .search-container {
      position: absolute; top: 0; left: 0; width: 100%;
      background-color: rgba(26, 29, 36, 0.95); backdrop-filter: blur(5px);
      display: flex; gap: 10px; z-index: 1000;
      max-height: 0px; overflow: hidden; opacity: 0; padding: 0px 15px;
      border-bottom: 1px solid transparent;
      transition: max-height 0.3s ease, padding 0.3s ease, opacity 0.3s ease, border 0.3s ease;
    }
    .search-container.active {
      max-height: 70px; opacity: 1; padding: 10px 15px;
      border-bottom: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .search-container input {
      flex: 1; padding: 12px 15px; border-radius: 30px; border: 1px solid #333;
      background-color: var(--bg-color); color: var(--text-main); font-size: 0.9rem; outline: none;
    }
    .map-wrapper { position: relative; flex: 1; display: flex; overflow: hidden; }
    #map { width: 100%; height: 100%; background-color: #bbb7b7; }
    .speed-widget {
      position: absolute; bottom: -15px; left: -25px; width: 150px; height: 150px; z-index: 500;
      display: flex; align-items: center; justify-content: center;
    }
    .speed-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
    .speed-value {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -60%);
      font-size: 28px; font-weight: 700; font-family: 'Rajdhani', 'Oswald', 'Arial Narrow', sans-serif;
      color: #000; line-height: 1; text-align: center; z-index: 2; white-space: nowrap;
      font-variant-numeric: tabular-nums; letter-spacing: -1px;
    }    
    .btn-search, .map-btn {
      display: flex; align-items: center; justify-content: center;
      --btn-size: 45px; --icon-scale: 0.85; width: var(--btn-size); height: var(--btn-size);
      background-size: calc(var(--btn-size) * var(--icon-scale)); background-repeat: no-repeat;
      background-position: center; background-color: var(--bg-color); border: 1px solid #333;
      border-radius: 50%; cursor: pointer; transition: 0.2s; flex-shrink: 0;
      font-size: 20px; color: var(--text-main);
    }
    .btn-search:hover, .map-btn:hover { border-color: var(--accent-color); transform: scale(1.05); }
    #btn-route-bar {
      --btn-size: 50px; --icon-scale: 0.95;
      background-color: rgba(255, 165, 0, 0.9); border: 2px solid rgba(255, 165, 0, 0.6);
      box-shadow: 0 0 15px rgba(255, 165, 0, 0.3); z-index: 10;
    }
    .map-controls {
      position: absolute; right: 15px; bottom: 40px;
      display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 500;
    }
    .map-controls-left {
      position: absolute; left: 15px; bottom: 40px;
      display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 500;
    }
    .map-btn img, .control-btn img {
      width: calc(var(--btn-size) * var(--icon-scale)); height: calc(var(--btn-size) * var(--icon-scale));
      object-fit: contain; pointer-events: none; transition: 0.2s;
    }
    #btn-search-bar { background-color: rgba(76, 220, 205, 0.9); }
    #btn-center { background-color: rgba(0, 255, 136, 0.9); border: 2px solid rgba(0, 255, 136, 0.5); }
    #btn-refresh { background-color: rgba(100, 100, 255, 0.9); }
    #btn-zoom-in, #btn-zoom-out { background-color: rgba(150, 150, 150, 0.8); --icon-scale: 0.6; }
    #btn-mute { background-color: rgba(255, 200, 0, 0.9); }
    #btn-mute.muted { background-color: rgba(120, 120, 120, 0.9); }
    #btn-add-radar { background-color: rgba(0, 200, 120, 0.9); }
    #btn-export-json { background-color: rgba(60, 130, 246, 0.9); }

    #alert-container {
      position: absolute; bottom: 0; left: 0; width: 100%; z-index: 1000;
      display: none; animation: slideUp 0.3s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .alert-bar {
      background-color: var(--alert-color); color: white; padding: 15px;
      display: flex; align-items: center; gap: 15px; box-shadow: 0 -5px 20px rgba(255, 0, 0, 0.4);
    }
    .alert-bar img { width: 40px; height: 40px; }
    .alert-info h3 { font-size: 1.1rem; margin-bottom: 3px; text-transform: uppercase; color: white; font-weight: 800; }
    .alert-info p { font-size: 0.85rem; opacity: 0.9; }
    .toast-notification {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px);
      background-color: var(--panel-color); color: var(--text-main); padding: 15px 25px;
      border-radius: 30px; border: 1px solid #555; box-shadow: 0 10px 25px rgba(0,0,0,0.6);
      z-index: 2000; opacity: 0; font-size: 0.9rem; font-weight: 600; text-align: center;
      pointer-events: none; transition: opacity 0.3s ease, transform 0.3s ease; white-space: nowrap;
    }
    .toast-notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .loading-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: var(--panel-color); padding: 20px 30px; border-radius: 10px;
      border: 1px solid var(--accent-color); text-align: center; z-index: 1001;
    }
    .loading-spinner { border: 3px solid #333; border-top: 3px solid var(--accent-color); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .leaflet-control-zoom, .leaflet-control-attribution, .leaflet-routing-container { display: none !important; }
    .loading-fullscreen {
      position: fixed; inset: 0; width: 100%; height: 100%; background-color: var(--bg-color);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    .loading-fullscreen.fade-out { opacity: 0; visibility: hidden; }
    .loading-fullscreen .spinner-ring { width: 70px; height: 70px; border-radius: 50%; position: relative; margin-bottom: 24px; }
    .loading-fullscreen .spinner-ring::before, .loading-fullscreen .spinner-ring::after { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 4px solid transparent; }
    .loading-fullscreen .spinner-ring::before { border-top-color: var(--accent-color); border-right-color: var(--accent-color); animation: spinRing 1s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite; }
    .loading-fullscreen .spinner-ring::after { inset: 8px; border-bottom-color: #ff3333; border-left-color: #ff3333; animation: spinRing 1.4s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite reverse; }
    @keyframes spinRing { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-fullscreen .loading-text { font-size: 1rem; font-weight: 600; color: var(--text-muted); letter-spacing: 0.5px; text-align: center; padding: 0 20px; }
    .loading-fullscreen .loading-text span { color: var(--accent-color); font-weight: 800; }
    .loading-fullscreen .loading-sub { margin-top: 8px; font-size: 0.75rem; color: #555; animation: pulseText 1.8s ease-in-out infinite; }
    @keyframes pulseText { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    .gps-status {
      position: absolute; top: 15px; right: 15px; z-index: 900;
      display: flex; align-items: center; gap: 8px;
      background: rgba(26,29,36,0.9); padding: 7px 14px; border-radius: 20px;
      border: 1px solid #333; font-size: 0.72rem; color: var(--text-muted);
      font-weight: 600; letter-spacing: 0.3px;
    }
    .gps-status-dot {
      width: 10px; height: 10px; border-radius: 50%; background: #666; flex-shrink: 0;
      transition: background-color 0.3s ease;
    }
    .gps-status-dot.gps-buscando { background: #ffcc00; animation: blinkDot 1s infinite; }
    .gps-status-dot.gps-ativo { background: var(--accent-color); animation: none; box-shadow: 0 0 6px var(--accent-color); }
    .gps-status-dot.gps-erro { background: var(--alert-color); animation: blinkDot 0.6s infinite; }
    @keyframes blinkDot { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }

    .leaflet-div-icon { background: transparent; border: none; }
    .user-nav-icon-wrapper { background: transparent; border: none; }
    .user-nav-icon {
      width: 40px; height: 40px;
      transform-origin: 50% 50%;
      transition: transform 0.35s linear;
      will-change: transform;
    }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      display: none; align-items: center; justify-content: center;
      z-index: 3000; padding: 20px;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: var(--panel-color); border: 1px solid var(--accent-color);
      border-radius: 14px; padding: 22px; width: 100%; max-width: 420px;
      max-height: 88vh; overflow-y: auto; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    }
    .modal-box h2 { font-size: 1.1rem; margin-bottom: 16px; color: var(--accent-color); }
    .modal-box label {
      display: block; font-size: 0.75rem; color: var(--text-muted);
      margin: 12px 0 5px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .modal-box input[type="text"], .modal-box select {
      width: 100%; padding: 11px 13px; border-radius: 8px; border: 1px solid #333;
      background-color: var(--bg-color); color: var(--text-main); font-size: 0.9rem; outline: none;
    }
    .modal-box input[type="text"]:focus, .modal-box select:focus { border-color: var(--accent-color); }
    .capture-row { display: flex; flex-direction: column; gap: 10px; }
    .btn-capture {
      background-color: rgba(0,255,136,0.15); border: 1px solid var(--accent-color);
      color: var(--accent-color); font-weight: 700; padding: 12px; border-radius: 8px;
      cursor: pointer; font-size: 0.85rem; transition: 0.2s;
    }
    .btn-capture:hover { background-color: rgba(0,255,136,0.3); }
    .capture-coords { display: flex; gap: 10px; }
    .coord-field {
      flex: 1; background: var(--bg-color); border: 1px solid #333; border-radius: 8px;
      padding: 8px 10px; text-align: center;
    }
    .coord-field label {
      display: block; font-size: 0.65rem; color: var(--text-muted); margin: 0 0 3px; text-transform: uppercase;
    }
    .coord-field span {
      display: block; font-size: 0.95rem; font-weight: 800; color: var(--accent-color) !important;
      font-variant-numeric: tabular-nums;
    }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-secondary, .btn-primary {
      flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer;
      font-weight: 700; font-size: 0.85rem; transition: 0.2s;
    }
    .btn-secondary { background: #333; color: var(--text-main); }
    .btn-secondary:hover { background: #444; }
    .btn-primary { background: var(--accent-color); color: #000; }
    .btn-primary:hover { filter: brightness(1.1); }
  </style>
</head>
<body>

  <!-- CORREÇÃO: Gerar áudio via Web Audio API em vez de arquivo externo -->
  <script>
    // Criar som de alerta usando Web Audio API (não precisa de arquivo externo)
    let alertSound = null;
    
    function createAlertSound() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
        oscillator.frequency.setValueAtTime(660, audioCtx.currentTime + 0.15);
        
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        return {
          play: function() {
            try {
              const ctx = new (window.AudioContext || window.webkitAudioContext)();
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.type = 'square';
              osc.frequency.setValueAtTime(880, ctx.currentTime);
              osc.frequency.setValueAtTime(660, ctx.currentTime + 0.15);
              gain.gain.setValueAtTime(0.3, ctx.currentTime);
              gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.start();
              osc.stop(ctx.currentTime + 0.4);
            } catch(e) { console.warn("Áudio não disponível:", e); }
          }
        };
      } catch(e) {
        return { play: function() { console.log("Áudio indisponível"); } };
      }
    }
  </script>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <script>
    let map, userMarker, radarMarkers = [], alertTimeout;
    let userLat = -19.91894, userLng = -43.93866, tileLayer, routingControl = null;
    let searchActive = false, routeActive = false, prevLat = null, prevLng = null, prevTime = null;
    let isMuted = (localStorage.getItem('radarx9_muted') === 'true');
    let navHeading = 0;
    let markerAnimFrame = null;
    let radaresAppLocal = { fields: [], records: [] };

    // Inicializar áudio após interação do usuário
    let audioInitialized = false;
    let audioContext = null;

    function initAudio() {
      if (audioInitialized) return;
      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        audioInitialized = true;
      } catch(e) {
        console.warn("Web Audio API não suportada");
      }
    }

    function playAlertSound() {
      if (isMuted) return;
      initAudio();
      try {
        if (audioContext) {
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          osc.type = 'square';
          osc.frequency.setValueAtTime(880, audioContext.currentTime);
          osc.frequency.setValueAtTime(660, audioContext.currentTime + 0.15);
          gain.gain.setValueAtTime(0.3, audioContext.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.4);
          osc.connect(gain);
          gain.connect(audioContext.destination);
          osc.start();
          osc.stop(audioContext.currentTime + 0.4);
        }
      } catch(e) { console.warn("Erro ao reproduzir áudio:", e); }
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
      const R = 6371e3; const p1 = lat1 * Math.PI / 180; const p2 = lat2 * Math.PI / 180;
      const dp = (lat2 - lat1) * Math.PI / 180; const dl = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dp/2)*Math.sin(dp/2) + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)*Math.sin(dl/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
    }

    function calcularRumo(lat1, lng1, lat2, lng2) {
      const toRad = d => d * Math.PI / 180;
      const toDeg = r => r * 180 / Math.PI;
      const dLng = toRad(lng2 - lng1);
      const y = Math.sin(dLng) * Math.cos(toRad(lat2));
      const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) - Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLng);
      const brng = toDeg(Math.atan2(y, x));
      return (brng + 360) % 360;
    }

        const lat = fromLatLng.lat + (toLatLng.lat - fromLatLng.lat) * t;

        if (userMarker) userMarker.setLatLng([lat, lng]);
        if (t < 1) markerAnimFrame = requestAnimationFrame(passo);
      }

    }

    function converterSIRGAS2000paraWGS84(xLeste, yNorte) {
      const a = 6378137.0; const f = 1 / 298.257222101; const k0 = 0.9996;
      const N0 = 10000000.0; const E0 = 500000.0;
      const e2 = 2*f - f*f; const ep2 = e2 / (1 - e2);
      const e1 = (1 - Math.sqrt(1 - e2)) / (1 + Math.sqrt(1 - e2));
      const M = yNorte - N0;
      const mu = M / (a * (1 - e2/4 - 3*e2*e2/64 - 5*e2*e2*e2/256));
      const phi1 = mu + (3*e1/2 - 27*e1*e1*e1/32) * Math.sin(2*mu) + (21*e1*e1/16 - 55*e1*e1*e1*e1/32) * Math.sin(4*mu) + (151*e1*e1*e1/96) * Math.sin(6*mu);
      const N1 = a / Math.sqrt(1 - e2 * Math.sin(phi1) * Math.sin(phi1));
      const T1 = Math.tan(phi1) * Math.tan(phi1);
      const C1 = ep2 * Math.cos(phi1) * Math.cos(phi1);
      const R1 = a * (1 - e2) / Math.pow(1 - e2 * Math.sin(phi1) * Math.sin(phi1), 1.5);
      const D = (xLeste - E0) / (N1 * k0);
      let lat = phi1 - (N1 * Math.tan(phi1) / R1) * (D*D/2 - (5+3*T1+10*C1-4*C1*C1-9*ep2)*Math.pow(D,4)/24 + (61+90*T1+298*C1+45*T1*T1-252*ep2-3*C1*C1)*Math.pow(D,6)/720);
      let lng = (D - (1+2*T1+C1)*Math.pow(D,3)/6 + (5-2*C1+28*T1-3*C1*C1+8*ep2+24*T1*T1)*Math.pow(D,5)/120) / Math.cos(phi1);
      lng = (lng * 180 / Math.PI) - 51; 
      lat = lat * 180 / Math.PI;
      return { lat: Math.round(lat * 1000000) / 1000000, lng: Math.round(lng * 1000000) / 1000000 };
    }

    function extrairCoordenadas(record) {
        let coordenadasEncontradas = null;
        if (record[9]) {
            const parts = String(record[9]).replace(/\s+/g, '').split(',').map(Number);
            if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) coordenadasEncontradas = parts;
        }
        if (!coordenadasEncontradas) {
            for (let i = 0; i < record.length; i++) {
                if (!record[i] || String(record[i]).length > 40) continue; 
                const parts = String(record[i]).replace(/\s+/g, '').split(',').map(Number);
                if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) { 
                    coordenadasEncontradas = parts; break; 
                }
            }
        }
        if (!coordenadasEncontradas) return null; 
        let v1 = coordenadasEncontradas[0];
        let v2 = coordenadasEncontradas[1];
        if (Math.abs(v1) > 1000 || Math.abs(v2) > 1000) return converterSIRGAS2000paraWGS84(v1, v2);
        if (v1 < -30 && v2 > -30) return { lat: v2, lng: v1 }; 
        return { lat: v1, lng: v2 };
    }

    function updateUserLocation(position) {
      const newLat = position.coords.latitude; const newLng = position.coords.longitude;
      let speedKmh = 0; const currentTime = Date.now();
      let heading = navHeading;

      if (prevLat !== null && prevTime !== null) {
        const dist = calcularDistancia(prevLat, prevLng, newLat, newLng);
        const time = (currentTime - prevTime) / 1000;
        if (time > 0) speedKmh = Math.round((dist / time) * 3.6);
        if (dist > 2) {
          heading = calcularRumo(prevLat, prevLng, newLat, newLng);
          navHeading = heading;
        }
      }
      if (speedKmh > 250) speedKmh = 0;
      $("#speed-display").text(speedKmh);

      const oldLat = userLat, oldLng = userLng;
      prevLat = newLat; prevLng = newLng; prevTime = currentTime; userLat = newLat; userLng = newLng;

      setGpsStatus('ativo');

      if (!userMarker) {
        userMarker = L.marker([newLat, newLng], { icon: criarIconeUsuario(heading) }).addTo(map);
        userMarker.bindTooltip("Você", { permanent: true, direction: "top", offset: [0, -30] });
        map.setView([newLat, newLng], 16); 
      } else {
        animarMarcadorUsuario(L.latLng(oldLat, oldLng), L.latLng(newLat, newLng), 800);
        atualizarRotacaoUsuario(heading);
      }
      verificarProximidade(userLat, userLng);
    }
   
    async function carregarRadares() {
      if (radarMarkers.length > 0) {
          radarMarkers.forEach(marker => map.removeLayer(marker));
          radarMarkers = [];
      }

      let recordsBase = [];
      let origemBase = "Dados de IA (Offline)";

      // Tentar carregar JSON local
      try {
        console.log("Tentando carregar JSON local (radares.json)...");
        const response = await fetch(`radares.json?v=${Date.now()}`);
        if (!response.ok) throw new Error("Arquivo não encontrado");
        const data = await response.json();
        let records = [];
        if (Array.isArray(data)) records = data;
        else if (data.result && Array.isArray(data.result.records)) records = data.result.records;
        else if (data.records && Array.isArray(data.records)) records = data.records;

        if (records.length > 0) {
          console.log(`Sucesso: ${records.length} radares do JSON Local.`);
          recordsBase = records;
          origemBase = "JSON Local";
        }
      } catch (e) {
        console.warn("Falha ao carregar radares.json:", e);
      }

      // Fallback: API da PBH (com timeout)
      if (recordsBase.length === 0) {
        $("#loading").show().html("<div class='loading-spinner'></div><div>Tentando API PBH...</div>");
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 10000);
          
          const metaResponse = await fetch(`${API_PBH_BASE}package_show?id=fiscalizacao-eletronica`, { signal: controller.signal });
          clearTimeout(timeoutId);
          const metaData = await metaResponse.json();
          if (!metaData.success || !metaData.result.resources) throw new Error("API PBH: Estrutura inválida");
          const csvResource = metaData.result.resources.find(r => r.format.toLowerCase() === 'csv');
          if (!csvResource || !csvResource.url) throw new Error("API PBH: CSV não encontrado");
          
          const csvResponse = await fetch(csvResource.url, { signal: controller.signal });
          if (!csvResponse.ok) throw new Error("API PBH: Erro no download");
          const csvText = await csvResponse.text();
          const recordsFromAPI = parseCSVtoRecords(csvText);
          if (recordsFromAPI.length > 0) {
            recordsBase = recordsFromAPI;
            origemBase = "API Oficial PBH";
          } else {
            throw new Error("Nenhum dado extraído do CSV.");
          }
        } catch (error) {
          console.warn("Falha na API da PBH:", error);
          console.log("Carregando apenas dados de IA (Hardcoded) + radares_app.json.");
        }
      }

      // Carregar radares_app.json
      let recordsAppExternos = [];
      try {
        const respApp = await fetch(`radares_app.json?v=${Date.now()}`);
        if (respApp.ok) {
          const dataApp = await respApp.json();
          if (dataApp && Array.isArray(dataApp.records)) recordsAppExternos = dataApp.records;
        }
      } catch (e) {
        console.warn("radares_app.json não encontrado no servidor (ok, é opcional):", e);
      }

      const todosOsRegistros = [
        ...recordsBase,
        ...recordsAppExternos,
        ...radaresAppLocal.records
      ];

      renderizarRadaresNoMapa(todosOsRegistros, origemBase);
    }

    function parseCSVtoRecords(csvText) {
      const lines = csvText.split(/\r\n|\n/).map(l => l.trim()).filter(l => l.length > 0);
      if (lines.length < 2) return [];
      const headers = lines[0].split(';').map(h => h.toLowerCase().replace(/"/g, '').trim());
      const dataLines = lines.slice(1);

      let idxEndereco = headers.findIndex(h => h.includes('endere') || h.includes('local') || h.includes('logrado'));
      let idxTipo = headers.findIndex(h => h.includes('tipo') || h.includes('equip') || h.includes('descr') || h.includes('especie'));
      let idxVelocidade = headers.findIndex(h => h.includes('veloc') || h.includes('limite') || h.includes('maxim'));
      let idxLeste = headers.findIndex(h => h.includes('leste') || h.includes('x') || h.includes('coord_x') || h.includes('utm_e'));
      let idxNorte = headers.findIndex(h => h.includes('norte') || h.includes('y') || h.includes('coord_y') || h.includes('utm_n'));

      const recordsFormatados = [];
      dataLines.forEach(line => {
          const cols = line.split(';').map(c => c.replace(/^"|"$/g, '').trim());
          if (cols.length < 3) return; 
          const endereco = idxEndereco !== -1 ? cols[idxEndereco] : (cols[2] || "Endereço não informado");
          const tipo = idxTipo !== -1 ? cols[idxTipo] : (cols[3] || "Não Identificado");
          const velocidade = idxVelocidade !== -1 ? cols[idxVelocidade] : "0";
          let coordString = null;
          if (idxLeste !== -1 && idxNorte !== -1 && cols[idxLeste] && cols[idxNorte]) {
              coordString = `${cols[idxLeste]},${cols[idxNorte]}`;
          } else {
              for(let c of cols) {
                  if(c && c.includes(',') && !c.includes(' ')) {
                      const parts = c.split(',');
                      if(parts.length == 2 && !isNaN(parts[0]) && !isNaN(parts[1])) { coordString = c; break; }
                  }
              }
          }
          recordsFormatados.push([ null, null, endereco, tipo, velocidade, null, null, null, null, coordString ]);
      });
      return recordsFormatados;
    }

    function renderizarRadaresNoMapa(records, origem) {
      const radaresExternos = records || [];
      const todosOsRadares = [...radaresExternos, ...injetarRadaresIA()];

      let contador = 0;
      for (let i = 0; i < todosOsRadares.length; i++) {
        const marker = criarMarkerRadar(todosOsRadares[i]);
        if (marker) contador++;
      }

      map.setView([userLat, userLng], 16);
      hideFullscreenLoading();
      $("#loading").hide();
      
      if (contador > 0) showNotification(`Base carregada (${origem})`);
      else showNotification("Nenhum radar encontrado.");
    }
    
    function verificarProximidade(uLat, uLng) {
      let alertTriggered = false;
      radarMarkers.forEach(marker => {
        if (alertTriggered) return;
        const dados = marker.radarData;
        const distance = calcularDistancia(uLat, uLng, dados.latitude, dados.longitude);
        if (distance < 300) { 
          alertTriggered = true;
          
          const emoji = getIconEmoji(dados.tipoOriginal, dados.velocidade_maxima);
          $("#alert-icon").text(emoji);
          $("#alert-text").text(`${dados.endereco} - Máx: ${dados.velocidade_maxima}km/h (${Math.round(distance)}m)`);
          $("#alert-title").text(dados.isIA ? "⚠️ Câmera Inteligente Detectada!" : "Atenção! Radar Detectado");
          
          // Tocar som de alerta
          playAlertSound();

          $("#alert-container").fadeIn(200); clearTimeout(alertTimeout);
          alertTimeout = setTimeout(() => $("#alert-container").fadeOut(500), 5000);
        }
      });
    }

    function buscarRadares(query) {
      if (!query || query.length < 2) return;
      let encontrou = false; const boundsGroup = L.featureGroup(); const q = query.toLowerCase();
      radarMarkers.forEach(marker => {
        const d = marker.radarData;
        if (`${d.endereco} ${d.tipoOriginal} ${d.tipoExibicao}`.toLowerCase().includes(q)) {
          encontrou = true; boundsGroup.addLayer(marker); marker.openPopup(); 
        }
      });
      if (encontrou) map.fitBounds(boundsGroup.getBounds().pad(0.5)); 
      else showNotification("Nenhum radar encontrado.");
    }

    function showError(error) { 
      hideFullscreenLoading(); 
      setGpsStatus('erro');
      if(error.code === 1) showNotification("Permissão de GPS negada.");
      else showNotification("Ative seu GPS."); 
    }

    function resetFormAddRadar() {
      $("#capture-lat").text("--"); $("#capture-lng").text("--");
      $("#input-endereco").val(""); $("#input-velocidade").val("");
      $("#input-sentido").val(""); $("#input-sentido-fiscalizado").val("");
    }

    function salvarNovoRadar() {
      const lat = $("#capture-lat").text();
      const lng = $("#capture-lng").text();
      if (lat === "--" || lng === "--") { showNotification("Capture a posição atual antes de salvar."); return; }

      const endereco = $("#input-endereco").val().trim();
      if (!endereco) { showNotification("Informe o endereço."); return; }

      const tipo = $("#input-tipo").val();
      const velocidade = $("#input-velocidade").val().trim() || "0";
      const sentido = $("#input-sentido").val().trim();
      const sentidoFiscalizado = $("#input-sentido-fiscalizado").val().trim() || "Único";

      const novoId = radaresAppLocal.records.length + 1;
      const registro = [
        novoId,
        String(novoId).padStart(4, '0'),
        endereco,
        tipo,
        velocidade,
        sentido,
        sentidoFiscalizado,
        "pendente",
        `${lat}, ${lng}`
      ];

      radaresAppLocal.records.push(registro);
      localStorage.setItem('radares_app_local', JSON.stringify(radaresAppLocal));

      criarMarkerRadar(registro);

      showNotification("Radar salvo! Use 'Exportar radares_app.json' para publicar.");
      $("#modal-add-radar").removeClass('active');
      resetFormAddRadar();
    }

    function exportarRadaresAppJson() {
      if (radaresAppLocal.records.length === 0) { showNotification("Nenhum radar novo para exportar."); return; }
      const blob = new Blob([JSON.stringify(radaresAppLocal, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'radares_app.json'; a.click();
      URL.revokeObjectURL(url);
      showNotification("Arquivo radares_app.json exportado.");
    }
    
    // Inicializar áudio no primeiro clique do usuário
    document.addEventListener('click', function initAudioOnClick() {
      initAudio();
      document.removeEventListener('click', initAudioOnClick);
    }, { once: true });
    
    window.onload = initMap;
  </script>
