<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Cache Control -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Radar X9 BH - Alerta Inteligente (OSM + IA)</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" crossorigin="anonymous" />
  
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js" crossorigin="anonymous"></script>


  <style>
    /* ===================================================================
       VARIÁVEIS DE TEMA (cores globais do app)
    =================================================================== */
    :root {
        --bg-color: #0f1115;
        --panel-color: #1a1d24;
        --accent-color: #00ff88;
        --alert-color: #ff3333;
        --text-main: #ffffff;
        --text-muted: #a0a0a0;
        --sidebar-width: 68px;
        --btn-size: 50px;
    }

    /* ===================================================================
       RESET GLOBAL — remove paddings/margins padrão do navegador
    =================================================================== */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
    }

    /* ===================================================================
       BODY — layout principal em coluna, tela cheia, sem scroll
    =================================================================== */
    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* ===================================================================
       HEADER — barra superior com logo, título e botão menu
    =================================================================== */
    header {
        background-color: var(--panel-color);
        padding: 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 2px solid var(--accent-color);
        box-shadow: 0 4px 15px rgba(0, 255, 136, 0.1);
        z-index: 1000;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .app-icon {
        width: 50px;
        height: 40px;
        border-radius: 8px;
        object-fit: contain;
    }

    h1 {
        font-size: 1.2rem;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    h1 span {
        color: var(--accent-color);
    }

    /* ===================================================================
       BOTÃO MENU TOGGLE — hamburger animado com label "MENU"
       Ao clicar, as 3 barras viram um "X" via transform
    =================================================================== */
    .btn-menu-toggle {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        background: none;
        border: 1.5px solid rgba(0, 255, 136, 0.3);
        border-radius: 10px;
        padding: 8px 14px 6px;
        cursor: pointer;
        transition: all 0.25s ease;
        user-select: none;
        -webkit-user-select: none;
    }

    .btn-menu-toggle:hover {
        border-color: var(--accent-color);
        background: rgba(0, 255, 136, 0.06);
    }

    .btn-menu-toggle:active {
        transform: scale(0.93);
    }

    .menu-hamburger {
        display: flex;
        flex-direction: column;
        gap: 4px;
        width: 22px;
    }

    .menu-hamburger span {
        display: block;
        height: 2.5px;
        width: 100%;
        background-color: var(--accent-color);
        border-radius: 2px;
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        transform-origin: center;
    }

    /* Animação do X quando o menu está ativo */
    .btn-menu-toggle.active .menu-hamburger span:nth-child(1) {
        transform: translateY(6.5px) rotate(45deg);
    }

    .btn-menu-toggle.active .menu-hamburger span:nth-child(2) {
        opacity: 0;
        transform: scaleX(0);
    }

    .btn-menu-toggle.active .menu-hamburger span:nth-child(3) {
        transform: translateY(-6.5px) rotate(-45deg);
    }

    .menu-label {
        font-size: 0.55rem;
        font-weight: 700;
        letter-spacing: 1.5px;
        color: var(--accent-color);
        text-transform: uppercase;
        line-height: 1;
        margin-top: 2px;
    }

    /* ===================================================================
       SIDEBAR CONTROLS — barra vertical à direita com botões de mapa
       Pode ser retraída via classe .retracted (translateX para fora)
    =================================================================== */
    .sidebar-controls {
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        width: var(--sidebar-width);
        z-index: 500;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 20px 0;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        transform: translateX(0);
    }

    .sidebar-controls.retracted {
        transform: translateX(calc(var(--sidebar-width) + 10px));
    }

    /* Botões dentro da sidebar — visibilidade controlada pela retração */
    .sidebar-controls .map-btn {
        width: var(--btn-size);
        height: var(--btn-size);
        opacity: 1;
        transition: opacity 0.25s ease 0s, transform 0.2s ease, border-color 0.2s ease;
    }

    .sidebar-controls.retracted .map-btn {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s ease 0s, transform 0.2s ease, border-color 0.2s ease;
    }

    /* ===================================================================
       BARRAS DE BUSCA — search-container para radares e rotas
       Max-height: 0 quando fechada, 90px quando .active
       Desliza para baixo com transição suave
    =================================================================== */
    .search-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        background-color: rgba(26, 29, 36, 0.98);
        backdrop-filter: blur(8px);
        display: flex;
        gap: 12px;
        z-index: 1000;
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        padding: 0 15px;
        border-bottom: 1px solid transparent;
        transition: all 0.3s ease;
        align-items: center;
    }

    .search-container.active {
        max-height: 90px;
        opacity: 1;
        padding: 15px;
        border-bottom: 1px solid #333;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    /* Input de busca — cantos arredondados, fundo preto */
    .search-container input {
        flex: 1;
        padding: 14px 20px;
        border-radius: 30px;
        border: 1px solid #444;
        background-color: #000;
        color: #fff;
        font-size: 1rem;
        outline: none;
        font-family: 'Inter', sans-serif;
    }

    .search-container input:focus {
        border-color: var(--accent-color);
    }

    /* Botão circular de buscar dentro da barra */
    .btn-search {
        position: relative;
        flex-shrink: 0;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        background: rgba(46, 102, 158, 0.95);
        box-shadow: 0 3px 8px rgba(203, 240, 15, 0.5);
        transition: all 0.2s ease;
        overflow: hidden;
    }

    .btn-search:active {
        transform: scale(0.9);
    }

    .btn-search img {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 40px;
        height: 40px;
        object-fit: contain;
        display: block;
        transform: translate(-50%, -50%);
    }

    /* ===================================================================
       MAP-WRAPPER — container flexível que segura o mapa e overlays
       Ocupa todo o espaço restante abaixo do header
    =================================================================== */
    .map-wrapper {
        position: relative;
        flex: 1;
        display: flex;
        overflow: hidden;
        width: 100%;
    }

    /* Mapa Leaflet — preenche todo o wrapper */
   /* Mapa Leaflet — preenche todo o wrapper */
#map {
    width: 100%;
    height: 100%;
    background-color: #2a2a2a;
    z-index: 1;
    position: relative; /* ✅ necessário para .compass-widget absolute funcionar */
}

/* ===================================================================
   ISOLAR PANES DO LEAFLET — NÃO DEIXAR NENHUM FICAR ACIMA DA BÚSSOLA
   =================================================================== */
/* Esconde o ícone de rotação padrão do leaflet-rotate */
.leaflet-control-rotate,
.leaflet-rotate-control,
.leaflet-control-rotate-icon,
.leaflet-rotate-control-icon,
.leaflet-control-rotate-toggle,
.leaflet-rotate-toggle,
.leaflet-control-rotate a,
.leaflet-rotate-control a {
    display: none !important;
    visibility: hidden !important;
    opacity: 0 !important;
    pointer-events: none !important;
    width: 0 !important;
    height: 0 !important;
}

/* Todos os panes do Leaflet ficam abaixo da bússola */
.leaflet-pane,
.leaflet-map-pane,
.leaflet-tile-pane,
.leaflet-overlay-pane,
.leaflet-shadow-pane,
.leaflet-marker-pane,
.leaflet-popup-pane,
.leaflet-control-pane,
.leaflet-tooltip-pane {
    z-index: 1 !important; /* forçar abaixo da bússola */
}

    
   
        /* ===================================================================
       BÚSSOLA - POSICIONAMENTO E ANIMAÇÃO COM BARRA DE BUSCA
    =================================================================== */
    .compass-widget {
        position: absolute;
        top: 10px; 
        left: 5px;
        width: 65px;
        height: 65px;
        z-index: 999999 !important;
        transform: translateZ(0);
        will-change: transform;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        
        /* ✅ Devolve a transição suave para a bússola */
        transition: top 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ✅ Classe que faz a bússola descer quando a busca/rota abre */
    .compass-widget.busca-ativo {
        top: 75px; 
    }

    .compass-base {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 1;
        background-image: url('/imagens_app/ic_compass.png');
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        opacity: 0.9;
    }

    .compass-needle {
        position: absolute;
        width: 55%;
        height: 55%;
        z-index: 2;
        object-fit: contain;
        transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    

    
/* ===================================================================
   SE A BÚSSOLA ESTIVER DENTRO DE #map, FORÇAR SAÍDA DO FLUXO LEAFLET
   =================================================================== */

/* Mover a bússola para fora do contexto de empilhamento do Leaflet */
#map > .compass-widget,
#map .compass-widget {
    /* Forçar posicionamento no topo da pilha de renderização */
    position: absolute !important;
    z-index: 999999 !important;
    
    /* Isolar em novo contexto de empilhamento */
    isolation: isolate;
    
    /* Garantir que não herda transform do mapa */
    transform: translateZ(1px) !important;
}

/* Se houver algum container pai com transform/opacity que crie contexto */
.leaflet-container .compass-widget,
.leaflet-map-pane ~ .compass-widget {
    z-index: 999999 !important;
    position: absolute !important;
}
    /* ===================================================================
       MAP-BTN — estilo base para todos os botões redondos do mapa
    =================================================================== */
    .map-btn {
        width: var(--btn-size);
        height: var(--btn-size);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        cursor: pointer;
        background: rgba(20, 20, 20, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
        transition: all 0.2s ease;
        flex-shrink: 0;
    }

    .map-btn:hover {
        transform: scale(1.08);
        border-color: var(--accent-color);
    }

    .map-btn:active {
        transform: scale(0.92);
    }

    .map-btn img {
        width: 30px;
        height: 30px;
        object-fit: contain;
        pointer-events: none;
    }

    /* ===================================================================
       BOTÃO ALERTA TOGGLE — estados LIGADO/DESLIGADO
    =================================================================== */
    .alert-toggle-btn {
        background: rgba(29, 28, 28, 0.9);
        border: 2px solid rgba(255, 255, 255, 0.08);
        transition: all 0.3s ease;
    }

    .alert-toggle-btn.alert-off {
        background: rgba(222, 127, 127, 0.9);
        border-color: #888;
    }

    .alert-toggle-btn.alert-off img {
        filter: rgba(225, 82, 82, 0.9);
    }

    .alert-toggle-btn img {
        transition: all 0.3s ease;
    }

    .sidebar-controls .map-btn {
        border: 1px solid rgba(0, 255, 136, 0.35);
    }

    #btn-route-bar {
        width: 54px;
        height: 54px;
    }

    /* ===================================================================
       CSS do botão de rotação — feedback visual + ícone girante
    =================================================================== */
    #btn-rotate-map {
        transition: border-color 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
    }

    #btn-rotate-map.rotated {
        border-color: var(--accent-color);
        box-shadow: 0 0 18px rgba(0, 255, 136, 0.35), inset 0 0 8px rgba(0, 255, 136, 0.1);
        background-color: rgba(0, 255, 136, 0.08);
    }

    #btn-rotate-map.rotated img {
        filter: brightness(1.2) drop-shadow(0 0 4px rgba(0, 255, 136, 0.5));
        transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.3s ease;
    }

    #btn-rotate-map:not(.rotated) img {
        transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.3s ease;
    }

    /* ===================================================================
       MARCADORES DE USUÁRIO E NAVEGAÇÃO
    =================================================================== */
    .user-gps-marker,
    .user-navigator-marker {
        background: transparent !important;
        border: none !important;
    }

    .user-gps-marker img,
    .user-navigator-marker img {
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        transition: none !important;
        will-change: transform;
    }

    .route-start-marker {
        background: transparent !important;
        border: none !important;
    }

    .route-start-marker img {
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        animation: pulseStart 1s ease-in-out infinite;
    }

    .route-end-marker {
        background: transparent !important;
        border: none !important;
    }

    .route-end-marker img {
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        animation: pulseEnd 1.2s ease-in-out infinite;
    }

    @keyframes pulseStart {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
        100% { transform: scale(1); opacity: 1; }
    }

    @keyframes pulseEnd {
        0% { transform: scale(1); }
        50% { transform: scale(1.15); }
        100% { transform: scale(1); }
    }

    /* ===================================================================
       MARCADORES DE RADAR
    =================================================================== */
    .radar-marker-icon {
        background: transparent !important;
        border: none !important;
    }

    .radar-marker-icon img {
        width: 40px !important;
        height: 40px !important;
        object-fit: contain !important;
        display: block !important;
    }

   

        /* ===================================================================
       SPEED WIDGET - CENTRALIZAÇÃO ABSOLUTA E APENAS ANIMAÇÃO DE ALERTA
    =================================================================== */

    .speed-widget {
        position: absolute;
        bottom: -15px;
        left: -25px;
        width: 150px;
        height: 150px;
        z-index: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        
        /* Apenas esta transição, para subir quando o alerta aparece */
        transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
    }

    
    /* ✅ Classe que faz o speed subir APENAS quando o alerta aparece */
    .speed-widget.alerta-ativo {
        bottom: 75px !important; 
    }

    .speed-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        pointer-events: none;
    }

    .speed-value {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-64%, -60%);
        font-size: 28px;
        font-weight: 700;
        font-family: 'Rajdhani', 'Oswald', 'Arial Narrow', sans-serif;
        color: #000;
        line-height: 1;
        z-index: 2;
        white-space: nowrap;
        text-align: center;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.5px;
        min-width: 3ch;
    }
   

/* ===================================================================
   ALERT CONTAINER (BASE)
=================================================================== */
#alert-container {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    display: none;
    animation: slideUp 0.3s ease-out;
    pointer-events: none;
}

@keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
}

/* Animação única e otimizada para todos os alertas críticos */
@keyframes pulseAlerta {
    0% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.02); filter: brightness(1.4); } /* Clareia a cor que já estiver no fundo */
    100% { transform: scale(1); filter: brightness(1); }
}

/* Estilo Base da Tarja (Serve como padrão para o Radar Vermelho) */
.alert-bar {
    color: white;
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 15px;
    transition: all 0.2s ease;
}

/* ===================================================================
   ALERTA DE RADAR (VERMELHO)
=================================================================== */
.alert-bar-radar,
.alert-bar:not([class*="-risco"]):not([class*="-mobilidade"]) {
    background: linear-gradient(90deg, #cc0000, #990000);
    border-top: 2px solid #ff5555;
    box-shadow: 0 -5px 20px rgba(255, 0, 0, 0.4);
}

/* ===================================================================
   ALERTA DE RISCO (AMARELO)
=================================================================== */
.alert-bar-risco {
    background: linear-gradient(90deg, #e6a800, #b38600);
    border-top: 2px solid #ffcc00;
    box-shadow: 0 -5px 20px rgba(230, 168, 0, 0.4);
}

/* ===================================================================
   AVISO DE MOBILIDADE (VERDE)
=================================================================== */
.alert-bar-mobilidade {
    background: linear-gradient(90deg, #00b359, #008040);
    border-top: 2px solid #00e066;
    box-shadow: 0 -5px 20px rgba(0, 179, 89, 0.4);
}

/* ===================================================================
   ESTILO CRÍTICO (MUITO PERTO) - Unificado
=================================================================== */
.alert-bar-critico,
.alert-bar-risco-critico,
.alert-bar-mobilidade-critico {
    animation: pulseAlerta 0.8s ease-in-out infinite;
}

/* ===================================================================
   ELEMENTOS INTERNOS DO ALERTA
=================================================================== */
.alert-bar img {
    width: 50px;
    height: 50px;
    filter: drop-shadow(0 0 5px rgba(0, 0, 0, 0.5));
}

.alert-info h3 {
    font-size: 1.2rem;
    margin-bottom: 3px;
    text-transform: uppercase;
    font-weight: 800;
}

.alert-info p {
    font-size: 0.95rem;
    opacity: 0.95;
}

    /* ===================================================================
       TOAST NOTIFICATION
    =================================================================== */
    .toast-notification {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        background-color: rgba(20, 20, 20, 0.95);
        color: var(--text-main);
        padding: 12px 25px;
        border-radius: 50px;
        border: 1px solid #444;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
        z-index: 2000;
        opacity: 0;
        font-size: 0.95rem;
        font-weight: 600;
        text-align: center;
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.3s ease;
        white-space: nowrap;
    }

    .toast-notification.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }

    /* ===================================================================
       LOADING OVERLAY
    =================================================================== */
    .loading-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(20, 20, 20, 0.9);
        padding: 20px 30px;
        border-radius: 12px;
        border: 1px solid var(--accent-color);
        text-align: center;
        z-index: 1001;
        backdrop-filter: blur(5px);
    }

    .loading-spinner {
        border: 3px solid #333;
        border-top: 3px solid var(--accent-color);
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
        margin: 0 auto 10px;
    }

    @keyframes spin {
        100% { transform: rotate(360deg); }
    }

    /* ===================================================================
       LOADING FULLSCREEN
    =================================================================== */
    .loading-fullscreen {
        position: fixed;
        inset: 0;
        background-color: var(--bg-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .loading-fullscreen.fade-out {
        opacity: 0;
        visibility: hidden;
    }

    .loading-fullscreen .spinner-ring {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        position: relative;
        margin-bottom: 24px;
    }

    .loading-fullscreen .spinner-ring::before,
    .loading-fullscreen .spinner-ring::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 4px solid transparent;
    }

    .loading-fullscreen .spinner-ring::before {
        border-top-color: var(--accent-color);
        border-right-color: var(--accent-color);
        animation: spinRing 1s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite;
    }

    .loading-fullscreen .spinner-ring::after {
        inset: 10px;
        border-bottom-color: #ff3333;
        border-left-color: #ff3333;
        animation: spinRing 1.4s cubic-bezier(0.68, -0.15, 0.27, 1.15) infinite reverse;
    }

    @keyframes spinRing {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .loading-fullscreen .loading-text {
        font-size: 1.1rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-align: center;
    }

    .loading-fullscreen .loading-text span {
        color: var(--accent-color);
    }

    .loading-fullscreen .loading-sub {

var alertTimers = [];
var tipoSomTocando = null; 

function pararTodosSons() {
  // Limpa os agendamentos de repetição
  alertTimers.forEach(function(t) { clearTimeout(t); });
  alertTimers = [];
  tipoSomTocando = null;

  // Pausa e reseta os elementos originais
  ['alert-sound-radar', 'alert-sound-risco', 'alert-sound-aviso'].forEach(function(id) {
    var sound = document.getElementById(id);
    if (sound) {
      sound.pause();
      sound.currentTime = 0;
    }
  });

  // Remove clones antigos para não acumular na memória
  var clones = document.querySelectorAll('.audio-clone');
  clones.forEach(function(c) { c.remove(); });
}

// Função que gerencia a reprodução do .mp3 3 vezes seguidas
function tocarSomAlerta(tipoAlerta) {
  // Evita re-disparar se já está tocando o mesmo alerta
  if (tipoSomTocando === tipoAlerta && alertTimers.length > 0) return;
  
  pararTodosSons(); // Limpa qualquer som anterior
  
  tipoSomTocando = tipoAlerta;

  var soundId = '';
  if (tipoAlerta === 'radar') {
    soundId = 'alert-sound-radar'; // Tarja Vermelha
  } else if (tipoAlerta === 'risco') {
    soundId = 'alert-sound-risco'; // Tarja Amarela
  } else if (tipoAlerta === 'aviso') {
    soundId = 'alert-sound-aviso'; // Tarja Verde
  }

  var originalSound = document.getElementById(soundId);
  if (!originalSound) return;

  // Estratégia que funciona mesmo no Chrome mobile: clona o áudio para tocar por cima
  for (var i = 0; i < 3; i++) {
    (function(index) {
      var timer = setTimeout(function() {
        var clone = originalSound.cloneNode(true);
        clone.classList.add('audio-clone');
        clone.volume = 1.0;
        document.body.appendChild(clone);
        
        var playPromise = clone.play();
        if (playPromise !== undefined) {
          playPromise.catch(function(e) {
            console.warn("Reprodução bloqueada pelo navegador até interação do usuário:", e);
          });
        }
        
        // Remove o clone após terminar para limpar a memória
        clone.onended = function() {
          clone.remove();
        };
      }, index * 700); // 700ms de intervalo entre os 3 toques
      alertTimers.push(timer);
    })(i);
  }
}

  // 1. Verifica se é RISCO (Amarelo)
  for (var i = 0; i < TIPOS_ALERTA_RISCO.length; i++) {
    if (tipoLimpo === TIPOS_ALERTA_RISCO[i] || tipoLimpo.includes(TIPOS_ALERTA_RISCO[i])) return 'risco';

  // 2. Verifica se é MOBILIDADE (Verde)
  for (var j = 0; j < TIPOS_ALERTA_MOBILIDADE.length; j++) {
    if (tipoLimpo === TIPOS_ALERTA_MOBILIDADE[j] || tipoLimpo.includes(TIPOS_ALERTA_MOBILIDADE[j])) return 'mobilidade';
  }
  
  // 3. Se não for Risco nem Mobilidade, é RADAR (Vermelho)
  return 'radar';
}

function calcularDistancia(lat1, lon1, lat2, lon2) {
  var R = 6371e3;
  var p1 = lat1 * Math.PI / 180;
  var p2 = lat2 * Math.PI / 180;
  var dp = (lat2 - lat1) * Math.PI / 180;
  var dl = (lon2 - lon1) * Math.PI / 180;
  var a = Math.sin(dp/2)*Math.sin(dp/2) + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)*Math.sin(dl/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function suavizarBearing(alvo, atual, fator) {
  var diff = alvo - atual;
  while (diff > 180) diff -= 360;
  while (diff < -180) diff += 360;
  return (atual + diff * fator + 360) % 360;
}

function calcularZoomPorVelocidade() {
  if (velocidadeAtual < 5) return 19;
  if (velocidadeAtual < 20) return 18;
  if (velocidadeAtual < 40) return 17;
  if (velocidadeAtual < 60) return 16;
  if (velocidadeAtual < 80) return 15;
  return 14;
}

function calcularCentroMapaComOffset(lat, lng, bearing) {
  if (!estaEmNavegacao || !mapaRotacionado) return { lat: lat, lng: lng };
  var offsetDist = 0.0003;
  var rad = (bearing - 90) * Math.PI / 180;
  return {
    lat: lat - Math.cos(rad) * offsetDist,
    lng: lng - Math.sin(rad) * offsetDist
  };
}

function suavizarPosicao(novaLat, novaLng) {
  if (posicaoSuavizada.lat === null) {
    posicaoSuavizada.lat = novaLat;
    posicaoSuavizada.lng = novaLng;
    return { lat: novaLat, lng: novaLng };
  }
  var fator = ALERT_CONFIG.SUAVIZACAO_FATOR;
  posicaoSuavizada.lat += (novaLat - posicaoSuavizada.lat) * fator;
  posicaoSuavizada.lng += (novaLng - posicaoSuavizada.lng) * fator;
  return { lat: posicaoSuavizada.lat, lng: posicaoSuavizada.lng };
}

function adicionarAoHistorico(lat, lng, timestamp) {
  historicoPosicoes.push({ lat: lat, lng: lng, time: timestamp });
  if (historicoPosicoes.length > ALERT_CONFIG.HISTORICO_TAMANHO) historicoPosicoes.shift();
}

function calcularTendenciaDistancia(radarId, distanciaAtual) {
  if (!historicoDistanciasRadar[radarId]) historicoDistanciasRadar[radarId] = [];
  historicoDistanciasRadar[radarId].push({ distancia: distanciaAtual, time: Date.now() });
  if (historicoDistanciasRadar[radarId].length > 5) historicoDistanciasRadar[radarId].shift();
  var historico = historicoDistanciasRadar[radarId];
  if (historico.length < 2) return { estaAproximando: true, estaAfastando: false };
  var diferenca = historico[0].distancia - historico[historico.length - 1].distancia;
  if (diferenca > 5) return { estaAproximando: true, estaAfastando: false, diferenca: diferenca };
  if (diferenca < -5) return { estaAproximando: false, estaAfastando: true, diferenca: diferenca };
  return { estaAproximando: true, estaAfastando: false, diferenca: 0 };
}

function moverMarcadorSuavemente(targetLat, targetLng) {
  var marcadorParaMover = estaEmNavegacao ? startRouteMarker : userMarker;
  if (!marcadorParaMover) return;
  if (ultimaPosicaoMarcador.lat === null) {
    ultimaPosicaoMarcador = { lat: targetLat, lng: targetLng };
    marcadorParaMover.setLatLng([targetLat, targetLng]);
    return;
  }
  var distancia = calcularDistancia(ultimaPosicaoMarcador.lat, ultimaPosicaoMarcador.lng, targetLat, targetLng);
  if (distancia < ALERT_CONFIG.DISTANCIA_MINIMA_MOVIMENTO) return;
  var inicioLat = ultimaPosicaoMarcador.lat;
  var inicioLng = ultimaPosicaoMarcador.lng;
  var duracao = 300;
  var inicioTempo = performance.now();
  if (animacaoMarcadorAtiva) return;
  animacaoMarcadorAtiva = true;
  function animarFrame(tempoAtual) {
    var progresso = Math.min((tempoAtual - inicioTempo) / duracao, 1);
    var easing = 1 - Math.pow(1 - progresso, 3);
    var latAtual = inicioLat + (targetLat - inicioLat) * easing;
    var lngAtual = inicioLng + (targetLng - inicioLng) * easing;
    marcadorParaMover.setLatLng([latAtual, lngAtual]);
    if (progresso < 1) {
      requestAnimationFrame(animarFrame);
    } else {
      ultimaPosicaoMarcador = { lat: targetLat, lng: targetLng };
      animacaoMarcadorAtiva = false;
    }
  }
  requestAnimationFrame(animarFrame);
}

function limparHistoricoDistancia(radarId) {
  if (historicoDistanciasRadar[radarId]) delete historicoDistanciasRadar[radarId];
}

function verificarDirecaoMelhorada(uLat, uLng, uHeading, radarLat, radarLng, radarId, distanciaAtual) {
  if (!uHeading || uHeading === -1 || isNaN(uHeading)) {
    var t = calcularTendenciaDistancia(radarId, distanciaAtual);
    return { estaAproximando: t.estaAproximando, estaAfastando: t.estaAfastando };
  }
  var deltaX = radarLng - uLng;
  var deltaY = radarLat - uLat;
  var anguloRadar = (Math.atan2(deltaY, deltaX) * 180 / Math.PI + 360) % 360;
  var diff = Math.abs(uHeading - anguloRadar);
  diff = Math.min(diff, 360 - diff);
  var tendencia = calcularTendenciaDistancia(radarId, distanciaAtual);
  return {
    estaAproximando: (diff < ALERT_CONFIG.ANGULO_APROXIMACAO) || tendencia.estaAproximando,
    estaAfastando: (diff > ALERT_CONFIG.ANGULO_AFASTANDO) && tendencia.estaAfastando
  };
}

function criarRota(destLat, destLng) {
  if (!userLat || !userLng) { showNotification("Aguardando posição GPS..."); return; }
  if (routingControl) { map.removeControl(routingControl); routingControl = null; }
  destinoAtual = { lat: destLat, lng: destLng };
  adicionarMarcadoresRota(userLat, userLng, destLat, destLng);
  routingControl = L.Routing.control({
    waypoints: [L.latLng(userLat, userLng), L.latLng(destLat, destLng)],
    routeWhileDragging: false, addWaypoints: false, draggableWaypoints: false,
    fitSelectedRoutes: false, show: false, autoRoute: true,
    lineOptions: {
      styles: [
        { color: '#4A148C', weight: 16, opacity: 0.4, lineCap: 'round', lineJoin: 'round' },
        { color: '#6A1B9A', weight: 12, opacity: 0.9, lineCap: 'round', lineJoin: 'round' },
        { color: '#8E24AA', weight: 8, opacity: 0.95, lineCap: 'round', lineJoin: 'round' },
        { color: '#FF9800', weight: 5, opacity: 1.0, lineCap: 'round', lineJoin: 'round' },
        { color: '#FFB74D', weight: 2, opacity: 0.9, lineCap: 'round', lineJoin: 'round' }
      ],
      addWaypoints: false
    },
    createMarker: function() { return null; },
    showAlternatives: false
  }).addTo(map);
  
  routingControl.on('routesfound', function(e) {
    let route = e.routes[0];
    if (route.coordinates && route.coordinates.length >= 2) {
      var p1 = route.coordinates[0];
      var p2 = route.coordinates[1];
      var heading = calcularBearing(p1.lat, p1.lng, p2.lat, p2.lng);
      headingIconeNavegacao = heading;
      headingIconeSuavizado = heading;
      // ADICIONADO: Sincroniza animação de navegação com a direção da rota
      _navAnim.headingAlvo      = heading;
      _navAnim.headingSuavizado = heading;
      bearingAlvo = heading;
      bearingAtual = heading;
    }
    let dk = (route.summary.totalDistance / 1000).toFixed(1);
    let tm = Math.round(route.summary.totalTime / 60);
    $("#loading").hide();
    showNotification("🚗 " + dk + " km • " + tm + " min");
    iniciarModoNavegacaoSuave();
  });
  routingControl.on('routingerror', function() { $("#loading").hide(); showNotification("Erro ao traçar rota."); });
  showNotification("🚀 Navegação iniciada");
}

function calcularBearing(lat1, lng1, lat2, lng2) {
  var dLon = (lng2 - lng1) * Math.PI / 180;
  var lat1Rad = lat1 * Math.PI / 180;
  var lat2Rad = lat2 * Math.PI / 180;
  var y = Math.sin(dLon) * Math.cos(lat2Rad);
  var x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
  var brng = Math.atan2(y, x) * 180 / Math.PI;
  return (brng + 360) % 360;
}

function iniciarModoNavegacaoSuave() {
  estaEmNavegacao = true;
  isFollowing = true;
  var sidebar = document.getElementById('sidebar-controls');
  var btnMenu = document.getElementById('btn-menu-toggle');
  if (sidebar && !sidebar.classList.contains('retracted')) {
    sidebarAberta = false;
    sidebar.classList.add('retracted');
    if (btnMenu) btnMenu.classList.add('active');
  }
  if (currentHeading > 0 && typeof map.setBearing === 'function') {
    mapaRotacionado = true;
    bearingAlvo = currentHeading;
    bearingAtual = currentHeading;
    map.setBearing(currentHeading);
    var rb = document.getElementById('btn-rotate-map');
    if (rb) rb.classList.add('rotated');
  }
}

function atualizarCameraNavegacaoSuave() {
  if (!estaEmNavegacao || !isFollowing) return;
  let agora = Date.now();
  if (agora - ultimaAtualizacaoCamera < INTERVALO_CAMERA_MS) return;
  ultimaAtualizacaoCamera = agora;
  let zoomDesejado = calcularZoomPorVelocidade();
  zoomAlvo = zoomAlvo * 0.85 + zoomDesejado * 0.15;
  let zoomArredondado = Math.round(zoomAlvo * 10) / 10;
  let latCam = ultimaPosicaoMarcador.lat || posicaoSuavizada.lat || userLat;
  let lngCam = ultimaPosicaoMarcador.lng || posicaoSuavizada.lng || userLng;
  let c = calcularCentroMapaComOffset(latCam, lngCam, bearingAtual);
  let mudancaZoom = Math.abs(zoomArredondado - zoomAtualEfetivo);
  let mudancaPos = 0;
  if (centroAtualEfetivo.lat !== null) {
    mudancaPos = calcularDistancia(c.lat, c.lng, centroAtualEfetivo.lat, centroAtualEfetivo.lng);
  }
  if (mapaRotacionado && typeof map.setBearing === 'function') {
    bearingAtual = suavizarBearing(bearingAlvo, bearingAtual, FATOR_SUAVIZACAO_BEARING);
    map.setBearing(bearingAtual);
    var rotateBtnIcon = document.getElementById('rotate-btn-icon');
    if (rotateBtnIcon) rotateBtnIcon.style.transform = 'rotate(' + bearingAtual + 'deg)';
  }
  if (mudancaPos < 2 && mudancaZoom < 0.3 && centroAtualEfetivo.lat !== null) return;
  centroAtualEfetivo = { lat: c.lat, lng: c.lng };
  zoomAtualEfetivo = zoomArredondado;
  map.setView([c.lat, c.lng], zoomArredondado, { animate: false, duration: 0 });
}

async function buscarCoordenadas(endereco) {
  try {
    var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(endereco + ', Belo Horizonte, Minas Gerais, Brasil');
    var response = await fetch(url);
    var data = await response.json();
    if (data && data.length > 0) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
    return null;
  } catch (e) { console.error("Erro ao buscar coordenadas:", e); return null; }
}

function resetarMapa() {
  if (!map) return;
  mapaRotacionado = false;
  bearingAlvo = 0;
  bearingAtual = 0;
  if (typeof map.setBearing === 'function') map.setBearing(0);
  var rotateBtnIcon = document.getElementById('rotate-btn-icon');
  if (rotateBtnIcon) {
    rotateBtnIcon.src = "/imagens_app/ic_girado_map.png";
    rotateBtnIcon.onerror = function() { this.src = 'https://cdn-icons-png.flaticon.com/512/3089/3089803.png'; };
    rotateBtnIcon.style.transform = 'rotate(0deg)';
  }
  var rotateBtn = document.getElementById('btn-rotate-map');
  if (rotateBtn) rotateBtn.classList.remove('rotated');
  map.setView([posicaoCentralOriginal.lat, posicaoCentralOriginal.lng], posicaoCentralOriginal.zoom, { animate: true, duration: 0.5 });
  isFollowing = false;
  if (refreshDelayTimer) clearTimeout(refreshDelayTimer);
  refreshDelayTimer = setTimeout(function() {
    var marcadorAtivo = estaEmNavegacao ? startRouteMarker : userMarker;
    if (marcadorAtivo && !isFollowing) {
      isFollowing = true;
      map.flyTo(marcadorAtivo.getLatLng(), 20, { duration: 0.8 });
      showNotification("Retornando à sua posição atual");
    }
    refreshDelayTimer = null;
  }, TEMPO_REFRESH_DELAY);
  removerRota();
  esconderAlertaVisual();
  showNotification("Mapa resetado");
}

function extrairCoordenadas(record, index) {
  if (!record || record.length < 9) return null;
  let geomIndex = (record.length >= 10) ? 9 : 8;
  let s = String(record[geomIndex]).trim();
  if (!s || s === '' || s === 'null' || s === 'undefined') {
    geomIndex = (geomIndex === 9) ? 8 : 7;
    s = String(record[geomIndex]).trim();
  }
  if (!s || s === '') return null;
  let lat = null, lng = null;
  
  if (lat === null && s.includes('.')) {
    let parts = s.split(',').map(function(p) { return p.trim(); });
    if (parts.length >= 2) { lat = parseFloat(parts[0]); lng = parseFloat(parts[parts.length - 1]); }
  }
  if ((lat === null || isNaN(lat)) && s.includes(';')) {
    let parts = s.split(';').map(function(p) { return p.trim().replace(',', '.'); });
    if (parts.length >= 2) { lat = parseFloat(parts[0]); lng = parseFloat(parts[1]); }
  }
  if ((lat === null || isNaN(lat)) && (s.match(/,/g) || []).length >= 3) {
    let match = s.match(/(-?\d+,\d+),\s*(-?\d+,\d+)/);
    if (match) { lat = parseFloat(match[1].replace(',', '.')); lng = parseFloat(match[2].replace(',', '.')); }
  }
  if ((lat === null || isNaN(lat))) {
    let parts = s.split(',').map(function(p) { return p.trim().replace(',', '.'); });
    if (parts.length === 2) { lat = parseFloat(parts[0]); lng = parseFloat(parts[1]); }
  }
  if (lat === null || isNaN(lat) || lng === null || isNaN(lng)) {
    for (var f = Math.max(0, geomIndex - 2); f < Math.min(record.length, geomIndex + 3); f++) {
      if (f === geomIndex) continue;
      var campo = String(record[f]).trim();
      if (campo.includes('.') && campo.includes(',')) {
        let parts = campo.split(',').map(function(p) { return p.trim(); });
        if (parts.length === 2) {
          var tLat = parseFloat(parts[0]); var tLng = parseFloat(parts[1]);
          if (!isNaN(tLat) && !isNaN(tLng) && tLat >= -90 && tLat <= 90) { lat = tLat; lng = tLng; break; }
        }
      }
    }
  }
  if (isNaN(lat) || isNaN(lng) || lat === null || lng === null || lat < -90 || lat > 90 || lng < -180 || lng > 180) return null;
  return { lat: lat, lng: lng };
}

function atualizarBussola(headingDegrees) {
  var needle = document.getElementById('compass-needle-img');
  if (needle) needle.style.transform = 'rotate(' + headingDegrees + 'deg)';
}

// ===================================================================
// BLOCO 3 — GPS / ÍCONE DE ROTA FLUIDO (Substitui processarNovaPosicao)
// ===================================================================

// ---- Estado interno da animação -----------------------------------
var _navAnim = {
  rafId: null,          // requestAnimationFrame handle
  fromLat: null,
  fromLng: null,
  toLat: null,
  toLng: null,
  startTime: null,
  duration: 600,        // ms — interpolação suave entre posições GPS
  headingAlvo: 0,
  headingSuavizado: 0
};

// Interpola suavemente o ícone de navegação entre posições GPS
function _animarIconeNavegacao() {
  if (!estaEmNavegacao || !startRouteMarker) return;

  var agora = performance.now();
  var progresso = Math.min((agora - _navAnim.startTime) / _navAnim.duration, 1);

  // Easing cúbico suave
  var t = 1 - Math.pow(1 - progresso, 3);

  var latAtual = _navAnim.fromLat + (_navAnim.toLat - _navAnim.fromLat) * t;
  var lngAtual = _navAnim.fromLng + (_navAnim.toLng - _navAnim.fromLng) * t;

  // Suaviza o heading do ícone
  _navAnim.headingSuavizado = suavizarBearing(
    _navAnim.headingAlvo,
    _navAnim.headingSuavizado,
    0.12   // fator de suavização — menor = mais suave
  );

  // Atualiza posição do marcador
  startRouteMarker.setLatLng([latAtual, lngAtual]);

  // Atualiza rotação do ícone HTML
  var imgNav = document.getElementById('nav-icon-img');
  if (imgNav) {
    imgNav.style.transform = 'rotate(' + _navAnim.headingSuavizado + 'deg)';
  }

  // Atualiza posição suavizada para câmera
  posicaoSuavizadaGPS = { lat: latAtual, lng: lngAtual };
  ultimaPosicaoMarcador = { lat: latAtual, lng: lngAtual };

  if (progresso < 1) {
    _navAnim.rafId = requestAnimationFrame(_animarIconeNavegacao);
  } else {
    _navAnim.rafId = null;
    ultimaPosicaoMarcador = { lat: _navAnim.toLat, lng: _navAnim.toLng };
  }
}

// Lança nova animação de deslocamento para o ícone de rota
function _iniciarAnimacaoNavegacao(toLat, toLng, novoHeading) {
  // Cancela animação anterior
  if (_navAnim.rafId) {
    cancelAnimationFrame(_navAnim.rafId);
    _navAnim.rafId = null;
  }

  // Ponto de partida = posição atual interpolada (sem saltos)
  var pos = startRouteMarker ? startRouteMarker.getLatLng() : null;
  _navAnim.fromLat = pos ? pos.lat : toLat;
  _navAnim.fromLng = pos ? pos.lng : toLng;
  _navAnim.toLat = toLat;
  _navAnim.toLng = toLng;
  _navAnim.startTime = performance.now();

  if (novoHeading !== null && !isNaN(novoHeading)) {
    _navAnim.headingAlvo = novoHeading;
    headingIconeNavegacao = novoHeading;
  }

  _navAnim.rafId = requestAnimationFrame(_animarIconeNavegacao);
}

// ---- processarNovaPosicao CORRIGIDA --------------------------------
function processarNovaPosicao(newLat, newLng, speedKmh, hardwareHeading) {
  if (!map) return;

  var currentTime = Date.now();
  var dist = 0;

  adicionarAoHistorico(newLat, newLng, currentTime);

  // Suaviza posição para câmera (não para o marcador — ele tem animação própria)
  var posSuave = suavizarPosicao(newLat, newLng);
  var smoothLat = posSuave.lat;
  var smoothLng = posSuave.lng;

  // Calcula velocidade
  if (prevLat !== null) {
    dist = calcularDistancia(prevLat, prevLng, newLat, newLng);
    if (speedKmh === 0 && prevTime !== null) {
      var time = (currentTime - prevTime) / 1000;
      if (time > 0) speedKmh = Math.round((dist / time) * 3.6);
    }
  }
  if (speedKmh > 250) speedKmh = 0;
  velocidadeAtual = speedKmh;
  $('#speed-display').text(speedKmh);
  estaEmMovimento = speedKmh > 3 || dist > 2;

  // Calcula heading
  var novoHeading = null;

  if (hardwareHeading !== null && !isNaN(hardwareHeading) && hardwareHeading >= 0) {
    if (!bussolaHardwareDisponivel) { currentHeading = hardwareHeading; bussolaHardwareDisponivel = true; }
    novoHeading = hardwareHeading;
  } else if (!bussolaHardwareDisponivel && dist > 3 && prevLat !== null) {
    var dy = newLat - prevLat;
    var dx = (newLng - prevLng) * Math.cos(newLat * Math.PI / 180);
    if (Math.abs(dx) > 0.0000001 || Math.abs(dy) > 0.0000001) {
      var calcHeading = (Math.atan2(dx, dy) * 180 / Math.PI + 360) % 360;
      currentHeading = calcHeading;
      novoHeading = calcHeading;
    }
  }

  if (novoHeading !== null && estaEmMovimento) {
    bearingAlvo = novoHeading;
    headingIconeNavegacao = novoHeading;
  }

  if (currentHeading !== null) atualizarBussola(currentHeading);

  prevLat = newLat;
  prevLng = newLng;
  prevTime = currentTime;
  userLat = newLat;
  userLng = newLng;

  // ---- Atualiza marcador de posição ----
  if (estaEmNavegacao && startRouteMarker) {
    // Usa animação suave dedicada — sem setLatLng direto aqui
    _iniciarAnimacaoNavegacao(smoothLat, smoothLng, novoHeading);

    if (!gpsInitialized) {
      gpsInitialized = true;
      hideFullscreenLoading();
    }
  } else if (!estaEmNavegacao) {
    if (!userMarker) {
      var defaultIcon = L.divIcon({
        html: '<img src="/imagens_app/ic_gps_marker.png" onerror="this.src=\'https://cdn-icons-png.flaticon.com/512/684/684908.png\'" style="width:50px;height:50px;">',
        className: 'user-gps-marker',
        iconSize: [50, 50],
        iconAnchor: [25, 50],
        popupAnchor: [0, -50]
      });
      userMarker = L.marker([smoothLat, smoothLng], { icon: defaultIcon, zIndexOffset: 1000 }).addTo(map);
      userMarker.bindTooltip('Você está aqui', { permanent: false, direction: 'top', offset: [0, -25] });
      ultimaPosicaoMarcador = { lat: smoothLat, lng: smoothLng };
      if (!gpsInitialized) {
        gpsInitialized = true;
        hideFullscreenLoading();
      }
    } else {
      moverMarcadorSuavemente(smoothLat, smoothLng);
    }
  }

  // Atualiza rota periodicamente
  if (destinoAtual && routingControl && estaEmNavegacao) {
    if (!window.ultimaAtualizacaoRota || (currentTime - window.ultimaAtualizacaoRota > 5000)) {
      atualizarRota();
      window.ultimaAtualizacaoRota = currentTime;
    }
  }

  // Câmera
  if (estaEmNavegacao && isFollowing) {
    atualizarCameraNavegacaoSuave();
  } else if (isFollowing && !estaEmNavegacao) {
    map.setView([smoothLat, smoothLng], map.getZoom(), { animate: false, duration: 0 });
  }
  
  verificarChegadaDestino();
  verificarAlertasRadares();
}


// ===================================================================
// VERIFICAÇÃO PRINCIPAL DE ALERTAS A 180 METROS
// ===================================================================
function verificarAlertasRadares() {
  if (!alertaHabilitado || !userLat || !userLng) return;

  var radarMaisProximo = null;
  var menorDistancia = Infinity;
  var tipoAlertaMaisProximo = null;

  for (var i = 0; i < radarMarkers.length; i++) {
    var m = radarMarkers[i];
    if (!m.options || !m.options.record) continue;
    
    var rData = m.options.record;
    var tipoOriginal = rData.tipo || rData.tipo_equipamento || "";
    
    if (!deveAlertaRadar(tipoOriginal)) continue;

    var rLat = m.getLatLng().lat;
    var rLng = m.getLatLng().lng;
    var dist = calcularDistancia(userLat, userLng, rLat, rLng);

    if (dist < menorDistancia) {
      menorDistancia = dist;
      radarMaisProximo = m;
      tipoAlertaMaisProximo = tipoOriginal;
    }
  }

  if (!radarMaisProximo || menorDistancia > ALERT_CONFIG.DISTANCIA_MAXIMA) {
    if ($("#alert-container").is(":visible") && ultimoRadarAlertado === (radarMaisProximo ? radarMaisProximo.options.id : null)) {
      esconderAlertaVisual();
    }
    ultimoRadarAlertado = null;
    return;
  }

  var rData = radarMaisProximo.options.record;
  var rId = radarMaisProximo.options.id;
  var tipoClassificado = classificarAlerta(tipoAlertaMaisProximo);

  var direcao = verificarDirecaoMelhorada(userLat, userLng, currentHeading, radarMaisProximo.getLatLng().lat, radarMaisProximo.getLatLng().lng, rId, menorDistancia);

  if (direcao.estaAfastando && menorDistancia > ALERT_CONFIG.DISTANCIA_PASSAR_RADAR) {
    if (ultimoRadarAlertado === rId) esconderAlertaVisual();
    ultimoRadarAlertado = null;
    return;
  }

  if (ultimoRadarAlertado !== rId) {
    ultimoRadarAlertado = rId;
    tipoSomTocando = null; // Reseta para o novo radar poder tocar
  }

  if (direcao.estaAproximando && menorDistancia <= ALERT_CONFIG.DISTANCIA_MAXIMA) {
    var nomeFormatado = ajusteNomes[tipoAlertaMaisProximo.trim()] || tipoAlertaMaisProximo;
    var velRadar = rData.velocidade || rData.vel || "";
    var msgAlerta = nomeFormatado + (velRadar ? " - " + velRadar + " km/h" : "") + " a " + Math.round(menorDistancia) + "m";

    $(".alert-bar").removeClass("alert-bar-critico alert-bar-risco alert-bar-risco-critico alert-bar-mobilidade alert-bar-mobilidade-critico alert-bar-MOBILIDADE");
    $(".alert-bar").css("background", "");
    
    if (tipoClassificado === 'radar') {
      $("#alert-title").text("⚠️ ATENÇÃO RADAR!");
      $(".alert-bar").addClass("alert-bar-critico");
      $("#alert-icon").attr("src", getIconUrl(tipoAlertaMaisProximo, velRadar));
      tocarSomAlerta('radar'); // VERMELHO: toca .mp3 3 vezes
    } 
    else if (tipoClassificado === 'risco') {
      $("#alert-title").text("⚠️ RISCO!");
      $(".alert-bar").addClass("alert-bar-risco");
      $("#alert-icon").attr("src", getIconUrl(tipoAlertaMaisProximo, velRadar));
      tocarSomAlerta('risco'); // AMARELO: toca .mp3 3 vezes
    } 
    else if (tipoClassificado === 'mobilidade') {
      dispararAlertaMobilidadeIA(msgAlerta); // VERDE: chama função própria que usa 'aviso' 3 vezes
      return;
    }

    $("#alert-text").text(msgAlerta);

    if (!$("#alert-container").is(":visible")) { 
      $("#alert-container").fadeIn(200); 
      ajustarPosicaoSpeedWidget(true);
    }

    if (menorDistancia <= ALERT_CONFIG.DISTANCIA_CRITICA) {
      $(".alert-bar").addClass(tipoClassificado === 'radar' ? "alert-bar-critico" : "alert-bar-risco-critico");
    }

    clearTimeout(alertTimeout);
    alertTimeout = setTimeout(function() { 
      if ($("#alert-container").is(":visible")) esconderAlertaVisual(); 
    }, ALERT_CONFIG.TEMPO_ALERTA);
  }
}
